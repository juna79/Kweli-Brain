<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kweli Brain — Institutional Memory</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
  :root{
    --bg:#070E14; --panel:#0E1E2A; --panel2:#122636; --raise:#16303F;
    --line:rgba(255,255,255,.07); --line-s:rgba(255,255,255,.12);
    --txt:#EAF1F4; --muted:#90A6B2; --faint:#5E7785;
    --gold:#C9A24B; --gold-d:#A6822F; --gold-soft:rgba(201,162,75,.13);
    --green:#46B98A; --amber:#E0A340; --red:#E0654B; --blue:#4FA3D1; --purple:#9B7FD4;
    --r:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-size:14px;line-height:1.55;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:var(--gold);text-decoration:none}
  ::selection{background:rgba(201,162,75,.28)}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .muted{color:var(--muted)} .faint{color:var(--faint)}

  .app{display:flex;min-height:100vh}
  .sidebar{width:236px;flex:none;background:#060B10;border-right:1px solid var(--line);
    position:fixed;inset:0 auto 0 0;padding:24px 16px;overflow-y:auto;z-index:40;transition:transform .2s}
  .main{flex:1;margin-left:236px;min-width:0;display:flex;flex-direction:column}
  .brand{display:flex;align-items:center;gap:12px;padding:2px 8px 22px}
  .brand-mark{width:36px;height:36px;border-radius:9px;flex:none;display:grid;place-items:center;
    background:linear-gradient(145deg,var(--gold),#6f571f);color:#070E14;font-weight:800;font-size:19px;font-family:ui-monospace,monospace}
  .brand-name{font-weight:660;font-size:15.5px;letter-spacing:-.01em;line-height:1.1}
  .brand-sub{font-size:9.5px;color:var(--faint);letter-spacing:.13em;text-transform:uppercase;font-family:ui-monospace,monospace;margin-top:3px}
  .nav{display:flex;flex-direction:column;gap:1px;margin-top:4px}
  .nav-item{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:9px;color:var(--muted);
    cursor:pointer;font-size:13.5px;font-weight:500}
  .nav-item:hover{color:var(--txt);background:var(--panel)}
  .nav-item.active{color:var(--txt);background:var(--panel2)}
  .nav-item .ico{width:17px;flex:none;color:var(--faint);text-align:center}
  .nav-item.active .ico{color:var(--gold)}
  .nav-badge{margin-left:auto;font-size:10px;font-family:ui-monospace,monospace;background:var(--red);color:#fff;border-radius:9px;padding:1px 7px;font-weight:700}
  .nav-sect{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-family:ui-monospace,monospace;padding:16px 12px 6px}

  .topbar{display:flex;align-items:center;gap:14px;padding:13px 30px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:rgba(7,14,20,.88);backdrop-filter:blur(10px);z-index:30}
  .hamb{display:none;background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--txt);width:36px;height:36px;cursor:pointer;font-size:16px}
  .searchwrap{position:relative;flex:1;max-width:560px}
  #globalSearch{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:11px;color:var(--txt);
    padding:10px 14px;font-size:13.5px;font-family:inherit;outline:none}
  #globalSearch:focus{border-color:var(--gold)}
  .search-panel{position:absolute;top:50px;left:0;right:0;background:var(--panel);border:1px solid var(--line-s);border-radius:13px;
    box-shadow:0 24px 60px -22px rgba(0,0,0,.8);max-height:65vh;overflow-y:auto;z-index:50;padding:8px}
  .search-group-h{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-family:ui-monospace,monospace;padding:10px 12px 5px}
  .search-res{padding:9px 12px;border-radius:9px;cursor:pointer}
  .search-res:hover{background:var(--panel2)}
  .search-res .r-title{font-size:13.5px}
  .search-res .r-snip{font-size:11.5px;color:var(--faint);margin-top:2px;display:block}
  .status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px}

  .content{padding:32px 30px 90px;max-width:1180px;margin:0 auto;width:100%}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:24px;flex-wrap:wrap}
  .eyebrow{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
  .page-title{font-size:25px;font-weight:660;letter-spacing:-.02em;margin-top:6px}
  .page-sub{font-size:13px;color:var(--muted);margin-top:5px}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px}
  .sec{margin-bottom:24px}
  .sec-h{display:flex;align-items:center;gap:10px;margin-bottom:11px}
  .sec-h h2{font-size:12.5px;font-weight:640;margin:0}
  .sec-h .count{font-family:ui-monospace,monospace;font-size:11px;color:var(--faint);margin-left:auto}
  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:1fr 1fr}
  .g-auto{grid-template-columns:repeat(auto-fill,minmax(270px,1fr))}
  .dash-grid{display:grid;grid-template-columns:2.2fr 1fr;gap:16px;align-items:start}
  @media(max-width:1000px){.dash-grid{grid-template-columns:1fr}}

  .row-item{display:flex;align-items:center;gap:12px;padding:12px 15px;background:var(--panel);
    border:1px solid var(--line);border-radius:11px;cursor:pointer;margin-bottom:7px}
  .row-item:hover{border-color:var(--line-s)}
  .row-item.alert{border-color:rgba(224,101,75,.4)}
  .udot{width:8px;height:8px;border-radius:50%;flex:none}
  .row-main{flex:1;min-width:0}
  .row-title{font-size:13.5px;font-weight:560}
  .row-meta{font-size:11.5px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row-right{font-size:10.5px;font-family:ui-monospace,monospace;white-space:nowrap;color:var(--faint)}

  .btn{background:var(--panel2);border:1px solid var(--line-s);color:var(--txt);padding:8px 14px;border-radius:9px;
    font-size:12.5px;font-weight:560;cursor:pointer;font-family:inherit}
  .btn:hover{border-color:var(--gold)}
  .btn.gold{background:linear-gradient(145deg,var(--gold),var(--gold-d));border:none;color:#070E14}
  .btn.sm{padding:6px 11px;font-size:12px}
  .btn.danger{border-color:rgba(224,101,75,.5);color:var(--red)}
  .btn.active{border-color:var(--gold);color:var(--gold)}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10.5px;
    font-weight:600;background:var(--panel2);border:1px solid var(--line-s)}
  .pill-editable{cursor:pointer;transition:border-color .12s,background .12s}
  .pill-editable:hover{border-color:var(--gold);background:var(--raise)}
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:18px;overflow-x:auto}
  .tab{padding:9px 13px;font-size:12.5px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
  .tab.active{color:var(--txt);border-color:var(--gold)}
  .field{margin-bottom:13px}
  .fl{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px}
  .input,.select,textarea.input{width:100%;background:var(--panel2);border:1px solid var(--line-s);border-radius:8px;
    color:var(--txt);padding:9px 11px;font-size:13px;font-family:inherit;outline:none}
  .input:focus,.select:focus,textarea.input:focus{border-color:var(--gold)}
  .kv{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:12.5px}
  .kv .k{color:var(--faint)}
  .kv:last-child{border-bottom:none}
  .modal-scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:flex-start;justify-content:center;padding:36px 20px;overflow-y:auto}
  .modal-scrim.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line-s);border-radius:16px;max-width:620px;width:100%;padding:24px;max-height:90vh;overflow-y:auto}
  .modal.wide{max-width:960px}
  .close-x{float:right;cursor:pointer;color:var(--faint);font-size:20px;line-height:1}
  .toast{position:fixed;bottom:22px;right:22px;background:var(--panel2);border:1px solid var(--gold);
    padding:11px 17px;border-radius:10px;font-size:12.5px;z-index:200;box-shadow:0 12px 30px rgba(0,0,0,.5)}
  .empty{color:var(--faint);font-size:12.5px;padding:18px 0;text-align:center}
  .badge-org-type{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--gold)}
  .out{background:#050A0E;border:1px solid var(--line);border-radius:10px;padding:13px;font-size:12px;
    font-family:ui-monospace,monospace;white-space:pre-wrap;max-height:400px;overflow-y:auto}
  .note-yellow{background:#3a3418;border-color:#E0A340}
  .note-red{background:#3a1e18;border-color:#E0654B}
  .note-green{background:#153328;border-color:#46B98A}
  .sticky{border:1px solid var(--line-s);border-radius:10px;padding:13px;min-height:105px;cursor:pointer;position:relative}
  .board-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:13px}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
  .link-btn{background:none;border:none;color:var(--gold);cursor:pointer;font-size:12.5px;padding:0}
  .badge-count{font-family:ui-monospace,monospace;font-size:10px;color:var(--faint)}
  .qa-btn{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:linear-gradient(145deg,var(--gold),var(--gold-d));
    border:none;color:#070E14;font-size:24px;cursor:pointer;box-shadow:0 12px 30px rgba(0,0,0,.5);z-index:60}
  .thumb{width:100%;aspect-ratio:4/3;background:var(--panel2);border-radius:9px;display:grid;place-items:center;font-size:28px;margin-bottom:10px;overflow:hidden}
  .suggest-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;background:var(--gold-soft);color:var(--gold);
    border:1px solid rgba(201,162,75,.35);border-radius:20px;padding:4px 10px;margin:4px 6px 0 0;cursor:default}
  @media(max-width:880px){
    .sidebar{transform:translateX(-100%)} .sidebar.open{transform:translateX(0)}
    .main{margin-left:0} .hamb{display:block} .content{padding:24px 16px 90px}
  }

  /* ===== Final-pass polish ===== */
  .card{transition:border-color .15s, transform .15s}
  .row-item{transition:border-color .15s, transform .12s}
  .row-item:hover{transform:translateX(2px)}
  .org-card{cursor:pointer;display:flex;flex-direction:column;gap:10px}
  .org-card:hover{border-color:var(--gold);transform:translateY(-1px)}
  .org-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .org-card-name{font-size:15.5px;font-weight:660;letter-spacing:-.01em}
  .org-card-meta{display:flex;gap:6px;flex-wrap:wrap;font-size:10.5px}
  .flag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
  .flag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
  .flag.waiting{background:rgba(79,163,209,.15);color:var(--blue);border:1px solid rgba(79,163,209,.3)}
  .flag.pilot{background:rgba(70,185,138,.15);color:var(--green);border:1px solid rgba(70,185,138,.3)}
  .flag.investor{background:var(--gold-soft);color:var(--gold);border:1px solid rgba(201,162,75,.3)}
  .flag.team{background:rgba(155,127,212,.15);color:var(--purple);border:1px solid rgba(155,127,212,.3)}
  .org-card-foot{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--line);font-size:11px}
  .priority-bar{width:100%;height:3px;border-radius:2px;background:var(--panel2);overflow:hidden}
  .priority-bar-fill{height:100%;border-radius:2px}

  .avatar{width:38px;height:38px;border-radius:50%;flex:none;display:grid;place-items:center;font-weight:700;font-size:13px;
    background:linear-gradient(145deg,var(--panel2),var(--raise));color:var(--gold);border:1px solid var(--line-s)}
  .person-card{cursor:pointer;display:flex;gap:12px;align-items:flex-start}
  .person-card:hover{border-color:var(--gold);transform:translateY(-1px)}
  .warmth-pill{font-size:9.5px;padding:2px 8px;border-radius:20px;font-weight:600}
  .warmth-hot{background:rgba(224,101,75,.15);color:var(--red)}
  .warmth-warm{background:rgba(224,163,64,.15);color:var(--amber)}
  .warmth-cold{background:rgba(79,163,209,.15);color:var(--blue)}
  .warmth-default{background:var(--panel2);color:var(--faint)}

  .empty{color:var(--faint);font-size:12.5px;padding:34px 20px;text-align:center;border:1px dashed var(--line-s);border-radius:12px}
  .empty-ico{font-size:22px;margin-bottom:8px;opacity:.5}


  /* organisation and people identity polish */
  .org-identity{display:flex;align-items:center;gap:12px;min-width:0}
  .org-emblem{width:46px;height:46px;border-radius:13px;flex:none;display:grid;place-items:center;font-size:22px;font-weight:800;
    border:1px solid rgba(255,255,255,.12);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 8px 20px rgba(0,0,0,.22)}
  .org-emblem.lg{width:58px;height:58px;border-radius:16px;font-size:28px}
  .org-title-wrap{min-width:0}
  .person-avatar{width:48px;height:48px;border-radius:15px;flex:none;display:grid;place-items:center;font-weight:800;font-size:14px;
    color:white;border:1px solid rgba(255,255,255,.14);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 8px 20px rgba(0,0,0,.2)}
  .person-avatar.sm{width:38px;height:38px;border-radius:12px;font-size:12px}
  .identity-head{display:flex;align-items:center;gap:14px}
  .identity-copy{min-width:0}


  /* richer list sections + card/table views */
  .view-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .view-toggle{display:inline-flex;background:var(--panel2);border:1px solid var(--line-s);border-radius:10px;padding:3px;gap:3px}
  .view-toggle button{border:none;background:transparent;color:var(--muted);padding:7px 12px;border-radius:7px;cursor:pointer;font:inherit;font-size:12px}
  .view-toggle button.active{background:var(--raise);color:var(--txt)}
  .metric-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
  .metric-tile{background:linear-gradient(145deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:12px;padding:13px}
  .metric-tile .metric-value{font-size:19px;font-weight:750}
  .metric-tile .metric-label{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
  .rich-card{position:relative;overflow:hidden;cursor:pointer;min-height:168px}
  .rich-card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--gold))}
  .rich-card:hover{border-color:var(--accent,var(--gold));transform:translateY(-2px)}
  .rich-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .rich-icon{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;flex:none;background:var(--gold-soft);color:var(--gold);font-size:19px;border:1px solid rgba(201,162,75,.25)}
  .rich-title{font-size:14.5px;font-weight:700;line-height:1.35}
  .rich-sub{font-size:11.5px;color:var(--muted);margin-top:3px}
  .rich-body{font-size:12.5px;color:var(--muted);margin-top:12px;line-height:1.5}
  .rich-foot{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-top:14px;padding-top:10px;border-top:1px solid var(--line);font-size:10.5px;color:var(--faint)}
  .data-table{width:100%;border-collapse:collapse;font-size:12.5px}
  .data-table th{text-align:left;padding:11px 14px;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);font-weight:650;border-bottom:1px solid var(--line)}
  .data-table td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:top}
  .data-table tr{transition:background .12s}
  .data-table tbody tr:hover{background:var(--panel2)}
  .status-chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:650;border:1px solid var(--line-s);background:var(--panel2)}


  /* lessons + objections visual system */
  .knowledge-hero{display:grid;grid-template-columns:1.6fr 1fr;gap:14px;margin-bottom:18px}
  @media(max-width:900px){.knowledge-hero{grid-template-columns:1fr}}
  .knowledge-banner{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--panel),var(--panel2));border:1px solid var(--line-s);
    border-radius:16px;padding:20px}
  .knowledge-banner:after{content:"";position:absolute;width:150px;height:150px;border-radius:50%;right:-45px;top:-55px;
    background:radial-gradient(circle,rgba(201,162,75,.18),transparent 68%)}
  .pattern-list{display:flex;flex-direction:column;gap:8px}
  .pattern-row{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--panel2);border:1px solid var(--line);border-radius:10px}
  .pattern-bar{height:5px;border-radius:5px;background:var(--panel2);overflow:hidden;flex:1}
  .pattern-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--gold-d),var(--gold))}
  .lesson-card{--accent:var(--purple)}
  .lesson-card .rich-icon{background:rgba(155,127,212,.14);color:var(--purple);border-color:rgba(155,127,212,.28)}
  .objection-card.open{--accent:var(--red)}
  .objection-card.answered{--accent:var(--amber)}
  .objection-card.resolved{--accent:var(--green)}
  .objection-quote{font-size:13px;line-height:1.55;font-weight:650}
  .response-box{margin-top:12px;padding:10px 12px;border-radius:10px;background:var(--bg);border:1px solid var(--line);font-size:12px;color:var(--muted)}
  .insight-label{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:4px}
  .entity-stack{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}


  /* live collaboration + Team HQ */
  .presence-strip{display:flex;align-items:center;gap:7px;margin-left:auto}
  .presence-label{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;margin-right:2px}
  .presence-avatar{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;font-size:9.5px;font-weight:800;
    color:#fff;border:1px solid rgba(255,255,255,.16);position:relative;cursor:default;box-shadow:0 5px 14px rgba(0,0,0,.22)}
  .presence-avatar:after{content:"";position:absolute;right:-2px;bottom:-2px;width:8px;height:8px;border-radius:50%;
    background:var(--green);border:2px solid var(--bg)}
  .presence-more{font-size:10px;color:var(--muted);padding:4px 7px;border-radius:10px;background:var(--panel2);border:1px solid var(--line)}
  .team-hq-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px}
  .team-hq-members{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 18px}
  .team-member-chip{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:11px;background:var(--panel2);border:1px solid var(--line)}
  .team-member-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(70,185,138,.55)}
  .corkboard{background:
    radial-gradient(circle at 20% 20%,rgba(255,255,255,.04),transparent 35%),
    linear-gradient(135deg,#6d4d2f,#3f2d1f);border:8px solid #2b1d14;border-radius:16px;padding:22px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.06),0 18px 40px rgba(0,0,0,.35)}
  .corkboard .board-grid{gap:18px}
  .cork-pin{position:absolute;top:-7px;left:50%;transform:translateX(-50%);width:13px;height:13px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff3b0,#c7372f 35%,#6d100d 72%);box-shadow:0 3px 5px rgba(0,0,0,.4);z-index:2}
  .team-empty{color:rgba(255,255,255,.7);text-align:center;padding:34px 15px;border:1px dashed rgba(255,255,255,.22);border-radius:12px}


  /* calendar meeting capture */
  .person-pick-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;max-height:230px;overflow-y:auto;
    padding:8px;background:var(--bg);border:1px solid var(--line);border-radius:10px}
  .person-pick{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;background:var(--panel2);border:1px solid var(--line);
    cursor:pointer;font-size:12px}
  .person-pick:hover{border-color:var(--gold)}
  .calendar-day-actions{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px}

  /* mini calendar (Today) */
  .mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .mini-cal .mc-h{font-size:8.5px;color:var(--faint);text-align:center;text-transform:uppercase}
  .mini-cal .mc-d{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;font-size:10.5px;position:relative;cursor:pointer}
  .mini-cal .mc-d.has-items{background:var(--panel2)}
  .mini-cal .mc-d.is-today{border:1px solid var(--gold);color:var(--gold);font-weight:700}
  .mini-cal .mc-dot{width:3px;height:3px;border-radius:50%;background:var(--gold);position:absolute;bottom:3px}
  .quick-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .qa-chip{display:flex;align-items:center;gap:6px;padding:9px 14px;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;cursor:pointer;font-size:12.5px;transition:border-color .15s,transform .12s}
  .qa-chip:hover{border-color:var(--gold);transform:translateY(-1px)}

  /* kanban (Marketing) */
  .kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;overflow-x:auto}
  @media(max-width:1000px){.kanban{grid-template-columns:1fr;gap:16px}}
  .kanban-col{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;min-height:120px}
  .kanban-col-h{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);font-family:ui-monospace,monospace;
    display:flex;justify-content:space-between;margin-bottom:10px}
  .kanban-card{background:var(--panel2);border:1px solid var(--line-s);border-radius:9px;padding:10px;margin-bottom:8px;font-size:12px;cursor:pointer}
  .kanban-card:hover{border-color:var(--gold)}
  .kanban-card .kc-type{font-size:9.5px;color:var(--gold);text-transform:uppercase;letter-spacing:.05em}

  /* knowledge base chapters */
  .kb-layout{display:grid;grid-template-columns:220px 1fr;gap:20px}
  @media(max-width:880px){.kb-layout{grid-template-columns:1fr}}
  .kb-chapter{padding:9px 12px;border-radius:9px;cursor:pointer;font-size:12.5px;color:var(--muted);margin-bottom:2px}
  .kb-chapter:hover{background:var(--panel)}
  .kb-chapter.active{background:var(--panel2);color:var(--txt)}
  .kb-chapter .cnt{float:right;color:var(--faint);font-family:ui-monospace,monospace;font-size:10.5px}

  /* sticky notes, refined */
  .sticky{transition:transform .15s, box-shadow .15s; box-shadow:0 4px 10px rgba(0,0,0,.25)}
  .sticky:hover{transform:translateY(-3px) rotate(0deg) !important; box-shadow:0 10px 22px rgba(0,0,0,.4)}

  /* export/snapshot premium */
  .export-hero{display:flex;align-items:center;gap:18px;padding:28px;background:linear-gradient(135deg,var(--panel),var(--panel2));
    border:1px solid var(--line-s);border-radius:16px;margin-bottom:22px}
  .export-icon{width:56px;height:56px;border-radius:14px;flex:none;display:grid;place-items:center;font-size:26px;
    background:linear-gradient(145deg,var(--gold),var(--gold-d));color:#070E14}
  .export-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:20px}
  .export-metric{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
  .export-metric .em-val{font-size:20px;font-weight:700;font-family:ui-monospace,monospace}
  .export-metric .em-lbl{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
  .prompt-chip{display:inline-flex;align-items:center;padding:8px 13px;background:var(--panel2);border:1px solid var(--line-s);
    border-radius:20px;font-size:12px;cursor:pointer;margin:0 8px 8px 0}
  .prompt-chip:hover{border-color:var(--gold);color:var(--gold)}

  /* ===== Ported verbatim from V1 index.html — the actual benchmark ===== */

  /* month-grid calendar (V1 cal-*) */
  .cal-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .cal-toolbar .cal-label{font-size:15px;font-weight:620;min-width:170px}
  .cal-grid-wrap{overflow-x:auto;margin-bottom:8px}
  .cal-head-row{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:12px 12px 0 0;overflow:hidden;min-width:900px}
  .cal-head-cell{background:#060B10;padding:9px 10px;font-family:ui-monospace,monospace;font-size:9.5px;
    letter-spacing:.1em;text-transform:uppercase;color:var(--faint);text-align:center}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);
    border:1px solid var(--line);border-top:none;border-radius:0 0 12px 12px;overflow:hidden;min-width:900px}
  .cal-cell{background:var(--panel);min-height:118px;padding:7px;display:flex;flex-direction:column;gap:4px;cursor:pointer}
  .cal-cell.other{background:#0A1620;opacity:.5}
  .cal-cell.today{box-shadow:inset 0 0 0 2px var(--gold)}
  .cal-cell-head{display:flex;align-items:center;justify-content:space-between}
  .cal-cell-num{font-family:ui-monospace,monospace;font-size:11px;color:var(--faint)}
  .cal-cell.today .cal-cell-num{color:var(--gold);font-weight:700}
  .cal-cell-more{font-size:10px;color:var(--faint);font-family:ui-monospace,monospace;padding:1px 2px}
  .cal-mini{background:var(--panel2);border-radius:6px;padding:3px 6px 3px 7px;font-size:10.5px;line-height:1.35;
    cursor:pointer;display:flex;align-items:flex-start;gap:5px;border-left:2px solid var(--gold);transition:background .12s}
  .cal-mini:hover{background:var(--raise)}
  .cal-mini.custom{border-left-color:var(--green)}
  .cal-mini.overdue{border-left-color:var(--red);background:rgba(224,101,75,.14)}
  .cal-mini.done{opacity:.55;border-left-color:var(--faint)}
  .cal-mini.done .cal-mini-text{text-decoration:line-through}
  .cal-mini-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;
    -webkit-line-clamp:2;-webkit-box-orient:vertical}
  @media(max-width:880px){.cal-head-row,.cal-grid{min-width:680px}}

  /* dense dashboard rows (V1 dsec/drow) */
  .dsec{margin-bottom:22px}
  .dsec-h{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .dsec-h h2{font-size:13px;font-weight:640;margin:0}
  .dcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px}
  .dlist{display:flex;flex-direction:column;gap:6px}
  .dempty{color:var(--faint);font-size:12px;padding:10px 2px}
  .drow{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--panel);border:1px solid var(--line);
    border-radius:9px;cursor:pointer;transition:border-color .15s}
  .drow:hover{border-color:var(--line-s)}
  .drow.alert{border-color:rgba(224,101,75,.4)}
  .drow-dot{width:7px;height:7px;border-radius:50%;flex:none}
  .drow-icon{font-size:12px;flex:none;width:16px;text-align:center}
  .drow-main{flex:1;min-width:0}
  .drow-title{font-size:13px;font-weight:560;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .drow-meta{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .drow-right{font-size:10.5px;font-family:ui-monospace,monospace;white-space:nowrap;color:var(--faint);flex:none}

  /* relationship cards (V1 ent-card, People) */
  .ent-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;cursor:pointer;
    display:flex;flex-direction:column;gap:9px;transition:border-color .15s}
  .ent-card:hover{border-color:var(--gold)}
  .ent-card.alert{border-color:rgba(224,101,75,.45)}
  .ent-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .ent-name{font-size:15px;font-weight:620;letter-spacing:-.01em}
  .ent-sub{font-size:11px;color:var(--faint);font-family:ui-monospace,monospace;margin-top:3px}
  .ent-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .ent-next{font-size:12.5px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:8px 10px;line-height:1.4}
  .ent-next .lbl{display:block;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);font-family:ui-monospace,monospace;margin-bottom:3px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .toolbar .search-in{flex:1;min-width:180px}
  .people-toolbar{display:grid;grid-template-columns:minmax(240px,1.5fr) minmax(180px,.8fr) minmax(150px,.65fr) minmax(180px,.75fr);gap:9px;align-items:center;margin-bottom:18px}
  .people-toolbar .input,.people-toolbar .select{min-width:0;width:100%;height:42px}
  @media(max-width:900px){.people-toolbar{grid-template-columns:1fr 1fr}.people-toolbar .people-search{grid-column:1/-1}}
  @media(max-width:560px){.people-toolbar{grid-template-columns:1fr}}

  /* asset library (V1 a-thumb/asset-card) */
  .assets-grid{display:grid;gap:16px;grid-template-columns:repeat(3,1fr)}
  @media(max-width:1020px){.assets-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:620px){.assets-grid{grid-template-columns:1fr}}
  .asset-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);cursor:pointer;overflow:hidden;
    display:flex;flex-direction:column;transition:border-color .15s}
  .asset-card:hover{border-color:var(--gold)}
  .a-thumb{position:relative;width:100%;aspect-ratio:4/3;flex:none;background:var(--panel2);overflow:hidden}
  .a-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s ease}
  .asset-card:hover .a-thumb img{transform:scale(1.035)}
  .a-thumb-fallback{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;height:100%;
    background:linear-gradient(160deg,var(--panel2),var(--raise))}
  .a-thumb-fallback .a-thumb-ico{font-size:32px;line-height:1}
  .a-thumb-fallback .a-thumb-label{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-family:ui-monospace,monospace}
  .a-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1;min-height:0}
  .a-title{font-size:13.5px;font-weight:620;line-height:1.32;letter-spacing:-.01em;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .a-sub{font-size:11px;color:var(--faint);font-family:ui-monospace,monospace}
  .a-foot{margin-top:auto;padding-top:9px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;
    font-size:10.5px;color:var(--faint);font-family:ui-monospace,monospace}

  /* onboarding restore panel (Marketing) */
  .restore-panel{background:linear-gradient(135deg,var(--panel),var(--panel2));border:1px solid var(--line-s);
    border-radius:14px;padding:26px;text-align:center;margin-bottom:20px}
  .seg{display:inline-flex;background:var(--panel2);border:1px solid var(--line-s);border-radius:9px;padding:2px;gap:2px}
  .seg button{background:none;border:none;color:var(--muted);font-size:12.5px;padding:7px 14px;border-radius:7px;cursor:pointer;font-family:inherit}
  .seg button.active{background:var(--raise);color:var(--txt)}

  /* ===== KWELI BRAIN V3 — BLACK + GOLD DESIGN SYSTEM ===== */
  :root{
    --bg:#050607; --panel:#0B0D0F; --panel2:#101316; --raise:#15191D;
    --line:rgba(201,162,75,.15); --line-s:rgba(201,162,75,.28);
    --txt:#F5F5F1; --muted:#A9ADB1; --faint:#6F757B;
    --gold:#D6A900; --gold-d:#8A6500; --gold-soft:rgba(214,169,0,.12);
    --green:#34C77B; --amber:#E5A12B; --red:#EF4444; --blue:#2E9BFF; --purple:#B66DFF;
    --r:13px;
  }
  body{background:
    radial-gradient(circle at 80% -10%,rgba(214,169,0,.06),transparent 35%),
    linear-gradient(#050607,#07090B);font-size:13px}
  .sidebar{width:228px;background:linear-gradient(180deg,#050607,#07090A);border-right:1px solid rgba(214,169,0,.16);padding:18px 14px}
  .main{margin-left:228px}
  .brand{padding:0 6px 20px}
  .brand-mark{background:transparent;color:var(--gold);border:1px solid var(--gold);box-shadow:0 0 18px rgba(214,169,0,.15)}
  .brand-name{font-size:18px;font-weight:760}
  .brand-sub{display:none}
  .nav{gap:4px}
  .nav-item{padding:10px 11px;border-radius:8px;color:#C4C7CA}
  .nav-item:hover{background:#0E1114;color:#fff}
  .nav-item.active{background:linear-gradient(90deg,#9B7000,#6F5000);color:#fff;box-shadow:inset 0 0 0 1px rgba(255,213,69,.2)}
  .nav-item.active .ico{color:#FFE17A}
  .nav-sect{color:#626970;padding-top:18px}
  .topbar{padding:12px 18px;background:rgba(5,6,7,.92);border-bottom:1px solid rgba(214,169,0,.12)}
  #globalSearch{background:#0D1012;border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:10px 14px}
  #globalSearch:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(214,169,0,.08)}
  .content{padding:18px 18px 70px;max-width:1540px}
  .page-title{font-size:24px;font-weight:760}
  .page-sub{color:#92999F}
  .card,.today-panel,.kanban-col,.ent-card,.asset-card,.dcard{
    background:linear-gradient(145deg,#0A0D0F,#0E1215);
    border:1px solid rgba(214,169,0,.17);
    box-shadow:0 10px 28px rgba(0,0,0,.18);
  }
  .card:hover,.ent-card:hover,.asset-card:hover{border-color:rgba(214,169,0,.42)}
  .btn{background:#0F1215;border:1px solid rgba(214,169,0,.27);border-radius:8px}
  .btn:hover{background:#15191C;border-color:var(--gold)}
  .btn.gold{background:linear-gradient(145deg,#C99B00,#7F5C00);color:#fff;box-shadow:0 6px 16px rgba(214,169,0,.18)}
  .pill,.status-chip{background:#0F1316;border:1px solid rgba(214,169,0,.18)}
  .input,.select,textarea.input{background:#0D1012;border:1px solid rgba(255,255,255,.1)}
  .input:focus,.select:focus,textarea.input:focus{border-color:var(--gold)}
  .modal{background:#090C0E;border:1px solid rgba(214,169,0,.28);box-shadow:0 30px 90px rgba(0,0,0,.7)}
  .row-item,.drow{background:#0A0D0F;border-color:rgba(255,255,255,.07)}
  .row-item:hover,.drow:hover{border-color:rgba(214,169,0,.3);background:#101417}
  .metric-tile,.metric-rail-card{background:linear-gradient(145deg,#0B0E10,#11161A);border-color:rgba(214,169,0,.18)}
  .data-table th{color:#8F969C;border-bottom-color:rgba(214,169,0,.15)}
  .data-table td{border-bottom-color:rgba(255,255,255,.06)}
  .data-table tbody tr:hover{background:#101417}
  .org-emblem,.person-avatar{box-shadow:0 8px 24px rgba(0,0,0,.35)}
  .cal-head-row,.cal-grid{background:rgba(214,169,0,.15);border-color:rgba(214,169,0,.15)}
  .cal-head-cell{background:#080A0C;color:#8C9399}
  .cal-cell{background:#0A0D10}
  .cal-cell.other{background:#07090B}
  .cal-mini{background:#11171C}
  .qa-btn{background:linear-gradient(145deg,#D6A900,#7E5A00);color:#fff}
  .today-v3{display:grid;grid-template-columns:minmax(0,2fr) minmax(310px,.82fr) 185px;gap:12px}
  .today-main{display:flex;flex-direction:column;gap:12px}
  .today-calendar{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(280px,.75fr);gap:12px}
  .today-calendar.agenda-only{grid-template-columns:1fr}
  .completion-focus{display:flex;align-items:center;justify-content:center;padding:18px}
  .completion-focus .completion-celebration{width:100%;margin:0}
  .today-panel{border-radius:12px;overflow:hidden}
  .panel-pad{padding:15px}
  .today-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap}
  .today-heading{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .today-date{color:#A7ADB2;font-size:12px}
  .seg-v3{display:inline-flex;background:#07090B;border:1px solid rgba(214,169,0,.2);border-radius:8px;padding:2px}
  .seg-v3 button{background:none;border:0;color:#8E969D;padding:6px 10px;border-radius:6px;cursor:pointer;font:inherit}
  .seg-v3 button.active{background:rgba(214,169,0,.14);color:var(--gold)}
  .agenda-list{padding:12px;min-height:475px}
  .agenda-row{display:grid;grid-template-columns:54px 16px 1fr;min-height:56px}
  .agenda-time{font-family:ui-monospace,monospace;color:#A4ABB1;font-size:11px;padding-top:4px}
  .agenda-line{border-left:1px solid rgba(255,255,255,.15);position:relative}
  .agenda-line:before{content:"";position:absolute;left:-4px;top:9px;width:7px;height:7px;border-radius:50%;background:var(--slot,var(--gold));box-shadow:0 0 8px var(--slot,var(--gold))}
  .agenda-card{margin:0 0 10px 10px;background:#10161B;border:1px solid rgba(255,255,255,.09);border-left:3px solid var(--slot,var(--gold));border-radius:8px;padding:10px 12px;cursor:pointer}
  .agenda-card:hover{border-color:var(--slot,var(--gold));transform:translateX(2px)}
  .agenda-title{font-weight:680;font-size:12.5px}
  .agenda-meta{font-size:10.5px;color:#96A0A8;margin-top:2px}
  .focus-v3{min-height:475px;padding:18px;background:linear-gradient(145deg,#0B0E10,#0F1317);border:1px solid rgba(214,169,0,.18);border-radius:11px}
  .focus-v3 h3{margin:0 0 6px;font-size:14px}
  .focus-label{font-size:9px;color:#7F888F;text-transform:uppercase;letter-spacing:.08em;margin:17px 0 5px}
  .focus-body{font-size:12px;color:#B7BEC3;line-height:1.55}
  .side-stack{display:flex;flex-direction:column;gap:12px}
  .side-row{display:grid;grid-template-columns:86px 1fr;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07);cursor:pointer}
  .side-row:last-child{border-bottom:0}
  .side-time{font-size:9.5px;color:#9BA3A9}
  .side-title{font-size:11.5px;font-weight:660}
  .side-sub{font-size:9.5px;color:#8D969D;margin-top:2px}
  .hq-board{background:linear-gradient(135deg,#74502F,#402C1E);border:5px solid #24180F;border-radius:10px;padding:10px}
  .hq-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .hq-post{position:relative;min-height:120px;padding:14px 8px 9px;color:#111;font-size:9px;font-weight:650;box-shadow:0 5px 10px rgba(0,0,0,.35);cursor:pointer}
  .hq-post:nth-child(1){background:#F2D96A;transform:rotate(-1deg)}
  .hq-post:nth-child(2){background:#A7D8ED;transform:rotate(1deg)}
  .hq-post:nth-child(3){background:#A8D889;transform:rotate(-.6deg)}
  .hq-post:before{content:"";position:absolute;top:-5px;left:50%;width:10px;height:10px;border-radius:50%;background:#C9352E}
  .hq-post:nth-child(2):before{background:#276FAE}.hq-post:nth-child(3):before{background:#318C49}
  .stat-rail{display:flex;flex-direction:column;gap:10px}
  .stat-card{background:linear-gradient(145deg,#0B0E10,#101519);border:1px solid rgba(214,169,0,.18);border-radius:11px;padding:14px}
  .stat-num{font-size:22px;font-weight:800}
  .stat-label{font-size:11px;color:#A6ADB2}
  .stat-note{font-size:9px;color:var(--gold);margin-top:6px}
  .today-bottom{display:grid;grid-template-columns:1fr 1.15fr .8fr;gap:12px}
  .compact-row{display:grid;grid-template-columns:12px minmax(100px,.75fr) 1.2fr auto;gap:9px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:11px;cursor:pointer}
  .compact-row:last-child{border-bottom:0}
  .feed-row{display:grid;grid-template-columns:28px 1fr auto;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)}
  .feed-avatar{width:25px;height:25px;border-radius:8px;display:grid;place-items:center;background:#141A1F;font-size:9px;font-weight:700}
  .calendar-v3-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .calendar-v3-toolbar .title{font-size:17px;font-weight:700;min-width:180px}
  .week-grid{display:grid;grid-template-columns:58px repeat(7,1fr);border:1px solid rgba(214,169,0,.18);border-radius:12px;overflow:hidden}

<script>
/* ============================================================================
   CONFIG — points at the completed, confirmed V2 schema (01-05 already run).
============================================================================ */
const SUPABASE_URL = "https://vezgkdmlkbujqdvfxpxp.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_Q9dXQ-QIkSDC4B4rswzgLg_sTRcCbOw";
const ASSETS_BUCKET = "kweli-brain-assets-v2";
const MIGRATION_STEP_PREFIX = "kweli_brain_v1_to_v2_2026_07:";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null, myProfile = null;
let realtimeStatus = 'connecting', dbStatus = 'connecting';
let presenceChannel = null;
let onlineMembers = [];
const signedUrlCache = {}; // path -> {url, expires}

/* ---------------------------------------------------------------------------
   STATE — exact confirmed V2 table names. One mirror, every page renders
   from it: "one record, multiple views."
--------------------------------------------------------------------------- */
let state = {
  user_profiles: [], organisations: [], people: [], opportunities: [], meetings: [],
  meeting_attendees: [], tasks: [], assets_v2: [], lessons_v2: [], decisions: [],
  team_messages_v2: [], team_message_replies: [], team_message_reads: [], activities: [],
  objections: [], marketing_items: [], knowledge_sections_v2: [], investor_profiles: [],
  entity_links: [], migration_log: []
};
const TABLES = Object.keys(state);

function uid(){return crypto.randomUUID();}
function today(){
  const d=new Date();
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function byId(arr,id){return arr.find(x=>x.id===id);}
function normText(s){return (s==null?'':String(s)).toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();}
function normEmail(s){return (s==null?'':String(s)).toLowerCase().trim();}
function normDomain(url){ if(!url) return ''; try{ let u=String(url).trim().replace(/^https?:\/\//i,'').replace(/^www\./i,''); return u.split(/[\/?#]/)[0].toLowerCase(); }catch(e){ return ''; } }
function fmtDate(d){if(!d)return '—';return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function toLocalDateTimeInput(value){
  if(!value) return '';
  const d=new Date(value);
  if(Number.isNaN(d.getTime())) return String(value).slice(0,16);
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
  const h=String(d.getHours()).padStart(2,'0'),min=String(d.getMinutes()).padStart(2,'0');
  return y+'-'+m+'-'+day+'T'+h+':'+min;
}
function localInputToIso(value){
  if(!value) return null;
  const d=new Date(value);
  return Number.isNaN(d.getTime())?value:d.toISOString();
}
function fmtDateTime(d){ if(!d) return 'Never'; try{ const dt=new Date(d); const t=dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); const isToday=dt.toDateString()===new Date().toDateString(); return (isToday?'Today':dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}))+' '+t; }catch(e){ return String(d); } }
function daysUntil(d){if(!d)return null;const t=new Date(today()),x=new Date(d);return Math.round((x-t)/86400000);}
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.getElementById('toastHost').appendChild(el);setTimeout(()=>el.remove(),3200);}
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}
function toggleSidebar(o){const sbEl=document.getElementById('sidebar'),sc=document.getElementById('scrim');
  if(o===undefined)o=!sbEl.classList.contains('open');sbEl.classList.toggle('open',o);sc.style.display=o?'block':'none';}

/* ---------------------------------------------------------------------------
   AUTH
--------------------------------------------------------------------------- */
async function doSignIn(){
  const email=document.getElementById('loginEmail').value.trim();
  const pw=document.getElementById('loginPw').value;
  document.getElementById('loginErr').textContent='';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){document.getElementById('loginErr').textContent=error.message;return;}
  await onSignedIn(data.session);
}
async function doSignOut(){await sb.auth.signOut();currentUser=null;location.reload();}
async function onSignedIn(session){
  currentUser=session.user;
  let {data:prof}=await sb.from('user_profiles').select('*').eq('id',currentUser.id).maybeSingle();
  if(!prof){
    const displayName=(currentUser.user_metadata||{}).name||currentUser.email.split('@')[0].replace(/^./,c=>c.toUpperCase());
    const ins=await sb.from('user_profiles').insert({id:currentUser.id,display_name:displayName,handle:displayName.toLowerCase()}).select().single();
    prof=ins.data;
  }
  myProfile=prof;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appRoot').style.display='flex';
  document.getElementById('whoami').textContent=myProfile.display_name;
  await loadAll();
  // The curated marketing plan is never installed automatically. It only
  // happens when the user explicitly clicks "Install Curated Marketing
  // Plan" (Marketing page or Settings → Data recovery) and confirms —
  // see installCuratedMarketingPlan().
  subscribeRealtime();
  subscribePresence();
  renderNav();
  go('today');
}
(async function initAuth(){
  const {data}=await sb.auth.getSession();
  if(data.session) await onSignedIn(data.session);
})();


/* ---------------------------------------------------------------------------
   LIVE PRESENCE — Supabase Presence, no database table required.
--------------------------------------------------------------------------- */
function presenceInitials(name){
  return initials(name||'?');
}
function renderPresence(){
  const el=document.getElementById('presenceStrip'); if(!el) return;
  const members=onlineMembers.filter((m,i,a)=>a.findIndex(x=>x.user_id===m.user_id)===i);
  if(!members.length){ el.innerHTML=''; return; }
  const shown=members.slice(0,4);
  el.innerHTML='<span class="presence-label">Online</span>'+
    shown.map(m=>{
      const bg=IDENTITY_GRADIENTS[stableVisualIndex(m.display_name||m.user_id,IDENTITY_GRADIENTS.length)];
      const title=(m.display_name||'Team member')+(m.page?' · '+m.page.replace(/([A-Z])/g,' $1'):'');

function allCalendarItemsForRange(start,end){
  const out=[];
  const inRange=(dateKey)=>{
    if(!dateKey) return false;
    const d=new Date(dateKey+'T12:00:00');
    return d>=start&&d<end;
  };
  state.tasks.forEach(t=>{
    const date=calendarDateKey(t.due_at);
    if(t.calendar_visible===false||!inRange(date)) return;
    const taskTime=taskCalendarTime(t);
    out.push({date,time:taskTime,allDay:!taskTime,label:t.title,type:'tasks',done:['Completed','Cancelled','Closed / Lost'].includes(t.status),onclick:"openTaskModal('"+t.id+"')"});
  });
  state.meetings.forEach(m=>{
    const date=calendarDateKey(m.scheduled_at);
    if(!inRange(date)) return;
    const d=new Date(m.scheduled_at);
    out.push({date,time:Number.isNaN(d.getTime())?'12:00':d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),label:m.title,type:'meetings',done:m.meeting_status==='Completed',onclick:"go('meetingDetail','"+m.id+"')"});
  });
  state.marketing_items.forEach(mi=>{
    const date=calendarDateKey(mi.scheduled_at);
    if(!inRange(date)) return;
    out.push({date,time:'14:00',label:mi.title,type:'marketing',done:itemIsDone(mi),onclick:"openMarketingDetail('"+mi.id+"')"});
  });
  state.team_messages_v2.forEach(m=>{
    const date=calendarDateKey(m.due_at);
    if(!m.is_pinned||!inRange(date)) return;
    out.push({date,time:'16:00',label:m.title,type:'team',done:m.status==='Done',onclick:"openTeamNoteDetail('"+m.id+"')"});
  });
  return out.filter(it=>calFilters[it.type]&&!(calHideCompleted&&it.done));
}

async function loadAll(){
  // PostgREST caps a plain select('*') at 1000 rows. marketing_items can
  // exceed that with legacy campaigns + the content library, which truncated
  // the reload and made freshly-written rows look absent. Paginate every table.
  const PAGE=1000;
  const loadTable=async(t)=>{
    let all=[], from=0, err=null;
    for(;;){
      const {data,error}=await sb.from(t).select('*').range(from, from+PAGE-1);
      if(error){ err=error; break; }
      all=all.concat(data||[]);
      if(!data || data.length<PAGE) break;
      from+=PAGE;
      if(from>100000) break; // hard safety cap
    }
    return {data:all, error:err};
  };
  const results = await Promise.all(TABLES.map(loadTable));
  let anyError=false;
  TABLES.forEach((t,i)=>{
    if(results[i].error){console.error('Load failed:',t,results[i].error);anyError=true;state[t]=state[t]||[];}
    else state[t]=results[i].data||[];
  });
  dbStatus = anyError ? 'error' : 'connected';
  refreshUnreadBadge();
  await cleanupMisclassifiedTaskLessons();
  await reconcilePilotOpportunities();
}
function subscribeRealtime(){
  const collab=['organisations','people','opportunities','activities','tasks','meetings','assets_v2',
    'lessons_v2','objections','decisions','team_messages_v2','team_message_replies','team_message_reads',
    'entity_links','marketing_items','investor_profiles','knowledge_sections_v2'];
  let subscribed=0;
  collab.forEach(t=>{
    sb.channel('rt:'+t).on('postgres_changes',{event:'*',schema:'public',table:t},payload=>{
      applyRealtimeChange(t,payload);
    }).subscribe(status=>{
      if(status==='SUBSCRIBED'){subscribed++; if(subscribed===collab.length) realtimeStatus='connected';}
      if(status==='CHANNEL_ERROR'||status==='TIMED_OUT') realtimeStatus='error';
    });
  });
}
function applyRealtimeChange(table,payload){
  const arr=state[table]; if(!arr) return;
  if(payload.eventType==='INSERT'){ if(!byId(arr,payload.new.id)) arr.push(payload.new); }
  else if(payload.eventType==='UPDATE'){ const i=arr.findIndex(x=>x.id===payload.new.id); if(i>=0) arr[i]=payload.new; else arr.push(payload.new); }
  else if(payload.eventType==='DELETE'){ const i=arr.findIndex(x=>x.id===payload.old.id); if(i>=0) arr.splice(i,1); }
  renderNav();
  if(document.getElementById('content') && route.page) renderCurrent();
}

/* Every meaningful interaction creates an activity — the single master
   timeline every detail page, search and AI retrieval read from. */
async function logActivity({activity_type,title,body,organisation_id,person_id,opportunity_id,task_id,meeting_id,asset_id,lesson_id,decision_id,team_message_id}){
  const row={
    activity_type, title, body: body||null, occurred_at: new Date().toISOString(),
    organisation_id: organisation_id||null, person_id: person_id||null, opportunity_id: opportunity_id||null,
    task_id: task_id||null, meeting_id: meeting_id||null, asset_id: asset_id||null,
    lesson_id: lesson_id||null, decision_id: decision_id||null, team_message_id: team_message_id||null,
    created_by: myProfile.display_name
  };

  // Some existing databases still have fk_activities_team_message pointing at
  // the retired team_messages table rather than team_messages_v2. The team note
  // itself has already been saved, so do not make posting fail just because its
  // optional activity link cannot be written. Retry as an unlinked activity.
  try{
    return await dbInsert('activities',row);
  }catch(error){
    const isTeamMessageFk=team_message_id && (
      error?.code==='23503' ||
      String(error?.message||'').includes('fk_activities_team_message')
    );
    if(!isTeamMessageFk) throw error;

    console.warn('Activity team-message FK is stale; saving activity without team_message_id.',error);
    row.team_message_id=null;
    return await dbInsert('activities',row);
  }
}

/* ---------------------------------------------------------------------------

   V1 lessons table" is never user-facing. Wherever a lesson title would be
   shown, this derives a real one from the content instead. Purely a
   presentation-layer fix — the underlying lessons_v2.title column in the
   database is untouched, per "do not modify the schema."
--------------------------------------------------------------------------- */
function isFallbackLessonTitle(t){ return !t || /^migrated lesson/i.test(t.trim()); }
function deriveLessonTitle(l){
  if(!isFallbackLessonTitle(l.title)) return l.title;
  const source=(l.summary||l.detail||'').trim();
  if(!source) return 'Untitled lesson';
  // First sentence, or first ~9 words if no sentence break — gives a real,
  // scannable title instead of the raw migration placeholder.
  const firstSentence=source.split(/(?<=[.!?])\s/)[0];
  let candidate = firstSentence.length<=70 ? firstSentence : source.split(/\s+/).slice(0,9).join(' ');
  candidate = candidate.replace(/[.!?]+$/,'').trim();
  if(candidate.length>78) candidate = candidate.slice(0,75).trim()+'…';
  return candidate;
}

async function ensureOpportunityForOrganisationStage(orgId, stage){
  const org=byId(state.organisations,orgId); if(!org) return null;
  let stageText=String(stage||'').trim();
  if(/^pilot$/i.test(stageText)) stageText='Pilot discussion';
  const shouldBeOpportunity=/pilot discussion|pilot active|proposal sent|won/i.test(stageText);
  if(!shouldBeOpportunity) return null;

  // One commercial opportunity per organisation. Do not depend on the optional
  // `status` column here: some deployed databases constrain or omit that value,
  // while the normal opportunity form saves successfully without it.
  const existing=state.opportunities.find(op=>op.organisation_id===orgId && !op.archived_at && !/lost/i.test(String(op.stage||'')));
  if(existing){
    const patch={updated_by:myProfile.display_name};
    if(existing.stage!==stageText) patch.stage=stageText;
    if(!existing.title) patch.title=(org.name+' pilot').slice(0,200);
    if(existing.priority==null) patch.priority=Number(org.priority||0);
    if(!existing.next_action_summary && org.next_action_summary) patch.next_action_summary=org.next_action_summary;
    if(!existing.next_action_date && org.next_action_date) patch.next_action_date=org.next_action_date;
    if(Object.keys(patch).length>1) await dbUpdate('opportunities',existing.id,patch);
    return existing.id;
  }

  // Match the known-good manual opportunity payload. In particular, do not
  // write `status:'Active'`, which prevented automatic creation on databases
  // whose opportunity status constraint does not accept that value.
  const created=await dbInsert('opportunities',{
    organisation_id:orgId,
    title:(org.name+' pilot').slice(0,200),
    stage:stageText,
    priority:Number(org.priority||0),
    next_action_summary:org.next_action_summary||null,
    next_action_date:org.next_action_date||null,

async function reconcilePilotOpportunities(){

  // before automatic opportunity creation was introduced.
  const candidates=(state.organisations||[]).filter(o=>{
    if(o.archived_at) return false;

    return /pilot discussion|pilot active|proposal sent|won/i.test(String(o.pipeline_stage||'')) || hasPilotTag;

  for(const org of candidates){
    try{

      await ensureOpportunityForOrganisationStage(org.id,stage);

  }

/* "Continue where you left off" — persisted across sessions via
   localStorage (this is a standalone deployed app, not a Claude.ai
   artifact, so browser storage is appropriate here). Tracks the last few
   detail pages visited, most recent first, deduped by (page,id). */
const LAST_VIEWED_KEY = 'kweli_brain_last_viewed';
const LAST_VIEWED_PAGES = {
  organisationDetail: {table:'organisations', nameField:'name', icon:'⌂'},
  personDetail: {table:'people', nameField:'full_name', icon:'☺'},
  opportunityDetail: {table:'opportunities', nameField:'title', icon:'◈'},
  meetingDetail: {table:'meetings', nameField:'title', icon:'▤'}
};
function trackLastViewed(page,id){
  if(!LAST_VIEWED_PAGES[page] || !id) return;
  let list=[];
  try{ list=JSON.parse(localStorage.getItem(LAST_VIEWED_KEY)||'[]'); }catch(e){ list=[]; }
  list=list.filter(x=>!(x.page===page && x.id===id));
  list.unshift({page,id,at:Date.now()});
  list=list.slice(0,8);
  try{ localStorage.setItem(LAST_VIEWED_KEY, JSON.stringify(list)); }catch(e){}
}
function getLastViewed(){
  let list=[];
  try{ list=JSON.parse(localStorage.getItem(LAST_VIEWED_KEY)||'[]'); }catch(e){ return []; }
  return list.map(entry=>{
    const cfg=LAST_VIEWED_PAGES[entry.page]; if(!cfg) return null;
    const row=byId(state[cfg.table], entry.id);
    if(!row) return null;
    return {page:entry.page, id:entry.id, label:row[cfg.nameField]||'Untitled', icon:cfg.icon, at:entry.at};
  }).filter(Boolean).slice(0,5);
}

function localDateISO(d){
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
// Calendar records are not completely consistent: some dates are stored as
// YYYY-MM-DD and others arrive as full ISO timestamps. Always compare the
// local calendar-date portion so tasks and marketing items do not disappear.
function calendarDateKey(value){
  if(!value) return '';
  const raw=String(value);
  if(/^\d{4}-\d{2}-\d{2}/.test(raw)) return raw.slice(0,10);
  const d=new Date(value);
  return Number.isNaN(d.getTime())?'':localDateISO(d);
}
function dailyWorkspaceData(dateISO){
  const dateStart=new Date(dateISO+'T00:00:00');
  const dateEnd=new Date(dateStart);dateEnd.setDate(dateEnd.getDate()+1);
  const allDue=state.tasks.filter(t=>t.calendar_visible!==false&&calendarDateKey(t.due_at)===dateISO);
  const due=allDue.filter(t=>!['Completed','Cancelled','Closed / Lost'].includes(t.status));
  const overdue=dateISO===today()?openTasks().filter(t=>t.due_at&&t.due_at<today()):[];
  const meetings=state.meetings.filter(m=>calendarDateKey(m.scheduled_at)===dateISO).sort((a,b)=>new Date(a.scheduled_at)-new Date(b.scheduled_at));
  const marketing=state.marketing_items.filter(mi=>calendarDateKey(mi.scheduled_at)===dateISO);
  const team=state.team_messages_v2.filter(m=>m.is_pinned&&calendarDateKey(m.due_at)===dateISO);
  const timeline=[
    ...meetings.map(m=>({type:'meetings',time:new Date(m.scheduled_at),title:m.title,sub:orgName(m.organisation_id)||'',click:"go('meetingDetail','"+m.id+"')",record:m,done:m.meeting_status==='Completed'})),
    ...marketing.map(mi=>({type:'marketing',time:new Date(dateISO+'T14:00:00'),title:mi.title,sub:mi.item_type||'Marketing plan',click:"openMarketingDetail('"+mi.id+"')",record:mi,done:itemIsDone(mi)})),
    ...allDue.map(t=>{const tt=taskCalendarTime(t); return {type:'tasks',time:tt?new Date(dateISO+'T'+tt+':00'):null,allDay:!tt,title:t.title,sub:orgName(t.organisation_id)||'Task',click:"openTaskModal('"+t.id+"')",record:t,done:['Completed','Cancelled','Closed / Lost'].includes(t.status)}}),
    ...team.map(m=>({type:'team',time:new Date(dateISO+'T17:00:00'),title:m.title,sub:'Team HQ',click:"openTeamNoteDetail('"+m.id+"')",record:m,done:m.status==='Done'}))
  ].sort((a,b)=>{
    if(a.allDay&&!b.allDay) return 1;
    if(!a.allDay&&b.allDay) return -1;
    const at=a.time instanceof Date?a.time.getTime():Number.MAX_SAFE_INTEGER;
    const bt=b.time instanceof Date?b.time.getTime():Number.MAX_SAFE_INTEGER;
    return at-bt || Number(a.done)-Number(b.done);
  });
  return {dateStart,dateEnd,due,allDue,overdue,meetings,marketing,team,timeline};
}

function dailyCompletionMessage(dateISO){
  const messages=[
    ['🎉','Outstanding. Everything for today is done.','Close the laptop. You earned that feeling.'],
    ['🍺','Go grab a beer. You earned it.','No loose ends. No guilt. Just a properly finished day.'],

    ['🥃','Pour yourself something nice.','Today’s work is done and dusted.'],
    ['🌴','Nothing left to chase today.','Switch off properly. You have earned the evening.'],
    ['🍕','Productivity level: pizza deserved.','Every task is complete. That deserves a reward.'],
    ['😴','Shut the laptop.','Tomorrow can wait. You finished today properly.'],
    ['🧠','Kweli Brain is satisfied.','Everything is complete. Go give your own brain a rest.'],
    ['💪','You smashed today.','Every planned item is complete. That is a proper finish.']
  ];
  let hash=0;
  for(let i=0;i<dateISO.length;i++) hash=((hash<<5)-hash)+dateISO.charCodeAt(i);

function vTodayWeek(){
  const todayDate=new Date();
  const monday=new Date(todayDate);
  const offset=(monday.getDay()+6)%7;
  monday.setDate(monday.getDate()-offset);
  monday.setHours(0,0,0,0);
  const end=new Date(monday);end.setDate(end.getDate()+7);
  const items=allCalendarItemsForRange(monday,end);
  const days=[...Array(7)].map((_,i)=>{const d=new Date(monday);d.setDate(d.getDate()+i);return d;});
  const meetings=items.filter(i=>i.type==='meetings').length;
  const tasks=items.filter(i=>i.type==='tasks').length;
  const marketing=items.filter(i=>i.type==='marketing').length;
  const team=items.filter(i=>i.type==='team').length;

  const columns=days.map(d=>{
    const iso=localDateISO(d);
    const dayItems=items.filter(it=>it.date===iso).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    const isToday=iso===today();
    return '<div class="week-day-v3'+(isToday?' today-col':'')+'"><div class="week-day-head"><div><div class="week-day-name">'+d.toLocaleDateString('en-GB',{weekday:'short'})+'</div>'+
      '<div class="week-day-num">'+d.getDate()+'</div></div><div class="week-day-count">'+dayItems.length+' items</div></div>'+
      (dayItems.length?dayItems.map(it=>'<div class="week-task-v3'+(it.done?' week-task-done':'')+'" style="--slot:'+CAL_TYPE_COLOR[it.type]+'" onclick="'+it.onclick+'">'+
        '<div class="week-task-time">'+(it.time?esc(it.time)+' · ':'')+esc(it.type)+'</div><div class="week-task-title">'+esc(it.label)+'</div></div>').join(''):
        '<div class="week-empty-v3">No scheduled work</div>')+
      '<button class="btn sm" style="width:100%;margin-top:6px" onclick="calDayView(\''+iso+'\')">Open day</button></div>';
  }).join('');

  return '<div class="today-top"><div class="today-heading"><div class="page-title">This Week</div>'+
    '<div class="today-date">'+monday.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+new Date(end.getTime()-86400000).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})+'</div>'+
    renderTodayTabs('week')+'</div><div><button class="btn" onclick="openQuickAdd()">+ Quick Add</button> <button class="btn gold" onclick="openMeetingForm()">+ Add Meeting</button></div></div>'+
    '<div class="week-summary-bar"><span class="week-summary-chip">'+items.length+' total items</span><span class="week-summary-chip">'+meetings+' meetings</span>'+
    '<span class="week-summary-chip">'+tasks+' follow-ups</span><span class="week-summary-chip">'+marketing+' marketing</span><span class="week-summary-chip">'+team+' team items</span></div>'+
    '<div class="week-board-v3">'+columns+'</div>';
}

function stagePriorityScore(stage){
  const s=String(stage||'').toLowerCase();
  if(s.includes('pilot active')) return 700;
  if(s.includes('pilot discussion')) return 650;
  if(s.includes('proposal')) return 560;
  if(s.includes('meeting done') || s.includes('meeting')) return 450;
  if(s.includes('contact')) return 330;
  if(s.includes('identified')) return 220;
  if(s.includes('on hold')) return 40;
  if(s.includes('won')) return 20;
  if(s.includes('lost')) return -500;
  return 0;
}
function organisationStageRank(o){
  const activeOpps=state.opportunities.filter(x=>x.organisation_id===o.id && !x.archived_at && !/lost|closed/i.test(String(x.stage||x.status||'')));
  const stages=[o.pipeline_stage,...activeOpps.map(x=>x.stage)];
  // On hold is an explicit instruction to sink the organisation, even when its old opportunity data is stronger.
  if(String(o.pipeline_stage||'').toLowerCase().includes('on hold')) return 40;
  return stages.reduce((m,s)=>Math.max(m,stagePriorityScore(s)),0);
}
function organisationPriorityScore(o){
  const raw=Number(o.priority||0)*10;
  const activeOpps=state.opportunities.filter(x=>x.organisation_id===o.id && !x.archived_at && !/lost|closed/i.test(String(x.stage||x.status||'')));
  const oppPriority=activeOpps.reduce((m,x)=>Math.max(m,Number(x.priority||0)*8),0);
  const openTasks=state.tasks.filter(t=>t.organisation_id===o.id && !['Completed','Cancelled','Closed / Lost'].includes(t.status));
  const overdue=openTasks.some(t=>t.due_at && t.due_at<today())?45:0;
  const dueSoon=openTasks.some(t=>t.due_at && t.due_at>=today() && t.due_at<=addDays(today(),7))?20:0;
  const hasNext=(o.next_action_summary||o.next_action_date)?12:0;
  return raw+oppPriority+overdue+dueSoon+hasNext;
}
function vOrganisations(){
  const orgs=[...state.organisations].filter(o=>!o.archived_at).sort((a,b)=>{
    // Stage is the primary queue. Pilot Active / Pilot Discussion always rise above Meeting Done / Identified.
    const stageDiff=organisationStageRank(b)-organisationStageRank(a);
    if(stageDiff) return stageDiff;
    // Priority, urgency and due dates only order organisations inside the same stage bucket.
    const priorityDiff=organisationPriorityScore(b)-organisationPriorityScore(a);
    if(priorityDiff) return priorityDiff;
    const aDate=a.next_action_date||'9999-12-31', bDate=b.next_action_date||'9999-12-31';
    if(aDate!==bDate) return aDate.localeCompare(bDate);
    return String(a.name||'').localeCompare(String(b.name||''));
  });
  const maxPriority=Math.max(1,...orgs.map(o=>organisationStageRank(o)+organisationPriorityScore(o)));
  return '<div class="page-head"><div><div class="eyebrow">Relationships</div><div class="page-title">Organisations</div>'+
    '<div class="page-sub">'+orgs.length+' organisations</div></div><button class="btn gold" onclick="openOrgForm()">+ New organisation</button></div>'+
    (orgs.length?'<div class="grid g-auto">'+orgs.map(o=>{
      const oppCount=state.opportunities.filter(x=>x.organisation_id===o.id).length;
      const flags=orgFlags(o);
      const overdue=state.tasks.some(t=>t.organisation_id===o.id && t.due_at && t.due_at<today() && !['Completed','Cancelled','Closed / Lost'].includes(t.status));
      const priorityPct=Math.round(((organisationStageRank(o)+organisationPriorityScore(o))/maxPriority)*100);
      return '<div class="card org-card" onclick="go(\'organisationDetail\',\''+o.id+'\')">'+
        '<div class="org-card-top"><div class="org-identity">'+orgEmblem(o,false)+'<div class="org-title-wrap">'+
          '<div class="badge-org-type pill-editable" onclick="openPillPopover(event,\''+o.id+'\',\'organisation_type\')">'+esc(o.organisation_type)+(o.sector?' · '+esc(o.sector):'')+'</div>'+

        '<div class="org-card-meta">'+
          '<span class="pill pill-editable" title="✏ Edit stage" onclick="openPillPopover(event,\''+o.id+'\',\'pipeline_stage\')">'+esc(o.pipeline_stage||'No stage')+'</span>'+
          '<span class="pill pill-editable" title="✏ Edit status" onclick="openPillPopover(event,\''+o.id+'\',\'relationship_status\')">'+esc(o.relationship_status||'—')+'</span>'+
        '</div>'+
        (flags.length?'<div class="flag-row">'+flags.map(f=>'<span class="flag '+f.cls+'">'+f.ico+' '+f.label+'</span>').join('')+'</div>':'')+
        '<div><div class="priority-bar"><div class="priority-bar-fill" style="width:'+priorityPct+'%;background:'+(priorityPct>66?'var(--gold)':priorityPct>33?'var(--blue)':'var(--faint)')+'"></div></div></div>'+
        '<div class="org-card-foot">'+
          '<span class="badge-count">'+oppCount+' opportunit'+(oppCount===1?'y':'ies')+'</span>'+
          '<span class="faint">'+(o.next_action_date?('Next: '+fmtDate(o.next_action_date)):'No next action')+'</span>'+
        '</div></div>';
    }).join('')+'</div>':'<div class="empty"><div class="empty-ico">⌂</div>No organisations yet. Add your first one to get started.</div>');

async function uploadAssetForOrg(file,orgId){
  if(!file) return;
  await uploadAsset(file);
  const newest=[...state.assets_v2].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];
  if(newest){
    const existing=state.entity_links.find(el=>el.source_type==='asset'&&el.source_id===newest.id&&el.target_type==='organisation');
    if(!existing) await dbInsert('entity_links',{source_type:'asset',source_id:newest.id,target_type:'organisation',target_id:orgId,relationship_type:'relates_to',is_inferred:false,confidence:1,created_by:myProfile.display_name});
    else if(existing.target_id!==orgId || existing.is_inferred) await dbUpdate('entity_links',existing.id,{target_id:orgId,is_inferred:false,confidence:1});
  }
  route.tab='assets'; renderCurrent();
}

/* ---------------------------------------------------------------------------
   RELATIONSHIP TAGS / CHAMPION / DECISION MAKER — organisation_type stays
   the single, CHECK-constrained "primary" type (unchanged, still editable
   via its own pill). Multi-select relationship tags and the two free-text
   roles have no dedicated columns and no schema change is in scope this
   round, so — same convention as the marketing packed fields, and
   deliberately not the "hidden JSON in a text field" pattern flagged as an
   anti-pattern during migration — they're stored as plain, visible, labeled
   lines in organisations.current_status. That column has no other display
   use once Executive Summary (current_summary) is the dedicated prose
   field, so nothing else is displaced.
--------------------------------------------------------------------------- */
const RELATIONSHIP_TAGS=['Customer','Partner','Investor','Government','NGO','Research','Supplier','Strategic','Advisor','Pilot','Commercial'];
const PEOPLE_WARMTH_OPTIONS=['Cold','Cool','Warm','Hot','Champion'];
function getOrgMeta(o){
  const raw=o.current_status||'';
  const tagsMatch=raw.match(/^\[\[tags:([^\]]*)\]\]\n?/);
  const tags=tagsMatch?tagsMatch[1].split(',').map(t=>t.trim()).filter(Boolean):[];
  const rest=raw.replace(/^\[\[tags:[^\]]*\]\]\n?/,'');
  const championMatch=rest.match(/^Champion:\s*(.*)$/m);
  const dmMatch=rest.match(/^Decision maker:\s*(.*)$/m);
  return {tags, champion:championMatch?championMatch[1].trim():'', decisionMaker:dmMatch?dmMatch[1].trim():''};
}
function serializeOrgMeta(meta){
  return '[[tags:'+meta.tags.join(',')+']]\nChampion: '+(meta.champion||'')+'\nDecision maker: '+(meta.decisionMaker||'');
}
async function saveOrgMetaField(orgId,key,value){
  const o=byId(state.organisations,orgId);
  const meta=getOrgMeta(o);
  meta[key]=value;
  await dbUpdate('organisations',orgId,{current_status:serializeOrgMeta(meta)});
  renderCurrent();
}
async function toggleOrgTag(orgId,tag){
  const o=byId(state.organisations,orgId);
  const meta=getOrgMeta(o);
  const idx=meta.tags.indexOf(tag);
  const adding=idx<0;
  if(!adding) meta.tags.splice(idx,1); else meta.tags.push(tag);
  await dbUpdate('organisations',orgId,{current_status:serializeOrgMeta(meta)});
  if(adding && /^pilot$/i.test(tag)){
    await ensureOpportunityForOrganisationStage(orgId,o.pipeline_stage&&/pilot/i.test(o.pipeline_stage)?o.pipeline_stage:'Pilot discussion');
  }
  renderCurrent();
}

  event.stopPropagation();

    'border:1px solid var(--line-s);border-radius:10px;padding:8px;z-index:150;box-shadow:0 12px 30px rgba(0,0,0,.5);min-width:170px';
  pop.innerHTML=RELATIONSHIP_TAGS.map(t=>'<label style="display:flex;align-items:center;gap:8px;padding:5px 4px;font-size:12.5px;cursor:pointer">'+
    '<input type="checkbox" '+(meta.tags.includes(t)?'checked':'')+' onchange="toggleOrgTag(\''+orgId+'\',\''+t+'\')"> '+t+'</label>').join('');
  document.body.appendChild(pop);
}
function startInlineEdit(el,orgId,key){
  const raw=el.dataset.raw||'';
  const holder=document.createElement('span');
  holder.innerHTML='<input class="input" style="display:inline-block;width:220px;padding:4px 8px;font-size:12.5px">';

/* ---------------------------------------------------------------------------
   GENERALIZED INLINE EDITING — one pair of helpers for any table/column,
   used across both Person and Organisation Overview so every attribute is
   editable in place. Replaces the earlier org-only and
   next-action-only-on-person versions (kvRealEditableText /
   kvRealEditableTextPerson / startRealInlineEdit / startRealInlineEditPerson)
   which only covered a handful of fields — this is the one mechanism now.
--------------------------------------------------------------------------- */
function kvEditReal(label,value,table,id,column,kind){
  kind=kind||'text';
  const val=value||'';
  const lower=String(column||'').toLowerCase();
  const isEmail=lower==='email';
  const isLink=['linkedin','website','url'].includes(lower);
  let display='';
  if(val && (isEmail||isLink)){
    const href=isEmail ? ('mailto:'+val) : (/^https?:\/\//i.test(val)?val:'https://'+val);
    const text=isEmail ? val : (lower==='linkedin'?'Open LinkedIn':'Visit website');
    display='<a href="'+esc(href)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">'+esc(text)+'</a>'+ '<button class="link-btn" style="margin-left:10px;color:var(--faint)" onclick="event.preventDefault();event.stopPropagation();startRealEdit(this.parentElement,\''+table+'\',\''+id+'\',\''+column+'\',\''+kind+'\')">Edit</button>';
  } else display='<span class="pill-editable" style="cursor:pointer;text-decoration:underline;text-decoration-style:dotted" onclick="startRealEdit(this,\''+table+'\',\''+id+'\',\''+column+'\',\''+kind+'\')">'+esc(val||'Click to add')+'</span>';
  return '<div class="kv"><span class="k">'+label+'</span><span class="v">'+display+'</span></div>';
}
function startRealEdit(el,table,id,column,kind){
  const holder=document.createElement('span');
  if(kind==='textarea') holder.innerHTML='<textarea class="input" rows="2" style="display:block;width:260px;padding:4px 8px;font-size:12.5px"></textarea>';
  else holder.innerHTML='<input class="input" type="text" style="display:inline-block;width:220px;padding:4px 8px;font-size:12.5px">';
  const input=holder.firstChild;
  input.value = el.textContent==='Click to add' ? '' : el.textContent;
  el.replaceWith(input);
  input.focus();
  input.onblur=async()=>{
    let value = input.value.trim()||null;
    if(kind==='array') value = value ? value.split(',').map(s=>s.trim()).filter(Boolean) : null;
    if((column==='full_name'||column==='name') && !value){ toast((column==='name'?'Organisation name':'Full name')+' can\u2019t be empty'); renderCurrent(); return; }
    await dbUpdate(table,id,{[column]: value});
    renderCurrent();
  };
  input.onkeydown=(e)=>{ if(e.key==='Enter' && kind!=='textarea') input.blur(); };
}
function kvEditRealDate(label,value,table,id,column){
  return '<div class="kv"><span class="k">'+label+'</span><span class="v">'+
    '<input type="date" class="input" style="display:inline-block;width:150px;padding:4px 8px;font-size:12.5px" value="'+(value||'')+'" '+
    'onchange="dbUpdate(\''+table+'\',\''+id+'\',{'+column+':this.value||null}).then(renderCurrent)"></span></div>';

   field this used to edit (name, type, sector, next action, next action
   date) is now inline-editable directly on the Organisation Detail
   Overview tab, which is the single place to manage an existing

   "Current status" field here wrote to organisations.current_status,
   which is now the packed store for relationship tags/champion/decision
   maker — an old-style edit here would have silently overwritten that
   structured data with free text. */
function openOrgForm(){
  openModal('<h3>New organisation</h3>'+ '<div class="field"><label class="fl">Name</label><input class="input" id="f_name"></div>'+ '<div class="field"><label class="fl">Type</label><select class="select" id="f_type">'+['Prospect','Customer','Investor','Partner','Supplier','Regulator','Advisor organisation','Internal','Other'].map(t=>'<option>'+t+'</option>').join('')+'</select></div>'+ '<div style="padding:12px;border:1px solid var(--line);border-radius:10px;margin:12px 0"><div class="fl" style="margin-bottom:10px">Primary contact (optional)</div><div class="field"><label class="fl">Full name</label><input class="input" id="f_org_person_name"></div><div class="field"><label class="fl">Role</label><input class="input" id="f_org_person_role"></div><div class="field"><label class="fl">Email</label><input class="input" id="f_org_person_email"></div><div class="field"><label class="fl">LinkedIn</label><input class="input" id="f_org_person_linkedin"></div></div>'+ '<div class="faint" style="font-size:11px;margin-bottom:10px">Add a primary contact now and the Brain will create their profile and link it automatically.</div>'+ '<button class="btn gold" onclick="saveOrgForm()">Create organisation</button>');
}
async function saveOrgForm(){
  const name=document.getElementById('f_name').value.trim();
  if(!name){toast('Name is required');return;}
  const canonical_name=name.toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
  // Duplicate guard — parity with people create. The canonical_name was
  // already computed here but never checked, so two orgs differing only by
  // punctuation/casing (e.g. "Verst Carbon" vs "Verst Carbon Ltd." typed
  // twice) could both be created. Match on canonical_name and offer to open
  // the existing record instead.
  const dupe=state.organisations.find(o=>!o.archived_at && (o.canonical_name||'')===canonical_name);
  if(dupe && !confirm('An organisation called "'+dupe.name+'" already exists (same normalised name). Create a second record anyway?')){
    closeModal(); go('organisationDetail', dupe.id); return;
  }
  const payload={
    name, organisation_type: document.getElementById('f_type').value,
    created_by: myProfile.display_name, updated_by: myProfile.display_name,
    canonical_name
  };
  const created=await dbInsert('organisations',payload);
  const personName=(document.getElementById('f_org_person_name')?.value||'').trim();
  if(personName){ await dbInsert('people',{full_name:personName,role:(document.getElementById('f_org_person_role')?.value||'').trim()||null,email:(document.getElementById('f_org_person_email')?.value||'').trim()||null,linkedin:(document.getElementById('f_org_person_linkedin')?.value||'').trim()||null,primary_organisation_id:created.id,created_by:myProfile.display_name}); }
  closeModal(); go('organisationDetail', created.id);
}
