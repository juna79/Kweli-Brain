async function deleteTeamNoteConfirm(id){
  const m=byId(state.team_messages_v2,id);
  if(!m) return;
  if(!confirm('Delete this team-board post permanently? This will also remove its replies and read receipts.')) return;

  // Remove dependent rows first so the parent delete cannot be blocked by
  // team_message_replies / team_message_reads foreign-key constraints.
  const {error:replyError}=await sb.from('team_message_replies').delete().eq('team_message_id',id);
  if(replyError){ toast('Delete failed: '+replyError.message); return; }

  const {error:readError}=await sb.from('team_message_reads').delete().eq('team_message_id',id);
  if(readError){ toast('Delete failed: '+readError.message); return; }

  // Where the activities table genuinely references team_messages_v2, detach
  // the audit entry rather than allowing it to block removal of the post.
  const {error:activityError}=await sb.from('activities').update({team_message_id:null}).eq('team_message_id',id);
  if(activityError) console.warn('Could not detach team-note activity before delete:',activityError);

  const {error}=await sb.from('team_messages_v2').delete().eq('id',id);
  if(error){ toast('Delete failed: '+error.message); return; }

  state.team_messages_v2=state.team_messages_v2.filter(x=>x.id!==id);
  state.team_message_reads=state.team_message_reads.filter(x=>x.team_message_id!==id);
  state.team_message_replies=state.team_message_replies.filter(x=>x.team_message_id!==id);
  state.activities.forEach(a=>{ if(a.team_message_id===id) a.team_message_id=null; });
  closeModal();
  refreshUnreadBadge();
  openTeamBoard();
  toast('Team-board post deleted');
}

/* ---------------------------------------------------------------------------
   AI WORKSPACE — retrieval-first. Resolves entities, traverses entity_links,
   pulls related records, ranks by recency, builds focused context. No
   fabricated reasoning: callLLM() returns null until a model is connected.
--------------------------------------------------------------------------- */
let _lastSuggestedPrompts=[];
function suggestedPrompts(){
  const prompts=[];
  const topOrg=[...state.organisations].sort((a,b)=>(b.priority||0)-(a.priority||0))[0];
  if(topOrg){
    prompts.push('What is the current status of '+topOrg.name+'?');
    prompts.push('Summarise our relationship history with '+topOrg.name);
  }
  const waitingTask=state.tasks.find(t=>t.status==='Waiting for Response');
  if(waitingTask) prompts.push('What are we waiting to hear back on?');
  const recentPerson=state.people[state.people.length-1];
  if(recentPerson) prompts.push('What do we know about '+recentPerson.full_name+'?');
  prompts.push('What lessons have we learned recently?');
  prompts.push('What objections keep coming up?');
  _lastSuggestedPrompts=prompts.slice(0,5);
  return _lastSuggestedPrompts;
}
function useSuggestedPrompt(i){
  document.getElementById('askInput').value=_lastSuggestedPrompts[i]||'';
  runAsk();
}
function vAsk(){
  const prompts=suggestedPrompts();
  return '<div class="page-head"><div><div class="eyebrow">AI</div><div class="page-title">AI Workspace</div>'+
    '<div class="page-sub">Ask about any organisation, person or opportunity — answers are built only from linked records.</div></div></div>'+
    '<div class="card"><div class="field"><label class="fl">Question</label><input class="input" id="askInput" value="'+esc(route.askPrefill||'')+'" placeholder="e.g. What did Kyle say about the Farmer App?"></div>'+
    '<div style="margin-bottom:14px">'+prompts.map((p,i)=>'<span class="prompt-chip" onclick="useSuggestedPrompt('+i+')">'+esc(p)+'</span>').join('')+'</div>'+
    '<button class="btn gold" onclick="runAsk()">Ask</button></div>'+
    '<div id="askResult" style="margin-top:20px"></div>';
}
function resolveEntities(query){
  const q=query.toLowerCase();
  const people=state.people.filter(p=>q.includes(p.full_name.toLowerCase()));
  const orgsDirect=state.organisations.filter(o=>q.includes(o.name.toLowerCase()));
  const orgsFromPeople=people.map(p=>p.primary_organisation_id).filter(Boolean).map(id=>byId(state.organisations,id));
  const orgs=[...new Map([...orgsDirect,...orgsFromPeople].filter(Boolean).map(o=>[o.id,o])).values()];
  return {people, orgs};
}
function runAsk(){
  const q=document.getElementById('askInput').value.trim();
  if(!q) return;
  const {people,orgs}=resolveEntities(q);
  const orgIds=orgs.map(o=>o.id);
  const relatedTasks=state.tasks.filter(t=>orgIds.includes(t.organisation_id));
  const relatedMeetings=state.meetings.filter(m=>orgIds.includes(m.organisation_id));
  const relatedActs=state.activities.filter(a=>orgIds.includes(a.organisation_id)||people.some(p=>p.id===a.person_id))
    .sort((a,b)=>new Date(b.occurred_at)-new Date(a.occurred_at)).slice(0,15);
  const relatedAssets=state.assets_v2.filter(a=>state.entity_links.some(el=>el.source_type==='asset'&&el.source_id===a.id&&el.target_type==='organisation'&&orgIds.includes(el.target_id)));
  const relatedLessons=state.lessons_v2.filter(l=>!l.archived_at && state.entity_links.some(el=>el.source_type==='lesson'&&el.source_id===l.id&&el.target_type==='organisation'&&orgIds.includes(el.target_id)));

  const contextLines=[];
  contextLines.push('QUESTION: '+q);
  if(orgs.length) contextLines.push('\nRESOLVED ORGANISATION(S): '+orgs.map(o=>o.name).join(', '));
  if(people.length) contextLines.push('RESOLVED PERSON/PEOPLE: '+people.map(p=>p.full_name+(p.role?' ('+p.role+')':'')).join(', '));
  if(relatedActs.length){ contextLines.push('\nRELEVANT ACTIVITY (most recent first):'); relatedActs.forEach(a=>contextLines.push('- ['+fmtDate(a.occurred_at)+'] '+a.title+(a.body?': '+a.body.slice(0,400):''))); }
  if(relatedTasks.length){ contextLines.push('\nOPEN/RECENT TASKS:'); relatedTasks.forEach(t=>contextLines.push('- '+t.title+' ('+t.status+(t.due_at?', due '+t.due_at:'')+')')); }
  if(relatedMeetings.length){ contextLines.push('\nMEETINGS:'); relatedMeetings.forEach(m=>contextLines.push('- '+m.title+' ('+fmtDate(m.scheduled_at)+')')); }
  if(relatedLessons.length){ contextLines.push('\nLESSONS:'); relatedLessons.forEach(l=>contextLines.push('- '+deriveLessonTitle(l)+(l.summary?': '+l.summary:''))); }
  if(relatedAssets.length){ contextLines.push('\nASSETS:'); relatedAssets.forEach(a=>contextLines.push('- '+a.title)); }
  if(!orgs.length && !people.length) contextLines.push('\nNo specific organisation or person was recognised in the question — showing nothing rather than guessing. Try including a company or person name.');

  const prompt=contextLines.join('\n');
  document.getElementById('askResult').innerHTML =
    '<div class="grid g2"><div class="card"><div class="fl">Retrieved context</div><div class="out">'+esc(prompt)+'</div>'+
      '<button class="btn gold sm" style="margin-top:10px" onclick="copyToClipboard()">Copy to Claude</button></div>'+
      '<div class="card"><div class="fl">Sources used</div>'+
        (orgs.length?orgs.map(o=>'<div class="kv" style="cursor:pointer" onclick="go(\'organisationDetail\',\''+o.id+'\')"><span class="v">'+esc(o.name)+'</span><span class="k">organisation</span></div>').join(''):'')+
        (people.length?people.map(p=>'<div class="kv" style="cursor:pointer" onclick="go(\'personDetail\',\''+p.id+'\')"><span class="v">'+esc(p.full_name)+'</span><span class="k">person</span></div>').join(''):'')+
        ((!orgs.length&&!people.length)?'<div class="empty">No matching records.</div>':'')+
      '</div></div>';
  window._lastAskPrompt = prompt;
}

function normaliseNameLoose(s){ return (s||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim(); }
const SNAPSHOT_NAME_ALIASES={'kentatse':'Kentaste','greenkey':'Green Key','green key':'Green Key','cropnuts':'CropNuts'};
function snapshotCanonicalName(raw){
  const key=normaliseNameLoose(raw);
  return SNAPSHOT_NAME_ALIASES[key]||raw;
}
function findOrgLoose(name){
  const canon=normaliseNameLoose(snapshotCanonicalName(name));
  return state.organisations.find(o=>normaliseNameLoose(o.name)===canon);
}
async function restoreFromSnapshot(){
  const report={orgsCreated:0,orgsEnriched:0,oppsCreated:0,oppsEnriched:0,investorsCreated:0,investorsEnriched:0,decisionsCreated:0,decisionsSkipped:0,meetingsCreated:0,meetingsSkipped:0};

  // --- Organisations + opportunities ---
  for(const s of SNAPSHOT_ORGS){
    let org=findOrgLoose(s.name);
    if(!org){
      org=await dbInsert('organisations',{
        name:snapshotCanonicalName(s.name), canonical_name:normaliseNameLoose(s.name),
        organisation_type:'Prospect', pipeline_stage:s.stage, priority:s.priority||0,
        next_action_summary:s.nextAction||null, description:s.description||null,
        created_by:myProfile.display_name, updated_by:myProfile.display_name
      });
      report.orgsCreated++;
    } else {
      const patch={};
      if(!org.pipeline_stage && s.stage) patch.pipeline_stage=s.stage;
      if(!org.next_action_summary && s.nextAction) patch.next_action_summary=s.nextAction;
      if(!org.description && s.description) patch.description=s.description;
      if(!org.priority && s.priority) patch.priority=s.priority;
      if(Object.keys(patch).length){ await dbUpdate('organisations',org.id,patch); org=byId(state.organisations,org.id); report.orgsEnriched++; }
    }
    let opp=state.opportunities.find(o=>o.organisation_id===org.id);
    if(!opp){
      opp=await dbInsert('opportunities',{
        organisation_id:org.id, title:snapshotCanonicalName(s.name)+' — opportunity',
        stage:['Identified','Contacted','Meeting done','Pilot discussion','Pilot active','Proposal sent','Won','Lost','On hold'].includes(s.stage)?s.stage:'Identified',
        status:'Active', priority:s.priority||0, next_action_summary:s.nextAction||null,
        proposed_pilot:s.pilot||null, pilot_scope:s.pilot||null,
        created_by:myProfile.display_name, updated_by:myProfile.display_name
      });
      report.oppsCreated++;
    } else {
      const patch={};
      if(!opp.next_action_summary && s.nextAction) patch.next_action_summary=s.nextAction;
      if(!opp.proposed_pilot && s.pilot) patch.proposed_pilot=s.pilot;
      if(!opp.pilot_scope && s.pilot) patch.pilot_scope=s.pilot;
      if(Object.keys(patch).length){ await dbUpdate('opportunities',opp.id,patch); report.oppsEnriched++; }
    }
  }

  // --- Investors ---
  for(const s of SNAPSHOT_INVESTORS){
    let org=findOrgLoose(s.name);
    if(!org){
      org=await dbInsert('organisations',{
        name:s.name, canonical_name:normaliseNameLoose(s.name), organisation_type:'Investor',
        pipeline_stage:s.stage, next_action_summary:s.nextAction||null,
        created_by:myProfile.display_name, updated_by:myProfile.display_name
      });
      report.orgsCreated++;
    } else if(org.organisation_type!=='Investor'){
      await dbUpdate('organisations',org.id,{organisation_type:'Investor'});
      org=byId(state.organisations,org.id);
    }
    let iv=state.investor_profiles.find(x=>x.organisation_id===org.id);
    if(!iv){
      await dbInsert('investor_profiles',{
        organisation_id:org.id, stage:s.stage||null, notes:s.notes||null, next_action_summary:s.nextAction||null
      });
      report.investorsCreated++;
    } else {
      const patch={};
      if(!iv.stage && s.stage) patch.stage=s.stage;
      if(!iv.notes && s.notes) patch.notes=s.notes;
      if(!iv.next_action_summary && s.nextAction) patch.next_action_summary=s.nextAction;
      if(Object.keys(patch).length){ await dbUpdate('investor_profiles',iv.id,patch); report.investorsEnriched++; }
    }
  }

  // --- Decisions (matched by first 60 chars of decision text, to stay idempotent) ---
  for(const s of SNAPSHOT_DECISIONS){
    const key=s.text.slice(0,60);
    const exists=state.decisions.some(d=>!d.archived_at && (d.decision||'').slice(0,60)===key);
    if(exists){ report.decisionsSkipped++; continue; }
    const title=s.text.replace(/^[•\s]+/,'').split(/\s+/).slice(0,10).join(' ').replace(/[.,;:]+$/,'');
    await dbInsert('decisions',{title:title.slice(0,200), decision:s.text, decided_at:s.date, created_by:myProfile.display_name, updated_by:myProfile.display_name});
    report.decisionsCreated++;
  }

  // --- Meetings (matched by org + date) ---
  for(const s of SNAPSHOT_MEETINGS){
    const org=findOrgLoose(s.org);
    if(!org) continue;
    const exists=state.meetings.some(m=>m.organisation_id===org.id && (m.scheduled_at||'').slice(0,10)===s.date);
    if(exists){ report.meetingsSkipped++; continue; }
    const isPast=s.date<today();
    const created=await dbInsert('meetings',{
      title:org.name+' — meeting', organisation_id:org.id, scheduled_at:s.date+'T09:00:00',
      meeting_status:isPast?'Completed':'Scheduled', objective:s.objective||null,
      notes:s.notes||null, next_steps:s.nextSteps||null,
      created_by:myProfile.display_name, updated_by:myProfile.display_name
    });
    if(s.notes) await logActivity({activity_type:'Meeting', title:'Meeting notes (restored from Snapshot): '+org.name, body:s.notes, organisation_id:org.id, meeting_id:created.id});
    report.meetingsCreated++;
  }

  renderCurrent();
  return report;
}

  md += recentDecisions.length ? recentDecisions.map(d=>'- '+fmtDate(d.decided_at)+' — **'+d.title+'**: '+d.decision+'\n').join('') : '_None recorded._\n';

/* ===========================================================================
   DUPLICATE AUDIT & ONE-TIME MERGE
   ---------------------------------------------------------------------------
   Entity-specific duplicate rules (not just title matching). The audit is
   read-only. The cleanup is user-triggered, requires confirmation, runs ONCE
   (guarded by a version row in migration_log so it can never loop on reload),
   keeps the richest record, repoints every reference to it generically (by
   UUID match across all tables — safe: UUID collisions don't happen),
   preserves conflicting values into a notes-like field rather than dropping
   them, and logs a full summary. Merge is best-effort under the anon key and
   RLS: any operation the policies reject is reported, never silently skipped.
=========================================================================== */
const DEDUP_VERSION='dedupe_cleanup_v1';
const DEDUP_RULES=[
  {table:'organisations', label:'Organisations', eligible:o=>!o.archived_at,
    key:o=>{ const d=normDomain(o.website||o.domain||''); return d?('dom:'+d):('name:'+(o.canonical_name||normText(o.name))); },
    name:o=>o.name },
  {table:'people', label:'People', eligible:p=>!p.archived_at,
    key:p=>{ const e=normEmail(p.email); return e?('em:'+e):('nm:'+normText(p.full_name)+'|'+(p.primary_organisation_id||'')); },
    strong:p=>{ const e=normEmail(p.email); return e?('em:'+e):null; },
    name:p=>p.full_name },
  {table:'meetings', label:'Meetings',
    key:m=>'mt:'+(m.organisation_id||'')+'|'+((m.scheduled_at||'').slice(0,10))+'|'+normText(m.title),
    name:m=>m.title },
  {table:'tasks', label:'Follow-ups', eligible:t=>!['Completed','Cancelled','Closed / Lost'].includes(t.status),
    key:t=>'tk:'+(t.organisation_id||'')+'|'+normText(t.title)+'|'+(t.due_at||''),
    name:t=>t.title },
  {table:'marketing_items', label:'Marketing / content',
    key:mi=>mi.seed_key?('sk:'+mi.seed_key):('mk:'+normText(mi.title)+'|'+normText(mi.item_type)+'|'+(mi.scheduled_at||'')),
    name:mi=>mi.title },
  {table:'assets_v2', label:'Assets',
    key:a=>'as:'+normText(a.file_name||a.title)+'|'+(a.file_size||''),
    name:a=>a.file_name||a.title },
  {table:'lessons_v2', label:'Lessons', eligible:l=>!l.archived_at,
    key:l=>'ls:'+normText(l.title), name:l=>l.title },
  {table:'knowledge_sections_v2', label:'Knowledge base', eligible:k=>k.is_current,
    key:k=>'kb:'+normText(k.title)+'|'+normText(k.category||''), name:k=>k.title },
  {table:'team_messages_v2', label:'Team notes',
    key:m=>'tn:'+normText(m.title)+'|'+normText((m.body||'').slice(0,80)), name:m=>m.title||'(note)' }
];
function recordRichness(r){ return Object.keys(r).filter(k=>!['id','created_at','updated_at'].includes(k) && r[k]!=null && r[k]!=='').length; }
function runDuplicateAudit(){
  return DEDUP_RULES.map(rule=>{
    const rows=(state[rule.table]||[]).filter(r=>rule.eligible?rule.eligible(r):true);
    const groups=new Map();
    rows.forEach(r=>{ const k=rule.key(r); if(!k) return; if(!groups.has(k)) groups.set(k,[]); groups.get(k).push(r); });
    const dupGroups=[...groups.entries()].filter(e=>e[1].length>1).map(e=>({key:e[0],rows:e[1]}));
    return {table:rule.table, label:rule.label, dupGroups, dupCount:dupGroups.reduce((n,g)=>n+g.rows.length-1,0)};
  });
}
async function mergeRecordInto(table, primary, dup){
  const result={repointed:0, enriched:[], conflicts:[]};
  for(const t of TABLES){
    for(const r of state[t]){
      if(r.id===dup.id) continue;
      for(const k of Object.keys(r)){
        if(k==='id') continue;
        if(r[k]===dup.id){
          try{ await dbUpdate(t, r.id, {[k]:primary.id}); result.repointed++; }
          catch(e){ result.conflicts.push('repoint '+t+'.'+k+' failed'); }
        }
      }
    }
  }
  const noteField=['notes','description','detail','content','summary'].find(f=>f in primary);
  const patch={}; let conflictNote='';
  for(const k of Object.keys(dup)){
    if(['id','created_at','updated_at'].includes(k)) continue;
    const pv=primary[k], dv=dup[k];
    if(dv==null || dv==='') continue;
    if(pv==null || pv===''){ patch[k]=dv; result.enriched.push(k); }
    else if(pv!==dv){ result.conflicts.push(k); conflictNote+='\n[merged] '+k+' (from duplicate): '+String(dv).slice(0,120); }
  }
  if(conflictNote && noteField) patch[noteField]=((primary[noteField]||'')+'\n'+conflictNote).trim();
  if(Object.keys(patch).length){ try{ await dbUpdate(table, primary.id, patch); }catch(e){ result.conflicts.push('enrich failed'); } }
  try{ await dbDelete(table, dup.id); }catch(e){ result.conflicts.push('delete failed'); }
  return result;
}
async function runDedupeCleanup(){
  if(state.migration_log.some(m=>m.step===DEDUP_VERSION && m.status==='ok')){ toast('Cleanup already run on this database.'); return; }
  const audit=runDuplicateAudit();
  const total=audit.reduce((n,a)=>n+a.dupCount,0);
  if(!total){ toast('No duplicates to clean.'); return; }
  if(!confirm('Run the one-time duplicate cleanup?\n\nThis MERGES '+total+' duplicate record(s) into their richest counterpart, repoints references, preserves conflicting values into notes, and deletes the extras. It cannot be undone.\n\nMake sure you created a backup first (Settings → Backup & Restore). Proceed?')) return;
  showSeedingOverlay('Merging duplicates…');
  const summary=[]; let merged=0;
  try{
    for(const a of audit){
      if(!a.dupCount) continue;
      const rule=DEDUP_RULES.find(r=>r.table===a.table);
      for(const g of a.dupGroups){
        let rows=g.rows;
        if(rule.strong){
          const sk=rule.strong(rows[0]);
          if(!sk){ summary.push(a.label+': left a name-only group for manual review ('+rows.length+' records)'); continue; }
          if(!rows.every(r=>rule.strong(r)===sk)) continue;
        }
        rows=[...rows].sort((x,y)=>recordRichness(y)-recordRichness(x) || String(x.created_at||'').localeCompare(String(y.created_at||'')));
        const primary=rows[0];
        for(let i=1;i<rows.length;i++){
          const res=await mergeRecordInto(a.table, primary, rows[i]);
          merged++;
          summary.push(a.label+': merged "'+String(rule.name(rows[i])||'').slice(0,40)+'" → "'+String(rule.name(primary)||'').slice(0,40)+'" (repointed '+res.repointed+(res.enriched.length?', filled '+res.enriched.length+' field(s)':'')+(res.conflicts.length?', '+res.conflicts.length+' conflict(s) preserved':'')+')');
        }
      }
    }
    try{ await dbInsert('migration_log',{step:DEDUP_VERSION, status:'ok', source_table:'system', detail:('Merged '+merged+' duplicate(s).\n'+summary.join('\n')).slice(0,8000)}); }
    catch(e){ summary.push('WARNING: could not persist the version flag — cleanup ran but might be offered again. ('+(e.message||e)+')'); }
    await loadAll(); renderNav();
  } finally { hideSeedingOverlay(); }
  openModal('<h3>Duplicate cleanup complete</h3><div class="muted" style="font-size:12.5px;margin-bottom:10px">'+merged+' record(s) merged. Full log:</div><div class="out" style="max-height:440px;white-space:pre-wrap">'+esc(summary.join('\n')||'No changes.')+'</div>', true);
}
function vDuplicatesTab(){
  const audit=runDuplicateAudit();
  const total=audit.reduce((n,a)=>n+a.dupCount,0);
  const alreadyRun=state.migration_log.some(m=>m.step===DEDUP_VERSION && m.status==='ok');
  let body='<div class="card"><div style="font-weight:640;margin-bottom:6px">Duplicate audit</div>'+
    '<div class="muted" style="font-size:12.5px;margin-bottom:10px">Read-only scan using entity-specific rules (email/domain/date/canonical key — not just titles). '+total+' likely duplicate record(s) across '+audit.filter(a=>a.dupCount).length+' area(s).</div>';
  if(total){
    body+='<div class="muted" style="font-size:12px;margin-bottom:10px">Cleanup keeps the richest record, repoints every reference to it, preserves conflicting values into notes, logs a summary, and runs <b>once</b> (version-guarded, never on reload). People matched by name-only (no email) are left for manual review. Create a backup first.</div>'+
      (alreadyRun?'<div class="faint" style="font-size:11px">Cleanup '+esc(DEDUP_VERSION)+' has already run on this database — disabled to prevent repeat merges.</div>'
        :'<button class="btn gold" onclick="runDedupeCleanup()">Run one-time cleanup</button>');
  } else body+='<div class="faint" style="font-size:11px">No duplicates detected by the current rules.</div>';
  body+='</div>';
  audit.filter(a=>a.dupCount).forEach(a=>{
    const rule=DEDUP_RULES.find(r=>r.table===a.table);
    body+='<div class="dsec" style="margin-top:16px"><div class="dsec-h"><h2>'+esc(a.label)+'</h2><span class="count">'+a.dupCount+'</span></div><div class="dlist">'+
      a.dupGroups.map(g=>'<div class="drow" style="align-items:flex-start"><div class="drow-main"><div class="drow-title">'+esc(rule.name(g.rows[0])||'(untitled)')+'</div>'+
        '<div class="drow-meta">'+g.rows.length+' copies · '+esc(g.key.slice(0,64))+'</div></div></div>').join('')+'</div></div>';
  });
  return body;
}

/* ===========================================================================
   BACKUP & RESTORE
   ---------------------------------------------------------------------------
   HONEST SCOPE — this is a client-side backup running under the anon key.
   It captures EVERYTHING a browser session legitimately can:
     • every row of every table currently in `state` (one JSON file each)
     • a live Markdown snapshot (the same one Export-for-Claude produces)
     • machine-readable metadata (version.json, kweli_brain_state.md)
     • restore instructions (README_RESTORE.md)
   It deliberately does NOT claim to capture, because a client with the
   anon key genuinely cannot:
     • the Postgres schema/DDL (no schema.sql — that lives in migrations/git)
     • Storage-bucket binaries (uploaded asset files — only their DB rows)
     • auth users / RLS policies
   Those are noted in the README rather than faked. Data restore works by
   upserting the JSON rows back by primary key, which is idempotent: running
   a restore of a backup taken from the same project simply rewrites the same
   rows. Restore validates the archive fully BEFORE writing anything.
=========================================================================== */
const KB_APP_VERSION = '2.4.0';
const KB_BUILD = 'marketing-engine-backup-2026-07';

function kbBackupTimestampParts(){
  const d=new Date();
  const p=n=>String(n).padStart(2,'0');
  return {
    date: d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()),
    time: p(d.getHours())+p(d.getMinutes()),
    iso: d.toISOString()
  };
}

function buildBackupStateMd(ts){
  const counts=TABLES.map(t=>'- '+t+': '+((state[t]||[]).length)).join('\n');
  return '# Kweli Brain — State\n\n'+
    '- Application: Kweli Brain\n'+
    '- Version: '+KB_APP_VERSION+'\n'+
    '- Build: '+KB_BUILD+'\n'+
    '- Export date: '+ts.iso+'\n'+
    '- Supabase project: '+SUPABASE_URL+'\n'+
    '- Storage bucket (V2): '+ASSETS_BUCKET+'\n'+
    '- Signed in as: '+(myProfile?myProfile.display_name:'—')+' ('+(currentUser?currentUser.email:'—')+')\n'+
    '- Theme: dark navy / gold (default)\n\n'+
    '## Installed modules\n'+
    'CRM · Organisations · People · Opportunities · Meetings · Calendar · Follow-ups · '+
    'Lessons · Objections · Decisions · Knowledge Base · Assets · Investors · Marketing · '+
    'AI Workspace · Export for Claude · Backup & Restore\n\n'+
    '## Row counts at export\n'+counts+'\n';
}

function buildRestoreReadme(ts, filename){
  return '# Restoring Kweli Brain — '+filename+'\n\n'+
    '> ⚠️ **DATA-ONLY BACKUP — NOT A COMPLETE BACKUP.** This archive contains your\n'+
    '> database rows plus best-effort code and metadata. It does **not** contain the\n'+
    '> uploaded asset binaries or the authoritative Postgres schema. Do not treat it\n'+
    '> as a full disaster-recovery image on its own.\n\n'+
    'This archive was produced by Kweli Brain\'s Backup & Restore panel on '+ts.iso+'.\n\n'+
    '## What is in this archive\n'+
    '- `data/<table>.json` — every row of every table, exactly as it was at export time.\n'+
    '- `index.html` — the deployed app source, fetched same-origin (present only when\n'+
    '  the app was opened over http/https; absent if opened as a local file).\n'+
    '- `schema/inferred_schema.md` — column names observed in the rows (a convenience,\n'+
    '  NOT authoritative DDL). `schema/README.md` explains where the real schema lives.\n'+
    '- `assets/asset_metadata.json` — filenames, storage paths, sizes and buckets for\n'+
    '  every asset. The binary files themselves are NOT here.\n'+
    '- `snapshot.md` — a human/AI-readable briefing (same as Export for Claude).\n'+
    '- `kweli_brain_state.md` — app version, build, config and row counts.\n'+
    '- `version.json` — machine-readable manifest used to validate a restore.\n\n'+
    '## What is NOT in this archive (and why)\n'+
    'This backup runs in the browser under the public anon key, so it cannot read:\n'+
    '- **Database schema / DDL** — there is no real `schema.sql`. The schema lives in\n'+
    '  your Supabase migrations and in git; recreate an empty project from those first.\n'+
    '- **Storage files** — only the *rows/metadata* describing assets are backed up, not\n'+
    '  the uploaded binaries in the `'+ASSETS_BUCKET+'` bucket. Download those from the\n'+
    '  Supabase dashboard (Storage) using the paths in `assets/asset_metadata.json`.\n'+
    '- **Auth users / RLS policies** — recreate from Supabase config.\n\n'+
    '## To restore the DATA\n'+
    '1. Ensure the target Supabase project already has the correct schema (run your\n'+
    '   migrations against a fresh project if rebuilding).\n'+
    '2. Open Kweli Brain, sign in, go to **Settings → Backup & Restore → Restore**.\n'+
    '3. Choose this `.zip`. The app validates it, shows exactly what it will write\n'+
    '   (including how many rows would be overwritten vs inserted), and only proceeds\n'+
    '   after you confirm.\n'+
    '4. Rows are upserted by primary key: existing rows with the same id are\n'+
    '   overwritten; new ids are inserted; nothing is deleted. Any table the current\n'+
    '   schema rejects is reported per-table rather than silently skipped.\n\n'+
    '## To restore the CODE\n'+
    'Prefer redeploying the matching commit from Netlify/git. The bundled `index.html`\n'+
    '(when present) is a convenience copy of what was served at export time.\n';
}

function buildInferredSchema(){
  let out='# Inferred schema (NOT authoritative)\n\nColumn NAMES observed in the exported rows only. No types, constraints, indexes, defaults or RLS. Get real DDL from your Supabase migrations.\n';
  TABLES.forEach(t=>{
    const rows=state[t]||[];
    const cols=new Set();
    rows.forEach(r=>Object.keys(r||{}).forEach(k=>cols.add(k)));
    out+='\n## '+t+' ('+rows.length+' rows)\n'+([...cols].sort().map(c=>'- '+c).join('\n')||'- (no rows observed — columns unknown)')+'\n';
  });
  return out;
}
async function createFullBackup(){
  if(typeof JSZip==='undefined'){ toast('Backup library not loaded — check your connection and reload.'); return; }
  const btn=document.getElementById('kbBackupBtn');
  if(btn){ btn.disabled=true; btn.textContent='Building backup…'; }
  try{
    const ts=kbBackupTimestampParts();
    const filename='KweliBrain_v'+KB_APP_VERSION+'_'+ts.date+'_'+ts.time+'.zip';
    const zip=new JSZip();
    const dataDir=zip.folder('data');

    const manifest={
      app:'Kweli Brain', version:KB_APP_VERSION, build:KB_BUILD,
      exported_at:ts.iso, supabase_url:SUPABASE_URL, assets_bucket:ASSETS_BUCKET,
      exported_by: myProfile?myProfile.display_name:null,
      tables:{}
    };
    TABLES.forEach(t=>{
      const rows=state[t]||[];
      manifest.tables[t]=rows.length;
      dataDir.file(t+'.json', JSON.stringify(rows, null, 2));
    });

    // Real deployed source (same-origin fetch of the served file, not the
    // mutated DOM). Skipped gracefully when opened as a local file://.
    manifest.index_html_included=false;
    try{
      if(location.protocol.indexOf('http')===0){
        const html=await fetch(location.href,{cache:'no-store'}).then(r=>r.ok?r.text():null);
        if(html && /<html/i.test(html)){ zip.file('index.html', html); manifest.index_html_included=true; }
      }
    }catch(e){ /* leave false */ }

    // Schema: NOT dumpable from the anon client. Ship an honest inferred list
    // plus instructions — never a fabricated schema.sql.
    zip.file('schema/inferred_schema.md', buildInferredSchema());
    zip.file('schema/README.md', 'The authoritative Postgres schema (types, constraints, indexes, RLS, triggers) CANNOT be exported from the browser anon client.\n\nRestore DDL from your Supabase migrations in git, or the Supabase dashboard (Database → Migrations). inferred_schema.md lists only the column NAMES observed in the exported rows and is a convenience, not a source of truth.');

    // Asset metadata only — binary files live in Supabase Storage and are not
    // in this archive.
    const assets=state.assets_v2||[];
    zip.file('assets/asset_metadata.json', JSON.stringify(assets.map(a=>({
      id:a.id, title:a.title, file_name:a.file_name, file_path:a.file_path,
      file_type:a.file_type, file_size:a.file_size, thumbnail_path:a.thumbnail_path, bucket:ASSETS_BUCKET
    })), null, 2));
    manifest.assets_count=assets.length;
    manifest.asset_binaries_included=false;
    manifest.complete=false; // data + metadata only; binaries and true schema excluded

    zip.file('version.json', JSON.stringify(manifest, null, 2));
    zip.file('snapshot.md', buildSnapshotMarkdown());
    zip.file('kweli_brain_state.md', buildBackupStateMd(ts));
    zip.file('README_RESTORE.md', buildRestoreReadme(ts, filename));

    const blob=await zip.generateAsync({type:'blob', compression:'DEFLATE'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=filename; document.body.appendChild(a); a.click();
    a.remove(); setTimeout(()=>URL.revokeObjectURL(url), 4000);

    const totalRows=TABLES.reduce((n,t)=>n+((state[t]||[]).length),0);
    toast('Backup ready — '+totalRows+' rows across '+TABLES.length+' tables ('+filename+')');
  }catch(e){
    console.error('[Backup] failed:',e);
    toast('Backup failed: '+(e.message||e));
  }finally{
    if(btn){ btn.disabled=false; btn.textContent='Create Full Backup'; }
  }
}

/* Validate the archive fully before any write. Returns {ok, manifest,
   tables:{table:rows[]}, error}. A partial/corrupt archive fails here and
   nothing is ever written — honouring "never perform a partial restore" for
   the validation stage. (Row-level rejects during write are still reported
   per-table, since a single client can't wrap 20 RLS-guarded tables in one
   atomic transaction.) */
async function kbValidateBackupZip(file){
  if(typeof JSZip==='undefined') return {ok:false, error:'Backup library not loaded.'};
  let zip;
  try{ zip=await JSZip.loadAsync(file); }
  catch(e){ return {ok:false, error:'Not a readable ZIP archive.'}; }
  const vf=zip.file('version.json');
  if(!vf) return {ok:false, error:'version.json missing — this is not a Kweli Brain backup.'};
  let manifest;
  try{ manifest=JSON.parse(await vf.async('string')); }
  catch(e){ return {ok:false, error:'version.json is corrupt.'}; }
  if(manifest.app!=='Kweli Brain') return {ok:false, error:'version.json is not a Kweli Brain backup.'};

  const tables={};
  for(const t of Object.keys(manifest.tables||{})){
    const f=zip.file('data/'+t+'.json');
    if(!f) return {ok:false, error:'data/'+t+'.json is missing though the manifest lists it.'};
    let rows;
    try{ rows=JSON.parse(await f.async('string')); }
    catch(e){ return {ok:false, error:'data/'+t+'.json is corrupt.'}; }
    if(!Array.isArray(rows)) return {ok:false, error:'data/'+t+'.json is not an array.'};
    if(rows.length!==manifest.tables[t]) return {ok:false, error:t+': manifest says '+manifest.tables[t]+' rows but file has '+rows.length+'.'};
    tables[t]=rows;
  }
  return {ok:true, manifest, tables};
}

let kbPendingRestore=null; // {manifest, tables}

async function onRestoreFileChosen(input){
  const file=input.files && input.files[0];
  input.value=''; // allow re-choosing the same file later
  if(!file) return;
  const host=document.getElementById('kbRestoreStatus');
  if(host) host.innerHTML='<div class="muted" style="font-size:12.5px">Validating '+esc(file.name)+'…</div>';
  const res=await kbValidateBackupZip(file);
  if(!res.ok){
    kbPendingRestore=null;
    if(host) host.innerHTML='<div class="card" style="border-color:var(--red)"><div style="font-weight:640;color:var(--red);margin-bottom:6px">Restore blocked</div>'+
      '<div class="muted" style="font-size:12.5px">'+esc(res.error)+'</div>'+
      '<div class="faint" style="font-size:11px;margin-top:8px">Nothing was written. Fix or re-export the backup and try again.</div></div>';
    return;
  }
  kbPendingRestore={manifest:res.manifest, tables:res.tables};
  const rowsData=Object.entries(res.tables).map(([t,r])=>{ const ex=new Set((state[t]||[]).map(x=>x.id)); const overwrite=r.filter(x=>ex.has(x.id)).length; return {t, count:r.length, overwrite, add:r.length-overwrite}; });
  const rows=rowsData.filter(d=>d.count).map(d=>'<tr><td style="padding:2px 12px 2px 0">'+esc(d.t)+'</td><td class="mono" style="text-align:right">'+d.count+'</td><td class="mono" style="text-align:right;color:var(--amber,#F59E0B)">'+d.overwrite+'</td><td class="mono" style="text-align:right;color:var(--faint)">'+d.add+'</td></tr>').join('');
  const total=Object.values(res.tables).reduce((n,r)=>n+r.length,0);
  const totalOverwrite=rowsData.reduce((n,d)=>n+d.overwrite,0);
  const incomplete=(res.manifest.complete===false)||(res.manifest.asset_binaries_included===false);
  if(host) host.innerHTML='<div class="card"><div style="font-weight:640;margin-bottom:8px">Archive validated ✓</div>'+
    '<div class="muted" style="font-size:12.5px;margin-bottom:10px">From '+esc(res.manifest.exported_at||'unknown date')+' · version '+esc(res.manifest.version||'?')+' · '+total+' rows.'+(incomplete?' <b>Data-only archive</b> — uploaded asset files and the Postgres schema are not included.':'')+'</div>'+
    '<table style="font-size:12px;border-collapse:collapse"><tr class="faint"><td>table</td><td style="text-align:right;padding:0 12px 0 0">rows</td><td style="text-align:right">overwrite</td><td style="text-align:right;padding-left:12px">new</td></tr>'+rows+'</table>'+
    '<div class="muted" style="font-size:12px;margin:12px 0">This upserts every row <b>by id</b>: <b>'+totalOverwrite+'</b> existing row(s) would be overwritten and <b>'+(total-totalOverwrite)+'</b> inserted as new. <b>Nothing is deleted.</b> If a whole table fails validation the restore is blocked before any write; row-level rejects (RLS/schema) are reported per table afterwards.</div>'+
    '<button class="btn gold" onclick="runRestore()">Restore '+total+' rows now</button></div>';
}

async function runRestore(){
  if(!kbPendingRestore){ toast('Choose a validated backup first.'); return; }
  if(!confirm('Restore now? This upserts '+Object.values(kbPendingRestore.tables).reduce((n,r)=>n+r.length,0)+' rows by id into the LIVE database. Existing rows with the same id are overwritten. This cannot be undone — make sure you have a current backup first.')) return;
  const host=document.getElementById('kbRestoreStatus');
  const {tables}=kbPendingRestore;
  const results=[];
  // Restore in FK-friendly order where it matters (parents before children),
  // falling back to manifest order for anything unlisted.
  const order=['user_profiles','organisations','people','opportunities','meetings','meeting_attendees',
    'tasks','assets_v2','lessons_v2','decisions','objections','marketing_items','knowledge_sections_v2',
    'investor_profiles','team_messages_v2','team_message_replies','team_message_reads','entity_links',
    'activities','migration_log'];
  const ordered=[...order.filter(t=>tables[t]), ...Object.keys(tables).filter(t=>!order.includes(t))];

  for(const t of ordered){
    const rows=tables[t];
    if(!rows.length){ results.push({t, ok:0, fail:0, note:'empty'}); continue; }
    let ok=0, fail=0, lastErr='';
    const CHUNK=200;
    for(let i=0;i<rows.length;i+=CHUNK){
      const chunk=rows.slice(i,i+CHUNK);
      const {data,error}=await sb.from(t).upsert(chunk, {onConflict:'id'}).select('id');
      if(error){ fail+=chunk.length; lastErr=error.message; }
      else { ok+=(data||[]).length; }
    }
    results.push({t, ok, fail, note:lastErr});
    if(host) host.innerHTML='<div class="muted" style="font-size:12.5px">Restoring… '+esc(t)+' ('+ok+' ok'+(fail?', '+fail+' failed':'')+')</div>';
  }

  await loadAll(); // refresh local mirror from the DB after writing
  renderNav();
  const totalOk=results.reduce((n,r)=>n+r.ok,0);
  const failed=results.filter(r=>r.fail>0);
  const rowsHtml=results.map(r=>'<tr><td style="padding:2px 12px 2px 0">'+esc(r.t)+'</td>'+
    '<td class="mono" style="text-align:right;color:var(--green,#4ADE80)">'+r.ok+'</td>'+
    '<td class="mono" style="text-align:right;color:'+(r.fail?'var(--red)':'var(--faint)')+'">'+r.fail+'</td>'+
    '<td class="faint" style="font-size:10px;padding-left:10px">'+esc(r.fail?r.note:'')+'</td></tr>').join('');
  if(host) host.innerHTML='<div class="card" style="border-color:'+(failed.length?'var(--amber)':'var(--gold)')+'">'+
    '<div style="font-weight:640;margin-bottom:8px">Restore complete — '+totalOk+' rows written'+(failed.length?', '+failed.reduce((n,r)=>n+r.fail,0)+' rejected':'')+'</div>'+
    '<table style="font-size:12px;border-collapse:collapse"><tr class="faint"><td>table</td><td style="text-align:right">written</td><td style="text-align:right">rejected</td><td></td></tr>'+rowsHtml+'</table>'+
    (failed.length?'<div class="muted" style="font-size:12px;margin-top:10px">Rejected rows are usually a schema mismatch (a column the current DB computes or no longer has) or an RLS policy. The reason is shown per table. Nothing was deleted.</div>':'')+'</div>';
  kbPendingRestore=null;
  toast('Restore finished — '+totalOk+' rows written'+(failed.length?', '+failed.reduce((n,r)=>n+r.fail,0)+' rejected':''));
}

function vBackupPanel(){
  const totalRows=TABLES.reduce((n,t)=>n+((state[t]||[]).length),0);
  const zipReady=(typeof JSZip!=='undefined');
  return '<div class="card"><div style="font-size:14.5px;font-weight:640;margin-bottom:6px">Create Full Backup</div>'+
    '<div class="muted" style="font-size:12.5px;margin-bottom:14px">One click exports every row of all '+TABLES.length+' tables ('+totalRows+' rows right now) as a versioned ZIP, alongside a Markdown snapshot, an app-state manifest, and restore instructions. Read-only — this never changes your data.</div>'+
    (zipReady?'':'<div class="muted" style="font-size:11px;color:var(--amber);margin-bottom:10px">Backup library still loading — if this button does nothing, reload the page.</div>')+
    '<button class="btn gold" id="kbBackupBtn" onclick="createFullBackup()">Create Full Backup</button>'+
    '<div class="faint" style="font-size:11px;margin-top:12px">Captures data rows, not the Postgres schema or uploaded asset files — those are managed in migrations/git and Supabase Storage. See README_RESTORE.md inside the ZIP for the full picture.</div>'+
  '</div>'+
  '<div class="card" style="margin-top:16px"><div style="font-size:14.5px;font-weight:640;margin-bottom:6px">Restore Backup</div>'+
    '<div class="muted" style="font-size:12.5px;margin-bottom:14px">Choose a Kweli Brain backup ZIP. It is fully validated before anything is written; you then see exactly what will change and confirm. Rows are upserted by id — existing records with matching ids are overwritten, new ones inserted, nothing deleted.</div>'+
    '<button class="btn" onclick="document.getElementById(\'kbRestoreInput\').click()">Choose backup ZIP…</button>'+
    '<input type="file" id="kbRestoreInput" accept=".zip" style="display:none" onchange="onRestoreFileChosen(this)">'+
    '<div id="kbRestoreStatus" style="margin-top:14px"></div>'+
  '</div>';
}
</script>
