Governance and procurement leaders already know this. What's usually missing isn't awareness, it's a fast, practical way to check a document's authenticity without adding another approval layer to an already slow process.

That's the gap we spend a lot of our time closing.`},
  {day:'thu', platform:'LinkedIn', type:'Digital Trust', title:'Every handoff assumes the document is real',
    desc:'Supply chain document trust.',
    copy:`Trace any supply chain far enough and you'll find the same quiet assumption repeated at every handoff: this certificate, this invoice, this compliance letter is genuine, because the last person in the chain seemed to think so too.

Nobody re-verifies at each step. It would be far too slow. So trust gets inherited rather than earned, all the way down the chain — right up until one forged document causes a problem, at which point everyone asks how nobody caught it.

Verification infrastructure doesn't ask every party to re-check everything. It gives each handoff a fast, independent confirmation instead of an inherited assumption.

That's a small shift in mechanics with a large effect on where risk actually sits.`}
]},
{w:11, items:[
  {day:'tue', platform:'LinkedIn', type:'AI & Document Fraud', title:'AI will happily believe a fake document',
    desc:'Cybersecurity Awareness Month — ties document integrity to AI adoption.',
    copy:`Cybersecurity Awareness Month is usually about passwords and phishing. Worth adding to the list: the documents feeding your AI systems.

An AI model reading a claim, an application or a contract has no idea whether the invoice or certificate behind it is genuine — it will process a well-forged document exactly as confidently as a real one. As more institutions plug AI into claims, underwriting and compliance workflows, the quality of the documents feeding those systems matters more, not less.

Verifying inputs isn't a side conversation to AI adoption. It's a prerequisite for trusting what the AI produces.

If your team is automating decisions this year, it's worth asking: what's verifying the documents before the model ever sees them?`},
  {day:'wed', platform:'Instagram', type:'Did You Know?', title:'Cybersecurity Awareness Month includes your documents too',
    desc:'Instagram tie-in to Cybersecurity Awareness Month.',
    copy:`Did you know? During Cybersecurity Awareness Month, most institutions review passwords and phishing training — but rarely audit whether the documents behind their claims and applications have ever been independently verified.

Document integrity is part of your security posture too.

#CybersecurityAwarenessMonth #DocumentIntegrity`,
    image:"A shield split in half — one side a padlock (classic cybersecurity), the other a document with a checkmark — captioned 'Two sides of the same problem.'"}
]},
{w:12, items:[
  {day:'tue', platform:'LinkedIn', type:'Thought Leadership', title:"Your documents are digital. Proving they're real is still analogue.",
    desc:'Digital document authenticity.',
    copy:`Almost every document an institution handles today arrives as a PDF, a scan, or a digital form. Almost every way institutions verify those documents is still analogue: a phone call, an email to the issuer, a person eyeballing a signature.

Digitising a document didn't digitise the trust behind it. That's the actual gap — not a lack of digital documents, but a lack of digital ways to prove they're genuine and unaltered.

Closing that gap doesn't require replacing how institutions issue documents today. It requires adding a verification layer underneath the documents that already exist.

That's a much smaller ask than most "digital transformation" projects, and a more immediately useful one.`},
  {day:'wed', platform:'Instagram', type:'Credentials', title:'Can anyone confirm it in seconds?',
    desc:'Visual — the real standard for credential trust.',
    copy:`A certificate, a licence, a diploma — all just documents claiming something is true.

The question worth asking isn't "does it look official?" It's "can anyone independently confirm it, in seconds, without calling the issuer?"

That's the standard we build to.

#Credentials #DigitalTrust`,
    image:"Three overlapping document icons (certificate, licence, diploma), each with a small verified-checkmark badge in the corner."},
  {day:'thu', platform:'LinkedIn', type:'Myth vs Fact', title:'Myth: blockchain for verification means crypto',
    desc:'Blockchain beyond crypto — reframes the useful part.',
    copy:`Myth: blockchain for document verification means crypto, tokens, and speculation.

Fact: the genuinely useful part was always the boring bit — a tamper-evident, independently checkable record of when something was issued and whether it's changed since. No coin required.

We use that property because it solves a real problem (proving a document is genuine, without a phone call), not because it's fashionable. Most of what made blockchain famous is irrelevant to what makes it useful here.

If "blockchain" makes you skeptical, that's fair. Judge the verification, not the word.`}
]},
{w:13, items:[
  {day:'tue', platform:'LinkedIn', type:'AI & Document Fraud', title:'The hidden cost of manual verification, revisited for AI',
    desc:'Manual verification as the bottleneck automation trips over.',
    copy:`We wrote a few weeks ago about the hidden cost of "we'll just call to confirm." Worth revisiting now that AI is entering claims and underwriting workflows: manual verification doesn't just cost time, it becomes the bottleneck an automated process trips over.

An AI system can triage a claim in seconds. If the document behind that claim still needs a human to phone the issuer, the automation gains nothing — the slow step just moved, it didn't disappear.

Verification has to modernise at the same pace as the systems around it, or it quietly becomes the reason automation projects underdeliver.

That's a less-discussed risk of AI rollouts than most people expect, and one worth raising before the project, not after.`},
  {day:'thu', platform:'LinkedIn', type:'Trust Infrastructure', title:'Where document verification goes next',
    desc:'Closes out the Cybersecurity Awareness Month arc with the category vision.',
    copy:`Closing out Cybersecurity Awareness Month with where we think this goes: verification stops being a manual step someone remembers to do, and becomes infrastructure sitting quietly underneath insurance, banking, trade and hiring — the way payment rails sit underneath commerce.

Institutions won't "add verification" as a project. They'll simply stop being able to imagine operating without an instant, independent way to confirm a document is genuine.

That's a ten-year view, not a next-quarter one. But every infrastructure shift looks like a niche tool right up until it doesn't.

We'd rather be early and unglamorous than late and obvious.`}
]},
{w:14, items:[]},
{w:15, items:[
  {day:'tue', platform:'LinkedIn', type:'Insurance Insight', title:'Claims leakage: the silent margin killer',
    desc:'Claims leakage as a background, distributed cost.',
    copy:`Claims leakage rarely shows up as a single dramatic loss. It shows up as a slow, steady margin erosion — a slightly inflated invoice here, an unverified certificate there, none of it big enough on its own to trigger an investigation.

That's exactly why it survives: no single case looks worth the cost of manual verification, so insurers accept a background rate of leakage as the price of doing business at volume.

The economics change once verification is fast and cheap enough to apply broadly instead of selectively. Leakage stops being a rounding error you tolerate and becomes a number you can actually see and reduce.

For claims leaders: do you currently know your real leakage rate, or an estimate built on the cases you happened to catch?`},
  {day:'thu', platform:'LinkedIn', type:'Founder Insight', title:'We built an exchange before we understood the problem',
    desc:'Founder story — the pivot away from the original exchange idea.',
    copy:`Kweli didn't start as a verification company. It started as an exchange — a marketplace idea that sounded good in a pitch deck and solved a problem almost nobody we later spoke to actually had.

It took real conversations with insurers, brokers and traders to hear the same specific frustration over and over: not "we need a marketplace," but "we have no fast way to know if this document is real." That's a narrower, less exciting-sounding problem. It's also the one people were actually willing to change their workflow for.

The lesson wasn't "pivot faster." It was: talk to the market before you're attached to the idea, not after.

We're glad we didn't ship the exchange.`},
  {day:'wed', platform:'Instagram', type:'Did You Know?', title:'Leakage is usually many small things, not one big thing',
    desc:'Bite-size visual on claims leakage.',
    copy:`Did you know? Claims leakage often isn't one big fraud — it's dozens of small, unverified documents that were never worth investigating individually.

Fast, cheap verification changes that math entirely.

#ClaimsLeakage #InsuranceInsight`,
    image:"A leaking bucket graphic with small document icons as the drips, labelled 'small, unverified, adds up.'"}
]},
{w:16, items:[
  {day:'tue', platform:'LinkedIn', type:'Document Integrity', title:'What thirty enterprise conversations taught us about trust',
    desc:'Customer-conversation lessons — the market rarely names its own problem correctly.',
    copy:`Over the past stretch of customer conversations, one pattern showed up almost everywhere, regardless of industry: nobody thinks they have a "verification problem." They think they have a claims problem, a compliance problem, an onboarding-speed problem — and it's only a few questions in that the actual bottleneck turns out to be the same thing: nobody can quickly confirm a document is genuine.

That's a useful thing to notice as a founder. The market rarely describes its own problem in the words you'd use to solve it.

It also means the sales conversation isn't "buy verification infrastructure" — it's "let's look at the specific document your team spends the most time doubting."

That's a much easier conversation to have.`},
  {day:'thu', platform:'LinkedIn', type:'Banking Insight', title:'What a certificate actually proves (and what it doesn’t)',
    desc:'Splits credential trust into three separate, checkable claims.',
    copy:`A certificate proves that, at some point, someone issued a document making a claim. It does not prove the claim is still true, that the copy in front of you is unaltered, or that it was actually the named issuer who created it — three separate things people routinely collapse into one glance at a logo and a signature.

Banks relying on certificates for KYC, compliance or collateral documentation are usually trusting all three at once, on the strength of the first.

Separating those questions — issued by whom, unaltered since when, still valid now — is a more precise (and more checkable) way to think about document trust than "does it look right."

It's a small reframing that changes what you actually need to verify.`}
]},
{w:17, items:[
  {day:'tue', platform:'LinkedIn', type:'Claims Workflow', title:"International Fraud Awareness Week: the fraud that isn't dramatic",
    desc:'International Fraud Awareness Week — the undramatic, everyday version of fraud.',
    copy:`This week is International Fraud Awareness Week, and most of the content around it will focus on the dramatic cases — the elaborate schemes, the headline numbers. Worth a word for the undramatic version, because it's the one institutions actually live with daily.

Most document fraud isn't sophisticated. It's a changed number on an invoice, a certificate that was never quite issued the way it claims, a report altered slightly between two hands. It survives not because it's clever, but because nobody has time to check everything, so a background rate gets accepted as normal.

Fraud awareness is useful. Fraud-checking infrastructure that doesn't depend on someone remembering to be suspicious is more useful.

That's the gap we spend this week — and every week — closing.`},
  {day:'thu', platform:'LinkedIn', type:'Myth vs Fact', title:'Myth: document fraud is rare',
    desc:'International Fraud Awareness Week — reframes fraud as a background cost, not a rare event.',
    copy:`Myth: document fraud is a rare, exceptional event that mostly happens to careless organisations.

Fact: it's closer to a background tax that most institutions quietly pay, distributed across thousands of small, unverified documents rather than concentrated in a few dramatic cases.

The reason it feels rare is that most of it is never caught, not that it doesn't happen. Verification infrastructure doesn't just catch more fraud — it changes an invisible cost into a visible, manageable one.

Happy International Fraud Awareness Week. The real milestone isn't awareness — it's making verification routine enough that awareness stops being the main defence.`},
  {day:'wed', platform:'Instagram', type:'Did You Know?', title:'Most document fraud is quiet, not dramatic',
    desc:'International Fraud Awareness Week visual.',
    copy:`Did you know? It's International Fraud Awareness Week. Most document fraud isn't dramatic — it's small, quiet, and routinely accepted as an unavoidable cost of doing business.

It doesn't have to be.

#FraudAwarenessWeek #DocumentIntegrity`,
    image:"A magnifying glass over a stack of ordinary-looking documents, one subtly highlighted, captioned 'Can you tell which one?'"}
]},
{w:18, items:[
  {day:'tue', platform:'LinkedIn', type:'Trade Insight', title:'Every handoff assumes the document is real, part two',
    desc:'Extends the supply-chain trust theme into trade finance specifically.',
    copy:`A few weeks ago we wrote about how supply chains inherit trust rather than earn it at each handoff. Worth a follow-up: the same pattern shows up just as clearly in trade finance, where a single shipment can touch a bank, an insurer, a customs authority and a buyer, each relying on paperwork none of them independently checked.

The instinct is to add more sign-offs. The actual fix is smaller: give each party in the chain a fast, independent way to confirm a document's authenticity at the moment they need it, rather than adding another layer of people trusting the layer before them.

Fewer approvals, more verification. It's a better trade than it sounds.`},
  {day:'thu', platform:'LinkedIn', type:'Credentials', title:'What a certificate proves, applied to hiring and licensing',
    desc:'Extends the certificate-trust framework into employment and licensing.',
    copy:`Employers and regulators verifying credentials face the same three-part problem we described for banks: was this issued by the named body, is this copy unaltered, and is it still valid — three questions routinely answered with one glance at a logo.

The cost of getting it wrong isn't abstract. A forged professional licence or degree in the wrong hands is a hiring decision made on false information, sometimes in fields where that matters a great deal.

Instant, independent credential verification isn't about distrusting applicants. It's about removing the one step in hiring that everyone currently does on faith rather than fact.

That's a small process change with an outsized reduction in risk.`}
]},
{w:19, items:[
  {day:'tue', platform:'LinkedIn', type:'Provenance', title:'What our first pilots taught us about where verification bites',
    desc:'Pilot learnings — process pain vs theoretical fraud risk.',
    copy:`Early pilots rarely confirm what you expected — they tell you something more specific. Ours taught us that the document type people most wanted verified wasn't always the one with the biggest fraud exposure; it was often the one causing the most operational friction, the document a team was manually chasing and re-checking every single week.

That's a useful distinction. "Where's the fraud risk" and "where's the process pain" are related questions, but they don't always point at the same document.

Designing verification infrastructure around actual daily friction, not just theoretical risk, is part of why the pilots stuck rather than stalling after the first month.

It's a smaller insight than it sounds, and it changed how we prioritise.`},
  {day:'thu', platform:'LinkedIn', type:'Thought Leadership', title:'What verification infrastructure actually means (and what it doesn’t)',
    desc:'The canonical definitional piece — precise about what Kweli is and isn’t.',
    copy:`"Verification infrastructure" gets used loosely, so worth being precise. It doesn't mean an AI that reads documents and guesses if they look suspicious. It doesn't mean a database of every document ever issued. And it doesn't mean publishing sensitive records anywhere public.

It means a fast, independent way to answer three specific questions about any document: who issued it, has it changed since, and is that still true today — without exposing the document's contents to anyone who doesn't already have them.

Everything we build sits underneath that definition. Not flashier, not broader — just reliably answering those three questions, at the speed institutions actually need them answered.

Precision here matters more than ambition.`},
  {day:'wed', platform:'Instagram', type:'Founder Insight', title:'The theme underneath everything we post',
    desc:'Closes November with a short reflective quote card.',
    copy:`Closing out November: the theme underneath everything we post is the same — trust shouldn't depend on a phone call, a hunch, or hoping nobody bothered to fake it well.

Small, precise infrastructure. Big, quiet difference.

#FounderInsight #TrustInfrastructure`,
    image:"A simple quote-card, navy background, gold serif text reading 'Trust shouldn't depend on a phone call.'"}
]},
{w:20, items:[
  {day:'tue', platform:'LinkedIn', type:'Document Integrity', title:'International Anti-Corruption Day: the paperwork behind it',
    desc:'International Anti-Corruption Day (9 December) — the mechanical layer under corruption.',
    copy:`December 9th is International Anti-Corruption Day, and most of the conversation focuses — rightly — on accountability and governance. Worth adding the quieter mechanical layer underneath a lot of corruption: documents that were never independently checked, because checking them wasn't practical at the volume institutions operate at.

Procurement fraud, falsified compliance letters, backdated approvals — these aren't exotic techniques. They work because verification is manual, slow, and easy to skip when nobody's specifically looking.

Anti-corruption efforts tend to focus on rules and oversight. Making the underlying documents fast and cheap to verify is a less-discussed lever, and one of the more practical ones institutions can actually pull this year.

Good governance needs good infrastructure underneath it.`},
  {day:'thu', platform:'LinkedIn', type:'Insurance Insight', title:'Getting ready for renewal season',
    desc:'Year-end renewal season claims readiness.',
    copy:`Renewal season concentrates a year's worth of claims, documentation and risk review into a few compressed weeks — exactly the conditions under which manual verification gets skipped, because there simply isn't time to phone every issuer on every file.

That's worth naming plainly: the busiest period for claims and underwriting teams is also the period when document scrutiny is most likely to quietly drop, not because anyone decided it should, but because volume forces triage.

Fast, independent verification doesn't ask teams to do more during renewal season. It removes the slowest step from the files that would otherwise get waved through on time pressure alone.

If your renewal season is heavy, that's usually when this matters most, not least.`},
  {day:'wed', platform:'Instagram', type:'Did You Know?', title:'A lot of corruption runs on unchecked documents',
    desc:'Anti-Corruption Day visual.',
    copy:`Did you know? December 9th is International Anti-Corruption Day. A lot of corruption doesn't run on conspiracy — it runs on documents nobody had time to check.

Faster verification is a real, practical part of the fix.

#AntiCorruptionDay #DocumentIntegrity`,
    image:"A stack of official-looking documents with a small padlock-and-checkmark icon, captioned 'Checked, not just signed.'"}
]},
{w:21, items:[
  {day:'tue', platform:'LinkedIn', type:'Trust Infrastructure', title:'Closing out the year on trust',
    desc:'Year-end reflection, ties the whole arc together.',
    copy:`A year of these posts has circled one idea from a dozen angles: institutions have quietly accepted document fraud as background noise, because checking properly was too slow to do at scale. That's not a permanent condition — it's just the version of the problem that existed before fast, independent verification did.

We don't think next year is the year every institution suddenly rebuilds its verification process. Infrastructure shifts are slower and less dramatic than that, and we'd be suspicious of anyone claiming otherwise.

But we do think the direction is set: verification stops being a phone call and becomes a layer underneath everything else. Glad to be building the unglamorous part early.

Thank you to everyone who's had one of these conversations with us this year.`},
  {day:'thu', platform:'LinkedIn', type:'Myth vs Fact', title:'Myth: this is only an insurance problem',
    desc:'Broadens the category beyond insurance ahead of year-end.',
    copy:`Myth: document verification is mainly an insurance-industry concern.

Fact: everywhere we've looked this year — banking, trade, education, procurement, hiring — the same gap shows up: documents are trusted because they look right, not because anyone independently confirmed it. Insurance just tends to notice the cost of that gap earliest, because claims leakage is easier to measure than most other industries' equivalent losses.

The underlying problem is the same wherever paperwork underpins a decision worth money or trust. That's exactly why we built this as infrastructure rather than an insurance product with a different label.

Wherever you sit, the question is the same one we keep asking: what document does your team currently trust without checking?`}
]},

{w:24, items:[
  {day:'tue', platform:'LinkedIn', type:'Founder Insight', title:"What we're carrying into the new year",
    desc:'New Year founder reflection — deliberately modest, not a big-ambitions post.',
    copy:`New Year posts usually promise a bigger, bolder version of the company. Ours is quieter: the same problem, described more precisely, delivered a bit faster than we did last year.

We spent the back half of last year hearing the same specific frustration across insurance, banking and trade — not "we need better technology," but "we have no fast way to know if this document is real." That clarity is worth more to us than a new list of ambitions.

This year, we'd rather get better at the narrow thing than wider at a vague one. If that sounds unambitious, it's a deliberate bet: infrastructure earns trust by being boring and correct for a long time, not by being exciting for a quarter.

Here's to more of the same, done better.`},
  {day:'thu', platform:'LinkedIn', type:'Insurance Insight', title:'What claims teams should watch for this year',
    desc:'New-year claims fraud vigilance note.',
    copy:`A new year of policies means a new year of claims built on documents nobody has reason to distrust yet — which is exactly when a slightly-too-convenient invoice or a certificate issued a little too quickly is easiest to wave through.

Fraud patterns don't reset in January, but scrutiny sometimes quietly does, especially on files that look routine. Worth a reminder heading into the year: the documents that feel least suspicious are often the ones least likely to have been checked at all.

That's not a call for more suspicion across the board — it's a call for verification that doesn't depend on a file feeling suspicious to trigger it.

Wishing every claims team a lighter leakage year than the last.`},
  {day:'wed', platform:'Instagram', type:'Did You Know?', title:'Fraud doesn’t take a New Year’s break',
    desc:'New Year visual tie-in.',
    copy:`Did you know? Fraud doesn't take a New Year's break — but scrutiny sometimes quietly does, on files that look routine.

Verification that doesn't depend on suspicion catches what routine-looking cases hide.

#NewYear #ClaimsLeakage`,
    image:"A calendar flipping to January with a small document icon and a subtle caution flag."}
]},
{w:25, items:[
  {day:'tue', platform:'LinkedIn', type:'Banking Insight', title:'KYC documents deserve the same scrutiny as claims',
    desc:'Extends claims-leakage thinking into banking onboarding.',
    copy:`Insurers talk about claims leakage. Banks should talk about onboarding leakage — the slow accumulation of accounts opened on the strength of an ID document, a proof of address or a company registration certificate that nobody independently confirmed, because KYC checklists focus on collecting documents, not verifying them.

Collecting the right documents and confirming they're genuine are two different steps, and most onboarding processes are thorough about the first and thin on the second.

That gap doesn't need a bigger checklist. It needs the existing checklist backed by a fast, independent way to confirm each document is what it claims to be.

For banking compliance teams: how much of your KYC process is collection versus actual verification?`},
  {day:'thu', platform:'LinkedIn', type:'AI & Document Fraud', title:'Automating decisions means automating trust in bad documents too',
    desc:'AI adoption risk if inputs are never verified.',
    copy:`Every institution automating claims, underwriting or onboarding this year is making an implicit bet: that the documents feeding the model are genuine. Most haven't actually tested that bet, because verifying inputs isn't usually part of the automation project scope — the focus goes to the model, not what it's reading.

A well-forged document doesn't confuse an AI system. It gets processed with exactly the same confidence as a real one, which means automation can scale a fraud problem just as efficiently as it scales a good decision.

Verifying documents before they reach the model isn't a nice-to-have alongside AI adoption. It's the part of the project that determines whether automation is actually safer, or just faster at being wrong.`}
]},
{w:26, items:[
  {day:'tue', platform:'LinkedIn', type:'Thought Leadership', title:'The coming divide between verified and unverifiable institutions',
    desc:'Closing thought-leadership piece — the category vision.',
    copy:`As verification infrastructure becomes normal in some sectors, a quieter divide starts to form: institutions whose documents can be independently confirmed in seconds, and institutions whose documents still require a phone call and a hope. That divide will show up first as a speed advantage, then as a trust advantage — partners and regulators will simply prefer dealing with the side that can prove things quickly.

Nobody will announce this divide. It'll just become slightly harder, quarter over quarter, to do business with institutions still running on manual verification, the way it slowly became harder to do business with anyone still sending paper cheques.

Being on the right side of that divide isn't about technology adoption for its own sake — it's about not being the slow, unverifiable option in five years' time.`},
  {day:'thu', platform:'LinkedIn', type:'Credentials', title:'The fake degree is a solved problem we haven’t deployed',
    desc:'Closing piece — echoes the opening theme, deployment not invention.',
    copy:`Fake degrees and inflated transcripts are one of the most talked-about, least technically difficult fraud problems to solve — the verification pattern is straightforward, the institutions involved are usually cooperative, and the fraud is common enough that everyone in hiring has a story about it.

What's missing isn't a solution. It's deployment: most employers still verify credentials the old way, if they verify them at all, because nobody made the fast version the default.

That's true of a lot of what we build. The hard part is rarely the verification method — it's making the fast, correct way easier to reach for than the slow, manual habit everyone already has.

Closing this run of posts on the same note we opened with six months ago: the gap isn't technology. It's habit.`},

    desc:'Closing quote card for the 6-month arc.',
    copy:`Six months of posts, one thread underneath all of them: institutions trust documents because they look right, not because anyone checked. We think that's about to change, quietly and slowly, the way infrastructure always does.

Thank you for reading along.

#TrustInfrastructure #Kweli`,
    image:"A simple closing quote-card, navy/gold, reading 'The gap isn't technology. It's habit.' with the Kweli mark."}
]}

/* Builds the flat marketing_items rows from the curated calendar above.
   Pure, deterministic, offline — no network call, no CRM dependency (this
   plan never references organisations/contacts, unlike the old distribution
   tasks it replaces). */
function buildInsurancePlanRows(){
  const rows=[];
  CURATED_CALENDAR_WEEKS.forEach(week=>{
    (week.items||[]).forEach((item,i)=>{
      const weekMonday=addCalendarDays(PLAN_START, (week.w-1)*7);
      const date=addCalendarDays(weekMonday, PLAN_DAY_OFFSET[item.day]);
      const itemType=item.platform==='Instagram' ? 'Instagram Caption' : 'LinkedIn Post';
      rows.push({
        seed_key: MARKETING_CAMPAIGN_KEY+'-week-'+String(week.w).padStart(2,'0')+'-'+item.day+'-'+(i+1),
        title: item.title,
        item_type: itemType,
        audience: item.audience || AUDIENCE_BY_TYPE[item.type] || null,
        objective: item.desc || null,
        status: STAGE_TO_DB_STATUS['Scheduled'],
        priority: 'Normal',
        owner_user_id: myProfile.id,
        scheduled_at: dateKeyLocal(date),
        description: serializeContentFields('Scheduled', {topic:item.type, readyCopy:escapeFieldNewlines(item.copy), imageSuggestion:escapeFieldNewlines(item.image||DEFAULT_IMAGE_SUGGESTION), notes:''})
      });
    });
  });
  return rows;
}
function expectedSeedKeys(){
  // Single source of truth: whatever buildInsurancePlanRows() would write,
  // computed here purely offline (myProfile.id/STAGE_TO_DB_STATUS don't
  // affect seed_key), so this stays a fast, pure completeness check.
  return buildInsurancePlanRows().map(r=>r.seed_key);
}

/* Authoritative, database-verified completeness check — queries the real
   table for every seed_key belonging to this campaign, not local state
   (which could be stale or reflect a different device's in-progress
   write). This is what makes self-healing possible: a partial batch
   failure leaves some expected keys missing from this query's result,
   and the very next sign-in (any device) will see exactly which ones. */
async function fetchExistingCampaignSeedKeys(){
  const {data,error} = await sb.from('marketing_items').select('seed_key').like('seed_key', MARKETING_CAMPAIGN_KEY+'-week-%');
  if(error){ console.error('[Marketing plan] could not check existing seed keys:',error); throw error; }
  return new Set((data||[]).map(r=>r.seed_key));
}

/* ---------------------------------------------------------------------------
   DUPLICATE PREVENTION, TWO LAYERS.
   Layer 1 (seed_key + unique index + upsert onConflict) already prevents
   the database from ever storing two rows with the same seed_key, even
   under a race. Layer 2, here, is a second, independent guard against a
   different failure mode: rows that exist WITHOUT a matching seed_key at
   all — e.g. left over from an earlier version of this seeding logic, or
   any other path that ever created a marketing_item with the same
   title/date/type. Before treating a computed row as "missing", check
   real content identity (title + scheduled_at + item_type) against every
   existing marketing_item, not just seed_key. If a content match is
   found but its seed_key is missing, backfill it — that both prevents a
   duplicate insert now and makes that row seed_key-recognised for every
   future run.
--------------------------------------------------------------------------- */
async function seedInsurancePlanBatched(){
  const allRows = buildInsurancePlanRows();
  const existingKeys = await fetchExistingCampaignSeedKeys();
  const contentIndex = new Map(); // "title|date|type" -> existing row
  state.marketing_items.forEach(mi=>{ contentIndex.set(mi.title+'|'+mi.scheduled_at+'|'+mi.item_type, mi); });

  const trulyMissing=[];
  const backfillKeyOnly=[];
  for(const r of allRows){
    if(existingKeys.has(r.seed_key)) continue; // already correctly seeded
    const contentMatch = contentIndex.get(r.title+'|'+r.scheduled_at+'|'+r.item_type);
    if(contentMatch && !contentMatch.seed_key){ backfillKeyOnly.push({id:contentMatch.id, seed_key:r.seed_key}); }
    else if(!contentMatch){ trulyMissing.push(r); }
    // else: a content match already carries a seed_key (from a different week/slot coincidentally
    // matching text) — leave it alone rather than risk overwriting a real, different row.
  }

  for(const b of backfillKeyOnly){ await dbUpdate('marketing_items', b.id, {seed_key:b.seed_key}); }

  if(!trulyMissing.length) return {created:0, backfilled:backfillKeyOnly.length, alreadyComplete:true, expected:allRows.length, existing:existingKeys.size};

  const CHUNK=40;
  let created=0;
  for(let i=0;i<trulyMissing.length;i+=CHUNK){
    const chunk=trulyMissing.slice(i,i+CHUNK);
    const {data,error} = await sb.from('marketing_items')
      .upsert(chunk, {onConflict:'seed_key', ignoreDuplicates:true})
      .select();
    if(error){ console.error('[Marketing plan] batch upsert failed:',error); toast('Marketing plan setup failed: '+error.message); throw error; }
    (data||[]).forEach(row=>{ if(!byId(state.marketing_items,row.id)) state.marketing_items.push(row); });
    created += (data||[]).length;
  }
  return {created, backfilled:backfillKeyOnly.length, alreadyComplete:false, expected:allRows.length, existing:existingKeys.size};
}

/* One-time cleanup pass, SCOPED STRICTLY to the automatic insurance
   campaign — never touches a manually created marketing_item, even if its
   title/date/type happens to coincidentally match a seeded one. A row is
   only eligible if it carries either:
     - a seed_key already starting with the campaign prefix, or
     - the legacy description tag '[[campaign:insurance-verification-6mo-v2]]'
       (rows created before seed_key existed).
   Within a group of eligible duplicates (same title+date+type, all
   already confirmed in-scope):
     1. a row that already has a valid campaign seed_key is always kept —
        deleting it would just force the seeder to recreate it.
     2. otherwise, prefer a row with real progress: Published status, or
        edited after creation (updated_at meaningfully later than
        created_at — a >5s gap rules out the near-simultaneous stamps a
        single insert produces).
     3. otherwise, the oldest by created_at.
   The retained row in every eligible group (duplicate or not) then gets
   its deterministic seed_key backfilled if it's missing one, computed
   from the same buildInsurancePlanRows() the seeder itself uses — so a
   legacy tagged row that was never a duplicate still becomes properly
   seed_key-recognised, and a real duplicate group collapses to exactly
   one row with the correct key, before the completeness check ever runs. */
async function dedupeMarketingItemsOnce(){
  const campaignPrefix = MARKETING_CAMPAIGN_KEY+'-week-';
  const campaignTag = '[[campaign:'+MARKETING_CAMPAIGN_KEY+']]';
  const inScope = (mi) => (mi.seed_key && mi.seed_key.startsWith(campaignPrefix)) || (mi.description||'').includes(campaignTag);
  const scoped = state.marketing_items.filter(inScope);
  if(!scoped.length) return {removed:0, backfilled:0};

  const expectedRows = buildInsurancePlanRows();
  const seedKeyLookup = new Map();
  expectedRows.forEach(r=>seedKeyLookup.set(r.title+'|'+r.scheduled_at+'|'+r.item_type, r.seed_key));

  const groups=new Map();
  scoped.forEach(mi=>{
    const key=mi.title+'|'+(mi.scheduled_at||'')+'|'+mi.item_type;
    if(!groups.has(key)) groups.set(key,[]);
    groups.get(key).push(mi);
  });

  const toDelete=[]; const toBackfill=[];
  groups.forEach((rows,key)=>{
    let keep;
    const alreadyKeyed = rows.find(r=>r.seed_key && r.seed_key.startsWith(campaignPrefix));
    if(alreadyKeyed){
      keep = alreadyKeyed;
    } else {
      const scored = rows.map(r=>{
        const edited = r.updated_at && r.created_at && (new Date(r.updated_at)-new Date(r.created_at) > 5000);
        return {r, score:(r.status==='Published'?2:0)+(edited?1:0)};
      });
      scored.sort((a,b)=> b.score-a.score || new Date(a.r.created_at)-new Date(b.r.created_at));
      keep = scored[0].r;
    }
    if(!keep.seed_key){
      const deterministicKey = seedKeyLookup.get(key);
      if(deterministicKey) toBackfill.push({id:keep.id, seed_key:deterministicKey});
    }
    if(rows.length>1) rows.forEach(r=>{ if(r.id!==keep.id) toDelete.push(r); });
  });

  for(const b of toBackfill){ await dbUpdate('marketing_items', b.id, {seed_key:b.seed_key}); }
  for(const row of toDelete){ await dbDelete('marketing_items', row.id); }
  return {removed:toDelete.length, backfilled:toBackfill.length};
}

/* Called automatically from onSignedIn(), after loadAll(), before Today
   first renders. Runs the DB-verified check every sign-in — cheap (one
   indexed query returning ~130 text values) — so a plan that was left
   incomplete by a prior failed batch is topped up automatically, with no
   user action, on the very next login from any device. */
/* One-time, versioned migration from the previous (8-slot daily) plan to
   weekly campaigns. Removes ONLY untouched auto-generated placeholders from
   the old campaign key(s); anything Published or edited is preserved. Guarded
   by a migration_log flag so it never repeats on reload. */
async function migrateToWeeklyCampaignsOnce(){
  if(state.migration_log.some(m=>m.step===WEEKLY_MIGRATION_VERSION && m.status==='ok')) return;
  const priorPrefixes=PRIOR_CAMPAIGN_KEYS.map(k=>k+'-week-');
  const prior=state.marketing_items.filter(mi=>mi.seed_key && priorPrefixes.some(p=>mi.seed_key.startsWith(p)));
  let removed=0, kept=0;
  if(prior.length){
    const untouched=prior.filter(mi=>{
      const edited=mi.updated_at && mi.created_at && (new Date(mi.updated_at)-new Date(mi.created_at)>5000);
      const published=(mi.status==='Published')||['Published','Repurposing'].includes(getContentStage(mi));
      return !edited && !published && !mi.completed_at;
    });
    kept=prior.length-untouched.length;
    const ids=untouched.map(mi=>mi.id);
    for(let i=0;i<ids.length;i+=100){
      const chunk=ids.slice(i,i+100);
      const {error}=await sb.from('marketing_items').delete().in('id',chunk);
      if(error){ console.error('[weekly migration] delete failed',error); break; }
      removed+=chunk.length;
    }
    if(removed){ const gone=new Set(ids.slice(0,removed)); state.marketing_items=state.marketing_items.filter(mi=>!gone.has(mi.id)); }
  }
  try{ await dbInsert('migration_log',{step:WEEKLY_MIGRATION_VERSION, status:'ok', source_table:'system', detail:'Weekly-campaign migration: removed '+removed+' untouched placeholder(s), kept '+kept+' edited/published item(s).'}); }catch(e){}
  if(removed||kept) toast('Marketing upgraded to weekly campaigns — cleared '+removed+' old placeholder(s)'+(kept?', kept '+kept+' you\u2019d worked on':''));
}
async function resetForwardGeneratedMarketingOnce(){
  // One-time cleanup after the visual-polish deployment. Earlier v3 and v4
  // files could both seed the same forward calendar, producing exact pairs.
  // Remove only auto-generated campaign rows from 20 July 2026 onward;
  // manual marketing records and all earlier completed history are untouched.
  if(state.migration_log.some(m=>m.step===FORWARD_MARKETING_RESET_VERSION && m.status==='ok')) return {removed:0, alreadyDone:true};
  const generatedPrefixes=['insurance-verification-6mo-','weekly-campaigns-6mo-','weekly-rhythm-6mo-'];
  const eligible=state.marketing_items.filter(mi=>{
    if(!mi.scheduled_at || String(mi.scheduled_at).slice(0,10)<FORWARD_MARKETING_START) return false;
    const keyed=!!mi.seed_key && generatedPrefixes.some(p=>String(mi.seed_key).startsWith(p));
    const tagged=(mi.description||'').includes('[[campaign:');
    return keyed || tagged;
  });
  let removed=0;
  const ids=eligible.map(mi=>mi.id);
  for(let i=0;i<ids.length;i+=100){
    const chunk=ids.slice(i,i+100);
    const {error}=await sb.from('marketing_items').delete().in('id',chunk);
    if(error){ console.error('[forward marketing reset] delete failed',error); throw error; }
    removed+=chunk.length;
  }
  if(ids.length){
    const gone=new Set(ids);
    state.marketing_items=state.marketing_items.filter(mi=>!gone.has(mi.id));
  }
  try{
    await dbInsert('migration_log',{step:FORWARD_MARKETING_RESET_VERSION,status:'ok',source_table:'system',detail:'Removed '+removed+' generated marketing row(s) scheduled from '+FORWARD_MARKETING_START+' onward before installing '+MARKETING_CAMPAIGN_KEY+'.'});
  }catch(e){ console.warn('[forward marketing reset] could not record migration marker',e); }
  return {removed, alreadyDone:false};
}

/* ---------------------------------------------------------------------------
   INSTALL CURATED MARKETING PLAN — explicit, user-initiated only. NEVER
   called automatically at sign-in (see onSignedIn). The user must click
   "Install Curated Marketing Plan" (Marketing page or Settings → Data
   recovery) and confirm first via confirmInstallCuratedMarketingPlan().
   installCuratedMarketingPlan() itself is idempotent and safe to run any
   number of times: it checks real seed_key values in the database before
   inserting anything (fetchExistingCampaignSeedKeys / seedInsurancePlanBatched)
   and only ever inserts items that are actually missing — it never touches
   meetings, tasks, existing calendar entries, or duplicates an item that's
   already installed.
--------------------------------------------------------------------------- */
function confirmInstallCuratedMarketingPlan(){
  const expected=expectedSeedKeys().length;
  const proceed=confirm(
    'Install the curated 6-month marketing plan?\n\n'+
    '• Adds up to '+expected+' ready-to-post marketing items (LinkedIn + Instagram posts, each with finished copy).\n'+
    '• Will NOT delete or change any meetings, tasks, or existing calendar entries.\n'+
    '• Safe to run more than once — items already installed are found by their seed_key and skipped, so it will never duplicate work or redo a plan that’s already installed.'
  );
  if(!proceed) return;
  installCuratedMarketingPlan();
}
async function installCuratedMarketingPlan(){
  showSeedingOverlay('Installing the curated marketing plan…');
  const result={added:0, skipped:0, errors:null};
  try{
    const reset=await resetForwardGeneratedMarketingOnce();
    await migrateToWeeklyCampaignsOnce();
    const dedupResult=await dedupeMarketingItemsOnce();
    const existingKeys=await fetchExistingCampaignSeedKeys();
    const expected=expectedSeedKeys();
    const missingCount=expected.filter(k=>!existingKeys.has(k)).length;
    if(missingCount===0){
      result.added=0;
      result.skipped=expected.length;
    } else {
      const r=await seedInsurancePlanBatched();
      result.added=r.created;
      result.skipped=r.existing+(r.backfilled||0);
    }
    if(reset.removed || dedupResult.removed || dedupResult.backfilled){
      result.cleanup=[
        reset.removed?reset.removed+' legacy duplicate(s) removed':null,
        dedupResult.removed?dedupResult.removed+' duplicate(s) removed':null,
        dedupResult.backfilled?dedupResult.backfilled+' seed key(s) backfilled':null
      ].filter(Boolean).join(', ');
    }
  } catch(e){
    result.errors=(e&&e.message)||String(e);
  } finally {
    hideSeedingOverlay();
  }
  renderCurrent();
  openModal('<h3>Curated marketing plan</h3>'+
    kv('Items added', result.added)+
    kv('Items skipped (already installed)', result.skipped)+
    (result.cleanup?kv('Legacy cleanup', esc(result.cleanup)):'')+
    kv('Errors', result.errors?('<span style="color:var(--red)">'+esc(result.errors)+'</span>'):'None')+
    '<div class="faint" style="font-size:11px;margin-top:10px">Nothing else was changed — meetings, tasks and existing calendar entries are untouched.</div>');
  return result;
}

function hideSeedingOverlay(){ const el=document.getElementById('seedingOverlay'); if(el) el.remove(); }

/* Settings-only manual rebuild. Deletes ONLY rows belonging to this
   campaign (matched by seed_key prefix — a real, RLS-permitted bulk
   delete, one network call) then reseeds the full expected set fresh. */
/* ===========================================================================
   MARKETING PLAN REBUILD (Settings → Marketing)
   Deletes only auto-generated, untouched seeded items across ANY past or
   present campaign key; preserves anything edited, published or archived;
   reseeds the current weekly rhythm week-by-week (real progress); then
   verifies the day structure and refuses to report success if it's wrong.
=========================================================================== */
function itemIsContentLibrary(mi){ return !mi.seed_key && Array.isArray(CONTENT_LIBRARY) && CONTENT_LIBRARY.some(c=>c.title===mi.title); }
function itemHasLegacyTag(mi){ return /\[\[campaign:[^\]]+\]\]/.test(mi.description||''); }
function itemIsCurrentPlan(mi){ return !!mi.seed_key && mi.seed_key.startsWith(MARKETING_CAMPAIGN_KEY+'-week-'); }
function itemIsSeeded(mi){
  // Any auto-generated marketing row: a campaign-plan row (current OR any
  // legacy campaign key), a legacy [[campaign:]]-tagged row, or a
  // bulk-imported content-library row.
  if(!!mi.seed_key && /-week-\d/.test(mi.seed_key)) return true;
  if(itemHasLegacyTag(mi)) return true;
  if(itemIsContentLibrary(mi)) return true;
  return false;
}
function itemHasUserContent(mi){
  const f=parseContentFields(mi.description||'');
  if([f.draftLink,f.publishedUrl,f.lessonsLearned].some(v=>v&&String(v).trim())) return true;
  if([f.views,f.likes,f.comments,f.shares,f.saves,f.leads].some(v=>v&&String(v).trim())) return true;
  if(f.notes && f.notes.trim()) return true;
  return false;
}
function itemIsProtected(mi){
  const stage = getContentStage(mi);
  if(['Published','Repurposing','Archived'].includes(stage) || mi.status==='Published' || mi.status==='Archived' || !!mi.completed_at) return true;
  // Content-library rows get their updated_at bumped by auto-scheduling, so a
  // timestamp is not a reliable "edited" signal — only real user content is.
  if(itemIsContentLibrary(mi)) return itemHasUserContent(mi);
  // Campaign-plan rows (current + legacy): the seeders never update rows after
  // insert, so a diverged updated_at means the user genuinely edited it.
  const edited = mi.updated_at && mi.created_at && (new Date(mi.updated_at)-new Date(mi.created_at) > 5000);
  return !!edited;
}
function marketingStatusInfo(){
  const last=(state.migration_log||[]).filter(m=>m.step==='marketing_rebuild').sort((a,b)=>String(b.created_at||'').localeCompare(String(a.created_at||'')))[0];
  const mi=state.marketing_items;
  const current=mi.filter(itemIsCurrentPlan).length;
  const legacy=mi.filter(x=>itemIsSeeded(x) && !itemIsCurrentPlan(x)).length;
  const deletable=mi.filter(x=>itemIsSeeded(x) && !itemIsProtected(x)).length;
  const preserved=mi.filter(x=>itemIsSeeded(x) && itemIsProtected(x)).length;
  return { campaign:MARKETING_CAMPAIGN_KEY, count:mi.length, current, legacy, deletable, preserved,
    expected:expectedSeedKeys().length, lastRebuild:last?last.created_at:null };
}
/* Validates the CURATED calendar's own rules, not the old fixed 8-slots/week
   rhythm: max 2 LinkedIn + 1 Instagram per calendar week, no weekend dates,
   unique seed_keys, and the total row count matches what the curated data
   actually specifies (some weeks are intentionally empty by design, so
   "weeks present" is reported but never required to equal 26). */
function verifyRhythmItems(items){
  const plan=items.filter(mi=>mi.seed_key && mi.seed_key.startsWith(MARKETING_CAMPAIGN_KEY+'-week-'));
  const dayName={0:'Sunday',1:'Monday',2:'Tuesday',3:'Wednesday',4:'Thursday',5:'Friday',6:'Saturday'};
  const errors=[];
  const seen=new Set();
  plan.forEach(mi=>{ if(seen.has(mi.seed_key)) errors.push('Duplicate seed_key: '+mi.seed_key); seen.add(mi.seed_key); });
  const byWeek={};
  plan.forEach(mi=>{
    const m=mi.seed_key.match(/-week-(\d\d)-/); if(!m) return;
    const wk=m[1];
    const b=byWeek[wk]=byWeek[wk]||{linkedin:0,instagram:0};
    if(!mi.scheduled_at){ errors.push('Week '+wk+' ('+mi.seed_key.split('-').pop()+'): no scheduled date'); return; }
    const dow=weekdayOf(mi.scheduled_at);
    if(dow===0||dow===6) errors.push('Week '+wk+': '+mi.seed_key.split('-').pop()+' lands on '+dayName[dow]+' ('+mi.scheduled_at+')');
    if(mi.item_type==='LinkedIn Post') b.linkedin++;
    else if(mi.item_type==='Instagram Caption') b.instagram++;
  });
  Object.keys(byWeek).sort().forEach(wk=>{
    const b=byWeek[wk];
    if(b.linkedin>2) errors.push('Week '+wk+': '+b.linkedin+' LinkedIn posts (max 2)');
    if(b.instagram>1) errors.push('Week '+wk+': '+b.instagram+' Instagram posts (max 1)');
  });
  const weeks=Object.keys(byWeek).length;
  const expectedCount=expectedSeedKeys().length;
  if(plan.length!==expectedCount) errors.push('Total plan rows = '+plan.length+' (expected '+expectedCount+')');
  return { weeks, count:plan.length, ok:errors.length===0, errors };
}
function verifyRhythm(){ return verifyRhythmItems(state.marketing_items); }
function verifyPlanRows(rows){ return verifyRhythmItems(rows); }
function showRebuildError(msg){ hideSeedingOverlay(); openModal('<h3 style="color:var(--danger,#F87171)">Rebuild stopped</h3><div class="muted" style="font-size:12.5px;white-space:pre-wrap;line-height:1.5">'+esc(msg)+'</div>', true); renderCurrent(); }
async function rebuildMarketingPlan(){
  const dbg=[];
  const log=(stage,detail)=>{ dbg.push({stage,detail:String(detail)}); try{ console.log('[rebuild] '+stage+'\n'+detail); }catch(e){} };
  const showDiag=(title,failed)=>{
    hideSeedingOverlay();
    const body=dbg.map(d=>'<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,.07)">'+
      '<div style="font-weight:660;font-size:12px;color:'+(failed?'var(--muted)':'var(--gold)')+'">'+esc(d.stage)+'</div>'+
      '<div class="mono" style="font-size:11px;white-space:pre-wrap;line-height:1.5;color:var(--muted);margin-top:2px">'+esc(d.detail)+'</div></div>').join('');
    openModal('<h3'+(failed?' style="color:var(--danger,#F87171)"':'')+'>'+esc(title)+'</h3>'+
      '<div style="max-height:460px;overflow:auto;margin-top:6px">'+body+'</div>', true);
    renderCurrent();
  };
  try{
    // ---- STAGE 1: build candidate rows in memory -------------------------
    showSeedingOverlay('Generating plan…');
    const rows=buildInsurancePlanRows();
    const keys=rows.map(r=>r.seed_key);
    const rowPrefix=keys[0]?keys[0].replace(/-week-.*$/,''):'(none)';
    log('1. Candidate rows built',
      'count: '+rows.length+
      '\nfirst seed_key: '+(keys[0]||'—')+
      '\nlast  seed_key: '+(keys[keys.length-1]||'—')+
      '\nwrite prefix:    '+rowPrefix+
      '\nverifier prefix: '+MARKETING_CAMPAIGN_KEY+'-week-'+
      '\nprefixes match:  '+(rowPrefix===MARKETING_CAMPAIGN_KEY?'YES':'NO ⚠️ (this alone would make the verifier report 0)'));

    // ---- STAGE 2: verify in-memory (nothing written yet) ----------------
    const vpre=verifyPlanRows(rows);
    log('2. In-memory verification',
      'ok: '+vpre.ok+' · rows: '+vpre.count+' · weeks: '+vpre.weeks+
      (vpre.ok?'':'\nfirst errors:\n'+vpre.errors.slice(0,8).join('\n')));
    if(!vpre.ok){ showDiag('Rebuild stopped at Stage 2 — generator failed (nothing deleted or written)', true); return; }

    const deletable=state.marketing_items.filter(mi=>itemIsSeeded(mi) && !itemIsProtected(mi));
    const preserved=state.marketing_items.filter(mi=>itemIsSeeded(mi) && itemIsProtected(mi)).length;
    hideSeedingOverlay();
    if(!confirm('Generator verified ✓ — '+rows.length+' ready-to-post items across the 6-month curated calendar.\n\nDelete '+deletable.length+' untouched auto-item(s), preserve '+preserved+', then write the plan. Continue?')) return;

    // ---- STAGE 3: delete untouched seeded rows --------------------------
    showSeedingOverlay('Deleting old campaign…');
    const delIds=deletable.map(mi=>mi.id); let deleted=0, delErr=null;
    for(let i=0;i<delIds.length;i+=100){
      const chunk=delIds.slice(i,i+100);
      const {error}=await sb.from('marketing_items').delete().in('id',chunk);
      if(error){ delErr=error.message||JSON.stringify(error); break; }
      deleted+=chunk.length;
    }
    log('3. Delete phase', 'attempted: '+delIds.length+' · deleted: '+deleted+(delErr?'\nSUPABASE ERROR: '+delErr:''));
    if(delErr){ showDiag('Rebuild stopped at Stage 3 — delete failed', true); return; }
    const goneSet=new Set(delIds);
    state.marketing_items=state.marketing_items.filter(mi=>!goneSet.has(mi.id));

    // ---- STAGE 4: upsert the verified rows ------------------------------
    showSeedingOverlay('Writing new plan…');
    let submitted=0, returned=0, upErr=null;
    for(let i=0;i<rows.length;i+=100){
      const chunk=rows.slice(i,i+100);
      submitted+=chunk.length;
      const {data,error}=await sb.from('marketing_items').upsert(chunk,{onConflict:'seed_key',ignoreDuplicates:true}).select();
      if(error){ upErr=error.message||error.details||JSON.stringify(error); break; }
      returned+=(data||[]).length;
    }
    log('4. Upsert phase',
      'submitted: '+submitted+
      '\nreturned by Supabase (newly inserted): '+returned+
      '\nnote: rows that already existed are skipped by ignoreDuplicates, so returned<submitted is normal after preserving edited slots'+
      (upErr?'\nSUPABASE ERROR: '+upErr+'\n(if this mentions "no unique or exclusion constraint", the seed_key unique index is missing)':''));
    if(upErr){ showDiag('Rebuild stopped at Stage 4 — upsert failed', true); return; }

    // ---- STAGE 5: direct readback from Supabase ----------------------------
    // Verify the rows returned by the database itself. Do not depend on stale
    // in-memory state or a broad loadAll() result that may contain legacy rows.
    showSeedingOverlay('Reading back verified plan…');
    const readPrefix=MARKETING_CAMPAIGN_KEY+'-week-';
    let persisted=[], readErr=null, from=0;
    const READ_PAGE=1000;
    for(;;){
      const {data,error}=await sb.from('marketing_items')
        .select('*')
        .like('seed_key', readPrefix+'%')
        .order('seed_key',{ascending:true})
        .range(from,from+READ_PAGE-1);
      if(error){ readErr=error.message||error.details||JSON.stringify(error); break; }
      persisted=persisted.concat(data||[]);
      if(!data || data.length<READ_PAGE) break;
      from+=READ_PAGE;
    }
    log('5. Direct readback',
      'query prefix: '+readPrefix+
      '\nerror: '+(readErr||'none')+
      '\nrows returned: '+persisted.length+
      '\nfirst seed_key: '+(persisted[0]?.seed_key||'—')+
      '\nlast  seed_key: '+(persisted[persisted.length-1]?.seed_key||'—'));
    if(readErr){ showDiag('Rebuild stopped at Stage 5 — direct readback failed', true); return; }

    // ---- STAGE 6: verify the exact persisted rows --------------------------
    showSeedingOverlay('Verifying persisted plan…');
    const vpost=verifyPlanRows(persisted);
    log('6. Persisted verification',
      'ok: '+vpost.ok+' · matching rows: '+vpost.count+' · weeks: '+vpost.weeks+
      (vpost.ok?'':'\nfirst errors:\n'+vpost.errors.slice(0,12).join('\n')));
    if(!vpost.ok){ showDiag('Rebuild stopped at Stage 6 — persisted verification failed (see counts above)', true); return; }

    // Replace only the current campaign slice in local state with the exact
    // rows just read from Supabase, preserving manual and historical records.
    state.marketing_items = state.marketing_items
      .filter(mi=>!(mi.seed_key||'').startsWith(readPrefix))
      .concat(persisted);
    renderNav();
    renderCurrent();

    try{ await dbInsert('migration_log',{step:'marketing_rebuild', status:'ok', source_table:'system', detail:'deleted '+deleted+', submitted '+submitted+', returned '+returned+', verified '+vpost.count+'. Campaign '+MARKETING_CAMPAIGN_KEY}); }catch(e){}
    log('✓ Success', vpost.count+' current-plan rows across '+vpost.weeks+' weeks · '+preserved+' preserved · '+deleted+' deleted');
    showDiag('Marketing plan rebuilt successfully ✓', false);
    toast('Rebuilt — deleted '+deleted+', wrote '+submitted+', verified '+vpost.count+' rows');
  }catch(e){
    log('EXCEPTION', (e&&(e.message||e.stack))||String(e));
    showDiag('Rebuild crashed — see stages above', true);
  }
}

  const kv=(k,v,mono,color)=>'<div style="display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)"><span class="faint" style="font-size:12px">'+k+'</span><span'+(mono?' class="mono"':'')+' style="font-size:12px;text-align:right'+(color?';color:'+color:'')+'">'+v+'</span></div>';

/* ---------------------------------------------------------------------------
   WORKFLOW STAGE — the requested 7-stage model (Planned/Researching/
   Drafting/Review/Scheduled/Published/Archived) does not match
   marketing_items.status's real CHECK constraint, which only allows 5
   values (Idea/Drafting/Scheduled/Published/Archived) — and no schema
   changes are in scope this round. Rather than silently collapsing two
   pairs of stages into one (losing the Planned-vs-Researching and
   Drafting-vs-Review distinction on reload), the specific stage is stored
   as a plain, visible marker on the first line of `description` — not a
   hidden HTML comment, just a short readable prefix — and mapped to a
   valid DB status alongside it. The DB status is always kept consistent
   with the stage, so anything reading raw `status` (the calendar's "done"
   check, the org-detail tab) still works correctly without knowing about
   the marker at all.
--------------------------------------------------------------------------- */
const CONTENT_STAGES=['Planned','Researching','Drafting','Designed','Review','Scheduled','Published','Repurposing','Archived'];
const STAGE_TO_DB_STATUS={Planned:'Idea',Researching:'Idea',Drafting:'Drafting',Designed:'Drafting',Review:'Drafting',Scheduled:'Scheduled',Published:'Published',Repurposing:'Published',Archived:'Archived'};
function getContentStage(mi){
  const m=(mi.description||'').match(/^\[\[stage:([^\]]+)\]\]\n?/);
  if(m && CONTENT_STAGES.includes(m[1])) return m[1];
  if(mi.status==='Idea') return 'Planned';
  if(mi.status==='Drafting') return 'Drafting';
  return mi.status;
}
function stripStageMarker(desc){ return (desc||'').replace(/^\[\[stage:[^\]]+\]\]\n?/, ''); }
function setContentStageMarker(desc,stage){ return '[[stage:'+stage+']]\n'+stripStageMarker(desc||''); }
async function setContentStage(id,stage){
  const mi=byId(state.marketing_items,id);
  const patch={description:setContentStageMarker(mi.description,stage), status:STAGE_TO_DB_STATUS[stage]};
  if(stage==='Published') patch.completed_at=new Date().toISOString();
  if(stage==='Scheduled' && !mi.scheduled_at) patch.scheduled_at=today();
  await dbUpdate('marketing_items',id,patch);
  return byId(state.marketing_items,id);
}

/* Extra fields (draft link, published URL, lessons learned, industries,
   products, free notes) are not backed by dedicated columns either — same
   reasoning as the stage marker. Stored as clearly labeled lines
   immediately after the stage marker, fully visible plain text, parsed
   back into a real edit form rather than left as one undifferentiated
   blob. This is a deliberate trade-off for this round, not an oversight —
   flagged here and in the delivery notes rather than silently done. */
/* Single source of truth for the structured content-fields stored as labeled
   lines in `description`. Labels MUST be letters/spaces only (the parser key
   is /^[A-Za-z ]+:/). Adding a pair here automatically wires parse + serialize;
   the detail form reads/writes these keys. No schema change — same sanctioned
   marker pattern already used for stage. Metric fields are plain text so they
   never fail a numeric constraint and stay editable. */
const CONTENT_FIELD_MAP=[
  ['Source article','sourceTitle'],
  ['Topic','topic'],
  ['Campaign','campaign'],
  ['Draft link','draftLink'],
  ['Published URL','publishedUrl'],
  ['Published date','publishedDate'],
  ['Industries','industries'],
  ['Products','products'],
  ['Views','views'],
  ['Likes','likes'],
  ['Comments','comments'],
  ['Shares','shares'],
  ['Saves','saves'],
  ['Leads','leads'],
  ['Investor interest','investorInterest'],
  ['Pilot interest','pilotInterest'],
  ['Lessons learned','lessonsLearned'],
  ['Ready to post copy','readyCopy'],
  ['Image suggestion','imageSuggestion']
];
/* readyCopy/imageSuggestion can be multi-paragraph, but every CONTENT_FIELD_MAP
   value must live on exactly one physical line (the parser reads one labeled
   line per field, in order, before falling through to free-text notes) — so
   real newlines are escaped to the literal two characters "\n" whenever these
   two fields are written, and reversed whenever they're shown/edited. */
function escapeFieldNewlines(s){ return String(s||'').replace(/\n/g,'\\n'); }
function unescapeFieldNewlines(s){ return String(s||'').replace(/\\n/g,'\n'); }
const CONTENT_FIELD_LABELS=CONTENT_FIELD_MAP.map(p=>p[0]);
const CONTENT_FIELD_LABELMAP=Object.fromEntries(CONTENT_FIELD_MAP);
function parseContentFields(description){
  const body=stripStageMarker(description);
  const lines=body.split('\n');
  const fields={notes:''};
  CONTENT_FIELD_MAP.forEach(([,k])=>fields[k]='');
  let i=0;
  for(; i<lines.length; i++){
    const m=lines[i].match(/^([A-Za-z ]+):\s*(.*)$/);
    if(m && CONTENT_FIELD_LABELMAP[m[1]]){ fields[CONTENT_FIELD_LABELMAP[m[1]]]=m[2]; }
    else break;
  }
  fields.notes=lines.slice(i).join('\n').replace(/^\n+/,'');
  return fields;
}
function serializeContentFields(stage,fields){
  let out='[[stage:'+stage+']]\n';
  CONTENT_FIELD_MAP.forEach(([label,key])=>{ out+=label+': '+(fields[key]||'')+'\n'; });
  out+=(fields.notes||'');
  return out;
}

/* ---------------------------------------------------------------------------
   EDITORIAL CALENDAR SCHEDULER — Layer 2. Draws unscheduled ("Planned")
   items from the library and spreads them across a realistic cadence:
   weekly (LinkedIn/Founder Story/Long-form/Founder-voice prompts, 3/week),
   biweekly (Customer Education, Opinion), monthly (Report), and a sparse
   quarterly-ish rhythm for PR/Partnership outreach. One shared calendar
   month state is used throughout the app (calMonth/calYear) — this only
   assigns scheduled_at dates into marketing_items, it never creates a
   second calendar.
--------------------------------------------------------------------------- */
const WEEKLY_CATEGORIES=['LinkedIn Post','LinkedIn Article','Founder Story','Long-form Article',
  'Founder LinkedIn — Infrastructure','Founder LinkedIn — Technology','Founder LinkedIn — Fraud','Founder LinkedIn — Trust',
  'Founder LinkedIn — Business philosophy','Founder LinkedIn — Startups','Founder LinkedIn — Enterprise software',
  'Founder LinkedIn — Case studies','Founder LinkedIn — Customer lessons','Founder LinkedIn — Product building','Founder LinkedIn — Industry observations'];
const BIWEEKLY_CATEGORIES=['Customer Education','Opinion Piece'];
const MONTHLY_CATEGORIES=['Report'];
const SPARSE_CATEGORIES=['PR','Partnership'];
const ITEMS_PER_WEEK=3;

function nextMonday(from){
  const d=new Date(from); const day=d.getDay(); const delta=(8-day)%7||7;
  d.setDate(d.getDate()+delta); return d;
}
function unscheduledInCats(cats){
  return state.marketing_items.filter(mi=>!mi.scheduled_at && cats.includes(mi.item_type) && getContentStage(mi)==='Planned');
}
async function scheduleContentItem(item,dateStr){
  await dbUpdate('marketing_items',item.id,{
    description:setContentStageMarker(item.description,'Scheduled'), status:'Scheduled', scheduled_at:dateStr
  });
}
async function generateEditorialCalendar(months){
  months=months||6;
  const weeks=Math.round(months*4.345);
  const startMonday=nextMonday(new Date());
  let scheduledCount=0;
  for(let w=0; w<weeks; w++){
    const weekStart=new Date(startMonday); weekStart.setDate(weekStart.getDate()+w*7);
    const weeklyPool=unscheduledInCats(WEEKLY_CATEGORIES);
    const dayOffsets=[0,2,4];
    for(let k=0;k<ITEMS_PER_WEEK;k++){
      const item=weeklyPool[k]; if(!item) break;
      const d=new Date(weekStart); d.setDate(d.getDate()+dayOffsets[k]);
      await scheduleContentItem(item, d.toISOString().slice(0,10));
      scheduledCount++;
    }
    if(w%2===0){
      const item=unscheduledInCats(BIWEEKLY_CATEGORIES)[0];
      if(item){ await scheduleContentItem(item, weekStart.toISOString().slice(0,10)); scheduledCount++; }
    }
    if(w%4===0){
      const item=unscheduledInCats(MONTHLY_CATEGORIES)[0];
      if(item){ await scheduleContentItem(item, weekStart.toISOString().slice(0,10)); scheduledCount++; }
    }
    if(w%3===0){
      const item=unscheduledInCats(SPARSE_CATEGORIES)[0];
      if(item){ await scheduleContentItem(item, weekStart.toISOString().slice(0,10)); scheduledCount++; }
    }
  }
  renderCurrent();
  return scheduledCount;
}

/* ---------------------------------------------------------------------------
   AI WORKSPACE HANDOFF — "Write" loads topic/audience/related-org context
   into the AI Workspace question and runs retrieval immediately.
--------------------------------------------------------------------------- */
/* ===========================================================================
   CONTENT ENGINE — deterministic, offline, template-driven.
   ---------------------------------------------------------------------------
   One long-form source becomes a linked pack of platform drafts. No AI, no
   API key, no network call: each transform is a pure function that reshapes
   the source's own title / objective / audience into a platform-specific
   SCAFFOLD (real starter text and structure, not an empty placeholder),
   which Juna then writes/refines by hand or with Claude externally.

   Every child is a normal marketing_item, so it flows through the existing
   library, calendar, stage workflow and edit form unchanged. Linkage is the
   'Source article' content-field (survives edits). Dedup is title-based:
   re-running never creates a second copy of the same piece.

   BRAND GUARDRAIL baked into the claim-bearing templates: Kweli proves a
   document was authentically issued and is unaltered/tamper-evident — never
   that its contents are factually correct. The scaffolds keep that precise.
=========================================================================== */
function firstSentence(txt){
  if(!txt) return '';
  const m=String(txt).split(/(?<=[.!?])\s+/)[0];
  return (m||'').trim();
}
const KWELI_CLAIM_NOTE='— Precision check: say Kweli proves a document is authentically issued and unaltered. Not that its contents are true.';

/* Each transform returns {type, suffix, body}. `body` becomes the draft
   notes; `type` becomes item_type; `suffix` is appended to the source title
   to make a deterministic, unique child title. */
const CONTENT_TRANSFORMS=[
  {type:'LinkedIn Post', suffix:'LinkedIn Post', build:s=>
    'Hook (1 line, no buzzwords):\n'+(firstSentence(s.objective)||('A sharper take on: '+s.title))+'\n\n'+

function derivedTitle(sourceTitle, suffix){ return sourceTitle+' \u2014 '+suffix; }

async function generateContentPack(sourceId){
  const src=byId(state.marketing_items,sourceId);
  if(!src){ toast('Source item not found'); return; }
  const s={title:src.title, objective:src.objective||'', audience:src.audience||''};
  const baseDate=src.scheduled_at?new Date(src.scheduled_at):null;
  let created=0, skipped=0, offset=1;
  for(const tf of CONTENT_TRANSFORMS){
    const title=derivedTitle(src.title, tf.suffix);
    if(state.marketing_items.some(mi=>mi.title===title)){ skipped++; continue; }
    let scheduled_at=null;
    if(baseDate){ const d=new Date(baseDate); d.setDate(d.getDate()+offset); scheduled_at=d.toISOString().slice(0,10); offset++; }
    await dbInsert('marketing_items',{
      title,
      item_type:tf.type,
      audience:src.audience||null,
      objective:src.objective||null,
      priority:'Normal',
      status:STAGE_TO_DB_STATUS['Drafting'],
      scheduled_at,
      owner_user_id:myProfile.id,
      description:serializeContentFields('Drafting',{sourceTitle:src.title, notes:tf.build(s)})
    });
    created++;
  }
  renderCurrent();
  toast(created?('Content pack generated \u2014 '+created+' platform draft(s) created'+(skipped?', '+skipped+' already existed':'')):'All '+CONTENT_TRANSFORMS.length+' pieces already exist for this article');
}

function openContentForWriting(id){
  const mi=byId(state.marketing_items,id);
  const relatedLink=state.entity_links.find(el=>el.source_type==='marketing_item'&&el.source_id===id&&el.target_type==='organisation');
  const relatedOrg=relatedLink?orgName(relatedLink.target_id):null;
  let q='Help me write this '+mi.item_type+': "'+mi.title+'"'+(mi.audience?' for '+mi.audience:'')+'.';

  if(relatedOrg) q+=' Related organisation: '+relatedOrg+'.';

function itemIsDone(mi){ return ['Published','Repurposing'].includes(getContentStage(mi)) || !!mi.completed_at || mi.status==='Published'; }
/* Groups the curated calendar by its own Monday-anchored calendar weeks
   (not by a shared "theme" — weeks now mix content types on purpose, so
   there's no single theme to group by any more). Every one of the 26
   weeks appears, including the ones deliberately left empty, so the UI
   can show "Nothing worth posting this week" instead of just omitting it. */
function buildCampaignGroups(){
  return CURATED_CALENDAR_WEEKS.map(week=>{
    const weekMonday=addCalendarDays(PLAN_START,(week.w-1)*7);
    const start=dateKeyLocal(weekMonday);
    const end=dateKeyLocal(addCalendarDays(weekMonday,4)); // Fri — nothing is ever scheduled on a weekend
    const prefix=MARKETING_CAMPAIGN_KEY+'-week-'+String(week.w).padStart(2,'0')+'-';
    const items=state.marketing_items.filter(mi=>(mi.seed_key||'').startsWith(prefix))
      .sort((a,b)=>(a.scheduled_at||'zzzz').localeCompare(b.scheduled_at||'zzzz'));
    const done=items.filter(itemIsDone).length;
    return {w:week.w, start, end, items, done, total:items.length,
      pct: items.length?Math.round(done/items.length*100):0,
      next: items.find(mi=>!itemIsDone(mi)), empty: items.length===0};
  });
}
function currentCampaign(){
  const t=today();
  const groups=buildCampaignGroups();
  return groups.find(g=>t>=g.start&&t<=g.end) || groups.find(g=>g.start>=t) || null;
}
/* Distribution suggestions come straight from the CRM — real organisations
   and their primary contacts, most-recently-touched first. No invented names. */
function distributionSuggestions(limit){
  limit=limit||6;
  const orgs=state.organisations.filter(o=>!o.archived_at)
    .sort((a,b)=>String(b.last_interaction_at||b.next_action_date||'').localeCompare(String(a.last_interaction_at||a.next_action_date||'')));
  const out=[];
  for(const o of orgs){
    const person=state.people.find(p=>!p.archived_at && p.primary_organisation_id===o.id);
    out.push({id:o.id, label:o.name, sub:person?person.full_name:(o.relationship_stage||'')});
    if(out.length>=limit) break;
  }
  return out;
}
function distributionSuggestionHtml(){
  const sugg=distributionSuggestions(6);
  if(!sugg.length) return '<div class="faint" style="font-size:11px">No organisations in the CRM yet to suggest recipients.</div>';
  return '<div class="dlist">'+sugg.map(s=>'<div class="drow" onclick="go(\'organisationDetail\',\''+s.id+'\')"><span class="drow-icon">🤝</span><div class="drow-main"><div class="drow-title">'+esc(s.label)+'</div>'+(s.sub?'<div class="drow-meta">'+esc(s.sub)+'</div>':'')+'</div><div class="drow-right faint" style="font-size:10px">send article</div></div>').join('')+'</div>';

function vMarketingTodayTab(){

    '</div>';
  } else {
    body+='<div class="empty" style="margin-bottom:20px"><div class="empty-ico">📌</div>Nothing worth posting this week. Focus on customers.</div>';
  }

  const dsec=(title,arr,emptyNote)=>{
    if(!arr.length && !emptyNote) return '';

  groups.push(['Organisations', state.organisations.filter(o=>{ const meta=getOrgMeta(o); return hit(o.name)||hit(o.sector)||hit(o.current_summary)||hit(meta.champion)||hit(meta.decisionMaker)||meta.tags.some(t=>hit(t)); }).map(o=>({label:o.name,sub:o.organisation_type,go:"go('organisationDetail','"+o.id+"')"}))]);
  groups.push(['People', state.people.filter(p=>hit(p.full_name)||hit(p.role)||hit(p.notes)).map(p=>({label:p.full_name,sub:p.role||'',go:"go('personDetail','"+p.id+"')"}))]);
  groups.push(['Opportunities', state.opportunities.filter(o=>hit(o.title)||hit(o.problem)||hit(o.kweli_angle)).map(o=>({label:o.title,sub:o.stage,go:"go('opportunityDetail','"+o.id+"')"}))]);
  groups.push(['Activities', state.activities.filter(a=>hit(a.title)||hit(a.body)).slice(0,8).map(a=>({label:a.title,sub:fmtDate(a.occurred_at),go:a.organisation_id?"go('organisationDetail','"+a.organisation_id+"')":"void(0)"}))]);

  groups.push(['Tasks', state.tasks.filter(t=>hit(t.title)||hit(t.description)).map(t=>({label:t.title,sub:t.status,go:"openTaskModal('"+t.id+"')"}))]);
  groups.push(['Assets', state.assets_v2.filter(a=>hit(a.title)||hit(a.file_name)||hit(a.notes)||hit(a.description)).map(a=>({label:a.title,sub:a.asset_type||'',go:"go('assetDetail','"+a.id+"')"}))]);
  groups.push(['Lessons', state.lessons_v2.filter(l=>!l.archived_at && (hit(l.title)||hit(l.summary)||hit(l.detail))).map(l=>({label:deriveLessonTitle(l),sub:l.category||'',go:"openLessonForm('"+l.id+"')"}))]);
  groups.push(['Knowledge', state.knowledge_sections_v2.filter(k=>hit(k.title)||hit(k.content)).map(k=>({label:k.title,sub:k.category||'',go:"go('knowledge')"}))]);
  groups.push(['Decisions', state.decisions.filter(d=>!d.archived_at && (hit(d.title)||hit(d.decision)||hit(d.reason))).map(d=>({label:d.title,sub:fmtDate(d.decided_at),go:"openDecisionForm('"+d.id+"')"}))]);

  groups.push(['Marketing', state.marketing_items.filter(m=>hit(m.title)||hit(m.description)||hit(m.objective)).map(m=>({label:m.title,sub:m.status,go:"openMarketingDetail('"+m.id+"')"}))]);

  return groups.filter(([,arr])=>arr.length);

function renderSearchResults(q){
  const groups=searchIndex(q);
  if(!groups.length) return '<div class="empty" style="padding:20px">No matches.</div>';
  return groups.map(([title,arr])=>'<div class="search-group-h">'+title+' ('+arr.length+')</div>'+
    arr.slice(0,6).map(r=>'<div class="search-res" onclick="'+r.go+';document.getElementById(\'searchPanel\').style.display=\'none\';document.getElementById(\'globalSearch\').value=\'\'"><div class="r-title">'+esc(r.label)+'</div><span class="r-snip">'+esc(r.sub)+'</span></div>').join('')
  ).join('');
}

/* ---------------------------------------------------------------------------
   TEAM BOARD — digital cork-board. Yellow = normal open, Red = important/
   urgent open, Green = done (always overrides priority). Per-user unread
   state, replies, history, realtime.
--------------------------------------------------------------------------- */
function tbColor(m){
  if(m.status==='Done') return 'note-green';
  if(m.priority==='Important'||m.priority==='Urgent') return 'note-red';
  return 'note-yellow';
}
/* Deterministic small rotation per note (hash of id) — real sticky notes
   are never perfectly aligned, but must stay stable across re-renders. */
function stickyTilt(id){
  let h=0; for(let i=0;i<id.length;i++) h=(h*31+id.charCodeAt(i))|0;
  return ((h%7)-3)*0.9; // -2.7deg .. +2.7deg
}

}

async function openTeamNoteDetail(id){
  // The local realtime mirror can briefly retain a note that has already
  // been deleted in Supabase. Confirm the parent record still exists before
  // inserting a read receipt, otherwise the FK on team_message_reads fails.
  let m=byId(state.team_messages_v2,id);
  const {data:liveMessage,error:messageError}=await sb
    .from('team_messages_v2')
    .select('*')
    .eq('id',id)
    .maybeSingle();

  if(messageError){
    console.error('Could not confirm team note:',messageError);
    toast('Could not open team note: '+messageError.message);
    return;
  }

  if(!liveMessage){
    state.team_messages_v2=state.team_messages_v2.filter(x=>x.id!==id);
    state.team_message_reads=state.team_message_reads.filter(x=>x.team_message_id!==id);
    state.team_message_replies=state.team_message_replies.filter(x=>x.team_message_id!==id);
    refreshUnreadBadge();
    closeModal();
    renderCurrent();
    toast('That team note no longer exists. The stale card was removed.');
    return;
  }

  m=liveMessage;
  const localIndex=state.team_messages_v2.findIndex(x=>x.id===id);
  if(localIndex>=0) state.team_messages_v2[localIndex]=m;
  else state.team_messages_v2.push(m);

  const alreadyRead=state.team_message_reads.some(r=>r.team_message_id===id && r.user_id===myProfile.id);
  if(!alreadyRead){
    const {data:readRow,error:readError}=await sb
      .from('team_message_reads')
      .upsert(
        {team_message_id:id,user_id:myProfile.id},
        {onConflict:'team_message_id,user_id',ignoreDuplicates:true}
      )
      .select()
      .maybeSingle();

    if(readError){
      // A read receipt must never prevent the note itself from opening.
      console.warn('Read receipt could not be saved:',readError);
    } else if(readRow && !state.team_message_reads.some(r=>r.id===readRow.id)){
      state.team_message_reads.push(readRow);
    }
    refreshUnreadBadge();
  }

  const replies=state.team_message_replies
    .filter(r=>r.team_message_id===id)
    .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));

  openModal('<h3>'+esc(m.title)+'</h3>'+
    (m.organisation_id?'<div class="muted" style="font-size:11.5px;margin-bottom:8px">'+esc(orgName(m.organisation_id))+'</div>':'')+
    '<div style="font-size:13px;white-space:pre-wrap;margin-bottom:14px">'+esc(m.message||'')+'</div>'+
    '<div class="fl">Replies</div>'+
    (replies.length?replies.map(r=>'<div class="kv"><span class="v">'+esc(r.body)+'</span><span class="k">'+fmtDate(r.created_at)+'</span></div>').join(''):'<div class="empty">No replies yet.</div>')+
    '<div class="field" style="margin-top:12px"><textarea class="input" id="f_tbreply" rows="2" placeholder="Reply…"></textarea></div>'+
    '<button class="btn sm" onclick="replyTeamNote(\''+id+'\')">Reply</button> '+
    '<button class="btn sm" onclick="markTeamNoteDone(\''+id+'\')">Mark done</button> '+
    '<button class="btn sm" onclick="unpinTeamNote(\''+id+'\')">Unpin</button> '+
    '<button class="btn sm danger" onclick="deleteTeamNoteConfirm(\''+id+'\')">Delete post</button>', true);
}
