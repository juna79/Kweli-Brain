  const warmths=[...new Set(all.map(p=>p.warmth).filter(Boolean))].sort();

  let list=[...all];
  if(f.q){ const q=f.q.toLowerCase(); list=list.filter(p=>(p.full_name+' '+(p.role||'')+' '+(p.notes||'')+' '+orgName(p.primary_organisation_id)).toLowerCase().includes(q)); }
  if(f.org) list=list.filter(p=>p.primary_organisation_id===f.org);
  if(f.warmth) list=list.filter(p=>p.warmth===f.warmth);
  if(f.sort==='recent') list.sort((a,b)=>(b.last_interaction_at||'').localeCompare(a.last_interaction_at||''));
  else if(f.sort==='org') list.sort((a,b)=>orgName(a.primary_organisation_id).localeCompare(orgName(b.primary_organisation_id)));
  else list.sort((a,b)=>a.full_name.localeCompare(b.full_name));

  const toolbar='<div class="people-toolbar">'+
    '<input class="input people-search" placeholder="Search people…" value="'+esc(f.q)+'" oninput="route.peopleFilter.q=this.value;renderCurrent()">'+
    (orgsWithPeople.length?'<select class="select" onchange="route.peopleFilter.org=this.value;renderCurrent()"><option value="">All organisations</option>'+orgsWithPeople.map(o=>'<option value="'+o.id+'"'+(f.org===o.id?' selected':'')+'>'+esc(o.name)+'</option>').join('')+'</select>':'')+
    (warmths.length?'<select class="select" onchange="route.peopleFilter.warmth=this.value;renderCurrent()"><option value="">All warmth</option>'+warmths.map(w=>'<option'+(f.warmth===w?' selected':'')+'>'+esc(w)+'</option>').join('')+'</select>':'')+
    '<select class="select" onchange="route.peopleFilter.sort=this.value;renderCurrent()">'+
      '<option value="name"'+(f.sort==='name'?' selected':'')+'>Sort: Name</option>'+
      '<option value="recent"'+(f.sort==='recent'?' selected':'')+'>Sort: Recently contacted</option>'+
      '<option value="org"'+(f.sort==='org'?' selected':'')+'>Sort: Organisation</option>'+
    '</select>'+
  '</div>';

  const cards=list.length?'<div class="grid g-auto">'+list.map(p=>{
    const personTasks=state.tasks.filter(t=>t.person_id===p.id && !['Completed','Cancelled','Closed / Lost'].includes(t.status));
    const orgTasks=p.primary_organisation_id?state.tasks.filter(t=>t.organisation_id===p.primary_organisation_id && !['Completed','Cancelled','Closed / Lost'].includes(t.status)):[];
    const nextTask=[...personTasks,...orgTasks].sort((a,b)=>(a.due_at||'9999').localeCompare(b.due_at||'9999'))[0];
    const currentOpp=state.opportunities.find(o=>o.organisation_id===p.primary_organisation_id && o.status==='Active');
    const overdue=nextTask && nextTask.due_at && nextTask.due_at<today();
    const staleMeetingAction=/^(book|schedule|arrange|await)\s+(a\s+)?meeting/i.test(String(p.next_action_summary||''));
    const displayNextAction=(!staleMeetingAction&&p.next_action_summary)?p.next_action_summary:(nextTask?nextTask.title:'');
    return '<div class="ent-card'+(overdue?' alert':'')+'" onclick="go(\'personDetail\',\''+p.id+'\')">'+
      '<div class="ent-top"><div class="org-identity">'+personAvatar(p,false)+'<div class="org-title-wrap">'+
        '<div class="ent-name">'+esc(p.full_name)+'</div>'+
        '<div class="ent-sub">'+esc(p.role||'—')+(p.primary_organisation_id?' · '+esc(orgName(p.primary_organisation_id)):'')+'</div>'+
        (p.relationship_to_kweli||p.relationship_description?'<div class="ent-line" style="margin-top:5px"><span class="pill">'+esc(p.relationship_to_kweli||p.relationship_description)+'</span></div>':'')+
      '</div></div>'+
      (p.warmth?'<span class="warmth-pill '+warmthClass(p.warmth)+'">'+esc(p.warmth)+'</span>':'')+
      '</div>'+
      (currentOpp?'<div class="ent-line"><span class="pill">'+esc(currentOpp.stage)+'</span></div>':'')+
      (p.why_they_matter?'<div class="ent-line" style="color:#DCE7EC">'+esc(p.why_they_matter).slice(0,120)+'</div>':'')+
      '<div class="ent-line" style="justify-content:space-between">'+
        '<span>'+(p.last_interaction_at?'Last contact '+fmtDate(p.last_interaction_at):'No contact logged')+'</span>'+
      '</div>'+
      (displayNextAction?'<div class="ent-next"><span class="lbl">Next action</span>'+esc(displayNextAction)+'</div>':'')+
    '</div>';
  }).join('')+'</div>' : '<div class="empty">No people match this filter.</div>';

  return '<div class="page-head"><div><div class="eyebrow">Relationships</div><div class="page-title">People</div><div class="page-sub">'+all.length+' contacts</div></div>'+
    '<button class="btn gold" onclick="openPersonForm()">+ Add person</button></div>'+
    toolbar+cards;

async function savePersonSummary(id,value){

  if(p && p.notes===value) return;
  await dbUpdate('people',id,{notes:value.trim()||null});
  toast('Saved');
}
async function quickLogPersonActivity(id){
  const input=document.getElementById('quickLog_'+id);
  const text=input.value.trim(); if(!text) return;
  const p=byId(state.people,id);
  await logActivity({activity_type:'Note', title:text.slice(0,120), body:text.length>120?text:null, person_id:id, organisation_id:p.primary_organisation_id||null});
  if(p.primary_organisation_id) await touchOrgInteraction(p.primary_organisation_id);
  await dbUpdate('people',id,{last_interaction_at:today()});

function toggleNewOrgFields(show){ const el=document.getElementById('newOrgFields'); if(el) el.style.display=show?'block':'none'; }
async function savePersonForm(){
  const email=document.getElementById('f_pemail').value.trim();
  const linkedin=document.getElementById('f_plinkedin').value.trim();
  const dupe=state.people.find(x=>(email && x.email && x.email.toLowerCase()===email.toLowerCase()) ||
                                   (linkedin && x.linkedin && x.linkedin.replace(/\/$/,'').toLowerCase()===linkedin.replace(/\/$/,'').toLowerCase()));
  if(dupe && !confirm('This looks like it might be the same person as "'+dupe.full_name+'" (matching email/LinkedIn). Create a new record anyway?')) {
    closeModal(); go('personDetail', dupe.id); return;
  }
  const full_name=document.getElementById('f_pname').value.trim();
  if(!full_name){toast('Name is required');return;}
  let organisationId=document.getElementById('f_porg').value||null;
  if(organisationId==='__new__'){
    const orgName=document.getElementById('f_new_org_name').value.trim(); if(!orgName){toast('New organisation name is required');return;}
    const canonical_name=orgName.toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
    const existing=state.organisations.find(o=>!o.archived_at && (o.canonical_name||'')===canonical_name);
    if(existing) organisationId=existing.id; else { const createdOrg=await dbInsert('organisations',{name:orgName,canonical_name,organisation_type:document.getElementById('f_new_org_type').value,created_by:myProfile.display_name,updated_by:myProfile.display_name}); organisationId=createdOrg.id; }
  }
  const payload={
    full_name, primary_organisation_id: organisationId,
    email: email||null, linkedin: linkedin||null, created_by: myProfile.display_name
  };
  const created=await dbInsert('people',payload);
  closeModal(); go('personDetail', created.id);
}

function opportunityPriorityScore(op){
  const dueBoost=op.next_action_date && op.next_action_date<=today()?45:0;
  return stagePriorityScore(op.stage)+Number(op.priority||0)*10+dueBoost;
}
function vOpportunities(){
  const opps=[...state.opportunities].filter(o=>!o.archived_at).sort((a,b)=>{
    const diff=opportunityPriorityScore(b)-opportunityPriorityScore(a);
    if(diff) return diff;
    return String(a.title||'').localeCompare(String(b.title||''));
  });
  const view=route.opportunitiesView=route.opportunitiesView||'card';
  const active=opps.filter(o=>!['Won','Lost'].includes(o.stage)).length;
  const pilots=opps.filter(o=>/pilot/i.test(o.stage||'')).length;
  const due=opps.filter(o=>o.next_action_date && o.next_action_date<=today()).length;
  const header='<div class="page-head"><div><div class="eyebrow">Pipeline</div><div class="page-title">Opportunities</div>'+
    '<div class="page-sub">'+opps.length+' commercial initiatives</div></div><button class="btn gold" onclick="openOppForm()">+ New opportunity</button></div>'+
    '<div class="metric-strip">'+
      '<div class="metric-tile"><div class="metric-value">'+active+'</div><div class="metric-label">Active</div></div>'+
      '<div class="metric-tile"><div class="metric-value">'+pilots+'</div><div class="metric-label">Pilot-stage</div></div>'+
      '<div class="metric-tile"><div class="metric-value">'+due+'</div><div class="metric-label">Action due</div></div>'+
    '</div><div class="view-toolbar"><div class="faint" style="font-size:11.5px">Prioritised by opportunity score</div>'+twoViewSwitcher('opportunitiesView',view)+'</div>';
  if(!opps.length) return header+'<div class="empty"><div class="empty-ico">◈</div>No opportunities yet.</div>';
  if(view==='table'){
    return header+'<div class="card" style="padding:0;overflow-x:auto"><table class="data-table"><thead><tr>'+
      ['Opportunity','Organisation','Stage','Priority','Next action','Due'].map(h=>'<th>'+h+'</th>').join('')+
      '</tr></thead><tbody>'+opps.map(op=>'<tr style="cursor:pointer" onclick="go(\'opportunityDetail\',\''+op.id+'\')">'+
        '<td><strong>'+esc(op.title)+'</strong><div class="faint" style="font-size:11px;margin-top:3px">'+esc((op.problem||'').slice(0,90))+'</div></td>'+
        '<td>'+esc(orgName(op.organisation_id)||'—')+'</td>'+
        '<td><span class="status-chip">'+esc(op.stage||'—')+'</span></td>'+
        '<td>'+String(op.priority||0)+'</td>'+
        '<td>'+esc(op.next_action_summary||'—')+'</td>'+
        '<td class="mono faint">'+fmtDate(op.next_action_date)+'</td></tr>').join('')+
      '</tbody></table></div>';

const FU_OUTCOMES=[
  {label:'Email sent',next:'Waiting for Response'},{label:'Waiting for response',next:'Waiting for Response'},
  {label:'Meeting completed',next:'In Progress'},{label:'Proposal sent',next:'Waiting for Response'},
  {label:'Call completed',next:'Waiting for Response'},{label:'Contract signed',next:'Completed'},

function vTasks(){
  const filter=route.taskFilter||'open';
  const list = filter==='open' ? openTasks() : filter==='waiting' ? state.tasks.filter(t=>t.status==='Waiting for Response') :
               filter==='overdue' ? openTasks().filter(t=>t.due_at&&t.due_at<today()) : state.tasks;
  const taskPriorityRank={Urgent:4,High:3,Normal:2,Low:1};
  const sorted=[...list].sort((a,b)=>{
    const aLate=!!(a.due_at&&a.due_at<today()), bLate=!!(b.due_at&&b.due_at<today());
    if(aLate!==bLate) return aLate?-1:1;
    const p=(taskPriorityRank[b.priority]||2)-(taskPriorityRank[a.priority]||2);
    if(p) return p;
    return (a.due_at||'9999').localeCompare(b.due_at||'9999');
  });
  const view=route.tasksView=route.tasksView||'card';
  const overdue=sorted.filter(t=>t.due_at&&t.due_at<today()&&!['Completed','Cancelled','Closed / Lost'].includes(t.status)).length;
  const waiting=sorted.filter(t=>t.status==='Waiting for Response').length;
  const header='<div class="page-head"><div><div class="eyebrow">Relationship workflow</div><div class="page-title">Follow-ups</div>'+

    '<div class="metric-tile"><div class="metric-value">'+overdue+'</div><div class="metric-label">Overdue</div></div>'+
    '<div class="metric-tile"><div class="metric-value">'+waiting+'</div><div class="metric-label">Waiting</div></div></div>'+
    '<div class="view-toolbar"><div style="display:flex;gap:8px;flex-wrap:wrap">'+
      [['open','Open'],['overdue','Overdue'],['waiting','Waiting'],['all','All history']].map(([id,l])=>
        '<button class="btn sm'+(filter===id?' active':'')+'" onclick="route.taskFilter=\''+id+'\';renderCurrent()">'+l+'</button>').join('')+
      '</div>'+twoViewSwitcher('tasksView',view)+'</div>';
  if(!sorted.length) return header+'<div class="empty"><div class="empty-ico">✓</div>Nothing here.</div>';
  if(view==='table'){
    return header+'<div class="card" style="padding:0;overflow-x:auto"><table class="data-table"><thead><tr>'+
      ['Follow-up','Organisation','Status','Priority','Due'].map(h=>'<th>'+h+'</th>').join('')+
      '</tr></thead><tbody>'+sorted.map(t=>'<tr style="cursor:pointer" onclick="openTaskModal(\''+t.id+'\')">'+
        '<td><strong>'+esc(t.title)+'</strong></td><td>'+esc(orgName(t.organisation_id)||'—')+'</td>'+
        '<td><span class="status-chip">'+esc(t.status)+'</span></td>'+
        '<td>'+esc(t.priority||'Normal')+'</td><td class="mono '+(t.due_at&&t.due_at<today()?'':'faint')+'">'+fmtDate(t.due_at)+'</td></tr>').join('')+
      '</tbody></table></div>';
  }
  return header+'<div class="priority-card-grid">'+sorted.map(t=>{
    const late=t.due_at&&t.due_at<today()&&!['Completed','Cancelled','Closed / Lost'].includes(t.status);
    return '<div class="card rich-card" style="--accent:'+(late?'var(--red)':priorityColor(t.priority))+'" onclick="openTaskModal(\''+t.id+'\')">'+
      '<div class="rich-card-head"><div style="display:flex;gap:11px"><div class="rich-icon">✓</div><div><div class="rich-title">'+esc(t.title)+'</div>'+
      '<div class="rich-sub">'+esc(orgName(t.organisation_id)||'No organisation')+'</div></div></div><span class="status-chip">'+esc(t.status)+'</span></div>'+
      '<div class="rich-body">'+(late?'Overdue follow-up requiring attention.':'Priority: '+esc(t.priority||'Normal'))+'</div>'+
      '<div class="rich-foot"><span>'+esc(t.priority||'Normal')+' priority</span><span>'+fmtDate(t.due_at)+'</span></div></div>';
  }).join('')+'</div>';
}

async function completeTask(id){
  const t=byId(state.tasks,id);
  const outcomeLabel=document.getElementById('f_outcome').value;
  const notes=document.getElementById('f_outcomeNotes').value.trim();
  const nextDue=document.getElementById('f_nextDue').value;
  const makeLesson=document.getElementById('f_makelesson').checked;
  const mapping=FU_OUTCOMES.find(o=>o.label===outcomeLabel);
  const nextStatus = mapping.next || 'Completed';
  const isFinal=['Completed','Closed / Lost'].includes(nextStatus);

  const act = await logActivity({
    activity_type: outcomeLabel.includes('Email')?'Email sent':outcomeLabel.includes('Meeting')?'Meeting':outcomeLabel.includes('Call')?'Call':outcomeLabel.includes('Proposal')?'Proposal sent':'Follow-up',
    title: t.title+' — '+outcomeLabel, body: notes||null,
    organisation_id: t.organisation_id, person_id: t.person_id, opportunity_id: t.opportunity_id, task_id: t.id
  });

  if(isFinal){
    await dbUpdate('tasks', id, {status: nextStatus, outcome: outcomeLabel, completion_notes: notes||null, completed_at: new Date().toISOString()});
  } else {
    await dbUpdate('tasks', id, {status: nextStatus, outcome: outcomeLabel, completion_notes: notes||null, due_at: nextDue, waiting_since: today()});
  }

  if(makeLesson && notes){
    if(isActionLikeKnowledge(t.title)){
      toast('Action items stay as follow-ups, not lessons.');
    } else {
      const lesson=await dbInsert('lessons_v2',{title:(t.title+' — lesson').slice(0,200), summary:notes.slice(0,300), detail:notes, source_type:'task', source_id:id, created_by:myProfile.display_name});
      if(t.organisation_id) await dbInsert('entity_links',{source_type:'lesson',source_id:lesson.id,target_type:'organisation',target_id:t.organisation_id,relationship_type:'relates_to',created_by:myProfile.display_name});
    }
  }

  if(t.organisation_id) await touchOrgInteraction(t.organisation_id, isFinal?null:t.title, isFinal?null:nextDue);
  closeModal(); renderCurrent(); toast('Follow-up updated');
}


function autoSummary(text){
  const clean=String(text||'').replace(/\s+/g,' ').trim();
  if(!clean) return '';
  const sentences=clean.match(/[^.!?]+[.!?]?/g)||[clean];
  return sentences.slice(0,3).join(' ').trim().slice(0,700);
}
function extractLines(text, patterns){
  return String(text||'').split(/\n+/).map(x=>x.trim()).filter(Boolean).filter(line=>patterns.some(p=>p.test(line)));
}
async function safeInsert(table,payload){
  try{return await dbInsert(table,payload);}catch(e){console.warn('Auto-update skipped',table,e);return null;}
}
async function propagateInteraction({organisationId,personId,meetingId,notes,nextSteps,opportunityId,interactionType}){
  const now=new Date().toISOString();
  const summary=autoSummary(notes);
  if(organisationId){
    const org=byId(state.organisations,organisationId);
    const patch={last_interaction_at:now};
    if(summary) patch.current_summary=summary;
    // A meeting being marked complete must never, on its own, create a
    // follow-up reminder — only an explicit follow-up the user creates
    // themselves counts. Other interaction types (calls, emails, notes)
    // keep the existing behaviour; this is scoped to meetings only.
    if(nextSteps && interactionType!=='Meeting'){patch.next_action_summary=nextSteps;patch.next_action_date=addDays(today(),7);}
    if(/pilot/i.test(notes)) patch.pipeline_stage='Pilot Planning';
    if(/positive|support|agreed|introduc|keen|interested/i.test(notes)) patch.relationship_status='Warm';
    await dbUpdate('organisations',organisationId,patch);
    const activeOpp=state.opportunities.find(o=>o.organisation_id===organisationId&&o.status==='Active')||state.opportunities.find(o=>o.organisation_id===organisationId);
    if(activeOpp){
      const opPatch={};
      if(nextSteps) opPatch.next_action=nextSteps;
      if(/pilot/i.test(notes)) opPatch.stage='Pilot Planning';
      if(Object.keys(opPatch).length) await dbUpdate('opportunities',activeOpp.id,opPatch);
    }
  }
  if(interactionType==='Meeting'){
    const staleMeetingTasks=state.tasks.filter(t=>
      !['Completed','Cancelled','Closed / Lost'].includes(t.status) &&
      ((personId && t.person_id===personId) || (organisationId && t.organisation_id===organisationId)) &&
      /^(book|schedule|arrange|await).*meeting|^contact$|^book meeting$/i.test(String(t.title||'').trim())
    );
    for(const t of staleMeetingTasks){
      await dbUpdate('tasks',t.id,{status:'Completed',outcome:'Meeting completed',completed_at:now,completion_notes:'Automatically closed when the meeting was recorded.'});
    }
  }
  const linkedPeople=new Set();
  if(personId) linkedPeople.add(personId);
  if(meetingId) state.meeting_attendees.filter(a=>a.meeting_id===meetingId&&a.person_id).forEach(a=>linkedPeople.add(a.person_id));
  for(const pid of linkedPeople){
    const person=byId(state.people,pid); if(!person) continue;
    const existing=String(person.notes||'').trim();
    const updateLine=(summary?summary:'Interaction recorded')+(nextSteps?' Next: '+nextSteps:'');
    await dbUpdate('people',pid,{last_interaction_at:now,notes:(updateLine+(existing?'\n\n'+existing:'')).slice(0,4000),next_action_summary:(interactionType==='Meeting'?person.next_action_summary:(nextSteps||person.next_action_summary))||null,warmth:/positive|support|agreed|introduc|keen|interested/i.test(notes)?'Warm':person.warmth});
  }
  // Meetings never auto-create a follow-up task from "next steps" text — that's
  // exactly the automatic-follow-up behaviour the Brain should not have. A
  // follow-up should only exist if the user explicitly creates one. Other
  // interaction types (calls, emails, notes) are unchanged.
  if(nextSteps && interactionType!=='Meeting'){
    const duplicate=state.tasks.some(t=>t.organisation_id===organisationId&&normText(t.title)===normText(nextSteps.slice(0,120))&&!['Completed','Cancelled'].includes(t.status));
    if(!duplicate) await safeInsert('tasks',{title:nextSteps.slice(0,120),description:nextSteps,organisation_id:organisationId||null,person_id:personId||null,opportunity_id:opportunityId||null,status:'To Do',priority:'Normal',due_at:addDays(today(),7),created_by_user_id:myProfile.id,assigned_to_user_id:myProfile.id});
  }
  const objections=extractLines(notes,[/doesn.?t want/i,/do not want/i,/concern/i,/hesitat/i,/objection/i,/too expensive/i,/free pilot/i,/no api/i]);
  for(const line of objections.slice(0,3)) await safeInsert('objections',{organisation_id:organisationId||null,raised_by_person_id:personId||null,objection:line,status:'Open',created_by:myProfile.display_name});
  const decisions=extractLines(notes,[/agreed/i,/decided/i,/will introduce/i,/approved/i,/pilot/i]);
  for(const line of decisions.slice(0,3)){
    const d=await safeInsert('decisions',{title:line.slice(0,120),decision:line,status:'Active',created_by:myProfile.display_name});
    if(d&&organisationId) await safeInsert('entity_links',{source_type:'decision',source_id:d.id,target_type:'organisation',target_id:organisationId,relationship_type:'relates_to',created_by:myProfile.display_name});
  }
  const lessons=extractLines(notes,[/only one workflow/i,/manual/i,/training/i,/proof/i,/works/i,/prefer/i]);
  for(const line of lessons.slice(0,2)){
    const l=await safeInsert('lessons_v2',{title:line.slice(0,120),summary:line,detail:notes,source_type:meetingId?'meeting':'interaction',source_id:meetingId||null,created_by:myProfile.display_name});
    if(l&&organisationId) await safeInsert('entity_links',{source_type:'lesson',source_id:l.id,target_type:'organisation',target_id:organisationId,relationship_type:'relates_to',created_by:myProfile.display_name});
    if(l&&meetingId) await safeInsert('entity_links',{source_type:'lesson',source_id:l.id,target_type:'meeting',target_id:meetingId,relationship_type:'sourced_from',created_by:myProfile.display_name});
  }
}

  const activityTypeMap={

/* ---------------------------------------------------------------------------
   CALENDAR — one engine, ported from V1's proven month-grid implementation.
   Tasks, meetings, marketing items and team notes with due dates all render
   from the same shared month state (calMonth/calYear) — nothing here is a
   second, independent calendar.
--------------------------------------------------------------------------- */
let calMonth=new Date().getMonth(), calYear=new Date().getFullYear();
let calFilters={tasks:true, meetings:true, marketing:true, team:true};
let calHideCompleted=false;
const CAL_TYPE_COLOR={tasks:'var(--blue)', meetings:'var(--green)', marketing:'var(--gold)', team:'var(--amber)', assets:'var(--muted)'};
const CAL_TYPE_ICON={tasks:'✅', meetings:'📅', marketing:'📢', team:'📌', assets:'📎'};

/* Monday-first month grid, including the leading/trailing days from
   adjacent months needed to fill complete weeks — exact port of V1's
   mkMonthGridDates(). */
function monthGridDates(year,month){
  const firstOfMonth=new Date(year,month,1);
  const lastOfMonth=new Date(year,month+1,0);
  const startOffset=(firstOfMonth.getDay()+6)%7; // Monday=0 ... Sunday=6
  const gridStart=new Date(firstOfMonth); gridStart.setDate(gridStart.getDate()-startOffset);
  const endOffset=(7-lastOfMonth.getDay())%7;
  const gridEnd=new Date(lastOfMonth); gridEnd.setDate(gridEnd.getDate()+endOffset);
  const cells=[]; let cur=new Date(gridStart);
  while(cur<=gridEnd){ cells.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
  return cells;
}
function isoDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

function calendarItemsFor(year,month){
  const items=[];
  state.tasks.forEach(t=>{
    if(t.calendar_visible===false || !t.due_at) return;
    const d=new Date(t.due_at); if(d.getFullYear()!==year||d.getMonth()!==month) return;
    const done=['Completed','Cancelled','Closed / Lost'].includes(t.status);
    items.push({date:t.due_at, label:t.title, type:'tasks', done, overdue:!done&&t.due_at<today(), onclick:"openTaskModal('"+t.id+"')"});
  });
  state.meetings.forEach(m=>{
    const d=new Date(m.scheduled_at); if(d.getFullYear()!==year||d.getMonth()!==month) return;
    items.push({date:isoDate(d), label:m.title, type:'meetings', done:m.meeting_status==='Completed', overdue:false, onclick:"go('meetingDetail','"+m.id+"')"});
  });
  state.marketing_items.forEach(mi=>{
    if(!mi.scheduled_at) return;
    const d=new Date(mi.scheduled_at); if(d.getFullYear()!==year||d.getMonth()!==month) return;
    items.push({date:isoDate(d), label:mi.title, type:'marketing', done:mi.status==='Published', overdue:false, onclick:"openMarketingDetail('"+mi.id+"')"});
  });
  state.team_messages_v2.forEach(m=>{
    if(!m.due_at || !m.is_pinned) return;
    const d=new Date(m.due_at); if(d.getFullYear()!==year||d.getMonth()!==month) return;
    items.push({date:m.due_at, label:m.title, type:'team', done:m.status==='Done', overdue:false, onclick:"openTeamNoteDetail('"+m.id+"')"});
  });
  return items;
}
function calMiniItem(it){
  return '<div class="cal-mini'+(it.overdue?' overdue':'')+(it.done?' done':'')+'" style="border-left-color:'+CAL_TYPE_COLOR[it.type]+'" onclick="event.stopPropagation();'+it.onclick+'">'+
    '<span style="flex:none;margin-right:3px">'+(CAL_TYPE_ICON[it.type]||'•')+'</span>'+
    (it.done?'<span style="color:var(--green);flex:none">\u2713</span>':'')+
    '<span class="cal-mini-text">'+esc(it.label)+'</span></div>';
}
function calDayCell(date,viewMonthNum,byDate){
  const iso_=isoDate(date);
  const dayItems=[...(byDate[iso_]||[])].sort((a,b)=>(a.done===b.done)?0:(a.done?1:-1)); // incomplete first, completed sink to the bottom — never removed
  const items=dayItems.slice(0,4);
  const overflow=dayItems.length-items.length;
  const isToday=iso_===today();
  const inMonth=date.getMonth()===viewMonthNum;
  return '<div class="cal-cell'+(isToday?' today':'')+(inMonth?'':' other')+'" onclick="calDayView(\''+iso_+'\')">'+
    '<div class="cal-cell-head"><span class="cal-cell-num">'+date.getDate()+'</span></div>'+
    items.map(calMiniItem).join('')+
    (overflow>0?'<div class="cal-cell-more">+'+overflow+' more</div>':'')+
  '</div>';
}
function renderFullCalendar(){
  calMonth=Math.max(0,Math.min(11,calMonth));
  const cells=monthGridDates(calYear,calMonth);
  const items=calendarItemsFor(calYear,calMonth).filter(it=>calFilters[it.type] && !(calHideCompleted && it.done));
  const byDate={}; items.forEach(it=>{ (byDate[it.date]=byDate[it.date]||[]).push(it); });

function lessonLinks(lessonId){ return state.entity_links.filter(el=>el.source_type==='lesson'&&el.source_id===lessonId); }
function linkLabel(l){
  if(l.target_type==='organisation') return orgName(l.target_id);
  if(l.target_type==='meeting') { const m=byId(state.meetings,l.target_id); return m?m.title:'meeting'; }
  if(l.target_type==='person') { const p=byId(state.people,l.target_id); return p?p.full_name:'person'; }
  if(l.target_type==='opportunity') { const o=byId(state.opportunities,l.target_id); return o?o.title:'opportunity'; }

}

async function saveLessonForm(id){
  const title=document.getElementById('f_ltitle').value.trim();
  if(!title){toast('Title required');return;}
  const payload={title, summary:document.getElementById('f_lsummary').value.trim()||null,
    detail:document.getElementById('f_ldetail').value.trim()||null, category:document.getElementById('f_lcat').value.trim()||null};
  let lesson;
  if(id){
    lesson=await dbUpdate('lessons_v2',id,payload);
  } else {
    const ldupe=state.lessons_v2.find(l=>!l.archived_at && normText(l.title)===normText(title));
    if(ldupe && !confirm('A lesson titled "'+ldupe.title+'" already exists. Create another anyway?')){ closeModal(); renderCurrent(); return; }
    payload.source_type='manual'; payload.created_by=myProfile.display_name;
    lesson=await dbInsert('lessons_v2',payload);
    await logActivity({activity_type:'Lesson learned', title:'Lesson: '+title, body:payload.summary, lesson_id:lesson.id});
  }
  const orgId=document.getElementById('f_lorg').value;
  const personId=document.getElementById('f_lperson').value;
  await syncEntityLink('lesson',lesson.id,'organisation',orgId);
  await syncEntityLink('lesson',lesson.id,'person',personId);
  closeModal(); renderCurrent(); toast('Saved');
}
async function deleteLessonConfirm(id){
  if(!confirm('Delete this lesson?')) return;
  await dbUpdate('lessons_v2',id,{archived_at:new Date().toISOString()});
  closeModal(); renderCurrent(); toast('Deleted');
}
/* Keeps exactly one entity_link of a given (sourceType,targetType) pair in
   sync with a single-select dropdown — used by lesson/objection/decision
   forms so re-saving never creates duplicate links. */
async function syncEntityLink(sourceType,sourceId,targetType,targetId){
  const existing=state.entity_links.find(el=>el.source_type===sourceType&&el.source_id===sourceId&&el.target_type===targetType);
  if(targetId && (!existing || existing.target_id!==targetId)){
    if(existing) await dbDelete('entity_links',existing.id);
    await dbInsert('entity_links',{source_type:sourceType,source_id:sourceId,target_type:targetType,target_id:targetId,relationship_type:'relates_to',created_by:myProfile.display_name});
  } else if(!targetId && existing){
    await dbDelete('entity_links',existing.id);
  }
}

/* ---------------------------------------------------------------------------
   STORAGE SOURCE RESOLUTION — migrated V1 assets physically live in V1's
   original bucket, confirmed as exactly 'assets' (the ASSETS_BUCKET
   constant in V1's index.html). Our SQL migration (05_v1_migration.sql,
   Phase 13) only copied metadata into assets_v2 — it never moved files —
   so file_path on a migrated row still points into that original bucket,
   not kweli-brain-assets-v2. Detection, in priority order:
     1. An explicit "now stored in <V2 bucket>" marker in notes — written
        by replaceAssetFile() below, and always authoritative (a replaced
        file is genuinely in the V2 bucket regardless of migration history).
     2. The original migration-time marker ("remains in the legacy Storage
        bucket") that 05_v1_migration.sql wrote into notes for every
        migrated row.
     3. A matching migration_log row (step 'kweli_brain_v1_to_v2_2026_07:
        assets', target_table 'assets_v2') for this asset id — the
        authoritative migration record, used if the notes marker was ever
        edited away.
   Anything matching none of these is a genuine new V2 upload.
--------------------------------------------------------------------------- */
const V1_LEGACY_BUCKET = 'assets'; // confirmed exact V1 Storage bucket name (ASSETS_BUCKET constant in V1 index.html)
function getAssetStorageSource(asset){
  if(!asset) return {bucket:ASSETS_BUCKET, filePath:null, thumbnailPath:null};
  const notes = asset.notes||'';
  const replacedIntoV2 = notes.includes('now stored in '+ASSETS_BUCKET);
  let isLegacy = false;
  if(!replacedIntoV2){
    isLegacy = notes.includes('remains in the legacy Storage bucket') ||
      state.migration_log.some(m=>m.step===MIGRATION_STEP_PREFIX+'assets' && m.target_table==='assets_v2' && m.target_id===asset.id);
  }
  return {
    bucket: isLegacy ? V1_LEGACY_BUCKET : ASSETS_BUCKET,
    filePath: asset.file_path||null,
    thumbnailPath: asset.thumbnail_path||null
  };
}

/* ---------------------------------------------------------------------------
   ASSET THUMBNAILS — ported from V1's proven pipeline: a thumbnail is
   generated ONCE, at upload time, uploaded to Storage as a real JPEG, and
   its path saved to assets_v2.thumbnail_path. Viewing a card afterwards is
   then just a signed-URL fetch (batched across every visible card, cached
   for ~45 minutes) — never a re-render of the PDF. Migrated assets that
   already carry a V1 thumb_path get the same signed-URL treatment, from
   whichever bucket getAssetStorageSource() resolves for them; if a migrated
   asset has no thumbnail at all, it shows the same fallback cover as any
   other file with no thumbnail — no forced re-upload, no forced generation.
--------------------------------------------------------------------------- */
const PDFJS_WORKER_CDN_URL='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const PDFJS_LIB_CDN_URL='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
let __pdfLibReady=null, __pdfWorkerReady=null;
function ensurePdfLibLoaded(){
  if(window.pdfjsLib) return Promise.resolve(true);
  if(__pdfLibReady) return __pdfLibReady;
  __pdfLibReady=new Promise((resolve)=>{
    const s=document.createElement('script');
    s.src=PDFJS_LIB_CDN_URL;
    s.onload=()=>resolve(true);
    s.onerror=()=>{ console.error('[Assets thumbnail] PDF.js failed to load from cdnjs.'); resolve(false); };
    document.head.appendChild(s);
  });
  return __pdfLibReady;
}
/* Same-origin blob-URL workaround as V1: browsers block new Worker() from
   loading a cross-origin script directly, so we fetch the worker source
   ourselves and hand PDF.js a blob: URL instead. */
function ensurePdfWorkerConfigured(){
  if(__pdfWorkerReady) return __pdfWorkerReady;
  __pdfWorkerReady=(async()=>{
    const libOk=await ensurePdfLibLoaded();
    if(!libOk || typeof pdfjsLib==='undefined') return false;
    try{
      const res=await fetch(PDFJS_WORKER_CDN_URL);
      if(!res.ok) throw new Error('HTTP '+res.status);
      const code=await res.text();
      const blobUrl=URL.createObjectURL(new Blob([code],{type:'application/javascript'}));
      pdfjsLib.GlobalWorkerOptions.workerSrc=blobUrl;
      return true;
    }catch(e){
      console.error('[Assets thumbnail] Could not blob-ify the PDF.js worker, falling back to direct CDN workerSrc:',e);
      pdfjsLib.GlobalWorkerOptions.workerSrc=PDFJS_WORKER_CDN_URL;
      return true;
    }
  })();
  return __pdfWorkerReady;
}
async function generatePdfThumbnailBlob(file){
  const workerReady=await ensurePdfWorkerConfigured();
  if(!workerReady){ console.error('[Assets thumbnail] PDF.js not usable — skipping thumbnail generation.'); return null; }
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    const page=await pdf.getPage(1);
    const base=page.getViewport({scale:1});
    const scale=Math.min(2,600/base.width);
    const viewport=page.getViewport({scale});
    const canvas=document.createElement('canvas');
    canvas.width=Math.max(1,Math.round(viewport.width)); canvas.height=Math.max(1,Math.round(viewport.height));
    const ctx=canvas.getContext('2d');
    if(!ctx) return null;
    await page.render({canvasContext:ctx, viewport}).promise;
    return await new Promise(res=>canvas.toBlob(res,'image/jpeg',0.82));
  }catch(e){ console.error('[Assets thumbnail] Generation failed:',e); return null; }
}
/* Batched, cached signed-URL fetch for card thumbnails — one Storage call
   per bucket for a whole page of cards, reused across re-renders. Migrated
   and new assets can resolve to different buckets, so requests are grouped
   by resolved bucket first. */
let __thumbUrlCache={};
const THUMB_CACHE_MS=45*60*1000;
async function hydratePdfThumbnails(){
  const list=state.assets_v2.filter(a=>a.thumbnail_path);
  if(!list.length) return;
  const now=Date.now();
  const byBucket={};
  list.forEach(a=>{
    const src=getAssetStorageSource(a);
    if(__thumbUrlCache[src.thumbnailPath] && now-__thumbUrlCache[src.thumbnailPath].ts<THUMB_CACHE_MS) return;
    (byBucket[src.bucket]=byBucket[src.bucket]||[]).push(src.thumbnailPath);
  });
  for(const bucket of Object.keys(byBucket)){
    const paths=byBucket[bucket];
    if(!paths.length) continue;
    try{
      const {data,error}=await sb.storage.from(bucket).createSignedUrls(paths,3600);
      if(error){ console.error('[Assets thumbnail] createSignedUrls failed for bucket',bucket,error); continue; }
      data.forEach((d,i)=>{ if(d&&d.signedUrl) __thumbUrlCache[paths[i]]={url:d.signedUrl, ts:now}; });
    }catch(e){ console.error('[Assets thumbnail] Signed URL batch request threw:',e); }
  }
  list.forEach(a=>{
    const src=getAssetStorageSource(a);
    const c=__thumbUrlCache[src.thumbnailPath];
    const el=document.getElementById('athumb-'+a.id);
    if(!el) return;
    if(c && c.url){ if(!el.querySelector('img')) el.innerHTML='<img src="'+esc(c.url)+'" loading="lazy" alt="" />'; }
  });
}

async function uploadAsset(file,meta={}){
  if(!file) return;
  const adupe=state.assets_v2.find(a=>a.file_name===file.name && (a.file_size==null||a.file_size===file.size));
  if(adupe && !confirm('An asset named "'+file.name+'"'+(adupe.file_size===file.size?' of the same size':'')+' already exists. Upload it again anyway?')) return;
  const path=uid()+'/'+file.name.replace(/[^a-zA-Z0-9.\-_]/g,'_');
  toast('Uploading…');
  const {error}=await sb.storage.from(ASSETS_BUCKET).upload(path,file,{cacheControl:'3600',upsert:true});
  if(error){toast('Upload failed: '+error.message);return;}
  let thumbnail_path=null;
  if(isPdfAsset({file_name:file.name, file_type:file.type})){
    const thumbBlob=await generatePdfThumbnailBlob(file);
    if(thumbBlob){
      thumbnail_path=path.replace(/\/[^/]+$/,'/thumb.jpg');
      const {error:thumbErr}=await sb.storage.from(ASSETS_BUCKET).upload(thumbnail_path,thumbBlob,{cacheControl:'3600',upsert:true,contentType:'image/jpeg'});
      if(thumbErr){ console.error('[Assets thumbnail] Upload failed:',thumbErr); thumbnail_path=null; }
    }
  }
  const asset=await dbInsert('assets_v2',{
    title:meta.title||file.name,
    notes:meta.notes||null,
    file_name:file.name,
    file_path:path,
    file_type:file.type,
    file_size:file.size,
    thumbnail_path,
    text_extraction_status:'not_started',
    created_by:myProfile.display_name
  });
  await logActivity({
    activity_type:'Asset uploaded',
    title:'Uploaded: '+(meta.title||file.name),
    body:meta.notes||null,
    asset_id:asset.id
  });
  // suggest org links by name match — suggestion only, never auto-confirmed
  for(const o of state.organisations){
    const firstWord=o.name.split(' ')[0].toLowerCase();
    if(firstWord.length>2 && file.name.toLowerCase().includes(firstWord)){
      await dbInsert('entity_links',{source_type:'asset',source_id:asset.id,target_type:'organisation',target_id:o.id,relationship_type:'mentions',is_inferred:true,confidence:0.6,created_by:myProfile.display_name});
    }
  }
  renderCurrent(); toast('Uploaded');
}
/* Replacing a migrated asset's file uploads into the V2 bucket and marks
   the row as V2-hosted going forward — the old V1 object is never deleted
   or moved, exactly as required. */
async function replaceAssetFile(id,file){
  if(!file) return;
  const a=byId(state.assets_v2,id);
  const wasLegacy=getAssetStorageSource(a).bucket===V1_LEGACY_BUCKET;
  const path=uid()+'/'+file.name.replace(/[^a-zA-Z0-9.\-_]/g,'_');
  toast('Uploading replacement…');
  const {error}=await sb.storage.from(ASSETS_BUCKET).upload(path,file,{cacheControl:'3600',upsert:true});
  if(error){ toast('Upload failed: '+error.message); return; }
  let thumbnail_path=a.thumbnail_path||null;
  if(isPdfAsset({file_name:file.name, file_type:file.type})){
    const thumbBlob=await generatePdfThumbnailBlob(file);
    if(thumbBlob){
      thumbnail_path=path.replace(/\/[^/]+$/,'/thumb.jpg');
      await sb.storage.from(ASSETS_BUCKET).upload(thumbnail_path,thumbBlob,{cacheControl:'3600',upsert:true,contentType:'image/jpeg'});
    }
  }
  const strippedNotes=(a.notes||'').replace(/\[V1 asset[^\]]*\]/,'').trim();
  const notes=(strippedNotes?strippedNotes+'\n\n':'')+(wasLegacy?'[File replaced '+today()+' — now stored in '+ASSETS_BUCKET+'; original V1 file left untouched in "'+V1_LEGACY_BUCKET+'".]':'[File replaced '+today()+' — now stored in '+ASSETS_BUCKET+'.]');
  await dbUpdate('assets_v2',id,{file_path:path, file_name:file.name, file_type:file.type, file_size:file.size, thumbnail_path, notes, text_extraction_status:'not_started', updated_by:myProfile.display_name});
  delete __thumbUrlCache[a.thumbnail_path]; delete signedUrlCache[a.file_path];
  await logActivity({activity_type:'Asset uploaded', title:'Replaced file: '+file.name, asset_id:id});
  renderCurrent(); toast(wasLegacy?'File replaced — original V1 file left untouched':'File replaced');
}
/* Cached signed-URL getter — bucket-aware via getAssetStorageSource(), so
   migrated V1 assets and new V2 uploads both resolve correctly. Cache
   checked/populated once per path, reused by Open/Preview/Download. */
async function getAssetSignedUrl(a){
  if(!a||!a.file_path) return null;
  const src=getAssetStorageSource(a);
  const cached=signedUrlCache[src.filePath];
  if(cached && cached.expires>Date.now()) return cached.url;
  const {data,error}=await sb.storage.from(src.bucket).createSignedUrl(src.filePath,3600);
  if(error){ toast('Could not open file (bucket: '+src.bucket+'): '+error.message); return null; }
  signedUrlCache[src.filePath]={url:data.signedUrl, expires:Date.now()+3500*1000};
  return data.signedUrl;
}
async function openAssetFile(id){
  const a=byId(state.assets_v2,id);
  const url=await getAssetSignedUrl(a);
  if(url) window.open(url,'_blank');
}
async function downloadAssetFile(id){
  const a=byId(state.assets_v2,id); if(!a||!a.file_path) return;

  if(error){ toast('Download failed: '+error.message); return; }
  window.open(data.signedUrl,'_blank');
}

/* Broader-than-investor_profiles candidate detection — a migration-time
   inference gap (Phase 12 of 05_v1_migration.sql only matched
   category/investment_status text loosely) may have missed a real investor
   relationship that still exists correctly in organisations/opportunities.
   This surfaces every plausible candidate, not just the ones that already
   have an investor_profiles row, so nothing stays silently excluded. */
function investorCandidates(){
  const byOrgId={};
  state.investor_profiles.forEach(iv=>{ if(iv.organisation_id) byOrgId[iv.organisation_id]={profile:iv, org:byId(state.organisations,iv.organisation_id)}; });
  state.organisations.forEach(o=>{
    if(byOrgId[o.id]) return;
    const hasInvestorType = o.organisation_type==='Investor';
    const hasInvestorOpp = state.opportunities.some(op=>op.organisation_id===o.id && ((op.problem||'').toLowerCase().includes('invest')||(op.kweli_angle||'').toLowerCase().includes('invest')));
    if(hasInvestorType || hasInvestorOpp) byOrgId[o.id]={profile:null, org:o};
  });
  const personOnly=state.investor_profiles.filter(iv=>!iv.organisation_id && iv.person_id).map(iv=>({profile:iv, org:null, person:byId(state.people,iv.person_id)}));
  return [...Object.values(byOrgId), ...personOnly];
}
function investorContext(c){
  const orgId=c.org?c.org.id:null;
  const opp=orgId?state.opportunities.find(o=>o.organisation_id===orgId):null;
  const acts=orgId?state.activities.filter(a=>a.organisation_id===orgId).sort((a,b)=>new Date(b.occurred_at)-new Date(a.occurred_at)):[];
  const decisions=orgId?state.decisions.filter(d=>!d.archived_at && state.entity_links.some(el=>el.source_type==='decision'&&el.source_id===d.id&&el.target_type==='organisation'&&el.target_id===orgId)):[];
  const objections=orgId?state.objections.filter(x=>!x.archived_at && x.organisation_id===orgId):[];
  return {opp, acts, decisions, objections};
}

  {title:'Pitch TechCrunch',category:'PR',audience:'TechCrunch',objective:'Not “African blockchain startup raises pre-seed” — that’s been done to death and ignored. Better: “Why this founder turned down fraud-detection framing to build something narrower and harder to explain” — a category-creation and positioning-discipline story, which TechCrunch’s better writers like more than funding news.',estMinutes:30},
  {title:'Pitch Rest of World',category:'PR',audience:'Rest of World',objective:'The human angle: a broker or loss adjuster’s on-the-ground account of how document fraud actually plays out in East African insurance — Kweli as the infrastructure response, not the subject.',estMinutes:30},
  {title:'Pitch Semafor Africa',category:'PR',audience:'Semafor Africa',objective:'Data-led: the flagship “State of Document Trust in East Africa” report, pitched as an exclusive first-look before public release.',estMinutes:30},
  {title:'Pitch Forbes Africa',category:'PR',audience:'Forbes Africa',objective:'Founder profile angle: three founders from media, engineering, and agriculture building infrastructure for institutional trust — a “who is building Africa’s quiet infrastructure layer” feature.',estMinutes:30},
  {title:'Pitch Business Daily Africa',category:'PR',audience:'Business Daily Africa',objective:'Trade and export angle: the hidden cost of document friction to Kenyan exporters, tied to KEBS/KEPHIS regulatory context — a business-reader, economically grounded story.',estMinutes:30},
  {title:'Pitch The Africa Report',category:'PR',audience:'The Africa Report',objective:'Regional and policy angle: what it would take for a regulator to mandate verification infrastructure, using the insurance mandate mechanic as the case study.',estMinutes:30},
  {title:'Pitch TechCabal',category:'PR',audience:'TechCabal',objective:'Product and technical build story: why the team chose Base over other chains, and the technical discipline of privacy-first verification — TechCabal’s audience is technical and appreciates real engineering detail over hype.',estMinutes:30},
  {title:'Pitch Techpoint',category:'PR',audience:'Techpoint',objective:'Founder-building-in-public angle: building an internal CRM before a single paying customer, and what that discipline says about the company.',estMinutes:30},
  {title:'Pitch Disrupt Africa',category:'PR',audience:'Disrupt Africa',objective:'Straightforward but well-timed traction story: first paying pilot, first vertical proof point — save this pitch for when there’s an actual milestone, not before.',estMinutes:30},
  {title:'Pitch Bloomberg Africa',category:'PR',audience:'Bloomberg Africa',objective:'Macro/investor angle: category-creation economics — why “verification infrastructure” is an underbuilt category with a plausible path to a large TAM, timed to align with the raise.',estMinutes:30},
  {title:'Pitch Reuters',category:'PR',audience:'Reuters',objective:'Only pitch when there’s a genuine news hook — a regulatory mandate, a notable fraud case Kweli’s data illuminates, or a funding close. Reuters doesn’t cover positioning stories; it covers events.',estMinutes:30},
  {title:'Partnership outreach: Audit firms (Big Four and mid-tier East African firms)',category:'Partnership',audience:'Audit firms (Big Four and mid-tier East African firms)',objective:'They see the tampered-document problem across every client; a referral relationship is worth more than any single audit-firm customer contract Offer to co-author “What Auditors Wish Their Clients Understood About Document Trust” (Part 4, #6); position as a practitioner resource, not a sales pitch',estMinutes:30},
  {title:'Partnership outreach: Insurance associations (e.g., Association of Kenya Insurers)',category:'Partnership',audience:'Insurance associations (e.g., Association of Kenya Insurers)',objective:'Association-level relationships open doors to every member insurer at once and lend third-party credibility Propose a closed-door roundtable on claims documentation risk; bring data, not a pitch deck',estMinutes:30},
  {title:'Partnership outreach: Law societies / legal bodies',category:'Partnership',audience:'Law societies / legal bodies',objective:'Legal counsel influence disputes where document authenticity is contested; early relationships build a referral and credibility channel Offer a short CLE-style briefing on document provenance and chain-of-custody standards',estMinutes:30},
  {title:'Partnership outreach: Universities',category:'Partnership',audience:'Universities',objective:'Long-term credentials vertical + research-partnership credibility for reports Approach an economics or law faculty with a co-research proposal, not a sales pitch — academic partnership, not vendor relationship',estMinutes:30},
  {title:'Partnership outreach: Certification bodies (e.g., KEBS-accredited certifiers)',category:'Partnership',audience:'Certification bodies (e.g., KEBS-accredited certifiers)',objective:'Direct beachhead vertical; also credible validators when they speak publicly about verification Approach with the specific reputational-risk framing (report #5, Certification Fraud Index) as the opening conversation',estMinutes:30},
  {title:'Partnership outreach: Export councils (e.g., Kenya Export Promotion and Branding Agency)',category:'Partnership',audience:'Export councils (e.g., Kenya Export Promotion and Branding Agency)',objective:'Policy-adjacent influence on trade documentation standards; potential co-branding on trade reports Propose collaboration on the Export Documentation Friction Report (Part 4, #7)',estMinutes:30},
  {title:'Partnership outreach: Software vendors / ERP providers (lab information systems, claims management systems)',category:'Partnership',audience:'Software vendors / ERP providers (lab information systems, claims management systems)',objective:'Integration partnerships turn Kweli into a feature of systems institutions already use, reducing sales friction dramatically Approach as a technical integration partner, offering API access for a joint case study, not a reseller deal upfront',estMinutes:30},
  {title:'Partnership outreach: Government agencies (KEBS, KEPHIS, KenTrade)',category:'Partnership',audience:'Government agencies (KEBS, KEPHIS, KenTrade)',objective:'Long-term mandate-setting power; too early to sell to, not too early to build relationship and share research Share research reports as background briefings with zero commercial ask; the goal is being known and trusted before any mandate conversation is possible',estMinutes:30},

/* Timezone-safe calendar-date helpers. NEVER use toISOString() for schedule
   generation — in timezones ahead of UTC (e.g. Nairobi, UTC+3) local midnight
   converts to the previous day, shifting every scheduled date back one day.
   These build and read LOCAL calendar dates and never touch UTC. */
function dateKeyLocal(date){
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,'0');
  const d=String(date.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+d;
}
function addCalendarDays(base, days){
  const d=new Date(base.getFullYear(), base.getMonth(), base.getDate());
  d.setDate(d.getDate()+days);
  return d;
}
function weekdayOf(dateValue){
  // Supabase may return a DATE as "YYYY-MM-DD" or a timestamp such as
  // "YYYY-MM-DDT00:00:00+00:00". Always read only the calendar-date part;
  // parsing the full timestamp can shift weekdays by timezone, while splitting
  // without trimming makes the day component NaN (e.g. "20T00:00:00").
  const m=String(dateValue||'').match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return NaN;
  return new Date(Number(m[1]), Number(m[2])-1, Number(m[3])).getDay();
} // 0=Sun..6=Sat, local, no UTC shift

{w:2, items:[
  {day:'tue', platform:'LinkedIn', type:'Claims Workflow', title:'Why medical bills are the easiest thing to fake',
    desc:'Opens the hospital/medical billing fraud theme for health insurers.',
    copy:`A medical bill is a spreadsheet with a letterhead. Change three line items, print it on the right paper, and most claims processes will never know the difference — because nobody calls the hospital to confirm every invoice, and the ones that do get checked are picked almost at random.

Health insurers lose real money to inflated and fabricated medical bills not because their assessors are careless, but because manual verification simply cannot cover the volume.

Verification infrastructure changes the economics: instead of spot-checking a sample and hoping, every document can carry a fast, independent answer to "is this genuine, and has it been altered since issue?"

That's a workflow question as much as a fraud question — and it's the one we spend most of our time on.`},

    desc:'Reframes verification as faster than the manual process it replaces.',
    copy:`Myth: adding verification into a claims or onboarding process makes it slower.

Fact: what's actually slow today is a person picking up the phone, waiting on hold, and calling the issuer to confirm a document by voice — then writing up notes nobody else can search.

An instant, independent check is faster than the phone call it replaces, not slower than doing nothing. The friction people remember is the old manual process, not the idea of verification itself.

The real question isn't "verification or speed" — it's which manual step you're finally ready to stop doing by hand.`}

{w:3, items:[

    desc:'Names the asymmetry between minutes-to-forge and days-to-verify.',
    copy:`Ask any claims handler how they'd fake an invoice and most can describe it in under a minute: take a genuine template, change the amounts, adjust the date, done. It takes longer to file the claim than to forge the document behind it.

That asymmetry — minutes to fake, hours or days to verify — is the entire reason claims leakage from invoice fraud persists at insurers who are otherwise very good at their jobs.

Closing that gap doesn't require catching every fraudster. It requires making genuine verification as fast as forgery, so the economics stop favouring the person with the printer.

That's a narrower, more solvable problem than "stop all fraud" — and it's the one worth funding.`},

{w:4, items:[
  {day:'tue', platform:'LinkedIn', type:'Insurance Insight', title:'The medical report that changed between the clinic and the claim',
    desc:'Medical report verification for health insurers and assessors.',
    copy:`A medical report leaves the clinic as one document. By the time it reaches a claims desk, it may have passed through two or three hands — a patient, an intermediary, sometimes an agent with an incentive to help the numbers along.

Nobody along that chain is necessarily dishonest. But nobody along that chain can prove the report hasn't changed either, and that's the actual problem: not "who lied," but "how would you know."

Health insurers and assessors don't need to interrogate every claimant. They need a fast, independent way to confirm a report is exactly what the clinic issued — unaltered, on the record, checkable in seconds rather than days.

That's a quieter kind of fraud prevention than most people picture, and a more useful one.`},
  {day:'thu', platform:'LinkedIn', type:'Trade Insight', title:'The import paperwork nobody can verify',
    desc:'Opens the trade/import documentation trust theme.',
    copy:`Import documentation moves fast, involves several parties who've often never met, and underpins real money changing hands at every step. It is also, by wide agreement among the trade and compliance people we talk to, some of the easiest paperwork in commerce to fake convincingly.

The usual response is more signatures, more stamps, more layers of manual sign-off — which mostly slows down genuine trade without meaningfully stopping a well-prepared forgery.

What actually helps is being able to independently confirm, quickly, that an import document is genuine and unaltered since issue — without adding another person to the approval chain.

]},

{w:7, items:[
  {day:'tue', platform:'LinkedIn', type:'Document Integrity', title:'The inflated repair quote is a document problem',
    desc:'Reframes repair quote inflation as a document integrity issue, not just negotiation.',
    copy:`Everyone in motor claims knows repair quotes get inflated. Fewer people frame it correctly: it's not a negotiation problem, it's a document integrity problem. A quote is a document like any other — it can be altered, backdated, or issued by a garage that doesn't quite match the one on record.

The fix isn't more scrutiny per assessor — it's making the underlying verification fast enough that scrutiny scales with claim volume instead of assessor headcount.

That reframing — document integrity, not just negotiation — is where we start most conversations with claims leadership.`},
  {day:'thu', platform:'LinkedIn', type:'Banking Insight', title:'The hidden cost of "we\'ll just call to confirm"',
    desc:'Names the real cost of manual phone-call verification.',
    copy:`Ask almost any bank or insurer how they verify a document today and you'll hear some version of: "we call to confirm." It sounds thorough. It's actually one of the most expensive, slowest, least auditable steps left in most operations — a person, a phone, a hope that the right contact picks up and tells the truth.

Nobody has costed this properly, because it's spread across hundreds of small interruptions rather than one visible line item. But add up the minutes, the follow-up calls, the claims and applications sitting in limbo waiting on a callback, and it's a meaningful drag on throughput.

Verification infrastructure doesn't remove judgment from the process. It removes the phone call from the part of the process that shouldn't need one.`},

{w:8, items:[

    desc:'Names the manual phone-call reality most institutions still run on.',
    copy:`Strip away the workflow diagrams and most institutional "verification processes" reduce to the same step: someone calls or emails the issuer and asks whether a document is real. It works, until volume rises, the issuer is unreachable, or the forgery is good enough that a busy person on the phone doesn't catch it.

  {day:'thu', platform:'LinkedIn', type:'Trade Insight', title:'Export documents move real money through untrusting hands',
    desc:'Export documentation trust for trade & trade-finance teams.',
    copy:`An export shipment can pass through a dozen parties before it's paid for — freight forwarders, banks, customs, insurers, buyers who've never met the seller. Every one of those parties is relying on paperwork issued by someone they don't fully trust, verified by nobody in particular.

Independent document verification doesn't replace trade finance controls — it gives every party in that chain a fast, shared way to confirm a document is genuine before real money moves on the strength of it.

It's a small addition to a very old process, and it changes the risk calculation more than its size suggests.`}
]},
{w:9, items:[

    desc:'Laboratory report integrity — an overlooked verification use case.',
    copy:`Laboratories sit upstream of an enormous number of decisions — insurance claims, supply chain sign-offs, compliance filings — and almost nobody downstream of a lab report has any independent way to confirm it's genuine and unaltered. You either trust the letterhead, or you don't get the deal done.

{w:10, items:[
  {day:'tue', platform:'LinkedIn', type:'Insurance Insight', title:'Where the money is largest, the documents are faked',
    desc:'Procurement & tender document fraud.',
    copy:`Procurement and tender fraud rarely gets discussed alongside insurance claims fraud, but the underlying problem is identical: a document (a bid, a certificate, a compliance letter) is trusted because it looks right, not because anyone independently confirmed it.
