async function updateMarketingStatus(id){
  const status=document.getElementById('f_mistatus').value;
  const mi=byId(state.marketing_items,id);
  const patch={status};
  if(status==='Published') patch.completed_at=new Date().toISOString();
  await dbUpdate('marketing_items',id,patch);
  // recurring items roll forward to their next occurrence instead of just disappearing
  if(status==='Published' && mi.repeat_rule && mi.scheduled_at){
    const next=mi.repeat_rule==='weekly'?addDays(mi.scheduled_at,7):mi.repeat_rule==='monthly'?addDays(mi.scheduled_at,30):mi.repeat_rule==='quarterly'?addDays(mi.scheduled_at,90):null;
    if(next) await dbInsert('marketing_items',{title:mi.title, item_type:mi.item_type, status:'Idea', priority:mi.priority, repeat_rule:mi.repeat_rule, scheduled_at:next, owner_user_id:mi.owner_user_id, description:mi.description});
  }
  closeModal(); renderCurrent(); toast('Updated');
}

  return groups.filter(([,arr])=>arr.length);

function renderSearchResults(q){

    arr.slice(0,6).map(r=>'<div class="search-res" onclick="'+r.go+';document.getElementById(\'searchPanel\').style.display=\'none\';document.getElementById(\'globalSearch\').value=\'\'"><div class="r-title">'+esc(r.label)+'</div><span class="r-snip">'+esc(r.sub)+'</span></div>').join('')

/* ---------------------------------------------------------------------------
   TEAM BOARD — digital cork-board. Yellow = normal open, Red = important/
   urgent open, Green = done (always overrides priority). Per-user unread
   state, replies, history, realtime.
--------------------------------------------------------------------------- */
function tbColor(m){
  if(m.status==='Done') return 'note-green';
  if(m.priority==='Important'||m.priority==='Urgent') return 'note-red';
  return 'note-yellow';
}
/* Deterministic small rotation per note (hash of id) — real sticky notes
   are never perfectly aligned, but must stay stable across re-renders. */
function stickyTilt(id){
  let h=0; for(let i=0;i<id.length;i++) h=(h*31+id.charCodeAt(i))|0;
  return ((h%7)-3)*0.9; // -2.7deg .. +2.7deg
}
function myUnreadCount(){
  const pinned=state.team_messages_v2.filter(m=>m.is_pinned);
  return pinned.filter(m=>!state.team_message_reads.some(r=>r.team_message_id===m.id && r.user_id===myProfile.id)).length;
}
function refreshUnreadBadge(){
  const n=myUnreadCount();
  const el=document.getElementById('tbUnreadBadge');
  if(el) el.innerHTML = n? '<span class="nav-badge">'+n+'</span>' : '';
}
function openTeamBoard(){

/* ---------------------------------------------------------------------------
   AI WORKSPACE — retrieval-first. Resolves entities, traverses entity_links,
   pulls related records, ranks by recency, builds focused context. No
   fabricated reasoning: callLLM() returns null until a model is connected.
--------------------------------------------------------------------------- */
let _lastSuggestedPrompts=[];
function suggestedPrompts(){
  const prompts=[];
  const topOrg=[...state.organisations].sort((a,b)=>(b.priority||0)-(a.priority||0))[0];
  if(topOrg){
    prompts.push('What is the current status of '+topOrg.name+'?');
    prompts.push('Summarise our relationship history with '+topOrg.name);
  }
  const waitingTask=state.tasks.find(t=>t.status==='Waiting for Response');
  if(waitingTask) prompts.push('What are we waiting to hear back on?');
  const recentPerson=state.people[state.people.length-1];
  if(recentPerson) prompts.push('What do we know about '+recentPerson.full_name+'?');
  prompts.push('What lessons have we learned recently?');
  prompts.push('What objections keep coming up?');
  _lastSuggestedPrompts=prompts.slice(0,5);
  return _lastSuggestedPrompts;
}
function useSuggestedPrompt(i){
  document.getElementById('askInput').value=_lastSuggestedPrompts[i]||'';
  runAsk();
}
function vAsk(){
  const prompts=suggestedPrompts();
  return '<div class="page-head"><div><div class="eyebrow">AI</div><div class="page-title">AI Workspace</div>'+
    '<div class="page-sub">Ask about any organisation, person or opportunity — answers are built only from linked records.</div></div></div>'+
    '<div class="card"><div class="field"><label class="fl">Question</label><input class="input" id="askInput" placeholder="e.g. What did Kyle say about the Farmer App?"></div>'+
    '<div style="margin-bottom:14px">'+prompts.map((p,i)=>'<span class="prompt-chip" onclick="useSuggestedPrompt('+i+')">'+esc(p)+'</span>').join('')+'</div>'+
    '<button class="btn gold" onclick="runAsk()">Ask</button></div>'+
    '<div id="askResult" style="margin-top:20px"></div>';
}
function resolveEntities(query){
  const q=query.toLowerCase();
  const people=state.people.filter(p=>q.includes(p.full_name.toLowerCase()));
  const orgsDirect=state.organisations.filter(o=>q.includes(o.name.toLowerCase()));
  const orgsFromPeople=people.map(p=>p.primary_organisation_id).filter(Boolean).map(id=>byId(state.organisations,id));
  const orgs=[...new Map([...orgsDirect,...orgsFromPeople].filter(Boolean).map(o=>[o.id,o])).values()];
  return {people, orgs};
}
function runAsk(){
  const q=document.getElementById('askInput').value.trim();
  if(!q) return;
  const {people,orgs}=resolveEntities(q);
  const orgIds=orgs.map(o=>o.id);
  const relatedTasks=state.tasks.filter(t=>orgIds.includes(t.organisation_id));
  const relatedMeetings=state.meetings.filter(m=>orgIds.includes(m.organisation_id));
  const relatedActs=state.activities.filter(a=>orgIds.includes(a.organisation_id)||people.some(p=>p.id===a.person_id))
    .sort((a,b)=>new Date(b.occurred_at)-new Date(a.occurred_at)).slice(0,15);
  const relatedAssets=state.assets_v2.filter(a=>state.entity_links.some(el=>el.source_type==='asset'&&el.source_id===a.id&&el.target_type==='organisation'&&orgIds.includes(el.target_id)));
  const relatedLessons=state.lessons_v2.filter(l=>state.entity_links.some(el=>el.source_type==='lesson'&&el.source_id===l.id&&el.target_type==='organisation'&&orgIds.includes(el.target_id)));

  const contextLines=[];
  contextLines.push('QUESTION: '+q);
  if(orgs.length) contextLines.push('\nRESOLVED ORGANISATION(S): '+orgs.map(o=>o.name).join(', '));
  if(people.length) contextLines.push('RESOLVED PERSON/PEOPLE: '+people.map(p=>p.full_name+(p.role?' ('+p.role+')':'')).join(', '));
  if(relatedActs.length){ contextLines.push('\nRELEVANT ACTIVITY (most recent first):'); relatedActs.forEach(a=>contextLines.push('- ['+fmtDate(a.occurred_at)+'] '+a.title+(a.body?': '+a.body.slice(0,400):''))); }
  if(relatedTasks.length){ contextLines.push('\nOPEN/RECENT TASKS:'); relatedTasks.forEach(t=>contextLines.push('- '+t.title+' ('+t.status+(t.due_at?', due '+t.due_at:'')+')')); }
  if(relatedMeetings.length){ contextLines.push('\nMEETINGS:'); relatedMeetings.forEach(m=>contextLines.push('- '+m.title+' ('+fmtDate(m.scheduled_at)+')')); }
  if(relatedLessons.length){ contextLines.push('\nLESSONS:'); relatedLessons.forEach(l=>contextLines.push('- '+deriveLessonTitle(l)+(l.summary?': '+l.summary:''))); }
  if(relatedAssets.length){ contextLines.push('\nASSETS:'); relatedAssets.forEach(a=>contextLines.push('- '+a.title)); }
  if(!orgs.length && !people.length) contextLines.push('\nNo specific organisation or person was recognised in the question — showing nothing rather than guessing. Try including a company or person name.');

  const prompt=contextLines.join('\n');
  document.getElementById('askResult').innerHTML =
    '<div class="grid g2"><div class="card"><div class="fl">Retrieved context</div><div class="out">'+esc(prompt)+'</div>'+
      '<button class="btn gold sm" style="margin-top:10px" onclick="copyToClipboard()">Copy to Claude</button></div>'+
      '<div class="card"><div class="fl">Sources used</div>'+
        (orgs.length?orgs.map(o=>'<div class="kv" style="cursor:pointer" onclick="go(\'organisationDetail\',\''+o.id+'\')"><span class="v">'+esc(o.name)+'</span><span class="k">organisation</span></div>').join(''):'')+
        (people.length?people.map(p=>'<div class="kv" style="cursor:pointer" onclick="go(\'personDetail\',\''+p.id+'\')"><span class="v">'+esc(p.full_name)+'</span><span class="k">person</span></div>').join(''):'')+
        ((!orgs.length&&!people.length)?'<div class="empty">No matching records.</div>':'')+
      '</div></div>';
  window._lastAskPrompt = prompt;
}
function copyToClipboard(){ navigator.clipboard.writeText(window._lastAskPrompt||''); toast('Copied'); }
async function callLLM(question, context){ return null; }

function normaliseNameLoose(s){ return (s||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim(); }
const SNAPSHOT_NAME_ALIASES={'kentatse':'Kentaste','greenkey':'Green Key','green key':'Green Key','cropnuts':'CropNuts'};
function snapshotCanonicalName(raw){
  const key=normaliseNameLoose(raw);
  return SNAPSHOT_NAME_ALIASES[key]||raw;
}
function findOrgLoose(name){
  const canon=normaliseNameLoose(snapshotCanonicalName(name));
  return state.organisations.find(o=>normaliseNameLoose(o.name)===canon);
}
async function restoreFromSnapshot(){
  const report={orgsCreated:0,orgsEnriched:0,oppsCreated:0,oppsEnriched:0,investorsCreated:0,investorsEnriched:0,decisionsCreated:0,decisionsSkipped:0,meetingsCreated:0,meetingsSkipped:0};

  // --- Organisations + opportunities ---
  for(const s of SNAPSHOT_ORGS){
    let org=findOrgLoose(s.name);
    if(!org){
      org=await dbInsert('organisations',{
        name:snapshotCanonicalName(s.name), canonical_name:normaliseNameLoose(s.name),
        organisation_type:'Prospect', pipeline_stage:s.stage, priority:s.priority||0,
        next_action_summary:s.nextAction||null, description:s.description||null,
        created_by:myProfile.display_name, updated_by:myProfile.display_name
      });
      report.orgsCreated++;
    } else {
      const patch={};
      if(!org.pipeline_stage && s.stage) patch.pipeline_stage=s.stage;
      if(!org.next_action_summary && s.nextAction) patch.next_action_summary=s.nextAction;
      if(!org.description && s.description) patch.description=s.description;
      if(!org.priority && s.priority) patch.priority=s.priority;
      if(Object.keys(patch).length){ await dbUpdate('organisations',org.id,patch); org=byId(state.organisations,org.id); report.orgsEnriched++; }
    }
    let opp=state.opportunities.find(o=>o.organisation_id===org.id);
    if(!opp){
      opp=await dbInsert('opportunities',{
        organisation_id:org.id, title:snapshotCanonicalName(s.name)+' — opportunity',
        stage:['Identified','Contacted','Meeting done','Pilot discussion','Pilot active','Proposal sent','Won','Lost','On hold'].includes(s.stage)?s.stage:'Identified',
        status:'Active', priority:s.priority||0, next_action_summary:s.nextAction||null,
        proposed_pilot:s.pilot||null, pilot_scope:s.pilot||null,
        created_by:myProfile.display_name, updated_by:myProfile.display_name
      });
      report.oppsCreated++;
    } else {
      const patch={};
      if(!opp.next_action_summary && s.nextAction) patch.next_action_summary=s.nextAction;
      if(!opp.proposed_pilot && s.pilot) patch.proposed_pilot=s.pilot;
      if(!opp.pilot_scope && s.pilot) patch.pilot_scope=s.pilot;
      if(Object.keys(patch).length){ await dbUpdate('opportunities',opp.id,patch); report.oppsEnriched++; }
    }
  }

  // --- Investors ---
  for(const s of SNAPSHOT_INVESTORS){
    let org=findOrgLoose(s.name);
    if(!org){
      org=await dbInsert('organisations',{
        name:s.name, canonical_name:normaliseNameLoose(s.name), organisation_type:'Investor',
        pipeline_stage:s.stage, next_action_summary:s.nextAction||null,
        created_by:myProfile.display_name, updated_by:myProfile.display_name
      });
      report.orgsCreated++;
    } else if(org.organisation_type!=='Investor'){
      await dbUpdate('organisations',org.id,{organisation_type:'Investor'});
      org=byId(state.organisations,org.id);
    }
    let iv=state.investor_profiles.find(x=>x.organisation_id===org.id);
    if(!iv){
      await dbInsert('investor_profiles',{
        organisation_id:org.id, stage:s.stage||null, notes:s.notes||null, next_action_summary:s.nextAction||null
      });
      report.investorsCreated++;
    } else {
      const patch={};
      if(!iv.stage && s.stage) patch.stage=s.stage;
      if(!iv.notes && s.notes) patch.notes=s.notes;
      if(!iv.next_action_summary && s.nextAction) patch.next_action_summary=s.nextAction;
      if(Object.keys(patch).length){ await dbUpdate('investor_profiles',iv.id,patch); report.investorsEnriched++; }
    }
  }

  // --- Decisions (matched by first 60 chars of decision text, to stay idempotent) ---
  for(const s of SNAPSHOT_DECISIONS){
    const key=s.text.slice(0,60);
    const exists=state.decisions.some(d=>(d.decision||'').slice(0,60)===key);
    if(exists){ report.decisionsSkipped++; continue; }
    const title=s.text.replace(/^[•\s]+/,'').split(/\s+/).slice(0,10).join(' ').replace(/[.,;:]+$/,'');
    await dbInsert('decisions',{title:title.slice(0,200), decision:s.text, decided_at:s.date, created_by:myProfile.display_name, updated_by:myProfile.display_name});
    report.decisionsCreated++;
  }

  // --- Meetings (matched by org + date) ---
  for(const s of SNAPSHOT_MEETINGS){
    const org=findOrgLoose(s.org);
    if(!org) continue;
    const exists=state.meetings.some(m=>m.organisation_id===org.id && (m.scheduled_at||'').slice(0,10)===s.date);
    if(exists){ report.meetingsSkipped++; continue; }
    const isPast=s.date<today();
    const created=await dbInsert('meetings',{
      title:org.name+' — meeting', organisation_id:org.id, scheduled_at:s.date+'T09:00:00',
      meeting_status:isPast?'Completed':'Scheduled', objective:s.objective||null,
      notes:s.notes||null, next_steps:s.nextSteps||null,
      created_by:myProfile.display_name, updated_by:myProfile.display_name
    });
    if(s.notes) await logActivity({activity_type:'Meeting', title:'Meeting notes (restored from Snapshot): '+org.name, body:s.notes, organisation_id:org.id, meeting_id:created.id});
    report.meetingsCreated++;
  }

  renderCurrent();
  return report;
}
async function runSnapshotRestore(){
  toast('Restoring from Snapshot — this may take a moment…');
  const r=await restoreFromSnapshot();
  openModal('<h3>Snapshot restoration complete</h3>'+
    kv('Organisations created',r.orgsCreated)+kv('Organisations enriched',r.orgsEnriched)+
    kv('Opportunities created',r.oppsCreated)+kv('Opportunities enriched',r.oppsEnriched)+
    kv('Investor profiles created',r.investorsCreated)+kv('Investor profiles enriched',r.investorsEnriched)+
    kv('Decisions created',r.decisionsCreated)+kv('Decisions already present (skipped)',r.decisionsSkipped)+

}

    body='<div class="grid g2" style="margin-bottom:18px">'+
      stat(open.length,'Outstanding')+stat(resolved.length,'Resolved this session')+

      :'<div class="empty"><div class="empty-ico">✓</div>Nothing outstanding — every migration item has been reviewed.</div>')+
    (duplicates.length?'<div class="dsec"><div class="dsec-h"><h2>Duplicates (already matched to an existing record — no action needed)</h2><span class="count">'+duplicates.length+'</span></div>'+
      '<div class="dlist">'+duplicates.slice(0,20).map(m=>migrationReviewRow(m,true)).join('')+'</div>'+

  return '<div class="page-head"><div><div class="eyebrow">System</div><div class="page-title">Settings</div></div></div>'+
    '<div class="tabs">'+tabs.map(([id,label])=>'<div class="tab'+(tab===id?' active':'')+'" onclick="route.tab=\''+id+'\';renderCurrent()">'+label+'</div>').join('')+'</div>'+
    body;
}
function migrationReviewRow(m,readonly){
  return '<div class="drow" style="align-items:flex-start;padding:12px" onclick="'+(readonly?'void(0)':"reviewMigrationItem('"+m.id+"')")+'">'+
    '<div class="drow-main"><div class="drow-title">'+esc(m.step||'')+' · '+esc(m.source_table||'')+'</div>'+
    '<div class="drow-meta" style="white-space:normal">'+esc(m.detail||'No detail recorded.')+'</div></div>'+
    '<div class="drow-right">'+fmtDate(m.created_at)+'</div></div>';
}
function reviewMigrationItem(id){
  const m=byId(state.migration_log,id); if(!m) return;
  const hasTarget=m.target_table && m.target_id;
  openModal('<h3>Migration item</h3>'+
    kv('Step',esc(m.step))+kv('Source',esc(m.source_table)+' · '+esc(m.source_id||''))+
    (hasTarget?kv('Target',esc(m.target_table)+' · linked record'):'')+kv('Status',esc(m.status))+
    '<div class="field" style="margin-top:10px"><label class="fl">Detail</label><div style="font-size:12.5px;white-space:pre-wrap">'+esc(m.detail||'—')+'</div></div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px">'+
      (hasTarget?'<button class="btn sm gold" onclick="fixMigrationItem(\''+id+'\')">Fix — open record</button>':'')+
      '<button class="btn sm" onclick="resolveMigrationItem(\''+id+'\',\'accept\')">Accept</button>'+
      '<button class="btn sm" onclick="resolveMigrationItem(\''+id+'\',\'resolve\')">Mark resolved</button>'+
      '<button class="btn sm" onclick="resolveMigrationItem(\''+id+'\',\'ignore\')">Ignore</button>'+
    '</div>');
}
async function resolveMigrationItem(id,action){
  const m=byId(state.migration_log,id); if(!m) return;
  const newStatus = action==='ignore' ? 'skipped' : 'ok';
  const label = action==='accept'?'Accepted':action==='resolve'?'Resolved':'Ignored';
  const detail=(m.detail||'')+' [Migration review: '+label+' by '+myProfile.display_name+' on '+today()+']';
  await dbUpdate('migration_log', id, {status:newStatus, detail});
  closeModal(); renderCurrent(); refreshUnreadBadge(); toast(label);
}
function fixMigrationItem(id){
  const m=byId(state.migration_log,id); if(!m) return;
  closeModal();
  const routeMap={organisations:'organisationDetail', people:'personDetail', opportunities:'opportunityDetail',
    meetings:'meetingDetail', lessons_v2:'lessons', assets_v2:'assetDetail', investor_profiles:'investors', team_messages_v2:'lessons'};
  const page=routeMap[m.target_table];
  if(page && (page.endsWith('Detail'))) go(page, m.target_id);
  else if(page) go(page);
  else toast('No direct record to open for this item — resolve it manually, then mark Accepted/Resolved.');
}

--------------------------------------------------------------------------- */
function buildSnapshotMarkdown(){
  const now=new Date();
  const openTasksList=openTasks().sort((a,b)=>(a.due_at||'9999').localeCompare(b.due_at||'9999'));
  const overdue=openTasksList.filter(t=>t.due_at&&t.due_at<today());
  const waiting=openTasksList.filter(t=>t.status==='Waiting for Response');
  const activeOpps=state.opportunities.filter(o=>o.status==='Active').sort((a,b)=>(b.priority||0)-(a.priority||0));
  const upcomingMeetings=state.meetings.filter(m=>m.meeting_status==='Scheduled'&&new Date(m.scheduled_at)>=now).sort((a,b)=>new Date(a.scheduled_at)-new Date(b.scheduled_at));
  const recentMeetings=state.meetings.filter(m=>m.meeting_status==='Completed').sort((a,b)=>new Date(b.scheduled_at)-new Date(a.scheduled_at)).slice(0,10);
  const recentDecisions=[...state.decisions].sort((a,b)=>new Date(b.decided_at)-new Date(a.decided_at)).slice(0,15);
  const openObjections=state.objections.filter(x=>x.status==='Open');
  const investors=state.investor_profiles;
  const next30=openTasksList.filter(t=>t.due_at && daysUntil(t.due_at)<=30 && daysUntil(t.due_at)>=0);

  let md = '# Kweli Brain Snapshot\n\nGenerated: '+now.toLocaleString('en-GB')+'\n\n---\n\n';
  md += '## Current Priorities\n\n';
  const urgent=openTasksList.filter(t=>t.priority==='Urgent');
  md += urgent.length ? urgent.map(t=>'- **'+orgName(t.organisation_id)+'** — '+t.title+' (due '+fmtDate(t.due_at)+')\n').join('') : '_None currently._\n';

  md += '\n---\n\n## Active Opportunities\n\n';
  activeOpps.forEach(o=>{ md += '### '+orgName(o.organisation_id)+' — '+o.title+'\n\nStage: '+o.stage+'  \nNext Action: '+(o.next_action_summary||'—')+'  \nLast Updated: '+fmtDate(o.updated_at)+'\n\n'; });
  if(!activeOpps.length) md += '_None currently._\n';

  md += '\n---\n\n## Overdue Follow-ups\n\n';
  md += overdue.length ? overdue.map(t=>'- **'+orgName(t.organisation_id)+'** — '+t.title+' (was due '+fmtDate(t.due_at)+')\n').join('') : '_None._\n';

  md += '\n---\n\n## Waiting For Response\n\n';
  md += waiting.length ? waiting.map(t=>'- **'+orgName(t.organisation_id)+'** — '+t.title+' (next check '+fmtDate(t.due_at)+')\n').join('') : '_None._\n';

  md += '\n---\n\n## Upcoming Meetings\n\n';
  md += upcomingMeetings.length ? upcomingMeetings.map(m=>'- '+fmtDate(m.scheduled_at)+' — '+orgName(m.organisation_id)+' — '+m.title+'\n').join('') : '_None currently._\n';

  md += '\n---\n\n## Recent Meetings\n\n';
  md += recentMeetings.length ? recentMeetings.map(m=>'- '+fmtDate(m.scheduled_at)+' — **'+orgName(m.organisation_id)+'** — '+(m.outcomes||m.title)+'\n').join('') : '_None recently._\n';

  md += '\n---\n\n## Recent Decisions\n\n';
  md += recentDecisions.length ? recentDecisions.map(d=>'- '+fmtDate(d.decided_at)+' — **'+d.title+'**: '+d.decision+'\n').join('') : '_None recorded._\n';

  md += '\n---\n\n## Current Risks\n\n';
  md += openObjections.length ? ('- Unresolved objections logged for: '+[...new Set(openObjections.map(x=>orgName(x.organisation_id)))].join(', ')+'\n') : '_None flagged._\n';

  md += '\n---\n\n## Investors\n\n';
  investors.forEach(iv=>{ const label = iv.organisation_id?orgName(iv.organisation_id):(iv.person_id?(byId(state.people,iv.person_id)||{}).full_name:'Investor'); md += '- **'+label+'** — '+(iv.stage||'—')+' — next: '+(iv.next_action_summary||'—')+'\n'; });
  if(!investors.length) md += '_None recorded._\n';

  md += '\n---\n\n## Metrics\n\n| Metric | Value |\n| --- | --- |\n';
  md += '| Open Opportunities | '+activeOpps.length+' |\n| Overdue Follow-ups | '+overdue.length+' |\n| Waiting For Response | '+waiting.length+' |\n| Meetings Scheduled | '+upcomingMeetings.length+' |\n| Investors | '+investors.length+' |\n';

  md += '\n---\n\n## Next 30 Days\n\n';
  md += next30.length ? next30.map(t=>'- **'+orgName(t.organisation_id)+'** — '+t.title+' (due '+fmtDate(t.due_at)+')\n').join('') : '_Nothing scheduled._\n';

  return md;
}
