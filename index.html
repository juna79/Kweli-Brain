<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kweli Brain — The Institutional Intelligence Platform</title>
<style>
  :root{
    --bg:#070E14; --panel:#0E1E2A; --panel2:#122636; --raise:#16303F;
    --line:rgba(255,255,255,.07); --line-s:rgba(255,255,255,.12);
    --txt:#EAF1F4; --muted:#90A6B2; --faint:#5E7785;
    --gold:#C9A24B; --gold-d:#A6822F; --gold-soft:rgba(201,162,75,.13);
    --green:#46B98A; --amber:#E0A340; --red:#E0654B;
    --r:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-size:14px;line-height:1.55;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:var(--gold);text-decoration:none}
  ::selection{background:rgba(201,162,75,.28)}
  .serif{font-family:Georgia,"Times New Roman",serif}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .muted{color:var(--muted)} .faint{color:var(--faint)}

  /* layout */
  .app{display:flex;min-height:100vh}
  .sidebar{width:236px;flex:none;background:#060B10;border-right:1px solid var(--line);
    position:fixed;inset:0 auto 0 0;padding:24px 16px;overflow-y:auto;z-index:40;transition:transform .22s ease}
  .main{flex:1;margin-left:236px;min-width:0;display:flex;flex-direction:column}
  .brand{display:flex;align-items:center;gap:12px;padding:2px 8px 22px}
  .brand-mark{width:36px;height:36px;border-radius:9px;flex:none;display:grid;place-items:center;
    background:linear-gradient(145deg,var(--gold),#6f571f);color:#070E14;font-weight:800;font-size:19px;font-family:ui-monospace,monospace}
  .brand-name{font-weight:660;font-size:15.5px;letter-spacing:-.01em;line-height:1.1}
  .brand-sub{font-size:9.5px;color:var(--faint);letter-spacing:.13em;text-transform:uppercase;font-family:ui-monospace,monospace;margin-top:3px}
  .nav{display:flex;flex-direction:column;gap:1px;margin-top:4px}
  .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:9px;color:var(--muted);
    cursor:pointer;font-size:13.5px;font-weight:500}
  .nav-item:hover{color:var(--txt);background:var(--panel)}
  .nav-item.active{color:var(--txt);background:var(--panel2)}
  .nav-item.active .ico{color:var(--gold)}
  .nav-item .ico{width:17px;height:17px;flex:none;color:var(--faint)}
  .nav-badge{margin-left:auto;font-size:10px;font-family:ui-monospace,monospace;background:var(--red);color:#fff;border-radius:9px;padding:1px 7px;font-weight:700}
  .nav-sect{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-family:ui-monospace,monospace;padding:18px 12px 7px}

  /* top bar */
  .topbar{display:flex;align-items:center;gap:14px;padding:14px 34px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:rgba(7,14,20,.86);backdrop-filter:blur(10px);z-index:30}
  .hamb{display:none;background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--txt);width:38px;height:38px;cursor:pointer;font-size:18px}
  .searchwrap{position:relative;flex:1;max-width:560px}
  .searchwrap .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--faint)}
  #globalSearch{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:11px;color:var(--txt);
    padding:11px 14px 11px 38px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
  #globalSearch:focus{border-color:var(--gold)}
  .search-panel{position:absolute;top:52px;left:0;right:0;background:var(--panel);border:1px solid var(--line-s);border-radius:13px;
    box-shadow:0 24px 60px -22px rgba(0,0,0,.8);max-height:60vh;overflow-y:auto;z-index:50;padding:8px}
  .search-group-h{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-family:ui-monospace,monospace;padding:10px 12px 5px}
  .search-res{padding:9px 12px;border-radius:9px;cursor:pointer;display:flex;gap:10px;align-items:baseline}
  .search-res:hover{background:var(--panel2)}
  .search-res .r-title{font-size:13.5px;color:var(--txt)}
  .search-res .r-sub{font-size:11.5px;color:var(--faint);margin-left:auto;white-space:nowrap}
  .search-res .r-snip{font-size:12px;color:var(--muted);margin-top:2px;display:block}
  .search-empty{padding:18px 14px;color:var(--faint);font-size:13px;text-align:center}

  .content{padding:38px 34px 90px;max-width:1120px;margin:0 auto;width:100%}
  .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:35}
  .scrim.show{display:block}

  /* headings */
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:30px;flex-wrap:wrap}
  .eyebrow{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
  .page-title{font-size:26px;font-weight:660;letter-spacing:-.02em;margin-top:6px}
  .page-sub{font-size:13.5px;color:var(--muted);margin-top:5px}
  .greeting{font-size:13px;color:var(--muted);font-family:ui-monospace,monospace;letter-spacing:.04em}

  /* cards */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:22px}
  .sec{margin-bottom:30px}
  .sec-h{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .sec-h h2{font-size:13px;font-weight:600;letter-spacing:.02em;margin:0}
  .sec-h .count{font-family:ui-monospace,monospace;font-size:11px;color:var(--faint);margin-left:auto}
  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:1fr 1fr}
  .g-auto{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}

  /* action row item (dashboard / followups) */
  .row-item{display:flex;align-items:center;gap:14px;padding:15px 18px;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;cursor:pointer;margin-bottom:9px;transition:border-color .15s}
  .row-item:hover{border-color:var(--line-s)}
  .row-item.alert{border-color:rgba(224,101,75,.4)}
  .udot{width:9px;height:9px;border-radius:50%;flex:none}
  .row-icon{width:20px;flex:none;text-align:center;font-size:14px;line-height:1}
  .row-main{flex:1;min-width:0}
  .row-title{font-size:14.5px;font-weight:560}
  .row-meta{font-size:12px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row-right{font-size:11.5px;font-family:ui-monospace,monospace;white-space:nowrap}

  /* ===== Dense dashboard layout (Today page only) — Bloomberg/Linear-style
     information density. Deliberately separate from .card/.sec/.row-item so
     every other page in the app keeps its normal spacing untouched. ===== */
  .content.content-wide{max-width:1720px;padding-top:20px;padding-bottom:14px}
  .dash-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:4px;flex-wrap:wrap}
  .dash-head .page-title{font-size:18px;margin-top:1px}
  .dash-head .greeting{font-size:11.5px}
  .dstat-row{display:flex;align-items:baseline;gap:22px;flex-wrap:wrap;margin:0 0 18px;padding:11px 16px;
    background:var(--panel);border:1px solid var(--line);border-radius:9px}
  .dstat{display:flex;align-items:baseline;gap:6px}
  .dstat-val{font-family:ui-monospace,monospace;font-size:14px;font-weight:700;color:var(--txt)}
  .dstat-lbl{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em}
  .dash-grid{display:grid;grid-template-columns:2.35fr 1fr;gap:18px;align-items:start}
  .dash-grid>div{min-width:0} /* critical: without this, unwrapped text forces the grid track wider than its fr share */
  @media(max-width:1100px){.dash-grid{grid-template-columns:1fr}}
  .dsec{margin-bottom:13px}
  .dsec:last-child{margin-bottom:0}
  .dsec-h{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .dsec-h h2{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:650;
    font-family:ui-monospace,monospace;margin:0}
  .dsec-h .count{font-family:ui-monospace,monospace;font-size:10px;color:var(--faint);margin-left:auto}
  /* Today's Priorities is the page's focal point — a visible accent bar and
     larger rows than every other (deliberately quieter) section. */
  .dsec-primary{border-left:2px solid var(--gold);padding:2px 0 8px 12px;margin:0 0 12px -1px;background:linear-gradient(90deg,rgba(212,168,83,.05),transparent 60%)}
  .dsec-primary .dsec-h h2{font-size:13px;color:var(--txt);text-transform:none;letter-spacing:0;font-family:inherit;font-weight:650}
  .dsec-primary .drow{padding:7px 10px;font-size:13px;margin-bottom:1px}
  .dsec-primary .drow-icon{font-size:13px}
  .dcard{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:11px}
  .dlist{overflow-y:auto}
  .dlist::-webkit-scrollbar{width:5px}
  .dlist::-webkit-scrollbar-thumb{background:var(--line-s);border-radius:3px}
  .drow{display:flex;align-items:center;gap:9px;padding:6px 9px;border-radius:6px;cursor:pointer;
    transition:background .12s;font-size:12px;line-height:1.3;min-width:0}
  .drow:hover{background:var(--panel2)}
  .drow.alert{background:rgba(224,101,75,.09)}
  .drow-icon{width:15px;flex:none;text-align:center;font-size:11px;line-height:1}
  .drow-dot{width:6px;height:6px;border-radius:50%;flex:none}
  .drow-main{flex:1;min-width:0;overflow:hidden}
  .drow-title{font-weight:560;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .drow-meta{font-size:10px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .drow-right{font-size:9.5px;flex:none;font-family:ui-monospace,monospace;white-space:nowrap;color:var(--faint)}
  .dempty{padding:8px 7px;font-size:11px;color:var(--faint)}
  .dintel-compact{padding:8px 10px;overflow-x:hidden}
  .dintel-line{font-size:11.5px;line-height:1.9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dintel-tag{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);
    font-family:ui-monospace,monospace;margin-right:9px}
  .dintel-link{color:var(--txt);cursor:pointer}
  .dintel-link:hover{color:var(--gold)}
  .dintel-sep{color:var(--faint)}
  .dintel-more{color:var(--gold);cursor:pointer;font-size:10px;margin-left:8px;white-space:nowrap}
  .dintel-more:hover{text-decoration:underline}
  .score{flex:none;width:40px;height:40px;border-radius:10px;display:grid;place-items:center;font-weight:740;font-size:14px;font-family:ui-monospace,monospace;border:1px solid var(--line)}

  /* chips */
  .chip{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;padding:4px 11px;border-radius:30px;border:1px solid var(--line);background:var(--panel2);color:var(--muted)}
  .chip .dot{width:7px;height:7px;border-radius:50%}
  .warm{color:var(--green)} .cold{color:var(--faint)}

  /* company / people cards */
  .ent-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;cursor:pointer;
    display:flex;flex-direction:column;gap:11px;transition:border-color .15s}
  .ent-card:hover{border-color:var(--gold)}
  .ent-card.alert{border-color:rgba(224,101,75,.45)}
  .ent-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .ent-name{font-size:16px;font-weight:600;letter-spacing:-.01em}
  .ent-sub{font-size:11.5px;color:var(--faint);font-family:ui-monospace,monospace;margin-top:3px}
  .ent-line{display:flex;align-items:center;gap:9px;flex-wrap:wrap;font-size:12.5px;color:var(--muted)}
  .ent-next{font-size:13px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 11px;line-height:1.45}
  .ent-next .lbl{display:block;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);font-family:ui-monospace,monospace;margin-bottom:3px}

  /* lesson cards */
  .lesson-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:stretch}
  @media(max-width:1020px){.lesson-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:620px){.lesson-grid{grid-template-columns:1fr}}
  .lesson-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;cursor:pointer;
    display:flex;flex-direction:column;gap:10px;transition:border-color .15s}
  .lesson-card:hover{border-color:var(--gold)}
  .lc-top{display:flex;align-items:flex-start;gap:9px}
  .lc-ico{font-size:14px;line-height:1.4;flex:none}
  .lc-title{font-size:14.5px;font-weight:620;line-height:1.35;letter-spacing:-.01em;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .lc-chips{display:flex;flex-wrap:wrap;gap:6px}
  .lc-chips .chip{padding:3px 10px;font-size:10.5px}
  .lc-lbl{font-size:9px;font-family:ui-monospace,monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:4px}
  .lc-why-text{font-size:12.5px;color:#DCE7EC;line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .lc-body{font-size:12.5px;color:var(--muted);line-height:1.55;white-space:pre-wrap;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .lc-body.lc-expanded{display:block;-webkit-line-clamp:unset;overflow:visible}
  .lc-more{align-self:flex-start;background:none;border:none;color:var(--gold);font-size:11.5px;
    font-family:inherit;cursor:pointer;padding:0}
  .lc-more:hover{text-decoration:underline}
  .lc-foot{margin-top:auto;padding-top:8px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .lc-date{font-size:10.5px;color:var(--faint);font-family:ui-monospace,monospace}
  .lc-related{padding-top:10px;border-top:1px dashed var(--line)}
  .lc-rel-item{font-size:11.5px;color:var(--muted);padding:4px 0;cursor:pointer}
  .lc-rel-item:hover{color:var(--gold)}

  /* asset cards — thumbnail-first "document library" layout */
  .assets-grid{display:grid;gap:16px;grid-template-columns:repeat(3,1fr)}
  @media(max-width:1020px){.assets-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:620px){.assets-grid{grid-template-columns:1fr}}
  .asset-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);cursor:pointer;
    display:flex;flex-direction:column;overflow:hidden;transition:border-color .15s,transform .15s,box-shadow .15s}
  .asset-card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 16px 36px -20px rgba(0,0,0,.6)}
  .a-thumb{position:relative;width:100%;aspect-ratio:4/3;flex:none;background:var(--panel2);overflow:hidden}
  .a-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s ease}
  .asset-card:hover .a-thumb img{transform:scale(1.035)}
  .a-thumb-fallback{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;height:100%;
    background:linear-gradient(160deg,var(--panel2),var(--raise))}
  .a-thumb-fallback .a-thumb-ico{font-size:32px;line-height:1}
  .a-thumb-fallback .a-thumb-label{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-family:ui-monospace,monospace}
  .a-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1;min-height:0}
  .a-title{font-size:14.5px;font-weight:620;line-height:1.32;letter-spacing:-.01em;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .a-sub{font-size:11.5px;color:var(--faint);font-family:ui-monospace,monospace}
  .a-desc{font-size:12.5px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .a-chips{display:flex;flex-wrap:wrap;gap:6px;max-height:23px;overflow:hidden}
  .a-chips .chip{padding:3px 10px;font-size:10.5px}
  .a-foot{margin-top:auto;padding-top:9px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;
    font-size:10.5px;color:var(--faint);font-family:ui-monospace,monospace}
  .a-preview{width:100%;border-radius:10px;border:1px solid var(--line);overflow:hidden;background:var(--bg)}
  .a-preview img{width:100%;display:block}
  .a-preview iframe{width:100%;height:480px;border:none;display:block}
  .a-dropzone{border:1px dashed var(--line-s);border-radius:12px;padding:22px;text-align:center;cursor:pointer;transition:border-color .15s;font-size:13px;color:var(--muted)}
  .a-dropzone:hover{border-color:var(--gold)}
  .a-dropzone.has-file{border-color:var(--green);border-style:solid}

  /* buttons / inputs */
  .btn{background:var(--panel2);border:1px solid var(--line-s);color:var(--txt);border-radius:10px;padding:10px 16px;
    font-size:13px;font-weight:540;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:8px;white-space:nowrap;transition:all .15s}
  .btn:hover{border-color:var(--gold)}
  .btn.gold{background:var(--gold);color:#070E14;border-color:var(--gold);font-weight:660}
  .btn.gold:hover{filter:brightness(1.08)}
  .btn.sm{padding:7px 12px;font-size:12px;border-radius:9px}
  .btn.ghost{background:transparent}
  .btn.danger:hover{border-color:var(--red);color:var(--red)}
  .btn .ico{width:15px;height:15px}
  .input,.select,textarea.input{width:100%;background:var(--bg);border:1px solid var(--line-s);border-radius:10px;color:var(--txt);
    padding:11px 13px;font-size:13.5px;font-family:inherit;outline:none;transition:border-color .15s}
  .input:focus,.select:focus,textarea.input:focus{border-color:var(--gold)}
  textarea.input{resize:vertical;line-height:1.55}
  .select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' stroke='%2390A6B2' stroke-width='1.4' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 13px center;padding-right:32px}
  label.fl{display:block;font-size:10px;color:var(--muted);font-family:ui-monospace,monospace;letter-spacing:.11em;text-transform:uppercase;margin:0 0 7px}
  .field{margin-bottom:15px}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .toolbar{display:flex;gap:11px;align-items:center;flex-wrap:wrap;margin-bottom:22px}
  .toolbar .input,.toolbar .select{width:auto}
  .toolbar .search-in{flex:1;min-width:180px}
  .seg{display:inline-flex;border:1px solid var(--line-s);border-radius:10px;overflow:hidden}
  .seg button{background:transparent;border:none;color:var(--muted);padding:8px 14px;font-size:12.5px;cursor:pointer;font-family:inherit}
  .seg button.active{background:var(--panel2);color:var(--gold)}
  .right{margin-left:auto}

  /* detail */
  .detail-grid{display:grid;grid-template-columns:1.55fr 1fr;gap:18px;align-items:start}
  .kv{display:flex;flex-direction:column;gap:3px;padding:11px 0;border-bottom:1px solid var(--line)}
  .kv:last-child{border-bottom:none}
  .kv .k{font-size:9.5px;font-family:ui-monospace,monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
  .kv .v{font-size:14px;word-break:break-word}
  .block{margin-top:20px}
  .block h4{font-size:10px;font-family:ui-monospace,monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin:0 0 10px}
  .prose{white-space:pre-wrap;font-family:Georgia,"Times New Roman",serif;font-size:14.5px;line-height:1.65;color:#DCE7EC}

  /* timeline */
  .timeline{list-style:none;margin:0;padding:0}
  .timeline li{position:relative;padding:0 0 18px 22px;border-left:1px solid var(--line);margin-left:5px}
  .timeline li:last-child{border-left-color:transparent;padding-bottom:0}
  .timeline li::before{content:"";position:absolute;left:-5px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--gold);border:2px solid var(--bg)}
  .t-meta{font-size:9.5px;font-family:ui-monospace,monospace;letter-spacing:.06em;color:var(--faint);text-transform:uppercase}
  .t-text{font-size:13.5px;margin-top:3px}
  .t-type{color:var(--gold)}

  /* prompt / workspace output */
  .out{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:18px;white-space:pre-wrap;
    font-family:ui-monospace,monospace;font-size:12.5px;line-height:1.62;color:#C6D6DD;max-height:520px;overflow:auto}

/* dates */
function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function today(){return iso(new Date())}
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return iso(d)}
function fmtDate(s){if(!s)return"";return new Date(s+"T00:00:00").toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"})}
function daysUntil(s){if(!s)return null;return Math.round((new Date(s+"T00:00:00")-new Date(today()+"T00:00:00"))/864e5)}
function uid(p){try{if(crypto&&crypto.randomUUID)return crypto.randomUUID();}catch(e){}return (p||'o')+Math.random().toString(36).slice(2,9)+Math.random().toString(36).slice(2,9);}

/* ====== Marketing Assistant — data model & persistence ======
   Two kinds of items, deliberately kept separate from `state` (the shared
   Supabase-backed CRM data) so it can never be wiped out by the several
   places in this app that wholesale-replace `state` (legacyLoad, resetDemo,
   importData, the offline cache fallback in fetchAll). It's its own small
   localStorage store — see Settings for the upgrade path if this should
   ever become shared/cross-device.

   1) `engine` — the 7 slots of the annual plan (Mon–Fri + monthly + quarterly).
      Each slot just tracks {dueDate, status/completed, index}. The index is a
      pointer into that slot's content queue (e.g. ARTICLE_QUEUE) — completing
      a slot logs it, advances the pointer to the next item, and pushes the due
      date forward by the slot's cadence. Nothing to configure, nothing to pick:
      the title always comes from wherever the pointer currently sits. Miss a
      week and the pointer simply doesn't move — it stays overdue and keeps
      showing until you catch up.
   2) `custom` — your own one-off reminders (follow-ups, ad hoc things) using
      the same simple fields as before: title, due date, optional repeat,
      priority, notes, completed. */
const MK_STORE='kweli_marketing_v3';
function mkEngineSlot(key,o){const def=MK_ENGINE_DEF[key];
  return Object.assign({dueDate:def.weekday!=null?nextWeekday(def.weekday):(def.repeat==='monthly'?nextMonthFirst():nextQuarterFirst()),
    status:'not_started',index:0},o||{});}
function defaultEngine(){const e={};Object.keys(MK_ENGINE_DEF).forEach(k=>e[k]=mkEngineSlot(k));return e;}
function mkReminder(o){return Object.assign({id:uid('rem'),title:'',dueDate:today(),repeat:'',priority:'Medium',
  notes:'',completed:false,completedDate:''},o||{});}
function defaultMk(){return {engine:defaultEngine(),custom:[],completions:[]};}
function migrateMk(m){
  if(!m||typeof m!=='object')return null;
  if(!m.engine||!Array.isArray(m.custom))return null; // old/foreign shape — caller will seed fresh instead
  const engine={};Object.keys(MK_ENGINE_DEF).forEach(k=>{engine[k]=mkEngineSlot(k,m.engine[k]||{});});
  return {engine,custom:m.custom.map(r=>mkReminder(r)),completions:m.completions||[]};
}
function nextWeekday(targetDow){const d=new Date();let add=(targetDow-d.getDay()+7)%7;if(add===0)add=7;d.setDate(d.getDate()+add);return iso(d);}
function nextMonthFirst(){const d=new Date();d.setMonth(d.getMonth()+1);d.setDate(1);return iso(d);}
function nextQuarterFirst(){const d=new Date();const q=Math.floor(d.getMonth()/3);d.setMonth(q*3+3);d.setDate(1);return iso(d);}
function loadMarketing(){
  try{const raw=localStorage.getItem(MK_STORE);if(raw){const m=migrateMk(JSON.parse(raw));if(m)return m;}}catch(e){}
  const fresh=defaultMk();
  try{localStorage.setItem(MK_STORE,JSON.stringify(fresh));}catch(e){}
  return fresh;
}
function saveMarketing(){try{localStorage.setItem(MK_STORE,JSON.stringify(mk));}catch(e){}}
function byMkReminder(id){return mk.custom.find(r=>r.id===id)}
let mk=loadMarketing(); // Marketing Assistant data — own localStorage store, independent of `state` (see note above loadMarketing()).

  saveRecent();
}

/* ---- offline pending queue ---- */
function loadPending(){try{return JSON.parse(localStorage.getItem(PENDING)||'[]');}catch(e){return[];}}
function savePending(q){try{localStorage.setItem(PENDING,JSON.stringify(q));}catch(e){}}
/* A genuine network failure means the request never reached Supabase / never got a
   response at all (fetch throws — e.g. TypeError: Failed to fetch, DNS failure, no
   connection). A Supabase/PostgREST error (bad column, RLS, validation) means the
   request DID reach the server and got a real response — that is not "offline".
   The supabase-js client only throws for the former; it returns {error:...} for the
   latter — so the try/catch below vs. the res.error check below are how we tell them apart. */
async function sync(table,op,payload){
  if(!CLOUD)return false;
  let res;
  try{
    if(op==='upsert')res=await sb.from(table).upsert(payload, table==='brain_sections'?{onConflict:'section_key'}:undefined);
    else if(op==='delete')res=await sb.from(table).delete().eq('id',payload);
  }catch(e){
    // The request itself never completed — this is a real connectivity problem.
    console.error('Supabase sync error',{table,op,payload,error:e,networkFailure:true});
    online=false;
    const q=loadPending();q.push({table,op,payload});savePending(q);
    updateStatus();
    toast('Offline — could not reach the server to save '+table+' ('+op+'). Will retry.');
    return false;
  }
  if(res&&res.error){
    // We got a real response from Supabase — connectivity is fine, the write itself
    // was rejected (missing column, RLS policy, bad value, duplicate key, etc).
    // Never mark offline for this — surface the real error instead.
    console.error('Supabase sync error',{table,op,payload,error:res.error});
    if(!online){online=true;}
    updateStatus();
    toast('Save failed: '+table+' '+op+' error. Check console.');
    return false;
  }
  if(!online){online=true;updateStatus();}
  return true;
}
async function trySyncPending(){
  if(!CLOUD)return;const q=loadPending();if(!q.length)return;
  const remain=[];let hadNetworkFailure=false;
  for(const it of q){
    try{
      let r;
      if(it.op==='upsert')r=await sb.from(it.table).upsert(it.payload,it.table==='brain_sections'?{onConflict:'section_key'}:undefined);
      else r=await sb.from(it.table).delete().eq('id',it.payload);
      if(r&&r.error){
        // Reached the server, write rejected — drop it from the retry queue (it will
        // never succeed unattended) and surface the real error instead of looping forever.
        console.error('Supabase sync error',{table:it.table,op:it.op,payload:it.payload,error:r.error});
        toast('Save failed: '+it.table+' '+it.op+' error. Check console.');
      }
    }catch(e){
      console.error('Supabase sync error',{table:it.table,op:it.op,payload:it.payload,error:e,networkFailure:true});
      remain.push(it);hadNetworkFailure=true;
    }
  }
  savePending(remain);online=!hadNetworkFailure;updateStatus();
  if(online&&remain.length===0){await fetchAll();render();toast('Synced pending changes');}
}

/* ---- cloud fetch / sync ---- */
/* Fetch a single table, never letting a per-table failure reject the outer Promise.all.
   Distinguishes: (a) genuine network failure — the request never reached Supabase
   (fetch throws) — from (b) a real response that came back with an error (RLS,
   missing column, permission, validation, etc). Only (a) is a connectivity problem. */
function fetchTableSafe(t){
  return sb.from(t).select('*').then(res=>{
    if(res.error){
      console.error('fetchAll table error',{table:t,error:res.error});
      toast('Read failed: '+t+'. Check console.');
      return {table:t,ok:false,networkFailure:false,data:null};
    }
    return {table:t,ok:true,networkFailure:false,data:res.data||[]};
  }).catch(e=>{
    console.error('fetchAll table error',{table:t,error:e,networkFailure:true});
    return {table:t,ok:false,networkFailure:true,data:null};
  });
}
async function fetchAll(){
  const tables=['opportunities','people','lessons','brain_sections','timeline_events','assets'];
  const results=await Promise.all(tables.map(fetchTableSafe));
  const raw={};results.forEach(r=>{raw[r.table]=r;});
  const anyNetworkFailure=results.some(r=>r.networkFailure);
  if(anyNetworkFailure){
    // A genuine connectivity problem — fall back to the last known-good cached
    // snapshot, exactly as before, and mark the app Offline.
    online=false;updateStatus();
    try{const c=JSON.parse(localStorage.getItem(CACHE));if(c){state=c;state.brain=migrateBrain(state.brain);state.opps.forEach(op=>op.timeline=op.timeline||[]);state.assets=state.assets||[];}}catch(_){}
    return false;
  }
  // We reached the server for every table — connectivity is fine. Any individual
  // table that came back with a read error (RLS/schema/permission) just keeps its
  // existing in-memory data rather than being wiped; every other table still updates.
  if(raw.opportunities.ok)state.opps=raw.opportunities.data.map(rowToOpp);
  if(raw.people.ok)state.people=raw.people.data.map(rowToPerson);
  if(raw.lessons.ok)state.lessons=raw.lessons.data.map(rowToLesson);
  if(raw.assets.ok)state.assets=raw.assets.data.map(rowToAsset);
  if(raw.brain_sections.ok){
    const nb=defaultBrain();
    if(raw.brain_sections.data.length){raw.brain_sections.data.forEach(r=>{nb[r.section_key]=r.content;});}
    state.brain=nb;
    if(!raw.brain_sections.data.length){
      for(const [k,label] of BRAIN_SECTIONS){
        try{
          const r=await sb.from('brain_sections').upsert({section_key:k,title:label,content:nb[k]},{onConflict:'section_key'});
          if(r&&r.error)console.error('fetchAll table error',{table:'brain_sections',error:r.error});
        }catch(e){console.error('fetchAll table error',{table:'brain_sections',error:e});}
      }
    }
  }
  if(raw.timeline_events.ok){
    const byOpp={};raw.timeline_events.data.forEach(r=>{(byOpp[r.opportunity_id]=byOpp[r.opportunity_id]||[]).push({date:r.date,type:r.type,text:r.text});});
    state.opps.forEach(op=>{op.timeline=(byOpp[op.id]||[]).sort((a,b)=>(a.date||'').localeCompare(b.date||''));});
  }else{
    state.opps.forEach(op=>{op.timeline=op.timeline||[];});
  }
  online=true;cacheSave();updateStatus();
  return true;
}

/* ============ CONNECTED DATA MODEL ============
   Enter once, reference everywhere, never duplicate.
   People + Lessons are backed by real synced tables, so links use existing
   columns (companyId / related / source) — no schema changes, cloud-safe.
   Objections + Follow-ups are derived from data already stored on the company. */
function normalizeName(s){return String(s||'').toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();}
function normalizeText(s){return String(s||'').toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();}
function samePerson(n1,n2){const a=normalizeName(n1),b=normalizeName(n2);if(!a||!b)return false;if(a===b)return true;
  const ta=a.split(' '),tb=b.split(' ');const sh=ta.length<=tb.length?ta:tb,lo=ta.length<=tb.length?tb:ta;
  return sh.every((t,i)=>t===lo[i]);}
function mergeNonEmpty(target,fields,skip){skip=skip||[];Object.keys(fields||{}).forEach(k=>{if(skip.indexOf(k)>=0)return;const val=fields[k];if(val!==undefined&&val!==null&&String(val).trim()!=='')target[k]=val;});return target;}
function addSource(list,name){if(!name)return list||'';const cur=String(list||'').split(',').map(s=>s.trim()).filter(Boolean);
  if(!cur.some(s=>normalizeName(s)===normalizeName(name)))cur.push(name);return cur.join(', ');}

function findOrCreatePerson(name,fields){
  const key=normalizeName(name);
  const ex=key?state.people.find(p=>normalizeName(p.name)===key):null;
  if(ex){
    mergeNonEmpty(ex,fields);ex.dateUpdated=today();persistPerson(ex);return ex;
  }
  const np=Object.assign({id:uid('p'),createdBy:userName(),dateCreated:today(),dateUpdated:today()},fields,{name});
  state.people.push(np);persistPerson(np);return np;
}
/* One-time cleanup: collapse any people already duplicated (e.g. by the old
   ambiguous-match bug) into a single record per normalized name. Safe to
   call repeatedly — it's a no-op once there are no duplicates left. */
function dedupePeople(){
  const groups={};
  state.people.forEach(p=>{const k=normalizeName(p.name);if(!k)return;(groups[k]=groups[k]||[]).push(p);});
  const removeIds=[];
  Object.keys(groups).forEach(k=>{
    const list=groups[k];if(list.length<2)return;
    list.sort((a,b)=>String(a.dateCreated||'').localeCompare(String(b.dateCreated||'')));
    const primary=list[0];
    for(let i=1;i<list.length;i++){
      const dup=list[i];
      Object.keys(dup).forEach(f=>{if(['id','dateCreated','createdBy','name'].indexOf(f)>=0)return;
        const cur=primary[f];const val=dup[f];
        if((cur===undefined||cur===null||String(cur).trim()==='')&&val!==undefined&&val!==null&&String(val).trim()!=='')primary[f]=val;});
      removeIds.push(dup.id);
    }
    primary.dateUpdated=today();
    persistPerson(primary);
  });
  if(removeIds.length){
    state.people=state.people.filter(p=>removeIds.indexOf(p.id)<0);
    removeIds.forEach(id=>persistPersonDelete(id));
  }
  return removeIds.length;
}
function findOrCreateLesson(fields,companyName){
  const tkey=normalizeText(fields.title),dkey=normalizeText(fields.description);
  let ex=null;
  if(tkey)ex=state.lessons.find(l=>normalizeText(l.title)===tkey);
  if(!ex&&!tkey&&dkey)ex=state.lessons.find(l=>normalizeText(l.description)===dkey);
  if(ex){
    mergeNonEmpty(ex,fields,['related','source']);
    if(companyName){ex.related=addSource(ex.related,companyName);if(!ex.source)ex.source=companyName;}
    ex.dateUpdated=today();persistLesson(ex);return ex;
  }
  const nl=Object.assign({id:uid('l'),createdBy:userName(),dateCreated:today(),dateUpdated:today()},fields);
  if(companyName){nl.related=addSource(fields.related,companyName);if(!nl.source)nl.source=companyName;}
  state.lessons.push(nl);persistLesson(nl);return nl;
}
function linkEntityToCompany(entity,companyName,field){field=field||'related';entity[field]=addSource(entity[field],companyName);return entity;}
function getCompanyPeople(o){if(!o)return [];const n=normalizeName(o.company);
  return state.people.filter(p=>p.companyId===o.id||(n&&normalizeName(p.company)===n));}
function getCompanyLessons(o){if(!o)return [];const n=normalizeName(o.company);if(!n)return [];
  return state.lessons.filter(l=>normalizeName(l.related).indexOf(n)>=0||normalizeName(l.source).indexOf(n)>=0);}
function getCompanyFollowUps(o){if(!o||!o.followUp)return [];return [{company:o.company,companyId:o.id,due:o.followUp,task:o.nextAction||'',priority:o.priority,status:o.status}];}
function getCompanyObjections(o){return (o&&o.objections&&o.objections.trim())?o.objections.trim():'';}

function vDash(){
  const mkBrief=mkTodayBrief();
  if(!state.opps.length&&!mkBrief.todayItems.length&&!mkBrief.upcomingItems.length)return emptyDash();
  const active=state.opps.filter(isActive);
  const od=overdue().sort((a,b)=>a.followUp.localeCompare(b.followUp));
  const dt=dueToday();
  const meetings=active.filter(o=>o.stage==='Meeting booked');

  // Every item gets one stable identity, so the same record can never be
  // claimed by two sections — this is the single source of the whole page's
  // deduplication.
  const keyOf=item=>item.kind?(item.kind+':'+(item.key||item.id)):('opp:'+item.id);
  const claimed=new Set();
  const claim=item=>{claimed.add(keyOf(item));return item;};

  // Upcoming is now the one primary working list — overdue first, then due
  // today, then genuinely upcoming work. No separate "recommended" section:
  // this single, honestly-sorted list already answers "what do I work on."
  const realToday=[...od,...mkBrief.overdueItems,...dt,...mkBrief.dueTodayItems].map(claim);
  const suggest=active.filter(o=>o.nextAction&&!dt.includes(o)&&!od.includes(o));
  const upcomingPool=[...new Set([...suggest,...meetings])];
  const udays=x=>x.kind?daysUntil(x.dueDate):(daysUntil(x.followUp)==null?999:daysUntil(x.followUp));
  const futureItems=[...upcomingPool,...mkBrief.upcomingItems]
    .filter(i=>!claimed.has(keyOf(i)))
    .sort((a,b)=>udays(a)-udays(b));
  futureItems.forEach(claim);
  const upcomingAll=[...realToday,...futureItems].slice(0,10);
  const upcomingRow=item=>item.kind?mkDashRow(item):denseRow(item);

  // Recently updated — excludes anything already shown as an active task above.
  const recent=[...state.opps].filter(o=>!claimed.has(keyOf(o)))
    .sort((a,b)=>lastTouch(b).localeCompare(lastTouch(a))).slice(0,3);

  const dsec=(title,arr,render,opts)=>{
    opts=opts||{};
    if(!arr.length&&!opts.note)return '';
    const body=arr.length?'<div class="dlist"'+(opts.maxH?' style="max-height:'+opts.maxH+'"':'')+'>'+arr.map(render).join('')+'</div>':'<div class="dempty">'+opts.note+'</div>';
    return '<div class="dsec"><div class="dsec-h"><h2>'+title+'</h2><span class="count">'+arr.length+'</span></div>'+body+'</div>';
  };

  // Compact single-row summary — real counts, nothing invented.
  const weekStart=iso(mkThisWeekMonday());
  const weekEndD=mkThisWeekMonday();weekEndD.setDate(weekEndD.getDate()+6);
  const weekEnd=iso(weekEndD);
  const meetingsThisWeek=meetings.filter(o=>o.followUp&&o.followUp>=weekStart&&o.followUp<=weekEnd).length;
  const overdueCount=od.length+mkBrief.overdueItems.length;
  const dueTodayCount=dt.length+mkBrief.dueTodayItems.length;
  const estMinutes=upcomingAll.reduce((s,i)=>s+(i.kind?(i.est||20):20),0);
  const stat=(val,label,color)=>'<div class="dstat"><span class="dstat-val"'+(color?' style="color:'+color+'"':'')+'>'+val+'</span><span class="dstat-lbl">'+label+'</span></div>';
  const summaryRow='<div class="dstat-row">'+
    stat(active.length,'Active')+
    stat(dueTodayCount,'Due Today',dueTodayCount?'var(--amber)':null)+
    stat(overdueCount,'Overdue',overdueCount?'var(--red)':null)+
    stat(meetingsThisWeek,'Meetings This Week')+
    stat(mkEstLabelCompact(estMinutes),'Est. Work')+
  '</div>';

  return '<div class="dash-head"><div><div class="greeting">'+greeting()+' \u00b7 '+new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})+'</div>'+
    '<div class="page-title">Today</div></div></div>'+
    summaryRow+

    '<div class="dash-grid">'+
      '<div>'+
        '<div class="dsec dsec-primary"><div class="dsec-h"><h2>Upcoming</h2><span class="count">'+upcomingAll.length+'</span></div>'+
          (upcomingAll.length?'<div class="dlist dlist-primary" style="max-height:36vh">'+upcomingAll.map(upcomingRow).join('')+'</div>'
            :'<div class="dempty">Nothing on the horizon.</div>')+
        '</div>'+
        mkIntelligenceHtml()+
      '</div>'+
      '<div>'+
        mkMiniCalendarHtml()+
        '<div class="dsec"><div class="dsec-h"><h2>This week</h2></div><div class="dcard">'+mkWeeklyAgendaHtml()+'</div></div>'+
        mkContinueHtml()+
        dsec('Recently updated',recent,o=>'<div class="drow" onclick="go(\'detail\',\''+o.id+'\')">'+
          '<div class="drow-main"><div class="drow-title">'+esc(o.company)+'</div></div>'+
          '<div class="drow-right">'+(lastTouch(o)?fmtDate(lastTouch(o)):'\u2014')+'</div></div>',{note:''})+
      '</div>'+
    '</div>';
}

/* Workspace */
/* ============ ASK KWELI BRAIN — retrieval layer ============
   Two very different kinds of search live here, and mixing them was the bug:

   1. ENTITY-SCOPED search — "Kyle", "Kentaste", "the Kweli Investor Deck".
      Resolve WHO/WHAT is being asked about first, then only pull records
      that are actually related to that person/company/asset. This is the
      default path and should cover almost every real question.

   2. GENERIC keyword search — a true last resort, only used when nothing
      specific could be resolved (or for recognised aggregate questions like
      "what's overdue" / "which companies are investors"). Never runs
      alongside (1); if an entity was resolved, generic search is skipped
      entirely so it can't drag in unrelated companies. */
function tokenize(s){return normalizeText(s).split(' ').filter(Boolean);}
function textScore(query,...fields){
  const qNorm=normalizeText(query);if(!qNorm)return 0;
  const hay=normalizeText(fields.filter(Boolean).join(' '));if(!hay)return 0;
  let score=0;
  if(hay.indexOf(qNorm)>=0)score+=10; // exact phrase match anywhere in the record
  const hayTokens=hay.split(' ');
  tokenize(query).forEach(t=>{
    if(t.length<2)return;
    if(hay.indexOf(t)>=0)score+=2;          // partial/substring token match
    if(hayTokens.indexOf(t)>=0)score+=1;    // exact token match, extra weight
  });
  return score;
}
function topScored(items,scoreFn,limit){
  return items.map(item=>({item,score:scoreFn(item)})).filter(x=>x.score>0)
    .sort((a,b)=>b.score-a.score).slice(0,limit||6).map(x=>x.item);
}
function searchCompanies(query,limit){
  return topScored(state.opps,o=>textScore(query,o.company,o.category,o.contactRole,o.contactName,o.angle,o.pilot,o.notes,o.meetingNotes,o.objections,o.nextAction),limit);
}
function searchPeople(query,limit){
  return topScored(state.people,p=>textScore(query,p.name,p.role,p.company,p.relationship,p.relationshipToKweli,p.introducedBy,(p.expertise||[]).join(' '),p.whyMatters,p.notes),limit);
}
function searchAssets(query,limit){
  return topScored(state.assets||[],a=>textScore(query,a.title,a.collection,a.assetType,a.description,a.version,(a.tags||[]).join(' '),a.notes,a.fileName,a.extractedText),limit);
}
function searchLessons(query,limit){
  return topScored(state.lessons,l=>textScore(query,l.title,l.description,l.impact,l.category,l.source,l.related),limit);
}
function searchObjections(query,limit){
  return topScored(allObjections(),o=>textScore(query,o.company,o.category,o.objections),limit);
}
function searchFollowups(query,limit){
  return topScored(state.opps.filter(o=>o.followUp),o=>textScore(query,o.company,o.nextAction,o.category),limit);
}
function searchKnowledge(query,limit){
  return topScored(BRAIN_SECTIONS.map(([k,label])=>({key:k,label,content:state.brain[k]||''})),k=>textScore(query,k.label,k.content),limit||4);
}
/* "Kweli Brain" and "Knowledge Base" are the same underlying thing (state.brain) —
   kept as two names since both were asked for; searchBrain is just the alias. */
function searchBrain(query,limit){return searchKnowledge(query,limit);}

/* ---- Entity resolution: figure out WHO/WHAT before searching ----
   Requires a real name-token match (first name, surname, or full company
   name), not a stray common word — that's what stopped "follow up" from
   matching every company whose next-action happens to mention following up. */
function resolveEntities(query){
  const qNorm=normalizeText(query),qTokens=tokenize(query);
  const MIN=6; // require a real distinctive-word or phrase hit, not incidental overlap
  const scoreP=p=>{
    const nameNorm=normalizeName(p.name),nameTokens=nameNorm.split(' ').filter(Boolean);
    let score=0;
    if(qNorm&&nameNorm&&qNorm.indexOf(nameNorm)>=0)score+=20; // full name mentioned
    nameTokens.forEach(nt=>{if(nt.length>=3&&qTokens.indexOf(nt)>=0)score+=8;}); // first/last name as its own word
    return score;
  };
  const scoreC=o=>{
    const compNorm=normalizeName(o.company);
    let score=0;
    if(qNorm&&compNorm&&qNorm.indexOf(compNorm)>=0)score+=20; // full company name mentioned
    else compNorm.split(' ').filter(t=>t.length>=4).forEach(ct=>{if(qTokens.indexOf(ct)>=0)score+=8;}); // distinctive word from the name
    return score;
  };
  const scoreA=a=>{
    const titleNorm=normalizeText(a.title);
    let score=0;
    if(qNorm&&titleNorm&&(qNorm.indexOf(titleNorm)>=0||titleNorm.indexOf(qNorm)>=0))score+=20; // whole title mentioned (either direction)
    else{let hits=0;titleNorm.split(' ').filter(t=>t.length>=4).forEach(tt=>{if(qTokens.indexOf(tt)>=0){score+=6;hits++;}});if(hits>=2)score+=6;} // 2+ distinctive title words
    return score;
  };
  const rank=(items,scoreFn)=>items.map(item=>({item,score:scoreFn(item)})).filter(x=>x.score>=MIN).sort((a,b)=>b.score-a.score).slice(0,5).map(x=>x.item);
  return {people:rank(state.people,scoreP),companies:rank(state.opps,scoreC),assets:rank(state.assets||[],scoreA)};
}
function resolveCompanyForPerson(p){
  if(!p)return null;
  let comp=p.companyId?byId(p.companyId):null;
  if(!comp&&p.company){const key=normalizeName(p.company);comp=state.opps.find(o=>normalizeName(o.company)===key);}
  return comp||null;
}
function resolveCompanyForAsset(a){
  if(!a)return null;
  const hay=normalizeText((a.title||'')+' '+(a.collection||'')+' '+(a.notes||''));
  return state.opps.find(o=>{const cn=normalizeName(o.company);return cn.length>=3&&hay.indexOf(cn)>=0;})||null;
}
const CATEGORY_ALIASES={insurance:['Insurance'],insurer:['Insurance'],insurers:['Insurance'],
  agriculture:['Agriculture/FMCG'],agri:['Agriculture/FMCG'],fmcg:['Agriculture/FMCG'],
  lab:['Labs'],labs:['Labs'],export:['Exporters'],exporters:['Exporters'],exporter:['Exporters'],
  banking:['Banks/Lenders'],bank:['Banks/Lenders'],banks:['Banks/Lenders'],lenders:['Banks/Lenders'],
  governance:['Governance/Legal'],legal:['Governance/Legal'],investor:['Investors'],investors:['Investors']};
function resolveCategory(query){
  const q=normalizeText(query);
  for(const key in CATEGORY_ALIASES){if(q.indexOf(key)>=0)return CATEGORY_ALIASES[key];}
  for(const c of CATEGORIES){if(q.indexOf(normalizeText(c))>=0)return [c];}
  return null;
}
function emptyContext(query){return {query,companies:[],people:[],assets:[],lessons:[],objections:[],followups:[],knowledge:[],anchor:{}};}

/* Path 1 — an entity was resolved. Expand ONLY around it: the company's own
   people/lessons/objections/follow-up, assets whose name matches the company
   (so an unlinked "Kweli x Kentaste" deck still surfaces), and the relevant
   sector playbook. No raw-query search runs here — that's the fix. */
function buildScopedContext(query,entities,anchorCompanies){
  const ctx=emptyContext(query);
  const compIds=new Set(),peopleIds=new Set(),assetIds=new Set(),lessonIds=new Set(),objIds=new Set(),followIds=new Set(),knowKeys=new Set();
  const addCompany=o=>{if(o&&!compIds.has(o.id)){ctx.companies.push(o);compIds.add(o.id);}};
  const addPerson=p=>{if(p&&!peopleIds.has(p.id)){ctx.people.push(p);peopleIds.add(p.id);}};
  const addAsset=a=>{if(a&&!assetIds.has(a.id)){ctx.assets.push(a);assetIds.add(a.id);}};
  const addLesson=l=>{if(l&&!lessonIds.has(l.id)){ctx.lessons.push(l);lessonIds.add(l.id);}};
  const addObjection=o=>{if(o&&!objIds.has(o.id)){ctx.objections.push(o);objIds.add(o.id);}};
  const addFollowup=o=>{if(o&&!followIds.has(o.id)){ctx.followups.push(o);followIds.add(o.id);}};
  const addKnowledgeFor=cat=>{const pk=PLAYBOOK_MAP[cat];if(pk&&!knowKeys.has(pk)){ctx.knowledge.push({key:pk,label:(BRAIN_SECTIONS.find(s=>s[0]===pk)||[pk,pk])[1],content:state.brain[pk]||''});knowKeys.add(pk);}};

  entities.people.slice(0,3).forEach(addPerson);
  entities.assets.slice(0,3).forEach(addAsset);
  anchorCompanies.forEach(addCompany);

  anchorCompanies.forEach(comp=>{
    getCompanyPeople(comp).forEach(addPerson);
    getCompanyLessons(comp).forEach(addLesson);
    if(getCompanyObjections(comp))addObjection(comp);
    if(comp.followUp)addFollowup(comp);
    searchAssets(comp.company,10).forEach(addAsset); // scoped to the company's own name, not the raw question
    addKnowledgeFor(comp.category);
  });
  if(!anchorCompanies.length&&entities.people.length){
    // a person with no known company — still surface anything naming them directly
    searchLessons(entities.people[0].name,6).forEach(addLesson);
  }
  ctx.companies=ctx.companies.slice(0,8);ctx.people=ctx.people.slice(0,8);ctx.assets=ctx.assets.slice(0,8);
  ctx.lessons=ctx.lessons.slice(0,8);ctx.objections=ctx.objections.slice(0,6);ctx.followups=ctx.followups.slice(0,6);ctx.knowledge=ctx.knowledge.slice(0,5);
  ctx.anchor={person:entities.people[0]||null,company:anchorCompanies[0]||null,asset:(!anchorCompanies.length&&entities.assets[0])||null};
  return ctx;
}
/* Path 2 — no specific entity resolved. Try a recognised aggregate question
   ("what's overdue", "which companies are investors", sector questions like
   "insurance objections") before ever falling back to a raw keyword sweep. */
function buildAggregateContext(query){
  const q=normalizeText(query);
  const ctx=emptyContext(query);
  if(/\boverdue\b/.test(q)){ctx.followups=overdue().slice(0,8);return ctx.followups.length?ctx:null;}
  if(/\binvestor/.test(q)){ctx.companies=state.opps.filter(isInv).sort((a,b)=>(+b.priority||0)-(+a.priority||0)).slice(0,8);return ctx.companies.length?ctx:null;}
  if(/proposal/.test(q)&&/(which|compan)/.test(q)){
    const proposalAssets=(state.assets||[]).filter(a=>/proposal/i.test(a.assetType||'')||/proposal/i.test(a.title||''));
    const compIds=new Set();
    proposalAssets.forEach(a=>{const hay=normalizeText((a.title||'')+' '+(a.collection||''));state.opps.forEach(o=>{if(hay.indexOf(normalizeName(o.company))>=0)compIds.add(o.id);});});
    ctx.companies=state.opps.filter(o=>compIds.has(o.id));ctx.assets=proposalAssets.slice(0,8);
    return (ctx.companies.length||ctx.assets.length)?ctx:null;
  }
  const cats=resolveCategory(query);
  if(cats){
    ctx.companies=state.opps.filter(o=>cats.indexOf(o.category)>=0).slice(0,8);
    ctx.lessons=searchLessons(query,8); // scoped: query itself IS the sector keyword, so this stays on-topic
    ctx.objections=allObjections().filter(o=>cats.indexOf(o.category)>=0).slice(0,6);
    ctx.followups=state.opps.filter(o=>cats.indexOf(o.category)>=0&&o.followUp).slice(0,6);
    ctx.assets=searchAssets(query,8);
    return (ctx.companies.length||ctx.lessons.length||ctx.objections.length||ctx.followups.length||ctx.assets.length)?ctx:null;
  }
  return null;
}
/* Path 3 — true last resort: broad keyword search, same as before, but only
   ever reached when nothing specific and no recognised aggregate pattern
   matched. Kept for genuinely open questions with no clean entity. */
function buildGenericContext(query){
  const ctx=emptyContext(query);
  ctx.companies=searchCompanies(query,5);ctx.people=searchPeople(query,5);ctx.assets=searchAssets(query,5);
  ctx.lessons=searchLessons(query,5);ctx.objections=searchObjections(query,4);ctx.followups=searchFollowups(query,4);
  ctx.knowledge=searchKnowledge(query,3);
  return ctx;
}
function buildAIContext(query){
  const entities=resolveEntities(query);
  const anchorCompanies=[];
  if(entities.companies.length)anchorCompanies.push(entities.companies[0]);
  else if(entities.people.length){const c=resolveCompanyForPerson(entities.people[0]);if(c)anchorCompanies.push(c);}
  else if(entities.assets.length){const c=resolveCompanyForAsset(entities.assets[0]);if(c)anchorCompanies.push(c);}

  if(anchorCompanies.length||entities.people.length||entities.assets.length)
    return buildScopedContext(query,entities,anchorCompanies);

  const agg=buildAggregateContext(query);
  if(agg)return agg;

  return buildGenericContext(query);
}

/* Structured listing of exactly what retrieval found — this is deliberately
   NOT an "answer". Without a connected LLM the app cannot actually reason
   about the question, so it doesn't pretend to; it shows the records
   retrieval matched, grouped and in priority order, and nothing else. */
function retrievedContextText(query,ctx){
  const L=[];
  const has=ctx.companies.length||ctx.people.length||ctx.assets.length||ctx.lessons.length||ctx.objections.length||ctx.followups.length||ctx.knowledge.length;
  if(!has)return 'No matching records found for "'+query+'". Try a different name, company, or keyword — or add the record first if it doesn\'t exist yet.';
  if(ctx.companies.length){L.push('COMPANIES');ctx.companies.forEach(o=>{
    L.push('- '+o.company+' ('+o.category+', stage: '+o.stage+', priority '+(+o.priority||0)+')');
    if(o.angle)L.push('  Kweli angle: '+o.angle);
    if(o.nextAction)L.push('  Next action: '+o.nextAction+(o.followUp?' — due '+fmtDate(o.followUp):''));
  });L.push('');}
  if(ctx.people.length){L.push('PEOPLE');ctx.people.forEach(p=>{
    L.push('- '+p.name+(p.role?', '+p.role:'')+(p.company?' at '+p.company:'')+(p.warmth?' — '+p.warmth:''));
    if(p.whyMatters)L.push('  Why they matter: '+p.whyMatters);
    if(p.nextAction)L.push('  Next action: '+p.nextAction);
  });L.push('');}
  if(ctx.assets.length){L.push('ASSETS');ctx.assets.forEach(a2=>{
    L.push('- '+a2.title+' ('+(a2.collection||'Uncategorised')+(a2.assetType?' · '+a2.assetType:'')+(a2.version?' · '+a2.version:'')+')');
    if(a2.description)L.push('  '+a2.description);
    L.push(a2.extractedText?'  Extracted text (excerpt): '+a2.extractedText.slice(0,300)+(a2.extractedText.length>300?'…':'')
      :'  Metadata only — full document text extraction is not enabled yet.');
  });L.push('');}
  if(ctx.lessons.length){L.push('LESSONS LEARNED');ctx.lessons.forEach(l=>{
    L.push('- '+l.title+(l.category?' ('+l.category+')':''));
    if(l.impact)L.push('  Impact: '+l.impact);
  });L.push('');}
  if(ctx.objections.length){L.push('OBJECTIONS');ctx.objections.forEach(o=>L.push('- '+o.company+': '+getCompanyObjections(o)));L.push('');}
  if(ctx.followups.length){L.push('FOLLOW-UPS');ctx.followups.forEach(o=>L.push('- '+o.company+': '+(o.nextAction||'no action noted')+(o.followUp?' — due '+fmtDate(o.followUp):'')));L.push('');}
  if(ctx.knowledge.length){L.push('KNOWLEDGE BASE');ctx.knowledge.forEach(k=>L.push('- '+k.label+': '+(k.content||'').slice(0,220)+((k.content||'').length>220?'…':'')));L.push('');}
  while(L.length&&L[L.length-1]==='')L.pop();
  return L.join('\n');
}
function countRetrieved(ctx){return ctx.companies.length+ctx.people.length+ctx.assets.length+ctx.lessons.length+ctx.objections.length+ctx.followups.length+ctx.knowledge.length;}
function anchorLabel(a){
  a=a||{};
  if(a.person)return a.person.name+(a.person.role?', '+a.person.role:'')+(a.company?' — '+a.company.company:(a.person.company?' — '+a.person.company:''));
  if(a.company)return a.company.company+' ('+a.company.category+')';
  if(a.asset)return a.asset.title+' (Asset)';
  return '';
}
function buildAskPrompt(query,ctx){
  const rules='You are the Kweli BD Analyst. Answer the question below using ONLY the context provided. Do not invent names, emails, facts, or figures — if the context does not contain the answer, say so plainly and note what\'s missing. Hold the precision rule: Kweli proves a document is the authentic, unaltered issued one; it does NOT prove the contents are correct.';
  const parts=[rules,'=== QUESTION ===\n'+query];
  if(ctx.companies.length)parts.push('=== COMPANIES ===\n'+ctx.companies.map(companyBlock).join('\n\n'));
  if(ctx.people.length)parts.push('=== PEOPLE ===\n'+ctx.people.map(p=>p.name+' — '+(p.role||'role unknown')+(p.company?' at '+p.company:'')+', warmth: '+(p.warmth||'unknown')+(p.whyMatters?'. Why they matter: '+p.whyMatters:'')+(p.notes?'. Notes: '+p.notes:'')).join('\n'));
  if(ctx.assets.length)parts.push('=== ASSETS (metadata only — full document text not yet extracted unless shown) ===\n'+ctx.assets.map(a=>a.title+' — '+(a.collection||'Uncategorised')+' · '+(a.assetType||'')+' · '+(a.version||'')+(a.description?'. '+a.description:'')+(a.extractedText?'\nExtracted text: '+a.extractedText:'')).join('\n'));
  if(ctx.lessons.length)parts.push('=== LESSONS LEARNED ===\n'+ctx.lessons.map(l=>l.title+(l.impact?': '+l.impact:'')).join('\n'));
  if(ctx.objections.length)parts.push('=== OBJECTIONS ===\n'+ctx.objections.map(o=>o.company+': '+getCompanyObjections(o)).join('\n'));
  if(ctx.followups.length)parts.push('=== FOLLOW-UPS ===\n'+ctx.followups.map(o=>o.company+': '+(o.nextAction||'')+(o.followUp?' (due '+fmtDate(o.followUp)+')':'')).join('\n'));
  if(ctx.knowledge.length)parts.push('=== KNOWLEDGE BASE ===\n'+ctx.knowledge.map(k=>'## '+k.label+'\n'+k.content).join('\n\n'));
  parts.push('=== INSTRUCTIONS ===\nAnswer the question using only the material above. If asked to summarise a specific asset and its text isn\'t included, say clearly that document text extraction isn\'t enabled yet and offer to summarise once the text is pasted in.');
  return parts.join('\n\n');
}
/* ============ THE ONE FUNCTION GPT/Claude integration needs ============
   Everything above this line — entity resolution, retrieval, ranking,
   context building — is the retrieval engine and does not need to change
   when a real model is connected. This is the only seam.

   Today it returns null, so the UI shows Retrieved Context + Copy to Claude
   instead of a generated answer — no faked reasoning.

   To connect a model later: call it here with the structured context and the
   question, and return the model's text (or null on failure, which the UI
   already handles by falling back to Retrieved Context). For example:

   async function callLLM(context, question){
     const prompt = buildAskPrompt(question, context); // same context, same builder
     const res = await fetch('https://api.openai.com/v1/chat/completions', {
       method:'POST',
       headers:{'Content-Type':'application/json','Authorization':'Bearer '+OPENAI_KEY},
       body: JSON.stringify({model:'gpt-4o-mini', messages:[{role:'user',content:prompt}]})
     });
     const data = await res.json();
     return data.choices?.[0]?.message?.content || null;
   }
*/
async function callLLM(context,question){return null;}

async function askKweliBrain(){
  const input=document.getElementById('askInput');
  const q=((input?input.value:route.ask.query)||'').trim();
  if(!q){toast('Type a question first');return;}
  route.ask.query=q;route.ask.loading=true;render();

/* Assets — central repository for every EAX Global business asset.
   Metadata (this table) is synced exactly like companies/people/lessons via
   Supabase + realtime. The actual file lives in Supabase Storage (ASSETS_BUCKET);
   we only ever store its path here and mint short-lived signed URLs on demand. */
function byIdAsset(id){return (state.assets||[]).find(a=>a.id===id)}
function fmtBytes(n){n=+n||0;if(!n)return '—';if(n<1024)return n+' B';if(n<1048576)return (n/1024).toFixed(1)+' KB';return (n/1048576).toFixed(1)+' MB';}
function assetIconType(a){const t=(a.fileType||'').toLowerCase(),n=(a.fileName||'').toLowerCase();
  if(t.indexOf('pdf')>=0||n.endsWith('.pdf'))return{ico:'📄',label:'PDF'};
  if(t.indexOf('presentation')>=0||/\.(pptx?|key)$/.test(n))return{ico:'📊',label:'Slides'};
  if(t.indexOf('word')>=0||/\.docx?$/.test(n))return{ico:'📝',label:'Doc'};
  if(t.indexOf('sheet')>=0||/\.(xlsx?|csv)$/.test(n))return{ico:'📈',label:'Sheet'};
  if(t.indexOf('image')>=0||/\.(png|jpe?g|svg|gif|webp)$/.test(n))return{ico:'🖼️',label:'Image'};
  if(t.indexOf('video')>=0||/\.(mp4|mov|webm)$/.test(n))return{ico:'🎬',label:'Video'};
  if(t.indexOf('text')>=0||n.endsWith('.txt'))return{ico:'📃',label:'Text'};
  return{ico:'📁',label:'File'};}
function assetStoragePath(id,fileName){return id+'/'+String(fileName||'file').replace(/[^a-zA-Z0-9.\-_]/g,'_');}
async function uploadAssetToStorage(path,file){const {error}=await sb.storage.from(ASSETS_BUCKET).upload(path,file,{cacheControl:'3600',upsert:true});if(error)throw error;return path;}
async function removeAssetFromStorage(path){if(!path)return;try{const {error}=await sb.storage.from(ASSETS_BUCKET).remove([path]);if(error)console.error('Storage delete failed',{path,error});}catch(e){console.error('Storage delete failed',{path,error:e});}}
async function getAssetViewUrl(path){if(!CLOUD||!path)return null;try{const {data,error}=await sb.storage.from(ASSETS_BUCKET).createSignedUrl(path,3600);if(error){console.error('Signed URL error',error);return null;}return data.signedUrl;}catch(e){console.error('Signed URL error',e);return null;}}
async function getAssetDownloadUrl(path,fileName){if(!CLOUD||!path)return null;try{const {data,error}=await sb.storage.from(ASSETS_BUCKET).createSignedUrl(path,3600,{download:fileName||true});if(error){console.error('Signed URL error',error);return null;}return data.signedUrl;}catch(e){console.error('Signed URL error',e);return null;}}
async function openAssetFile(id){const a=byIdAsset(id);if(!a||!a.filePath){toast('No file stored for this asset');return;}
  if(!CLOUD){toast('Sign in to open files — Assets are stored in the shared cloud');return;}
  const win=window.open('','_blank'); // open synchronously so popup blockers don't catch the async URL fetch
  const url=await getAssetViewUrl(a.filePath);
  if(!url){if(win)win.close();toast('Could not generate file link');return;}
  if(win)win.location.href=url;else window.open(url,'_blank');}
async function downloadAssetFile(id){const a=byIdAsset(id);if(!a||!a.filePath){toast('No file stored for this asset');return;}
  if(!CLOUD){toast('Sign in to download files — Assets are stored in the shared cloud');return;}
  const url=await getAssetDownloadUrl(a.filePath,a.fileName);
  if(!url){toast('Could not generate download link');return;}
  const link=document.createElement('a');link.href=url;link.download=a.fileName||a.title;document.body.appendChild(link);link.click();link.remove();}

/* ---- Thumbnails ----
   PDF: rendered client-side (page 1) via PDF.js at upload/replace time and
   stored as a small JPEG alongside the original file — real automated
   thumbnails, generated once, never re-derived from the full PDF on every
   card render (that would be slow and defeats the point).
   PowerPoint/Word: no reliable dependency-free renderer runs in a browser
   (that needs a real Office engine — LibreOffice/Office server-side, or a
   heavy paid API). Rather than fake a cover, those get the polished
   file-type "cover" treatment below instead of a tiny inline icon.

   Every stage below logs explicitly to the console (prefixed
   "[Assets thumbnail]") so a failure is always traceable to one exact step —
   nothing here is swallowed silently. */
function isPdfFile(file){return (file.type||'').toLowerCase()==='application/pdf'||/\.pdf$/i.test(file.name||'');}

const PDFJS_WORKER_CDN_URL='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
/* Browsers only allow the Worker() constructor to load a script from the
   SAME origin as the page by default — a plain <script src> tag can be
   cross-origin, but new Worker('https://cdnjs...') throws a SecurityError
   in most browsers. Pointing GlobalWorkerOptions.workerSrc straight at the
   CDN (the "obvious" setup) hits exactly that restriction, and PDF.js swallows
   the resulting failure inside its internal worker bootstrap — which is why
   every render was failing silently. Fix: fetch the worker script ourselves
   and hand PDF.js a same-origin blob: URL instead. This is the standard,
   documented workaround for "PDF.js worker from a CDN". */
let __pdfWorkerReady=null;
function ensurePdfWorkerConfigured(){
  if(__pdfWorkerReady)return __pdfWorkerReady;
  __pdfWorkerReady=(async()=>{
    if(typeof pdfjsLib==='undefined'){
      console.error('[Assets thumbnail] STEP 1 FAILED: pdfjsLib is undefined at generation time — the PDF.js <script> tag did not load (see the STEP 1 log at page load above, or check the Network tab for a blocked/failed request to cdnjs.cloudflare.com).');
      return false;
    }
    console.log('[Assets thumbnail] STEP 1 confirmed OK: pdfjsLib is available.');
    try{
      const res=await fetch(PDFJS_WORKER_CDN_URL);
      if(!res.ok)throw new Error('HTTP '+res.status+' fetching pdf.worker.min.js');
      const code=await res.text();
      const blobUrl=URL.createObjectURL(new Blob([code],{type:'application/javascript'}));
      pdfjsLib.GlobalWorkerOptions.workerSrc=blobUrl;
      console.log('[Assets thumbnail] PDF.js worker configured via same-origin blob URL (cross-origin Worker() restriction avoided).');
      return true;
    }catch(e){
      console.error('[Assets thumbnail] Could not fetch/blob-ify the PDF.js worker script, falling back to a direct CDN workerSrc (may hit cross-origin Worker restrictions in some browsers):',e);
      pdfjsLib.GlobalWorkerOptions.workerSrc=PDFJS_WORKER_CDN_URL;
      return true; // still attempt rendering — some browsers/CDN CORS configs allow this directly
    }
  })();
  return __pdfWorkerReady;
}
async function generatePdfThumbnailBlob(file){
  const workerReady=await ensurePdfWorkerConfigured();
  if(!workerReady){console.error('[Assets thumbnail] Aborting thumbnail generation — PDF.js is not usable (see STEP 1 error above).');return null;}
  let pdf,page,viewport,canvas,ctx;
  try{
    const buf=await file.arrayBuffer();
    pdf=await pdfjsLib.getDocument({data:buf}).promise;
    page=await pdf.getPage(1);
  }catch(e){console.error('[Assets thumbnail] STEP 2 FAILED: could not open the PDF or load page 1:',e);return null;}
  try{
    const base=page.getViewport({scale:1});
    const scale=Math.min(2,600/base.width);
    viewport=page.getViewport({scale});
    canvas=document.createElement('canvas');
    canvas.width=Math.max(1,Math.round(viewport.width));canvas.height=Math.max(1,Math.round(viewport.height));
    ctx=canvas.getContext('2d');
    if(!ctx){console.error('[Assets thumbnail] STEP 2 FAILED: canvas.getContext("2d") returned null.');return null;}
    await page.render({canvasContext:ctx,viewport}).promise;
  }catch(e){console.error('[Assets thumbnail] STEP 2 FAILED: page.render() threw an error:',e);return null;}
  if(!canvas||!canvas.width||!canvas.height){
    console.error('[Assets thumbnail] STEP 2 FAILED: canvas exists but has zero dimensions after render.',canvas&&canvas.width,canvas&&canvas.height);
    return null;
  }
  console.log('[Assets thumbnail] STEP 2 OK: Page rendered ('+canvas.width+'×'+canvas.height+')');
  let blob;
  try{
    blob=await new Promise(res=>canvas.toBlob(res,'image/jpeg',0.82));
  }catch(e){console.error('[Assets thumbnail] STEP 3 FAILED: canvas.toBlob() threw an error:',e);return null;}
  if(!blob){console.error('[Assets thumbnail] STEP 3 FAILED: canvas.toBlob() returned null (possible tainted-canvas or unsupported-format issue).');return null;}
  console.log('[Assets thumbnail] STEP 3 OK: Thumbnail generated, blob size',fmtBytes(blob.size));
  return blob;
}
/* Batched, cached signed-URL fetch for card thumbnails — one Storage call
   for a whole page of cards instead of one per card, and reused across
   re-renders (search/filter) within the same ~1hr signed-URL lifetime. */
let __thumbUrlCache={};
const THUMB_CACHE_MS=45*60*1000;
async function loadAssetThumbnails(list){
  const withThumb=list.filter(a=>a.thumbPath);
  if(!withThumb.length)return; // nothing to fetch — cards already show the fallback cover
  if(!CLOUD||!sb){console.warn('[Assets thumbnail] STEP 6 SKIPPED: not signed in / no Supabase client — showing fallback covers.');return;}
  const now=Date.now();
  const need=withThumb.filter(a=>!__thumbUrlCache[a.thumbPath]||now-__thumbUrlCache[a.thumbPath].ts>THUMB_CACHE_MS).map(a=>a.thumbPath);
  if(need.length){
    console.log('[Assets thumbnail] STEP 6: requesting signed URLs for',need.length,'thumbnail(s):',need);
    try{
      const {data,error}=await sb.storage.from(ASSETS_BUCKET).createSignedUrls(need,3600);
      if(error){
        console.error('[Assets thumbnail] STEP 6 FAILED: createSignedUrls error:',error);
      }else if(data){
        let ok=0;
        data.forEach((d,i)=>{
          if(d&&d.signedUrl){__thumbUrlCache[need[i]]={url:d.signedUrl,ts:now};ok++;}
          else console.error('[Assets thumbnail] STEP 6 FAILED for path',need[i],':',d&&d.error);
        });
        console.log('[Assets thumbnail] STEP 6 OK: signed URLs ready for',ok,'of',need.length);
      }
    }catch(e){console.error('[Assets thumbnail] STEP 6 FAILED: signed URL batch request threw:',e);}
  }
  withThumb.forEach(a=>{
    const c=__thumbUrlCache[a.thumbPath];const el=document.getElementById('athumb-'+a.id);
    if(!el)return;
    if(c&&c.url){if(!el.querySelector('img'))el.innerHTML='<img src="'+esc(c.url)+'" loading="lazy" alt="">';}
    else console.warn('[Assets thumbnail] No signed URL available for',a.title,'('+a.thumbPath+') — leaving fallback cover in place.');
  });
}

function assetsHtml(){
  const f=route.assetFilter;let list=[...(state.assets||[])];
  if(f.q){const q=f.q.toLowerCase();list=list.filter(a=>(a.title+' '+(a.collection||'')+' '+(a.description||'')+' '+(a.notes||'')+' '+((a.tags||[]).join(' '))).toLowerCase().includes(q));}
  if(f.collection)list=list.filter(a=>a.collection===f.collection);
  if(f.type)list=list.filter(a=>a.assetType===f.type);
  if(f.sort==='newest')list.sort((a,b)=>(b.uploadedDate||'').localeCompare(a.uploadedDate||''));
  else if(f.sort==='oldest')list.sort((a,b)=>(a.uploadedDate||'').localeCompare(b.uploadedDate||''));
  else if(f.sort==='az')list.sort((a,b)=>a.title.localeCompare(b.title));
  else list.sort((a,b)=>(b.updatedDate||b.uploadedDate||'').localeCompare(a.updatedDate||a.uploadedDate||''));
  if(!list.length)return '<div class="empty"><div class="em">'+ICON('assets')+'</div><h3>No assets match</h3><p>Try a different search or filter.</p></div>';
  setTimeout(()=>loadAssetThumbnails(list),0); // fires after this render's innerHTML assignment completes
  return '<div class="assets-grid">'+list.map(assetCard).join('')+'</div>';
}

async function loadAssetPreview(id){const a=byIdAsset(id);if(!a)return;
  const url=await getAssetViewUrl(a.filePath);
  const wrap=document.getElementById('assetPreviewWrap');if(!wrap)return; // user navigated away
  if(!url){wrap.innerHTML='<div class="muted" style="padding:30px;text-align:center;font-size:13px">Preview unavailable</div>';return;}
  const ft=(a.fileType||'').toLowerCase();
  if(ft.indexOf('image')>=0)wrap.innerHTML='<div class="a-preview"><img src="'+esc(url)+'"></div>';
  else if(ft.indexOf('pdf')>=0)wrap.innerHTML='<div class="a-preview"><iframe src="'+esc(url)+'"></iframe></div>';
  else wrap.innerHTML='';
}

function runSearch(q){const panel=document.getElementById('searchPanel');q=(q||'').trim();
  if(!q){panel.innerHTML='';return;}
  const ql=q.toLowerCase();const hit=t=>(t||'').toLowerCase().includes(ql);
  const groups=[];
  const comp=state.opps.filter(o=>hit(o.company)||hit(o.category)||hit(o.angle)||hit(o.pilot)||hit(o.objections)||hit(o.notes)||hit(o.meetingNotes)||hit(o.contactRole));
  if(comp.length)groups.push(['Companies & Investors',comp.map(o=>({title:o.company,sub:o.category,snip:o.nextAction||o.angle,go:"go('detail','"+o.id+"')"}))]);
  const ppl=state.people.filter(p=>hit(p.name)||hit(p.role)||hit(p.company)||hit(p.notes)||hit(p.relationship));
  if(ppl.length)groups.push(['People',ppl.map(p=>({title:p.name,sub:p.role||'',snip:p.company,go:"openPerson('"+p.id+"')"}))]);
  const les=state.lessons.filter(l=>hit(l.title)||hit(l.description)||hit(l.impact)||hit(l.category)||hit(l.source)||hit(l.related));
  if(les.length)groups.push(['Lessons',les.map(l=>({title:l.title,sub:l.category||'',snip:l.impact,go:"openLesson('"+l.id+"')"}))]);
  const kb=BRAIN_SECTIONS.filter(([k,label])=>hit(label)||hit(state.brain[k]));
  if(kb.length)groups.push(['Knowledge Base',kb.map(([k,label])=>({title:label,sub:'section',snip:(state.brain[k]||'').slice(0,90),go:"go('knowledge')"}))]);
  const ast=(state.assets||[]).filter(a=>hit(a.title)||hit(a.collection)||hit(a.description)||hit(a.notes)||hit((a.tags||[]).join(' ')));
  if(ast.length)groups.push(['Assets',ast.map(a=>({title:a.title,sub:a.collection||'',snip:a.description||a.assetType,go:"go('assetDetail','"+a.id+"')"}))]);
  const rem=mk.custom.filter(r=>hit(r.title)||hit(r.notes));
  if(rem.length)groups.push(['Marketing reminders',rem.map(r=>({title:r.title,sub:r.repeat?repeatLabel(r.repeat):(r.dueDate?fmtDate(r.dueDate):''),snip:r.notes,go:"mkOpenFromSearch('"+r.id+"')"}))]);
  if(!groups.length){panel.innerHTML='<div class="search-empty">No matches for “'+esc(q)+'”.</div>';return;}
  panel.innerHTML='<div class="search-panel">'+groups.map(([title,items])=>'<div class="search-group-h">'+title+'</div>'+
    items.slice(0,6).map(it=>'<div class="search-res" onclick="'+it.go+'"><div style="flex:1;min-width:0"><span class="r-title">'+esc(it.title)+'</span>'+(it.snip?'<span class="r-snip">'+esc(String(it.snip).slice(0,100))+'</span>':'')+'</div><span class="r-sub">'+esc(it.sub)+'</span></div>').join('')).join('')+'</div>';

function brainText(){return BRAIN_SECTIONS.map(([k,label])=>'## '+label+'\n'+(state.brain[k]||'')).join('\n\n');}
function companyBlock(o){if(!o)return '(no company selected — general request)';
  const ppl=peopleOf(o.id).map(p=>p.name+' ('+(p.role||'role unknown')+', '+(p.warmth||'')+')').join('; ');
  return ['Company: '+o.company,'Category: '+o.category,'Website: '+(o.website||'unknown'),
    'Contact role: '+(o.contactRole||'unknown'),'Email: '+(o.email||'unknown — do not guess'),
    'Stage: '+o.stage,'Priority: '+(o.priority||0),isInv(o)?'Investment status: '+(o.investmentStatus||'—'):'',
    'Linked people: '+(ppl||'none'),'Kweli angle (founder hypothesis): '+(o.angle||'none yet'),
    'Proposed pilot: '+(o.pilot||'none yet'),'Known objections: '+(o.objections||'none logged')].filter(Boolean).join('\n');}
function notesBlock(o){if(!o)return '';const p=[];if(o.notes)p.push('Notes: '+o.notes);if(o.meetingNotes)p.push('Meeting notes: '+o.meetingNotes);
  const tl=(o.timeline||[]).slice(-5);if(tl.length)p.push('Recent timeline: '+tl.map(t=>t.date+' ['+(t.type||'Note')+'] '+t.text).join(' | '));return p.length?p.join('\n'):'(none recorded)';}
function buildPrompt(task,o,extra){
  const pk=o?PLAYBOOK_MAP[o.category]:null;const pb=pk?state.brain[pk]:'';
  const rules='You are the Kweli BD Analyst — the sharpest business-development analyst in Africa, trained only on Kweli. Reason ONLY from the Kweli Brain, the company record, and the pasted material below.\n\nRULES (non-negotiable):\n- Do not invent names, emails, titles, or facts. If unknown, write "unknown — verify" and say how to find it.\n- Hold the precision rule: Kweli proves a document is the authentic, unaltered issued one; it does NOT prove the contents are correct.\n- Keep any outreach under 150 words, founder-led, human, no hype.\n- If Kweli is not a genuine fit here, say so plainly.';
  const parts=[rules,'=== COMPANY RECORD ===\n'+companyBlock(o)];
  if(o)parts.push('=== STORED NOTES ===\n'+notesBlock(o));
  if(pb)parts.push('=== SECTOR PLAYBOOK ('+o.category+') ===\n'+pb);
  if(extra&&extra.trim())parts.push('=== PASTED MATERIAL ===\n'+extra.trim());
  parts.push('=== KWELI BRAIN ===\n'+brainText());
  parts.push(TASKS[task]||TASKS.research);
  return parts.join('\n\n');
}

    if(btn){btn.disabled=false;btn.textContent='Upload';}

/* ================= Marketing Assistant ================= */
function mkAdvance(dueDate,repeat){const d=new Date((dueDate||today())+'T00:00:00');
  if(repeat==='daily')d.setDate(d.getDate()+1);
  else if(repeat==='weekly')d.setDate(d.getDate()+7);
  else if(repeat==='monthly')d.setMonth(d.getMonth()+1);
  else if(repeat==='quarterly')d.setMonth(d.getMonth()+3);
  return iso(d);
}
function mkWhen(dueDate){
  const dd=daysUntil(dueDate);
  if(dd<0)return {label:Math.abs(dd)+' day'+(Math.abs(dd)===1?'':'s')+' overdue',cls:'overdue'};
  if(dd===0)return {label:'Due today',cls:'today'};
  if(dd===1)return {label:'Due tomorrow',cls:''};
  return {label:'Due '+fmtDate(dueDate),cls:''};
}

/* ---- content queue lookups (this is the "the system already knows" part) ----
   mkOccurrenceContent works off an explicit {key,index} rather than live engine
   state, so the exact same lookup logic can render both today's live card AND
   future calendar previews without drifting apart. */
function mkOccurrenceContent(occ){
  const key=occ.key,idx=occ.index;
  if(key==='monday'){const a=ARTICLE_QUEUE[idx%ARTICLE_QUEUE.length];
    return {title:'Write: '+a.title,sub:'For '+a.audience+'. '+a.goal};}
  if(key==='tuesday'){const a=ARTICLE_QUEUE[idx%ARTICLE_QUEUE.length];
    return {title:'Turn this week\u2019s article into a LinkedIn post',sub:'Article: '+a.title};}
  if(key==='wednesday'){const a=ARTICLE_QUEUE[idx%ARTICLE_QUEUE.length];
    return {title:'Research next week\u2019s article',sub:'Up next: '+a.title};}
  if(key==='thursday'){const isFounder=idx%2===0;const list=isFounder?FOUNDER_QUEUE:OPINION_QUEUE;
    const item=list[Math.floor(idx/2)%list.length];
    return {title:(isFounder?'Write a founder story: ':'Write an opinion piece: ')+item.title,sub:item.goal};}
  if(key==='friday'){return {title:'Industry outreach and engagement',sub:'Reach out to one auditor, broker, partner, or prospect — keep the relationships warm.'};}
  if(key==='monthly'){const r=REPORT_QUEUE[idx%REPORT_QUEUE.length];
    return {title:'Progress: '+r.title,sub:'Move this report forward — research, data, or drafting.'};}
  if(key==='quarterly'){const r=FLAGSHIP_QUEUE[idx%FLAGSHIP_QUEUE.length];
    return {title:'Prepare & publish: '+r.title,sub:'This quarter\u2019s flagship milestone.'};}
  return {title:'',sub:''};
}

function mkOccurrenceDetail(key,idx){

  if(key==='wednesday'){const a=ARTICLE_QUEUE[idx%ARTICLE_QUEUE.length];return {kind:'Research',title:a.title,audience:a.audience,objective:a.goal};}
  if(key==='thursday'){const isFounder=idx%2===0;const list=isFounder?FOUNDER_QUEUE:OPINION_QUEUE;const item=list[Math.floor(idx/2)%list.length];
    return {kind:isFounder?'Founder story':'Opinion piece',title:item.title,audience:item.audience,objective:item.goal};}

    if(key==='monday'||key==='thursday'||key==='monthly'||key==='quarterly')slot.index++;
    slot.dueDate=mkAdvance(slot.dueDate,def.repeat);

/* ---- One source of truth ----
   A single function, mkTodayBrief(), computes "what's overdue / due today /
   coming up" across BOTH the automatic engine and your own reminders. Every
   surface that shows marketing tasks — this page's own Today tab, the main
   Kweli Brain dashboard, and (indirectly, since it reads the same mk.engine
   / mk.custom data) the Calendar — calls into this same function or the same
   underlying data, so there is exactly one reminder object per task, never a
   copy, and never a chance for one view to say something different from
   another. */
function mkEngineIndexFor(key){
  if(key==='tuesday')return mk.engine.monday.index;
  if(key==='wednesday')return mk.engine.monday.index+1;
  return mk.engine[key].index;
}
function mkEngineItemDescriptor(key){
  const slot=mk.engine[key],def=MK_ENGINE_DEF[key],idx=mkEngineIndexFor(key);
  const content=mkOccurrenceContent({key,index:idx});
  return {kind:'engine',key,index:idx,title:content.title,dueDate:slot.dueDate,priority:def.priority,est:def.est,overdue:slot.dueDate<today()};
}
function mkCustomItemDescriptor(r){
  return {kind:'custom',id:r.id,title:r.title,dueDate:r.dueDate,priority:r.priority,est:20,overdue:r.dueDate<today()};
}
function mkTodayBrief(){
  const engineKeys=['monday','tuesday','wednesday','thursday','friday','monthly','quarterly'];
  const all=engineKeys.map(mkEngineItemDescriptor).concat(mk.custom.filter(r=>!r.completed).map(mkCustomItemDescriptor));
  const overdueItems=all.filter(i=>i.overdue).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const dueTodayItems=all.filter(i=>!i.overdue&&i.dueDate===today());
  const upcomingItems=all.filter(i=>!i.overdue&&i.dueDate>today()).sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).slice(0,6);
  const todayItems=overdueItems.concat(dueTodayItems);
  const estMinutes=todayItems.reduce((s,i)=>s+(i.est||20),0);
  return {overdueItems,dueTodayItems,upcomingItems,todayItems,estMinutes};
}
function mkEstLabel(mins){const h=Math.floor(mins/60),m=mins%60;
  if(h&&m)return h+' hr'+(h===1?'':'s')+' '+m+' min'+(m===1?'':'s');
  if(h)return h+' hr'+(h===1?'':'s');
  return m+' min'+(m===1?'':'s');
}
function mkEstLabelCompact(mins){const h=Math.floor(mins/60),m=mins%60;
  if(h&&m)return h+'h '+m+'m';

  return m+'m';
}
