/* ---- Today's Intelligence ----
   Zero AI: plain keyword overlap between today's top task and existing
   records (companies, lessons, assets, other queue ideas). A record only
   shows up if it genuinely shares a meaningful word — nothing is forced. */
const MK_STOPWORDS=new Set(['the','a','an','of','to','for','and','or','why','how','what','is','are','in','on','with',
  'that','this','your','you','we','our','it','its','their','they','do','does','did','can','will','would','should',
  'from','by','as','at','be','been','being','not','no','yes','if','when','where','who','whom','was','were','has','have']);
function mkKeywords(text){return (text||'').toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(w=>w.length>3&&!MK_STOPWORDS.has(w));}
function mkKeywordScore(words,text){const t=(text||'').toLowerCase();return words.reduce((s,w)=>s+(t.includes(w)?1:0),0);}
function mkIntelligenceFor(topItem){
  if(!topItem)return null;
  const words=mkKeywords(topItem.title);
  if(!words.length)return null;
  const rank=(list,textFn)=>list.map(x=>({x,score:mkKeywordScore(words,textFn(x))})).filter(r=>r.score>0).sort((a,b)=>b.score-a.score).map(r=>r.x);
  const companies=rank(state.opps,o=>o.company+' '+o.category+' '+(o.notes||''));
  const lessons=rank(state.lessons||[],l=>l.title+' '+(l.category||'')+' '+(l.description||'')+' '+(l.impact||''));
  const assets=rank(state.assets||[],a=>a.title+' '+(a.collection||'')+' '+(a.description||'')+' '+(a.tags||[]).join(' '));
  return {companies,lessons,assets};
}
/* Never a dead end: when nothing is overdue or due today, this surfaces real,
   honest next steps — the nearest upcoming marketing task plus whatever
   companies already have a defined next action — instead of leaving the
   page's main focal point empty. Nothing here is invented. */
function mkTitleOf(item){return item.kind?item.title:item.company;}
function mkRecommendedActions(){
  const engineKeys=['monday','tuesday','wednesday','thursday','friday','monthly','quarterly'];
  const engineSorted=engineKeys.map(mkEngineItemDescriptor).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const withNextAction=state.opps.filter(o=>isActive(o)&&o.nextAction).sort((a,b)=>(+b.priority||0)-(+a.priority||0));
  const items=[];
  if(engineSorted[0])items.push(engineSorted[0]);
  withNextAction.forEach(o=>{if(items.length<5)items.push(o);});
  if(items.length<3&&engineSorted[1])items.push(engineSorted[1]);
  return items.slice(0,5);
}
/* One compact line per category: up to 3 named links, "View All" if more
   exist. No chip clouds, no wrapping grids, no horizontal scroll — this
   answers exactly one question ("what should I open before I start?"),
   nothing more. */
function mkIntelLine(tag,items,titleFn,clickFn,viewAllOnclick){
  if(!items.length)return '';
  const shown=items.slice(0,3);
  const links=shown.map(x=>'<span class="dintel-link" onclick="'+clickFn(x)+'">'+esc(titleFn(x))+'</span>').join('<span class="dintel-sep">, </span>');
  const more=items.length>3?'<span class="dintel-more" onclick="'+viewAllOnclick+'">View All</span>':'';
  return '<div class="dintel-line"><span class="dintel-tag">'+tag+'</span>'+links+more+'</div>';
}
function mkIntelligenceHtml(){
  const top=mkTodayBrief().todayItems[0]||mkRecommendedActions()[0];
  const intel=mkIntelligenceFor(top?{title:mkTitleOf(top)}:null);
  if(!top||!intel||(!intel.companies.length&&!intel.lessons.length&&!intel.assets.length))return '';
  const topTitle=mkTitleOf(top);
  const lines=[
    mkIntelLine('Companies',intel.companies,o=>o.company,o=>"go('detail','"+o.id+"')","go('companies')"),
    mkIntelLine('Notes',intel.lessons,l=>l.title,()=>"go('lessons')","go('lessons')"),
    mkIntelLine('Assets',intel.assets,a=>a.title,a=>"go('assetDetail','"+a.id+"')","go('assets')")
  ].filter(Boolean);
  return '<div class="dsec"><div class="dsec-h"><h2>Today\u2019s Intelligence</h2><span class="count" style="font-style:italic;text-transform:none;letter-spacing:0">from "'+esc(topTitle.slice(0,34))+(topTitle.length>34?'\u2026':'')+'"</span></div><div class="dcard dintel-compact">'+lines.join('')+'</div></div>';
}

/* ---- Continue where you left off ----
   Two honest sources: engine slots you've explicitly marked "in progress",
   and detail pages you actually opened recently (still active/live) — no
   invented "unfinished work" tracking beyond what the app already knows. */
function mkContinueHtml(){
  const items=[];
  ['monday','tuesday','wednesday','thursday','friday','monthly','quarterly'].forEach(k=>{
    if(mk.engine[k].status==='in_progress'){
      const content=mkSlotContent(k);
      items.push({label:'Continue writing: ',title:content.title,onclick:mkItemOnclick({kind:'engine',key:k,index:mkEngineIndexFor(k),dueDate:mk.engine[k].dueDate})});
    }
  });
  recentViews.forEach(v=>{
    if(v.type==='detail'){const o=byId(v.id);if(o&&isActive(o))items.push({label:'Continue: ',title:o.company,onclick:"go('detail','"+o.id+"')"});}
    else if(v.type==='assetDetail'){const a=(state.assets||[]).find(x=>x.id===v.id);if(a)items.push({label:'Continue editing: ',title:a.title,onclick:"go('assetDetail','"+a.id+"')"});}
  });
  const shown=items.slice(0,4);

  return '<div class="dsec"><div class="dsec-h"><h2>Continue where you left off</h2></div>'+
    shown.map(it=>'<div class="drow" onclick="'+it.onclick+'"><div class="drow-main"><div class="drow-title">'+esc(it.label)+esc(it.title)+'</div></div></div>').join('')+
  '</div>';
}

function mkBodyHtml(){

/* ---- Calendar view — a real month grid, generated by projecting the same
   7 engine slots onto the visible date range. Nothing is stored per-future-
   date: each slot's current {dueDate,index} is fast-forwarded in memory,
   using the exact same content lookups as the Today cards, so the two views
   can never disagree about what's scheduled. If a slot is currently overdue,
   it gets exactly one overdue marker on its real due date — not a stack of
   speculative missed dates — and projection resumes from the next real
   occurrence of that slot's cadence (e.g. next Monday) onward. */
const MK_KIND_LABEL={monday:'Article',tuesday:'LinkedIn',wednesday:'Research',thursday:'Founder Story',friday:'Outreach',monthly:'Report',quarterly:'Flagship'};
const MK_MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function mkThisMonthFirst(){const d=new Date();return iso(new Date(d.getFullYear(),d.getMonth(),1));}
function mkCatchUpDate(key){ // where projection resumes right after a single overdue marker
  const def=MK_ENGINE_DEF[key];
  if(def.weekday!=null)return nextWeekday(def.weekday);
  if(def.repeat==='monthly')return nextMonthFirst();
  if(def.repeat==='quarterly')return nextQuarterFirst();
  return mkAdvance(today(),def.repeat);
}
function mkProjectRange(key,rangeStartISO,rangeEndISO){
  const slot=mk.engine[key],def=MK_ENGINE_DEF[key];
  const isOwner=(key==='monday'||key==='thursday'||key==='monthly'||key==='quarterly');
  const out=[];
  let date=slot.dueDate,idx=slot.index,i=0;
  const maxIter=60; // safety cap — plenty for even a year of weekly slots
  while(i<maxIter){
    let contentIdx;
    if(key==='tuesday')contentIdx=mk.engine.monday.index+i;
    else if(key==='wednesday')contentIdx=mk.engine.monday.index+i+1;
    else contentIdx=idx;
    const overdue=date<today();
    if(date>=rangeStartISO&&date<=rangeEndISO)out.push({key,date,index:contentIdx,isFirst:i===0,overdue});
    if(date>rangeEndISO&&!overdue)break;
    if(i===0&&overdue){date=mkCatchUpDate(key);if(isOwner)idx++;}
    else{date=mkAdvance(date,def.repeat);if(isOwner)idx++;}
    i++;
  }
  return out;
}
function mkOccurrencesInRange(startISO,endISO){
  const keys=['monday','tuesday','wednesday','thursday','friday','monthly','quarterly'];
  let all=[];keys.forEach(k=>{all=all.concat(mkProjectRange(k,startISO,endISO));});
  return all;
}
/* Compact per-cell wording — matches the plain "Kind: reference" phrasing
   asked for, rather than the fuller Today-card copy. */
function mkCalCellText(occ){
  const idx=occ.index;
  if(occ.key==='monday'){const a=ARTICLE_QUEUE[idx%ARTICLE_QUEUE.length];return 'Write article: '+a.title;}
  if(occ.key==='tuesday')return 'LinkedIn: Turn Monday\u2019s article into a post';
  if(occ.key==='wednesday')return 'Research: Next article';
  if(occ.key==='thursday'){const isFounder=idx%2===0;const list=isFounder?FOUNDER_QUEUE:OPINION_QUEUE;const item=list[Math.floor(idx/2)%list.length];
    return (isFounder?'Founder Story: ':'Opinion Piece: ')+item.title;}
  if(occ.key==='friday')return 'Outreach';
  if(occ.key==='monthly'){const r=REPORT_QUEUE[idx%REPORT_QUEUE.length];return 'Report: '+r.title;}
  if(occ.key==='quarterly'){const r=FLAGSHIP_QUEUE[idx%FLAGSHIP_QUEUE.length];return 'Flagship: '+r.title;}
  return '';
}
function mkMonthGridDates(viewMonthFirstISO){
  const d0=new Date(viewMonthFirstISO+'T00:00:00');
  const firstOfMonth=new Date(d0.getFullYear(),d0.getMonth(),1);
  const lastOfMonth=new Date(d0.getFullYear(),d0.getMonth()+1,0);
  const startOffset=(firstOfMonth.getDay()+6)%7; // Monday=0 ... Sunday=6
  const gridStart=new Date(firstOfMonth);gridStart.setDate(gridStart.getDate()-startOffset);
  const endOffset=(7-lastOfMonth.getDay())%7;
  const gridEnd=new Date(lastOfMonth);gridEnd.setDate(gridEnd.getDate()+endOffset);
  const cells=[];let cur=new Date(gridStart);
  while(cur<=gridEnd){cells.push(new Date(cur));cur.setDate(cur.getDate()+1);}
  return cells;
}
function mkCalMonthLabel(viewMonthFirstISO){const d=new Date(viewMonthFirstISO+'T00:00:00');return MK_MONTHS[d.getMonth()]+' '+d.getFullYear();}
function mkCalNavMonth(delta){
  const d=new Date(route.mk.calMonth+'T00:00:00');d.setMonth(d.getMonth()+delta);
  route.mk.calMonth=iso(new Date(d.getFullYear(),d.getMonth(),1));
  renderMk();
}
function mkCalToday(){
  route.mk.calMonth=mkThisMonthFirst();
  renderMk();
}
function mkCalMiniItem(it){
  if(it.custom)return mkCalMiniCustom(it);
  if(it.done)return '<div class="cal-mini done" onclick="event.stopPropagation()"><span class="cal-mini-text">\u2713 '+esc(it.title)+'</span></div>';
  return '<div class="cal-mini'+(it.overdue?' overdue':'')+'" onclick="event.stopPropagation();mkOccurrenceModal(\''+it.key+'\','+it.index+',\''+it.date+'\','+it.isFirst+')">'+
    (it.isFirst?'<input type="checkbox" class="cal-mini-chk" onclick="event.stopPropagation();mkSetStatus(\''+it.key+'\',\'done\')">':'')+
    '<span class="cal-mini-text">'+esc(mkCalCellText(it))+'</span></div>';
}
/* Your own manual reminders — same store as the "Your own reminders" list,
   just also placed on their date in the grid so the calendar shows the full
   picture: automatic plan + whatever you've added yourself. */
function mkCalMiniCustom(r){
  return '<div class="cal-mini custom'+(r.completed?' done':'')+(!r.completed&&daysUntil(r.dueDate)<0?' overdue':'')+'" onclick="event.stopPropagation();mkReminderForm(\''+r.id+'\')">'+
    (!r.completed?'<input type="checkbox" class="cal-mini-chk" onclick="event.stopPropagation();mkToggleCustomComplete(\''+r.id+'\')">':'')+
    '<span class="cal-mini-text">'+(r.completed?'\u2713 ':'')+esc(r.title)+'</span></div>';
}
function mkCalAddForDate(dateISO){mkReminderForm(null,dateISO);}
function mkDayView(dateISO){
  const items=[];
  mkOccurrencesInRange(dateISO,dateISO).forEach(o=>items.push(o));
  mk.custom.forEach(r=>{if(r.dueDate===dateISO)items.push(Object.assign({custom:true},r));});
  mk.completions.forEach(c=>{if(c.date===dateISO)items.push({done:true,title:c.title,date:c.date});});
  const d=new Date(dateISO+'T00:00:00');
  const label=MK_DAY_NAMES[d.getDay()]+' '+d.getDate()+' '+MK_MONTHS[d.getMonth()]+' '+d.getFullYear();
  document.getElementById('modal-root').innerHTML='<div class="modal-scrim" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-h"><h2>'+esc(label)+'</h2><button class="x" onclick="closeModal()">\u00d7</button></div>'+
    (items.length?'<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:4px">'+items.map(mkCalMiniItem).join('')+'</div>'
      :'<div class="card muted" style="padding:16px;margin-bottom:4px">Nothing scheduled for this day.</div>')+
    '<div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Close</button><button class="btn gold" onclick="mkCalAddForDate(\''+dateISO+'\')">+ Add action</button></div></div></div>';
}
function mkCalDayCell(date,viewMonthNum,byDate){
  const iso_=iso(date);
  const items=(byDate[iso_]||[]).slice(0,4);
  const overflow=(byDate[iso_]||[]).length-items.length;
  const isToday=iso_===today();
  const inMonth=date.getMonth()===viewMonthNum;
  return '<div class="cal-cell'+(isToday?' today':'')+(inMonth?'':' other')+'" onclick="mkDayView(\''+iso_+'\')" title="Click to view '+fmtDate(iso_)+'">'+
    '<div class="cal-cell-head"><span class="cal-cell-num">'+date.getDate()+'</span>'+
    '<button class="cal-add-btn" onclick="event.stopPropagation();mkCalAddForDate(\''+iso_+'\')" title="Add action">+</button></div>'+
    items.map(mkCalMiniItem).join('')+
    (overflow>0?'<div class="cal-cell-more">+'+overflow+' more</div>':'')+
  '</div>';
}
function mkCalendarHtml(){
  route.mk.calMonth=route.mk.calMonth||mkThisMonthFirst();
  const viewMonth=route.mk.calMonth;
  const cells=mkMonthGridDates(viewMonth);
  const rangeStart=iso(cells[0]),rangeEnd=iso(cells[cells.length-1]);
  const byDate={};
  mkOccurrencesInRange(rangeStart,rangeEnd).forEach(o=>{(byDate[o.date]=byDate[o.date]||[]).push(o);});
  mk.custom.forEach(r=>{if(r.dueDate>=rangeStart&&r.dueDate<=rangeEnd)(byDate[r.dueDate]=byDate[r.dueDate]||[]).push(Object.assign({custom:true},r));});
  // Historical completion-log entries are lowest priority for cell display — a busy day's
  // live tasks (automatic + manual) should never be crowded out by past completions when
  // a cell hits its display cap; the full history is always visible in "Recently completed" below.
  mk.completions.forEach(c=>{if(c.date>=rangeStart&&c.date<=rangeEnd)(byDate[c.date]=byDate[c.date]||[]).push({done:true,title:c.title,date:c.date});});
  const viewMonthNum=new Date(viewMonth+'T00:00:00').getMonth();
  const toolbar='<div class="cal-toolbar"><button class="btn" onclick="mkCalNavMonth(-1)">\u2190</button>'+
    '<div class="cal-label">'+mkCalMonthLabel(viewMonth)+'</div>'+
    '<button class="btn" onclick="mkCalNavMonth(1)">\u2192</button>'+
    '<button class="btn ghost" onclick="mkCalToday()">This month</button></div>';
  const head='<div class="cal-head-row">'+['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map(d=>'<div class="cal-head-cell">'+d+'</div>').join('')+'</div>';
  const grid='<div class="cal-grid">'+cells.map(d=>mkCalDayCell(d,viewMonthNum,byDate)).join('')+'</div>';
  return toolbar+head+'<div class="cal-grid-wrap">'+grid+'</div>'+
    '<div class="faint" style="font-size:11px;margin:10px 2px 0">Click any day to see its agenda \u2014 use the + to add an action directly. Automatic plan items show with a gold edge, yours show with a green edge.</div>'+
    mkCompletedHtml();
}
function mkOccurrenceModal(key,idx,date,isFirst){
  const d=mkOccurrenceDetail(key,idx);
  document.getElementById('modal-root').innerHTML='<div class="modal-scrim" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-h"><h2>'+esc(d.kind)+'</h2><button class="x" onclick="closeModal()">\u00d7</button></div>'+

    '<div class="field"><label class="fl">Scheduled</label><div class="muted">'+fmtDate(date)+'</div></div>'+
    '<div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Close</button>'+
    (isFirst?'<button class="btn gold" onclick="mkSetStatus(\''+key+'\',\'done\');closeModal();">Mark done</button>':'')+
    '</div></div></div>';

/* ---- your own one-off reminders (not part of the annual plan) ---- */
function mkDot(priority){return '<span class="rem-dot" style="background:'+(priority==='High'?'var(--red)':priority==='Medium'?'var(--amber)':'var(--faint)')+'"></span>';}
function reminderRow(r){
  return '<div class="rem-row'+(!r.completed&&daysUntil(r.dueDate)<0?' overdue':'')+(r.completed?' done':'')+'">'+
    '<input type="checkbox" class="rem-chk" '+(r.completed?'checked':'')+' onclick="event.stopPropagation();mkToggleCustomComplete(\''+r.id+'\')">'+
    '<div class="rem-main" onclick="mkReminderForm(\''+r.id+'\')"><div class="rem-title">'+esc(r.title)+'</div>'+
    (r.notes?'<div class="rem-notes">'+esc(r.notes)+'</div>':'')+'</div>'+
    '<div class="rem-side">'+(r.repeat?'<span class="chip" style="font-size:10px;padding:3px 9px">'+repeatLabel(r.repeat)+'</span>':'')+mkDot(r.priority)+
    '<span class="rem-date">'+(r.dueDate?fmtDate(r.dueDate):'')+'</span></div></div>';
}
function mkCustomSectionHtml(){
  const active=mk.custom.filter(r=>!r.completed).sort((a,b)=>(a.dueDate||'').localeCompare(b.dueDate||''));
  return '<div class="sec"><div class="sec-h"><h2>Your own reminders</h2><span class="count">'+active.length+'</span>'+
    '<button class="btn ghost" style="margin-left:auto;font-size:11.5px;padding:5px 10px" onclick="mkReminderForm()">+ Add reminder</button></div>'+
    (active.length?active.map(reminderRow).join(''):'<div class="card muted" style="padding:16px">Nothing of your own added yet — outreach follow-ups, one-off tasks, anything outside the annual plan.</div>')+
  '</div>';
}
function mkToggleCustomComplete(id){
  const r=byMkReminder(id);if(!r)return;
  if(r.completed){r.completed=false;r.completedDate='';saveMarketing();renderMk();return;}
  mk.completions.unshift({title:r.title,date:today()});
  if(mk.completions.length>200)mk.completions.length=200;
  if(r.repeat){r.dueDate=mkAdvance(r.dueDate,r.repeat);toast('Nice — back on '+repeatLabel(r.repeat).toLowerCase()+' for '+fmtDate(r.dueDate));}
  else{r.completed=true;r.completedDate=today();toast('Done');}
  saveMarketing();renderMk();
}
function mkClearCompleted(){mk.custom=mk.custom.filter(r=>!r.completed);saveMarketing();renderMk();toast('Cleared');}
function mkReminderForm(id,presetDate){
  const r=id?byMkReminder(id):mkReminder({dueDate:presetDate||today()});
  document.getElementById('modal-root').innerHTML='<div class="modal-scrim" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-h"><h2>'+(id?'Edit reminder':'New reminder')+'</h2><button class="x" onclick="closeModal()">\u00d7</button></div>'+
    (id&&r.completed?'<div class="chip" style="margin-bottom:14px"><span class="dot" style="background:var(--green)"></span>Completed '+(r.completedDate?fmtDate(r.completedDate):'')+'</div>':'')+
    '<div class="field"><label class="fl">Title *</label><input class="input" id="rm_title" value="'+esc(r.title)+'"></div>'+
    '<div class="field-row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+
      '<div class="field"><label class="fl">Due date</label><input class="input" type="date" id="rm_due" value="'+(r.dueDate||today())+'"></div>'+
      '<div class="field"><label class="fl">Repeat</label><select class="select" id="rm_repeat">'+REM_REPEATS.map(([v,l])=>'<option value="'+v+'" '+(r.repeat===v?'selected':'')+'>'+l+'</option>').join('')+'</select></div>'+
    '</div>'+
    '<div class="field"><label class="fl">Priority</label><select class="select" id="rm_priority">'+REM_PRIORITIES.map(p=>'<option '+(r.priority===p?'selected':'')+'>'+p+'</option>').join('')+'</select></div>'+
    '<div class="field"><label class="fl">Notes</label><textarea class="input" id="rm_notes" rows="2">'+esc(r.notes||'')+'</textarea></div>'+
    '<div class="modal-foot">'+(id?'<button class="btn danger" style="margin-right:auto" onclick="mkDeleteReminder(\''+id+'\')">Delete</button>':'')+
    (id?'<button class="btn" onclick="mkToggleCustomComplete(\''+id+'\');closeModal();">'+(r.completed?'Mark incomplete':'Mark complete')+'</button>':'')+
    '<button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn gold" onclick="mkSaveReminder(\''+(id||'')+'\')">'+(id?'Save changes':'Add')+'</button></div></div></div>';
}
function mkSaveReminder(existingId){
  const g=fld=>{const el=document.getElementById(fld);return el?el.value:'';};
  const title=g('rm_title').trim();if(!title){toast('Title is required');return;}
  const data={title,dueDate:g('rm_due')||today(),repeat:g('rm_repeat'),priority:g('rm_priority'),notes:g('rm_notes')};
  if(existingId)Object.assign(byMkReminder(existingId),data);
  else mk.custom.push(mkReminder(data));
  saveMarketing();closeModal();
  if(route.view==='marketing')renderMk();
  toast(existingId?'Saved':'Added');
}
function mkDeleteReminder(id){if(!confirm('Delete this reminder?'))return;mk.custom=mk.custom.filter(r=>r.id!==id);saveMarketing();closeModal();renderMk();toast('Deleted');}
function mkOpenFromSearch(id){clearSearch();go('marketing');mkReminderForm(id);}

/* ---- history ---- */
function mkCompletedHtml(){
  const showN=route.mk.showCompleted?200:8;
  const logEntries=mk.completions.map(c=>({title:c.title,date:c.date}));
  const customCompleted=mk.custom.filter(r=>r.completed).map(r=>({title:r.title,date:r.completedDate||r.dueDate}));
  const total=logEntries.length+customCompleted.length;
  const merged=[...logEntries,...customCompleted].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,showN);
  return '<div class="sec"><div class="sec-h"><h2>Recently completed</h2>'+
    (total>showN&&!route.mk.showCompleted?'<span class="count" style="cursor:pointer;color:var(--gold)" onclick="route.mk.showCompleted=true;renderMk()">Show more</span>':'')+
    (mk.custom.some(r=>r.completed)?'<button class="btn ghost" style="margin-left:auto;font-size:11.5px;padding:5px 10px" onclick="mkClearCompleted()">Clear finished one-offs</button>':'')+
  '</div>'+
  (merged.length?merged.map(c=>'<div class="rem-row done"><input type="checkbox" class="rem-chk" checked disabled><div class="rem-main"><div class="rem-title">'+esc(c.title)+'</div></div><div class="rem-side"><span class="rem-date">'+(c.date?fmtDate(c.date):'')+'</span></div></div>').join('')
    :'<div class="card muted" style="padding:16px">Nothing completed yet.</div>')+
  '</div>';
}

function closeModal(){document.getElementById('modal-root').innerHTML=''}

/* data actions */
function resetBrain(){if(confirm('Reset the Knowledge Base to defaults? Your edits will be lost.')){state.brain=defaultBrain();cacheSave();if(CLOUD){BRAIN_SECTIONS.forEach(([k,label])=>sync('brain_sections','upsert',{section_key:k,title:label,content:state.brain[k]}));}render();toast('Knowledge Base reset');}}
function exportData(){const blob=new Blob([JSON.stringify(Object.assign({},state,{marketing:mk}),null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='kweli-brain-'+today()+'.json';a.click();URL.revokeObjectURL(a.href);toast('Backup downloaded');}
function importData(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.opps&&!d.brain)throw new Error('not a valid backup');if(!confirm(CLOUD?'Upload this backup into the shared cloud? Existing records are kept; this adds the backup\'s records.':'Replace all current data with this backup?'))return;
  if(d.marketing){const m=migrateMk(d.marketing);if(m){mk=m;saveMarketing();}} // Marketing Assistant data restores the same way regardless of cloud/local mode — always local-only for now.
  if(CLOUD){toast('Importing…');uploadDataset(d).then(()=>fetchAll()).then(()=>{render();toast('Backup imported'+(d.assets&&d.assets.length?' — note: asset files must be re-uploaded via Upload Asset, backups don\'t carry files.':'.'));}).catch(e=>toast('Import failed: '+(e.message||e)));}
  else{state={opps:d.opps||[],people:d.people||[],lessons:d.lessons||[],brain:migrateBrain(d.brain),assets:state.assets||[],version:2};state.opps.forEach(o=>o.timeline=o.timeline||[]);cacheSave();go('dashboard');toast('Backup restored');}
  }catch(e){toast('Import failed: '+e.message);}};r.readAsText(f);input.value='';}
function resetDemo(){if(!confirm(CLOUD?'Replace ALL shared cloud data with demo data?':'Reload demo data? This replaces everything currently stored.'))return;
  if(CLOUD){(async()=>{toast('Resetting…');try{await clearCloud();await uploadDataset(seed());await fetchAll();render();toast('Demo data loaded');}catch(e){toast('Failed: '+(e.message||e));}})();}
  else{state=seed();cacheSave();go('dashboard');toast('Demo data loaded');}}
function clearAll(){if(!confirm(CLOUD?'Delete ALL shared companies, people and lessons? Cannot be undone.':'Delete ALL companies, people and lessons? The Knowledge Base is kept. Cannot be undone.'))return;
  if(CLOUD){(async()=>{try{await clearCloud();await fetchAll();render();toast('Cleared');}catch(e){toast('Failed: '+(e.message||e));}})();}
  else{state.opps=[];state.people=[];state.lessons=[];cacheSave();go('dashboard');toast('Cleared');}}

/* clipboard + toast */
function copy(t){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>toast('Copied to clipboard'),()=>fb(t));}else fb(t);}
function fb(t){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('Copied to clipboard');}catch(e){toast('Copy failed');}document.body.removeChild(ta);}
let tt;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),1900);}

function afterRender(){}
init();
</script>
