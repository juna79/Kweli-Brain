<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kweli Brain — Institutional Memory</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#070E14; --panel:#0E1E2A; --panel2:#122636; --raise:#16303F;
    --line:rgba(255,255,255,.07); --line-s:rgba(255,255,255,.12);
    --txt:#EAF1F4; --muted:#90A6B2; --faint:#5E7785;
    --gold:#C9A24B; --gold-d:#A6822F; --gold-soft:rgba(201,162,75,.13);
    --green:#46B98A; --amber:#E0A340; --red:#E0654B; --blue:#4FA3D1; --purple:#9B7FD4;
    --r:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-size:14px;line-height:1.55;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:var(--gold);text-decoration:none}
  ::selection{background:rgba(201,162,75,.28)}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .muted{color:var(--muted)} .faint{color:var(--faint)}

  .app{display:flex;min-height:100vh}
  .sidebar{width:236px;flex:none;background:#060B10;border-right:1px solid var(--line);
    position:fixed;inset:0 auto 0 0;padding:24px 16px;overflow-y:auto;z-index:40;transition:transform .2s}
  .main{flex:1;margin-left:236px;min-width:0;display:flex;flex-direction:column}
  .brand{display:flex;align-items:center;gap:12px;padding:2px 8px 22px}
  .brand-mark{width:36px;height:36px;border-radius:9px;flex:none;display:grid;place-items:center;
    background:linear-gradient(145deg,var(--gold),#6f571f);color:#070E14;font-weight:800;font-size:19px;font-family:ui-monospace,monospace}
  .brand-name{font-weight:660;font-size:15.5px;letter-spacing:-.01em;line-height:1.1}
  .brand-sub{font-size:9.5px;color:var(--faint);letter-spacing:.13em;text-transform:uppercase;font-family:ui-monospace,monospace;margin-top:3px}
  .nav{display:flex;flex-direction:column;gap:1px;margin-top:4px}
  .nav-item{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:9px;color:var(--muted);
    cursor:pointer;font-size:13.5px;font-weight:500}
  .nav-item:hover{color:var(--txt);background:var(--panel)}
  .nav-item.active{color:var(--txt);background:var(--panel2)}
  .nav-item .ico{width:17px;flex:none;color:var(--faint);text-align:center}
  .nav-item.active .ico{color:var(--gold)}
  .nav-badge{margin-left:auto;font-size:10px;font-family:ui-monospace,monospace;background:var(--red);color:#fff;border-radius:9px;padding:1px 7px;font-weight:700}
  .nav-sect{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-family:ui-monospace,monospace;padding:16px 12px 6px}

  .topbar{display:flex;align-items:center;gap:14px;padding:13px 30px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:rgba(7,14,20,.88);backdrop-filter:blur(10px);z-index:30}
  .hamb{display:none;background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--txt);width:36px;height:36px;cursor:pointer;font-size:16px}
  .searchwrap{position:relative;flex:1;max-width:560px}
  #globalSearch{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:11px;color:var(--txt);
    padding:10px 14px;font-size:13.5px;font-family:inherit;outline:none}
  #globalSearch:focus{border-color:var(--gold)}
  .search-panel{position:absolute;top:50px;left:0;right:0;background:var(--panel);border:1px solid var(--line-s);border-radius:13px;
    box-shadow:0 24px 60px -22px rgba(0,0,0,.8);max-height:65vh;overflow-y:auto;z-index:50;padding:8px}
  .search-group-h{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-family:ui-monospace,monospace;padding:10px 12px 5px}
  .search-res{padding:9px 12px;border-radius:9px;cursor:pointer}
  .search-res:hover{background:var(--panel2)}
  .search-res .r-title{font-size:13.5px}
  .search-res .r-snip{font-size:11.5px;color:var(--faint);margin-top:2px;display:block}
  .status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px}

  .content{padding:32px 30px 90px;max-width:1180px;margin:0 auto;width:100%}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:24px;flex-wrap:wrap}
  .eyebrow{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
  .page-title{font-size:25px;font-weight:660;letter-spacing:-.02em;margin-top:6px}
  .page-sub{font-size:13px;color:var(--muted);margin-top:5px}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px}
  .sec{margin-bottom:24px}
  .sec-h{display:flex;align-items:center;gap:10px;margin-bottom:11px}
  .sec-h h2{font-size:12.5px;font-weight:640;margin:0}
  .sec-h .count{font-family:ui-monospace,monospace;font-size:11px;color:var(--faint);margin-left:auto}
  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:1fr 1fr}
  .g-auto{grid-template-columns:repeat(auto-fill,minmax(270px,1fr))}
  .dash-grid{display:grid;grid-template-columns:2.2fr 1fr;gap:16px;align-items:start}
  @media(max-width:1000px){.dash-grid{grid-template-columns:1fr}}

  .row-item{display:flex;align-items:center;gap:12px;padding:12px 15px;background:var(--panel);
    border:1px solid var(--line);border-radius:11px;cursor:pointer;margin-bottom:7px}
  .row-item:hover{border-color:var(--line-s)}
  .row-item.alert{border-color:rgba(224,101,75,.4)}
  .udot{width:8px;height:8px;border-radius:50%;flex:none}
  .row-main{flex:1;min-width:0}
  .row-title{font-size:13.5px;font-weight:560}
  .row-meta{font-size:11.5px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row-right{font-size:10.5px;font-family:ui-monospace,monospace;white-space:nowrap;color:var(--faint)}

  .btn{background:var(--panel2);border:1px solid var(--line-s);color:var(--txt);padding:8px 14px;border-radius:9px;
    font-size:12.5px;font-weight:560;cursor:pointer;font-family:inherit}
  .btn:hover{border-color:var(--gold)}
  .btn.gold{background:linear-gradient(145deg,var(--gold),var(--gold-d));border:none;color:#070E14}
  .btn.sm{padding:6px 11px;font-size:12px}
  .btn.danger{border-color:rgba(224,101,75,.5);color:var(--red)}
  .btn.active{border-color:var(--gold);color:var(--gold)}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10.5px;
    font-weight:600;background:var(--panel2);border:1px solid var(--line-s)}
  .pill-editable{cursor:pointer;transition:border-color .12s,background .12s}
  .pill-editable:hover{border-color:var(--gold);background:var(--raise)}
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:18px;overflow-x:auto}
  .tab{padding:9px 13px;font-size:12.5px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
  .tab.active{color:var(--txt);border-color:var(--gold)}
  .field{margin-bottom:13px}
  .fl{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px}
  .input,.select,textarea.input{width:100%;background:var(--panel2);border:1px solid var(--line-s);border-radius:8px;
    color:var(--txt);padding:9px 11px;font-size:13px;font-family:inherit;outline:none}
  .input:focus,.select:focus,textarea.input:focus{border-color:var(--gold)}
  .kv{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:12.5px}
  .kv .k{color:var(--faint)}
  .kv:last-child{border-bottom:none}
  .modal-scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:flex-start;justify-content:center;padding:36px 20px;overflow-y:auto}
  .modal-scrim.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line-s);border-radius:16px;max-width:620px;width:100%;padding:24px}
  .modal.wide{max-width:960px}
  .close-x{float:right;cursor:pointer;color:var(--faint);font-size:20px;line-height:1}
  .toast{position:fixed;bottom:22px;right:22px;background:var(--panel2);border:1px solid var(--gold);
    padding:11px 17px;border-radius:10px;font-size:12.5px;z-index:200;box-shadow:0 12px 30px rgba(0,0,0,.5)}
  .empty{color:var(--faint);font-size:12.5px;padding:18px 0;text-align:center}
  .badge-org-type{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--gold)}
  .out{background:#050A0E;border:1px solid var(--line);border-radius:10px;padding:13px;font-size:12px;
    font-family:ui-monospace,monospace;white-space:pre-wrap;max-height:400px;overflow-y:auto}
  .note-yellow{background:#3a3418;border-color:#E0A340}
  .note-red{background:#3a1e18;border-color:#E0654B}
  .note-green{background:#153328;border-color:#46B98A}
  .sticky{border:1px solid var(--line-s);border-radius:10px;padding:13px;min-height:105px;cursor:pointer;position:relative}
  .board-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:13px}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
  .link-btn{background:none;border:none;color:var(--gold);cursor:pointer;font-size:12.5px;padding:0}
  .badge-count{font-family:ui-monospace,monospace;font-size:10px;color:var(--faint)}
  .qa-btn{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:linear-gradient(145deg,var(--gold),var(--gold-d));
    border:none;color:#070E14;font-size:24px;cursor:pointer;box-shadow:0 12px 30px rgba(0,0,0,.5);z-index:60}
  .thumb{width:100%;aspect-ratio:4/3;background:var(--panel2);border-radius:9px;display:grid;place-items:center;font-size:28px;margin-bottom:10px;overflow:hidden}
  .suggest-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;background:var(--gold-soft);color:var(--gold);
    border:1px solid rgba(201,162,75,.35);border-radius:20px;padding:4px 10px;margin:4px 6px 0 0;cursor:default}
  @media(max-width:880px){
    .sidebar{transform:translateX(-100%)} .sidebar.open{transform:translateX(0)}
    .main{margin-left:0} .hamb{display:block} .content{padding:24px 16px 90px}
  }

  /* ===== Final-pass polish ===== */
  .card{transition:border-color .15s, transform .15s}
  .row-item{transition:border-color .15s, transform .12s}
  .row-item:hover{transform:translateX(2px)}
  .org-card{cursor:pointer;display:flex;flex-direction:column;gap:10px}
  .org-card:hover{border-color:var(--gold);transform:translateY(-1px)}
  .org-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .org-card-name{font-size:15.5px;font-weight:660;letter-spacing:-.01em}
  .org-card-meta{display:flex;gap:6px;flex-wrap:wrap;font-size:10.5px}
  .flag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
  .flag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
  .flag.waiting{background:rgba(79,163,209,.15);color:var(--blue);border:1px solid rgba(79,163,209,.3)}
  .flag.pilot{background:rgba(70,185,138,.15);color:var(--green);border:1px solid rgba(70,185,138,.3)}
  .flag.investor{background:var(--gold-soft);color:var(--gold);border:1px solid rgba(201,162,75,.3)}
  .flag.team{background:rgba(155,127,212,.15);color:var(--purple);border:1px solid rgba(155,127,212,.3)}
  .org-card-foot{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--line);font-size:11px}
  .priority-bar{width:100%;height:3px;border-radius:2px;background:var(--panel2);overflow:hidden}
  .priority-bar-fill{height:100%;border-radius:2px}

  .avatar{width:38px;height:38px;border-radius:50%;flex:none;display:grid;place-items:center;font-weight:700;font-size:13px;
    background:linear-gradient(145deg,var(--panel2),var(--raise));color:var(--gold);border:1px solid var(--line-s)}
  .person-card{cursor:pointer;display:flex;gap:12px;align-items:flex-start}
  .person-card:hover{border-color:var(--gold);transform:translateY(-1px)}
  .warmth-pill{font-size:9.5px;padding:2px 8px;border-radius:20px;font-weight:600}
  .warmth-hot{background:rgba(224,101,75,.15);color:var(--red)}
  .warmth-warm{background:rgba(224,163,64,.15);color:var(--amber)}
  .warmth-cold{background:rgba(79,163,209,.15);color:var(--blue)}
  .warmth-default{background:var(--panel2);color:var(--faint)}

  .empty{color:var(--faint);font-size:12.5px;padding:34px 20px;text-align:center;border:1px dashed var(--line-s);border-radius:12px}
  .empty-ico{font-size:22px;margin-bottom:8px;opacity:.5}

  /* mini calendar (Today) */
  .mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .mini-cal .mc-h{font-size:8.5px;color:var(--faint);text-align:center;text-transform:uppercase}
  .mini-cal .mc-d{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;font-size:10.5px;position:relative;cursor:pointer}
  .mini-cal .mc-d.has-items{background:var(--panel2)}
  .mini-cal .mc-d.is-today{border:1px solid var(--gold);color:var(--gold);font-weight:700}
  .mini-cal .mc-dot{width:3px;height:3px;border-radius:50%;background:var(--gold);position:absolute;bottom:3px}
  .quick-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .qa-chip{display:flex;align-items:center;gap:6px;padding:9px 14px;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;cursor:pointer;font-size:12.5px;transition:border-color .15s,transform .12s}
  .qa-chip:hover{border-color:var(--gold);transform:translateY(-1px)}

  /* kanban (Marketing) */
  .kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;overflow-x:auto}
  @media(max-width:1000px){.kanban{grid-template-columns:1fr;gap:16px}}
  .kanban-col{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;min-height:120px}
  .kanban-col-h{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);font-family:ui-monospace,monospace;
    display:flex;justify-content:space-between;margin-bottom:10px}
  .kanban-card{background:var(--panel2);border:1px solid var(--line-s);border-radius:9px;padding:10px;margin-bottom:8px;font-size:12px;cursor:pointer}
  .kanban-card:hover{border-color:var(--gold)}
  .kanban-card .kc-type{font-size:9.5px;color:var(--gold);text-transform:uppercase;letter-spacing:.05em}

  /* knowledge base chapters */
  .kb-layout{display:grid;grid-template-columns:220px 1fr;gap:20px}
  @media(max-width:880px){.kb-layout{grid-template-columns:1fr}}
  .kb-chapter{padding:9px 12px;border-radius:9px;cursor:pointer;font-size:12.5px;color:var(--muted);margin-bottom:2px}
  .kb-chapter:hover{background:var(--panel)}
  .kb-chapter.active{background:var(--panel2);color:var(--txt)}
  .kb-chapter .cnt{float:right;color:var(--faint);font-family:ui-monospace,monospace;font-size:10.5px}

  /* sticky notes, refined */
  .sticky{transition:transform .15s, box-shadow .15s; box-shadow:0 4px 10px rgba(0,0,0,.25)}
  .sticky:hover{transform:translateY(-3px) rotate(0deg) !important; box-shadow:0 10px 22px rgba(0,0,0,.4)}

  /* export/snapshot premium */
  .export-hero{display:flex;align-items:center;gap:18px;padding:28px;background:linear-gradient(135deg,var(--panel),var(--panel2));
    border:1px solid var(--line-s);border-radius:16px;margin-bottom:22px}
  .export-icon{width:56px;height:56px;border-radius:14px;flex:none;display:grid;place-items:center;font-size:26px;
    background:linear-gradient(145deg,var(--gold),var(--gold-d));color:#070E14}
  .export-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:20px}
  .export-metric{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
  .export-metric .em-val{font-size:20px;font-weight:700;font-family:ui-monospace,monospace}
  .export-metric .em-lbl{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
  .prompt-chip{display:inline-flex;align-items:center;padding:8px 13px;background:var(--panel2);border:1px solid var(--line-s);
    border-radius:20px;font-size:12px;cursor:pointer;margin:0 8px 8px 0}
  .prompt-chip:hover{border-color:var(--gold);color:var(--gold)}

  /* ===== Ported verbatim from V1 index.html — the actual benchmark ===== */

  /* month-grid calendar (V1 cal-*) */
  .cal-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .cal-toolbar .cal-label{font-size:15px;font-weight:620;min-width:170px}
  .cal-grid-wrap{overflow-x:auto;margin-bottom:8px}
  .cal-head-row{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:12px 12px 0 0;overflow:hidden;min-width:900px}
  .cal-head-cell{background:#060B10;padding:9px 10px;font-family:ui-monospace,monospace;font-size:9.5px;
    letter-spacing:.1em;text-transform:uppercase;color:var(--faint);text-align:center}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);
    border:1px solid var(--line);border-top:none;border-radius:0 0 12px 12px;overflow:hidden;min-width:900px}
  .cal-cell{background:var(--panel);min-height:118px;padding:7px;display:flex;flex-direction:column;gap:4px;cursor:pointer}
  .cal-cell.other{background:#0A1620;opacity:.5}
  .cal-cell.today{box-shadow:inset 0 0 0 2px var(--gold)}
  .cal-cell-head{display:flex;align-items:center;justify-content:space-between}
  .cal-cell-num{font-family:ui-monospace,monospace;font-size:11px;color:var(--faint)}
  .cal-cell.today .cal-cell-num{color:var(--gold);font-weight:700}
  .cal-cell-more{font-size:10px;color:var(--faint);font-family:ui-monospace,monospace;padding:1px 2px}
  .cal-mini{background:var(--panel2);border-radius:6px;padding:3px 6px 3px 7px;font-size:10.5px;line-height:1.35;
    cursor:pointer;display:flex;align-items:flex-start;gap:5px;border-left:2px solid var(--gold);transition:background .12s}
  .cal-mini:hover{background:var(--raise)}
  .cal-mini.custom{border-left-color:var(--green)}
  .cal-mini.overdue{border-left-color:var(--red);background:rgba(224,101,75,.14)}
  .cal-mini.done{opacity:.55;border-left-color:var(--faint)}
  .cal-mini.done .cal-mini-text{text-decoration:line-through}
  .cal-mini-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;
    -webkit-line-clamp:2;-webkit-box-orient:vertical}
  @media(max-width:880px){.cal-head-row,.cal-grid{min-width:680px}}

  /* dense dashboard rows (V1 dsec/drow) */
  .dsec{margin-bottom:22px}
  .dsec-h{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .dsec-h h2{font-size:13px;font-weight:640;margin:0}
  .dcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px}
  .dlist{display:flex;flex-direction:column;gap:6px}
  .dempty{color:var(--faint);font-size:12px;padding:10px 2px}
  .drow{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--panel);border:1px solid var(--line);
    border-radius:9px;cursor:pointer;transition:border-color .15s}
  .drow:hover{border-color:var(--line-s)}
  .drow.alert{border-color:rgba(224,101,75,.4)}
  .drow-dot{width:7px;height:7px;border-radius:50%;flex:none}
  .drow-icon{font-size:12px;flex:none;width:16px;text-align:center}
  .drow-main{flex:1;min-width:0}
  .drow-title{font-size:13px;font-weight:560;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .drow-meta{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .drow-right{font-size:10.5px;font-family:ui-monospace,monospace;white-space:nowrap;color:var(--faint);flex:none}

  /* relationship cards (V1 ent-card, People) */
  .ent-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;cursor:pointer;
    display:flex;flex-direction:column;gap:9px;transition:border-color .15s}
  .ent-card:hover{border-color:var(--gold)}
  .ent-card.alert{border-color:rgba(224,101,75,.45)}
  .ent-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .ent-name{font-size:15px;font-weight:620;letter-spacing:-.01em}

  .asset-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);cursor:pointer;overflow:hidden;

    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .a-sub{font-size:11px;color:var(--faint);font-family:ui-monospace,monospace}
  .a-foot{margin-top:auto;padding-top:9px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;
    font-size:10.5px;color:var(--faint);font-family:ui-monospace,monospace}

  /* onboarding restore panel (Marketing) */
  .restore-panel{background:linear-gradient(135deg,var(--panel),var(--panel2));border:1px solid var(--line-s);
    border-radius:14px;padding:26px;text-align:center;margin-bottom:20px}
  .seg{display:inline-flex;background:var(--panel2);border:1px solid var(--line-s);border-radius:9px;padding:2px;gap:2px}
  .seg button{background:none;border:none;color:var(--muted);font-size:12.5px;padding:7px 14px;border-radius:7px;cursor:pointer;font-family:inherit}
  .seg button.active{background:var(--raise);color:var(--txt)}
</style>
</head>
<body>


<div id="loginScreen" class="login-wrap">
  <div class="card" style="width:360px">
    <div class="brand" style="padding-bottom:14px">
      <div class="brand-mark">K</div>
      <div><div class="brand-name">Kweli Brain</div><div class="brand-sub">Institutional Memory</div></div>
    </div>

    <div class="field"><label class="fl">Password</label><input class="input" id="loginPw" type="password" /></div>
    <button class="btn gold" style="width:100%" onclick="doSignIn()">Sign in</button>
    <div id="loginErr" class="muted" style="margin-top:10px;font-size:12px;color:var(--red)"></div>
  </div>
</div>

<div id="appRoot" class="app" style="display:none">
  <div class="scrim" id="scrim" onclick="toggleSidebar(false)" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:35"></div>
  <div class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">K</div>
      <div><div class="brand-name">Kweli Brain</div><div class="brand-sub">Institutional Memory</div></div>
    </div>
    <div class="nav" id="navList"></div>
  </div>

  <div class="main">
    <div class="topbar">
      <button class="hamb" onclick="toggleSidebar()">☰</button>
      <div class="searchwrap">
        <input id="globalSearch" placeholder="Search everything…" oninput="onSearchInput(this.value)" />
        <div class="search-panel" id="searchPanel" style="display:none"></div>
      </div>
      <button class="btn sm" onclick="openTeamBoard()">Team Board <span id="tbUnreadBadge"></span></button>
      <span class="mono muted" id="whoami" style="font-size:11.5px"></span>
    </div>
    <div class="content" id="content"></div>
  </div>

</div>

<div class="modal-scrim" id="modalScrim" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>

<div id="toastHost"></div>

<script>
/* ============================================================================
   CONFIG — points at the completed, confirmed V2 schema (01-05 already run).
============================================================================ */
const SUPABASE_URL = "https://vezgkdmlkbujqdvfxpxp.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_Q9dXQ-QIkSDC4B4rswzgLg_sTRcCbOw";
const ASSETS_BUCKET = "kweli-brain-assets-v2";
const MIGRATION_STEP_PREFIX = "kweli_brain_v1_to_v2_2026_07:";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null, myProfile = null;
let realtimeStatus = 'connecting', dbStatus = 'connecting';
const signedUrlCache = {}; // path -> {url, expires}

/* ---------------------------------------------------------------------------
   STATE — exact confirmed V2 table names. One mirror, every page renders
   from it: "one record, multiple views."
--------------------------------------------------------------------------- */
let state = {
  user_profiles: [], organisations: [], people: [], opportunities: [], meetings: [],
  meeting_attendees: [], tasks: [], assets_v2: [], lessons_v2: [], decisions: [],
  team_messages_v2: [], team_message_replies: [], team_message_reads: [], activities: [],
  objections: [], marketing_items: [], knowledge_sections_v2: [], investor_profiles: [],
  entity_links: [], migration_log: []
};
const TABLES = Object.keys(state);

function uid(){return crypto.randomUUID();}
function today(){return new Date().toISOString().slice(0,10);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function byId(arr,id){return arr.find(x=>x.id===id);}
function fmtDate(d){if(!d)return '—';return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function daysUntil(d){if(!d)return null;const t=new Date(today()),x=new Date(d);return Math.round((x-t)/86400000);}
function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.getElementById('toastHost').appendChild(el);setTimeout(()=>el.remove(),3200);}
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}
function toggleSidebar(o){const sbEl=document.getElementById('sidebar'),sc=document.getElementById('scrim');
  if(o===undefined)o=!sbEl.classList.contains('open');sbEl.classList.toggle('open',o);sc.style.display=o?'block':'none';}

/* ---------------------------------------------------------------------------
   AUTH
--------------------------------------------------------------------------- */
async function doSignIn(){
  const email=document.getElementById('loginEmail').value.trim();
  const pw=document.getElementById('loginPw').value;
  document.getElementById('loginErr').textContent='';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){document.getElementById('loginErr').textContent=error.message;return;}
  await onSignedIn(data.session);
}
async function doSignOut(){await sb.auth.signOut();currentUser=null;location.reload();}
async function onSignedIn(session){
  currentUser=session.user;
  let {data:prof}=await sb.from('user_profiles').select('*').eq('id',currentUser.id).maybeSingle();
  if(!prof){
    const displayName=(currentUser.user_metadata||{}).name||currentUser.email.split('@')[0].replace(/^./,c=>c.toUpperCase());
    const ins=await sb.from('user_profiles').insert({id:currentUser.id,display_name:displayName,handle:displayName.toLowerCase()}).select().single();
    prof=ins.data;
  }
  myProfile=prof;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appRoot').style.display='flex';
  document.getElementById('whoami').textContent=myProfile.display_name;
  await loadAll();
  await autoSeedMarketingPlanIfNeeded();
  subscribeRealtime();
  renderNav();
  go('today');
}
(async function initAuth(){
  const {data}=await sb.auth.getSession();
  if(data.session) await onSignedIn(data.session);
})();

/* ---------------------------------------------------------------------------
   DATA LAYER
--------------------------------------------------------------------------- */
async function loadAll(){
  const results = await Promise.all(TABLES.map(t=>sb.from(t).select('*')));
  let anyError=false;
  TABLES.forEach((t,i)=>{
    if(results[i].error){console.error('Load failed:',t,results[i].error);anyError=true;state[t]=state[t]||[];}
    else state[t]=results[i].data||[];
  });
  dbStatus = anyError ? 'error' : 'connected';
  refreshUnreadBadge();
}
function subscribeRealtime(){
  const collab=['organisations','people','opportunities','activities','tasks','meetings','assets_v2',
    'lessons_v2','objections','decisions','team_messages_v2','team_message_replies','team_message_reads',
    'entity_links','marketing_items','investor_profiles','knowledge_sections_v2'];
  let subscribed=0;
  collab.forEach(t=>{
    sb.channel('rt:'+t).on('postgres_changes',{event:'*',schema:'public',table:t},payload=>{
      applyRealtimeChange(t,payload);
    }).subscribe(status=>{
      if(status==='SUBSCRIBED'){subscribed++; if(subscribed===collab.length) realtimeStatus='connected';}
      if(status==='CHANNEL_ERROR'||status==='TIMED_OUT') realtimeStatus='error';
    });
  });
}
function applyRealtimeChange(table,payload){
  const arr=state[table]; if(!arr) return;
  if(payload.eventType==='INSERT'){ if(!byId(arr,payload.new.id)) arr.push(payload.new); }
  else if(payload.eventType==='UPDATE'){ const i=arr.findIndex(x=>x.id===payload.new.id); if(i>=0) arr[i]=payload.new; else arr.push(payload.new); }
  else if(payload.eventType==='DELETE'){ const i=arr.findIndex(x=>x.id===payload.old.id); if(i>=0) arr.splice(i,1); }
  renderNav();
  if(document.getElementById('content') && route.page) renderCurrent();
}

async function dbInsert(table,row){
  const {data,error}=await sb.from(table).insert(row).select().single();
  if(error){toast('Save failed: '+error.message);console.error(error);throw error;}
  if(!byId(state[table],data.id)) state[table].push(data);
  return data;
}
async function dbUpdate(table,id,patch){
  const {data,error}=await sb.from(table).update(patch).eq('id',id).select().single();
  if(error){toast('Save failed: '+error.message);console.error(error);throw error;}
  const i=state[table].findIndex(x=>x.id===id); if(i>=0) state[table][i]=data;
  return data;
}
async function dbDelete(table,id){
  const {error}=await sb.from(table).delete().eq('id',id);
  if(error){toast('Delete failed: '+error.message);console.error(error);throw error;}
  const i=state[table].findIndex(x=>x.id===id); if(i>=0) state[table].splice(i,1);
}

/* Every meaningful interaction creates an activity — the single master
   timeline every detail page, search and AI retrieval read from. */
async function logActivity({activity_type,title,body,organisation_id,person_id,opportunity_id,task_id,meeting_id,asset_id,lesson_id,decision_id,team_message_id}){
  return dbInsert('activities',{
    activity_type, title, body: body||null, occurred_at: new Date().toISOString(),
    organisation_id: organisation_id||null, person_id: person_id||null, opportunity_id: opportunity_id||null,
    task_id: task_id||null, meeting_id: meeting_id||null, asset_id: asset_id||null,
    lesson_id: lesson_id||null, decision_id: decision_id||null, team_message_id: team_message_id||null,
    created_by: myProfile.display_name
  });
}
async function touchOrgInteraction(orgId, nextActionSummary, nextActionDate){
  if(!orgId) return;
  const patch={last_interaction_at: today()};
  if(nextActionSummary!==undefined) patch.next_action_summary=nextActionSummary;
  if(nextActionDate!==undefined) patch.next_action_date=nextActionDate;
  await dbUpdate('organisations', orgId, patch);
}

/* ---------------------------------------------------------------------------
   TIMELINE ROW EDIT/DELETE — every note logged via quickLogPersonActivity /
   quickLogOrgActivity, and every plain 'Note' activity, can be edited or
   removed directly from wherever its timeline is shown. Non-Note activity
   types (Meeting/Asset uploaded/etc.) are system-generated records of a
   real event elsewhere and are shown read-only here — editing "Meeting"
   as a timeline row wouldn't change the actual meeting, so that stays a
   link to the source record instead of an edit action.
--------------------------------------------------------------------------- */
function editActivityForm(id){
  const a=byId(state.activities,id); if(!a) return;
  openModal('<h3>Edit note</h3>'+
    '<div class="field"><label class="fl">Title</label><input class="input" id="f_acttitle" value="'+esc(a.title)+'"></div>'+
    '<div class="field"><label class="fl">Details</label><textarea class="input" id="f_actbody" rows="4">'+esc(a.body||'')+'</textarea></div>'+
    '<button class="btn gold" onclick="saveActivityEdit(\''+id+'\')">Save</button>'+
    '<div class="faint" style="font-size:10.5px;margin-top:10px">Notes can\u2019t be deleted — activities are a permanent record by design (RLS has no delete policy on this table, deliberately). Clear the text instead if it needs to go away.</div>');
}
async function saveActivityEdit(id){
  const title=document.getElementById('f_acttitle').value.trim();
  if(!title){toast('Title required');return;}
  await dbUpdate('activities',id,{title, body:document.getElementById('f_actbody').value.trim()||null});
  closeModal(); renderCurrent(); toast('Saved');
}
/* Renders one timeline row. Editable (title/body edit) only for plain Note
   activities — anything else links to its real source record. No delete
   action here: activities has no archived_at column and its RLS policy
   deliberately grants no delete permission (a permanent audit trail, by
   the original schema design) — a delete button here would fail every
   time, so it isn't offered rather than shipping a button that lies. */
function timelineRow(a){
  const editable = a.activity_type==='Note';
  const openTarget = a.meeting_id?"go('meetingDetail','"+a.meeting_id+"')"
    : a.task_id?"openTaskModal('"+a.task_id+"')"
    : a.asset_id?"go('assetDetail','"+a.asset_id+"')"
    : editable?"editActivityForm('"+a.id+"')" : null;
  return '<div class="row-item" style="'+(openTarget?'':'cursor:default')+'"'+(openTarget?' onclick="'+openTarget+'"':'')+'>'+
    '<div class="row-main"><div class="row-title">'+esc(a.title)+'</div>'+(a.body?'<div class="row-meta" style="white-space:normal">'+esc(a.body.slice(0,180))+'</div>':'')+'</div>'+
    '<div class="row-right">'+a.activity_type+' · '+fmtDate(a.occurred_at)+'</div></div>';
}
function orgName(id){const o=byId(state.organisations,id);return o?o.name:'';}
function userDisplay(userId){ const u=byId(state.user_profiles,userId); return u?u.display_name:'—'; }

/* ---------------------------------------------------------------------------
   DISPLAY-TITLE DERIVATION — migration metadata like "Migrated lesson from
   V1 lessons table" is never user-facing. Wherever a lesson title would be
   shown, this derives a real one from the content instead. Purely a
   presentation-layer fix — the underlying lessons_v2.title column in the
   database is untouched, per "do not modify the schema."
--------------------------------------------------------------------------- */
function isFallbackLessonTitle(t){ return !t || /^migrated lesson/i.test(t.trim()); }
function deriveLessonTitle(l){
  if(!isFallbackLessonTitle(l.title)) return l.title;
  const source=(l.summary||l.detail||'').trim();
  if(!source) return 'Untitled lesson';
  // First sentence, or first ~9 words if no sentence break — gives a real,
  // scannable title instead of the raw migration placeholder.
  const firstSentence=source.split(/(?<=[.!?])\s/)[0];
  let candidate = firstSentence.length<=70 ? firstSentence : source.split(/\s+/).slice(0,9).join(' ');
  candidate = candidate.replace(/[.!?]+$/,'').trim();
  if(candidate.length>78) candidate = candidate.slice(0,75).trim()+'…';
  return candidate;
}

function warmthClass(w){
  if(!w) return 'warmth-default';
  const s=w.toLowerCase();
  if(s.includes('hot')) return 'warmth-hot';
  if(s.includes('warm')) return 'warmth-warm';
  if(s.includes('cold')) return 'warmth-cold';
  return 'warmth-default';
}
function initials(name){
  if(!name) return '?';
  const parts=name.trim().split(/\s+/);
  return ((parts[0]?.[0]||'')+(parts[1]?.[0]||'')).toUpperCase();
}
/* Computed relationship flags for an organisation card — waiting/pilot/
   investor/team-notes — all derived live from state, never a stored field. */
function orgFlags(o){
  const flags=[];
  const waiting=state.tasks.some(t=>t.organisation_id===o.id && t.status==='Waiting for Response');
  if(waiting) flags.push({cls:'waiting',label:'Waiting',ico:'⏳'});
  const pilot=state.opportunities.some(op=>op.organisation_id===o.id && op.stage==='Pilot active');
  if(pilot) flags.push({cls:'pilot',label:'Pilot',ico:'▶'});
  const investor=state.investor_profiles.some(iv=>iv.organisation_id===o.id);
  if(investor) flags.push({cls:'investor',label:'Investor',ico:'$'});
  const teamNotes=state.team_messages_v2.some(m=>m.organisation_id===o.id && m.is_pinned);
  if(teamNotes) flags.push({cls:'team',label:'Team notes',ico:'✎'});
  return flags;
}

/* ---------------------------------------------------------------------------
   INLINE PILL EDITING — click a stage/status pill anywhere (card or detail
   page) to change it immediately, no form, no page reload. Both locations
   read the same organisations.pipeline_stage / .relationship_status
   columns, so they're inherently synchronised — there's only one place
   this data actually lives.
--------------------------------------------------------------------------- */
const PIPELINE_STAGES=['Identified','Contacted','Meeting done','Pilot discussion','Pilot active','Proposal sent','Won','Lost','On hold'];
const RELATIONSHIP_STATUSES=['Cold','Warm','Engaged','Active pilot','Customer','Dormant','Lost'];
/* The 9 values here are the ONLY ones the real organisation_type CHECK
   constraint allows — this is a database restriction, not a UI choice, so
   an arbitrary label like "Research Partner" cannot be saved into this
   field no matter how the UI is built. Multi-word or informal
   characterisations (e.g. "Research Partner", "Pilot customer") belong in
   Relationship Tags instead, which are unconstrained. */
const ORGANISATION_TYPES=['Prospect','Customer','Investor','Partner','Supplier','Regulator','Advisor organisation','Internal','Other'];
const PRIORITY_PRESETS=[0,25,50,75,100];
function closePillPopover(){ const p=document.getElementById('pillPopover'); if(p) p.remove(); }
document.addEventListener('click',e=>{ if(!e.target.closest('.pill-editable') && !e.target.closest('#pillPopover')) closePillPopover(); });
function openPillPopover(event, orgId, field){
  event.stopPropagation();
  closePillPopover();
  const options = field==='pipeline_stage' ? PIPELINE_STAGES
    : field==='relationship_status' ? RELATIONSHIP_STATUSES
    : field==='organisation_type' ? ORGANISATION_TYPES
    : field==='priority' ? PRIORITY_PRESETS
    : field==='warmth' ? PEOPLE_WARMTH_OPTIONS
    : [];
  const rect = event.currentTarget.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.id='pillPopover';
  pop.style.cssText='position:fixed;top:'+(rect.bottom+4)+'px;left:'+rect.left+'px;background:var(--panel2);'+
    'border:1px solid var(--line-s);border-radius:10px;padding:4px;z-index:150;box-shadow:0 12px 30px rgba(0,0,0,.5);min-width:160px;max-height:260px;overflow-y:auto';
  pop.innerHTML = options.map(opt=>'<div style="padding:7px 10px;font-size:12.5px;border-radius:7px;cursor:pointer" '+
    'onmouseover="this.style.background=\'var(--raise)\'" onmouseout="this.style.background=\'\'" '+
    'onclick="setPillField(\''+orgId+'\',\''+field+'\',\''+String(opt).replace(/'/g,"\\'")+'\')">'+esc(opt)+'</div>').join('');
  document.body.appendChild(pop);
}
async function setPillField(id, field, value){
  closePillPopover();
  const peopleFields=['warmth'];
  const table = peopleFields.includes(field) ? 'people' : 'organisations';
  const patch = field==='priority' ? {priority: parseInt(value,10)} : {[field]: value};
  await dbUpdate(table, id, patch);
  renderCurrent();
}
/* Kept as an alias — earlier code paths call setOrgPillField() directly. */
async function setOrgPillField(orgId, field, value){ return setPillField(orgId, field, value); }

/* ---------------------------------------------------------------------------
   NAV / ROUTING
--------------------------------------------------------------------------- */
const NAV = [
  {sect:'Command'}, {id:'today', label:'Today', ico:'◆'},
  {sect:'Relationships'},
  {id:'organisations', label:'Organisations', ico:'⌂'},
  {id:'people', label:'People', ico:'☺'},
  {id:'opportunities', label:'Opportunities', ico:'◈'},
  {sect:'Work'},
  {id:'tasks', label:'Follow-ups', ico:'✓'},
  {id:'meetings', label:'Meetings', ico:'▤'},
  {sect:'Knowledge'},
  {id:'lessons', label:'Lessons', ico:'✦'},
  {id:'objections', label:'Objections', ico:'!'},
  {id:'decisions', label:'Decisions', ico:'⚑'},
  {id:'knowledge', label:'Knowledge Base', ico:'▣'},
  {id:'assets', label:'Assets', ico:'▢'},
  {sect:'Investing'},
  {id:'investors', label:'Investors', ico:'$'},
  {id:'marketing', label:'Marketing', ico:'▲'},
  {sect:'AI'},
  {id:'ask', label:'AI Workspace', ico:'✳'},
  {id:'snapshot', label:'Export for Claude', ico:'⇩'},
  {sect:''},
  {id:'settings', label:'Settings', ico:'⚙'}
];
let route = {page:'today', id:null, tab:null};

function renderNav(){
  const el=document.getElementById('navList'); if(!el) return;
  const overdueCount = state.tasks.filter(t=>t.due_at && t.due_at<today() && !['Completed','Cancelled','Closed / Lost'].includes(t.status)).length;
  const reviewCount = state.migration_log.filter(m=>['needs_review','error'].includes(m.status)).length;
  el.innerHTML = NAV.map(n=>{
    if(n.sect!==undefined && !n.id) return n.sect?'<div class="nav-sect">'+n.sect+'</div>':'<div style="height:8px"></div>';
    if(n.sect) return '<div class="nav-sect">'+n.sect+'</div>';
    let badge='';
    if(n.id==='tasks' && overdueCount) badge='<span class="nav-badge">'+overdueCount+'</span>';
    if(n.id==='settings' && reviewCount) badge='<span class="nav-badge">'+reviewCount+'</span>';
    return '<div class="nav-item'+(route.page===n.id?' active':'')+'" onclick="go(\''+n.id+'\')"><span class="ico">'+n.ico+'</span>'+n.label+badge+'</div>';
  }).join('');
}
function go(page,id){
  route={page,id:id||null,tab:null};
  trackLastViewed(page,id);
  renderNav();
  renderCurrent();

/* "Continue where you left off" — persisted across sessions via
   localStorage (this is a standalone deployed app, not a Claude.ai
   artifact, so browser storage is appropriate here). Tracks the last few
   detail pages visited, most recent first, deduped by (page,id). */
const LAST_VIEWED_KEY = 'kweli_brain_last_viewed';
const LAST_VIEWED_PAGES = {
  organisationDetail: {table:'organisations', nameField:'name', icon:'⌂'},
  personDetail: {table:'people', nameField:'full_name', icon:'☺'},
  opportunityDetail: {table:'opportunities', nameField:'title', icon:'◈'},
  meetingDetail: {table:'meetings', nameField:'title', icon:'▤'}
};
function trackLastViewed(page,id){
  if(!LAST_VIEWED_PAGES[page] || !id) return;
  let list=[];
  try{ list=JSON.parse(localStorage.getItem(LAST_VIEWED_KEY)||'[]'); }catch(e){ list=[]; }
  list=list.filter(x=>!(x.page===page && x.id===id));
  list.unshift({page,id,at:Date.now()});
  list=list.slice(0,8);
  try{ localStorage.setItem(LAST_VIEWED_KEY, JSON.stringify(list)); }catch(e){}
}
function getLastViewed(){
  let list=[];
  try{ list=JSON.parse(localStorage.getItem(LAST_VIEWED_KEY)||'[]'); }catch(e){ return []; }
  return list.map(entry=>{
    const cfg=LAST_VIEWED_PAGES[entry.page]; if(!cfg) return null;
    const row=byId(state[cfg.table], entry.id);
    if(!row) return null;
    return {page:entry.page, id:entry.id, label:row[cfg.nameField]||'Untitled', icon:cfg.icon, at:entry.at};
  }).filter(Boolean).slice(0,5);
}

  const meetingsList=state.meetings.filter(m=>m.meeting_status==='Scheduled').sort((a,b)=>new Date(a.scheduled_at)-new Date(b.scheduled_at));
  const meetingsThisWeek=meetingsList.filter(m=>new Date(m.scheduled_at)<=weekEnd).length;
  const completedThisWeek=state.tasks.filter(t=>t.completed_at && new Date(t.completed_at) > new Date(Date.now()-7*86400000));
  const shownIds=new Set([...overdue,...dueToday].map(t=>t.id));
  const thisWeekTasks=opens.filter(t=>t.due_at && t.due_at>today() && new Date(t.due_at)<=weekEnd && !shownIds.has(t.id)).sort((a,b)=>a.due_at.localeCompare(b.due_at));

  const claimedOrgs=new Set([...overdue,...dueToday,...waiting,...thisWeekTasks].map(t=>t.organisation_id).filter(Boolean));

/* ---------------------------------------------------------------------------
   RELATIONSHIP TAGS / CHAMPION / DECISION MAKER — organisation_type stays
   the single, CHECK-constrained "primary" type (unchanged, still editable
   via its own pill). Multi-select relationship tags and the two free-text
   roles have no dedicated columns and no schema change is in scope this
   round, so — same convention as the marketing packed fields, and
   deliberately not the "hidden JSON in a text field" pattern flagged as an
   anti-pattern during migration — they're stored as plain, visible, labeled
   lines in organisations.current_status. That column has no other display
   use once Executive Summary (current_summary) is the dedicated prose
   field, so nothing else is displaced.
--------------------------------------------------------------------------- */
const RELATIONSHIP_TAGS=['Customer','Partner','Investor','Government','NGO','Research','Supplier','Strategic','Advisor','Pilot','Commercial'];
const PEOPLE_WARMTH_OPTIONS=['Cold','Cool','Warm','Hot','Champion'];
function getOrgMeta(o){
  const raw=o.current_status||'';
  const tagsMatch=raw.match(/^\[\[tags:([^\]]*)\]\]\n?/);
  const tags=tagsMatch?tagsMatch[1].split(',').map(t=>t.trim()).filter(Boolean):[];
  const rest=raw.replace(/^\[\[tags:[^\]]*\]\]\n?/,'');
  const championMatch=rest.match(/^Champion:\s*(.*)$/m);
  const dmMatch=rest.match(/^Decision maker:\s*(.*)$/m);
  return {tags, champion:championMatch?championMatch[1].trim():'', decisionMaker:dmMatch?dmMatch[1].trim():''};
}
function serializeOrgMeta(meta){
  return '[[tags:'+meta.tags.join(',')+']]\nChampion: '+(meta.champion||'')+'\nDecision maker: '+(meta.decisionMaker||'');
}
async function saveOrgMetaField(orgId,key,value){
  const o=byId(state.organisations,orgId);
  const meta=getOrgMeta(o);
  meta[key]=value;
  await dbUpdate('organisations',orgId,{current_status:serializeOrgMeta(meta)});
  renderCurrent();
}
async function toggleOrgTag(orgId,tag){
  const o=byId(state.organisations,orgId);
  const meta=getOrgMeta(o);
  const idx=meta.tags.indexOf(tag);
  if(idx>=0) meta.tags.splice(idx,1); else meta.tags.push(tag);
  await dbUpdate('organisations',orgId,{current_status:serializeOrgMeta(meta)});
  renderCurrent();
}
function openTagPopover(event,orgId){
  event.stopPropagation();
  closePillPopover();
  const meta=getOrgMeta(byId(state.organisations,orgId));
  const rect=event.currentTarget.getBoundingClientRect();
  const pop=document.createElement('div');
  pop.id='pillPopover';
  pop.style.cssText='position:fixed;top:'+(rect.bottom+4)+'px;left:'+rect.left+'px;background:var(--panel2);'+
    'border:1px solid var(--line-s);border-radius:10px;padding:8px;z-index:150;box-shadow:0 12px 30px rgba(0,0,0,.5);min-width:170px';
  pop.innerHTML=RELATIONSHIP_TAGS.map(t=>'<label style="display:flex;align-items:center;gap:8px;padding:5px 4px;font-size:12.5px;cursor:pointer">'+
    '<input type="checkbox" '+(meta.tags.includes(t)?'checked':'')+' onchange="toggleOrgTag(\''+orgId+'\',\''+t+'\')"> '+t+'</label>').join('');
  document.body.appendChild(pop);
}
function startInlineEdit(el,orgId,key){
  const raw=el.dataset.raw||'';
  const holder=document.createElement('span');
  holder.innerHTML='<input class="input" style="display:inline-block;width:220px;padding:4px 8px;font-size:12.5px">';
  const input=holder.firstChild;
  input.value=raw;
  el.replaceWith(input);
  input.focus();
  input.onblur=()=>saveOrgMetaField(orgId,key,input.value.trim());
  input.onkeydown=(e)=>{ if(e.key==='Enter') input.blur(); };
}
function kvEditableText(label,value,orgId,key){
  return '<div class="kv"><span class="k">'+label+'</span><span class="v"><span class="pill-editable" style="cursor:pointer;text-decoration:underline;text-decoration-style:dotted" data-raw="'+esc(value||'')+'" onclick="startInlineEdit(this,\''+orgId+'\',\''+key+'\')">'+esc(value||'Click to add')+'</span></span></div>';
}
/* Same click-to-edit interaction as kvEditableText, but for real
   organisations columns (dbUpdate directly) rather than the packed
   current_status metadata block. */
/* ---------------------------------------------------------------------------
   GENERALIZED INLINE EDITING — one pair of helpers for any table/column,
   used across both Person and Organisation Overview so every attribute is
   editable in place. Replaces the earlier org-only and
   next-action-only-on-person versions (kvRealEditableText /
   kvRealEditableTextPerson / startRealInlineEdit / startRealInlineEditPerson)
   which only covered a handful of fields — this is the one mechanism now.
--------------------------------------------------------------------------- */
function kvEditReal(label,value,table,id,column,kind){
  kind=kind||'text';
  return '<div class="kv"><span class="k">'+label+'</span><span class="v"><span class="pill-editable" style="cursor:pointer;text-decoration:underline;text-decoration-style:dotted" onclick="startRealEdit(this,\''+table+'\',\''+id+'\',\''+column+'\',\''+kind+'\')">'+esc(value||'Click to add')+'</span></span></div>';
}
function startRealEdit(el,table,id,column,kind){
  const holder=document.createElement('span');
  if(kind==='textarea') holder.innerHTML='<textarea class="input" rows="2" style="display:block;width:260px;padding:4px 8px;font-size:12.5px"></textarea>';
  else holder.innerHTML='<input class="input" type="text" style="display:inline-block;width:220px;padding:4px 8px;font-size:12.5px">';
  const input=holder.firstChild;
  input.value = el.textContent==='Click to add' ? '' : el.textContent;
  el.replaceWith(input);
  input.focus();
  input.onblur=async()=>{
    let value = input.value.trim()||null;
    if(kind==='array') value = value ? value.split(',').map(s=>s.trim()).filter(Boolean) : null;
    if((column==='full_name'||column==='name') && !value){ toast((column==='name'?'Organisation name':'Full name')+' can\u2019t be empty'); renderCurrent(); return; }
    await dbUpdate(table,id,{[column]: value});
    renderCurrent();
  };
  input.onkeydown=(e)=>{ if(e.key==='Enter' && kind!=='textarea') input.blur(); };
}
function kvEditRealDate(label,value,table,id,column){
  return '<div class="kv"><span class="k">'+label+'</span><span class="v">'+
    '<input type="date" class="input" style="display:inline-block;width:150px;padding:4px 8px;font-size:12.5px" value="'+(value||'')+'" '+
    'onchange="dbUpdate(\''+table+'\',\''+id+'\',{'+column+':this.value||null}).then(renderCurrent)"></span></div>';
}
/* Select-variant, for id-valued fields like a person's organisation —
   reuses the pill popover mechanism but with an id/label option list
   instead of fixed strings. */
function kvEditRealSelect(label,value,table,id,column,options){
  return '<div class="kv"><span class="k">'+label+'</span><span class="v"><span class="pill pill-editable" onclick="openIdPickerPopover(event,\''+table+'\',\''+id+'\',\''+column+'\')">'+esc(value||'Click to set')+'</span></span></div>';
}
function openIdPickerPopover(event,table,id,column){
  event.stopPropagation();
  closePillPopover();
  const options = column==='primary_organisation_id' ? state.organisations.map(o=>({id:o.id,label:o.name})) : [];
  const rect = event.currentTarget.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.id='pillPopover';
  pop.style.cssText='position:fixed;top:'+(rect.bottom+4)+'px;left:'+rect.left+'px;background:var(--panel2);'+
    'border:1px solid var(--line-s);border-radius:10px;padding:4px;z-index:150;box-shadow:0 12px 30px rgba(0,0,0,.5);min-width:180px;max-height:260px;overflow-y:auto';
  pop.innerHTML = options.map(opt=>'<div style="padding:7px 10px;font-size:12.5px;border-radius:7px;cursor:pointer" '+
    'onmouseover="this.style.background=\'var(--raise)\'" onmouseout="this.style.background=\'\'" '+
    'onclick="dbUpdate(\''+table+'\',\''+id+'\',{'+column+':\''+opt.id+'\'}).then(()=>{closePillPopover();renderCurrent()})">'+esc(opt.label)+'</div>').join('');
  document.body.appendChild(pop);
}

function vPeople(){
  const all=state.people.filter(p=>!p.archived_at);
  if(!all.length) return '<div class="page-head"><div><div class="eyebrow">Relationships</div><div class="page-title">People</div></div>'+
    '<button class="btn gold" onclick="openPersonForm()">+ Add person</button></div>'+
    '<div class="empty"><div class="empty-ico">☺</div>No people yet. Track the humans behind every opportunity.</div>';

  const f=route.peopleFilter=route.peopleFilter||{q:'', org:'', warmth:'', sort:'name'};
  const orgsWithPeople=[...new Set(all.map(p=>p.primary_organisation_id).filter(Boolean))].map(id=>byId(state.organisations,id)).filter(Boolean).sort((a,b)=>a.name.localeCompare(b.name));
  const warmths=[...new Set(all.map(p=>p.warmth).filter(Boolean))].sort();

  let list=[...all];
  if(f.q){ const q=f.q.toLowerCase(); list=list.filter(p=>(p.full_name+' '+(p.role||'')+' '+(p.notes||'')+' '+orgName(p.primary_organisation_id)).toLowerCase().includes(q)); }
  if(f.org) list=list.filter(p=>p.primary_organisation_id===f.org);
  if(f.warmth) list=list.filter(p=>p.warmth===f.warmth);
  if(f.sort==='recent') list.sort((a,b)=>(b.last_interaction_at||'').localeCompare(a.last_interaction_at||''));
  else if(f.sort==='org') list.sort((a,b)=>orgName(a.primary_organisation_id).localeCompare(orgName(b.primary_organisation_id)));
  else list.sort((a,b)=>a.full_name.localeCompare(b.full_name));

  const toolbar='<div class="toolbar">'+

async function savePersonForm(){
  const email=document.getElementById('f_pemail').value.trim();
  const linkedin=document.getElementById('f_plinkedin').value.trim();
  const dupe=state.people.find(x=>(email && x.email && x.email.toLowerCase()===email.toLowerCase()) ||
                                   (linkedin && x.linkedin && x.linkedin.replace(/\/$/,'').toLowerCase()===linkedin.replace(/\/$/,'').toLowerCase()));
  if(dupe && !confirm('This looks like it might be the same person as "'+dupe.full_name+'" (matching email/LinkedIn). Create a new record anyway?')) {
    closeModal(); go('personDetail', dupe.id); return;
  }
  const full_name=document.getElementById('f_pname').value.trim();
  if(!full_name){toast('Name is required');return;}
  const payload={
    full_name, primary_organisation_id: document.getElementById('f_porg').value||null,
    email: email||null, linkedin: linkedin||null, created_by: myProfile.display_name
  };
  const created=await dbInsert('people',payload);
  closeModal(); go('personDetail', created.id);
}

async function saveOppForm(id){
  const payload={
    organisation_id: document.getElementById('f_oorg').value,
    title: document.getElementById('f_otitle').value.trim(),
    stage: document.getElementById('f_ostage').value,
    problem: document.getElementById('f_oproblem').value.trim()||null,
    kweli_angle: document.getElementById('f_oangle').value.trim()||null,
    next_action_summary: document.getElementById('f_onext').value.trim()||null,

async function completeTask(id){

  const outcomeLabel=document.getElementById('f_outcome').value;
  const notes=document.getElementById('f_outcomeNotes').value.trim();
  const nextDue=document.getElementById('f_nextDue').value;
  const makeLesson=document.getElementById('f_makelesson').checked;
  const mapping=FU_OUTCOMES.find(o=>o.label===outcomeLabel);
  const nextStatus = mapping.next || 'Completed';
  const isFinal=['Completed','Closed / Lost'].includes(nextStatus);

  const act = await logActivity({
    activity_type: outcomeLabel.includes('Email')?'Email sent':outcomeLabel.includes('Meeting')?'Meeting':outcomeLabel.includes('Call')?'Call':outcomeLabel.includes('Proposal')?'Proposal sent':'Follow-up',
    title: t.title+' — '+outcomeLabel, body: notes||null,
    organisation_id: t.organisation_id, person_id: t.person_id, opportunity_id: t.opportunity_id, task_id: t.id
  });

  if(isFinal){
    await dbUpdate('tasks', id, {status: nextStatus, outcome: outcomeLabel, completion_notes: notes||null, completed_at: new Date().toISOString()});
  } else {
    await dbUpdate('tasks', id, {status: nextStatus, outcome: outcomeLabel, completion_notes: notes||null, due_at: nextDue, waiting_since: today()});
  }

  if(makeLesson && notes){
    const lesson=await dbInsert('lessons_v2',{title:(t.title+' — lesson').slice(0,200), summary:notes.slice(0,300), detail:notes, source_type:'task', source_id:id, created_by:myProfile.display_name});

  }

  if(t.organisation_id) await touchOrgInteraction(t.organisation_id, isFinal?null:t.title, isFinal?null:nextDue);
  closeModal(); renderCurrent(); toast('Follow-up updated');
}

/* ---------------------------------------------------------------------------
   CALENDAR — one engine, ported from V1's proven month-grid implementation.
   Tasks, meetings, marketing items and team notes with due dates all render
   from the same shared month state (calMonth/calYear) — nothing here is a
   second, independent calendar.
--------------------------------------------------------------------------- */
let calMonth=new Date().getMonth(), calYear=new Date().getFullYear();
let calFilters={tasks:true, meetings:true, marketing:true, team:true};
let calHideCompleted=false;
const CAL_TYPE_COLOR={tasks:'var(--blue)', meetings:'var(--green)', marketing:'var(--gold)', team:'var(--amber)'};

/* Monday-first month grid, including the leading/trailing days from
   adjacent months needed to fill complete weeks — exact port of V1's
   mkMonthGridDates(). */
function monthGridDates(year,month){
  const firstOfMonth=new Date(year,month,1);
  const lastOfMonth=new Date(year,month+1,0);
  const startOffset=(firstOfMonth.getDay()+6)%7; // Monday=0 ... Sunday=6
  const gridStart=new Date(firstOfMonth); gridStart.setDate(gridStart.getDate()-startOffset);
  const endOffset=(7-lastOfMonth.getDay())%7;
  const gridEnd=new Date(lastOfMonth); gridEnd.setDate(gridEnd.getDate()+endOffset);
  const cells=[]; let cur=new Date(gridStart);
  while(cur<=gridEnd){ cells.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
  return cells;
}
function isoDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

function calendarItemsFor(year,month){
  const items=[];
  state.tasks.forEach(t=>{
    if(t.calendar_visible===false || !t.due_at) return;
    const d=new Date(t.due_at); if(d.getFullYear()!==year||d.getMonth()!==month) return;
    const done=['Completed','Cancelled','Closed / Lost'].includes(t.status);
    items.push({date:t.due_at, label:t.title, type:'tasks', done, overdue:!done&&t.due_at<today(), onclick:"openTaskModal('"+t.id+"')"});
  });
  state.meetings.forEach(m=>{
    const d=new Date(m.scheduled_at); if(d.getFullYear()!==year||d.getMonth()!==month) return;
    items.push({date:isoDate(d), label:m.title, type:'meetings', done:m.meeting_status==='Completed', overdue:false, onclick:"go('meetingDetail','"+m.id+"')"});
  });
  state.marketing_items.forEach(mi=>{
    if(!mi.scheduled_at) return;
    const d=new Date(mi.scheduled_at); if(d.getFullYear()!==year||d.getMonth()!==month) return;
    items.push({date:isoDate(d), label:mi.title, type:'marketing', done:mi.status==='Published', overdue:false, onclick:"openMarketingDetail('"+mi.id+"')"});
  });
  state.team_messages_v2.forEach(m=>{
    if(!m.due_at || !m.is_pinned) return;
    const d=new Date(m.due_at); if(d.getFullYear()!==year||d.getMonth()!==month) return;
    items.push({date:m.due_at, label:m.title, type:'team', done:m.status==='Done', overdue:false, onclick:"openTeamNoteDetail('"+m.id+"')"});
  });
  return items;
}
function calMiniItem(it){
  return '<div class="cal-mini'+(it.overdue?' overdue':'')+(it.done?' done':'')+'" style="border-left-color:'+CAL_TYPE_COLOR[it.type]+'" onclick="event.stopPropagation();'+it.onclick+'">'+
    (it.done?'<span style="color:var(--green);flex:none">\u2713</span>':'')+
    '<span class="cal-mini-text">'+esc(it.label)+'</span></div>';
}
function calDayCell(date,viewMonthNum,byDate){
  const iso_=isoDate(date);
  const dayItems=[...(byDate[iso_]||[])].sort((a,b)=>(a.done===b.done)?0:(a.done?1:-1)); // incomplete first, completed sink to the bottom — never removed
  const items=dayItems.slice(0,4);
  const overflow=dayItems.length-items.length;
  const isToday=iso_===today();
  const inMonth=date.getMonth()===viewMonthNum;
  return '<div class="cal-cell'+(isToday?' today':'')+(inMonth?'':' other')+'" onclick="calDayView(\''+iso_+'\')">'+
    '<div class="cal-cell-head"><span class="cal-cell-num">'+date.getDate()+'</span></div>'+
    items.map(calMiniItem).join('')+
    (overflow>0?'<div class="cal-cell-more">+'+overflow+' more</div>':'')+
  '</div>';
}
function renderFullCalendar(){
  calMonth=Math.max(0,Math.min(11,calMonth));
  const cells=monthGridDates(calYear,calMonth);
  const items=calendarItemsFor(calYear,calMonth).filter(it=>calFilters[it.type] && !(calHideCompleted && it.done));
  const byDate={}; items.forEach(it=>{ (byDate[it.date]=byDate[it.date]||[]).push(it); });
  const monthLabel=new Date(calYear,calMonth,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const filterChip=(type,label)=>'<span class="pill" style="cursor:pointer;opacity:'+(calFilters[type]?1:.4)+'" onclick="calFilters.'+type+'=!calFilters.'+type+';renderCurrent()">'+
    '<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+CAL_TYPE_COLOR[type]+'"></span> '+label+'</span>';
  const toolbar='<div class="cal-toolbar"><button class="btn sm" onclick="calNav(-1)">‹</button>'+
    '<div class="cal-label">'+monthLabel+'</div>'+
    '<button class="btn sm" onclick="calNav(1)">›</button>'+
    '<button class="btn sm" onclick="calToday()">This month</button>'+
    '<div style="display:flex;gap:8px;margin-left:auto;flex-wrap:wrap">'+
      filterChip('tasks','Tasks')+filterChip('meetings','Meetings')+filterChip('marketing','Marketing')+filterChip('team','Team notes')+
      '<span class="pill" style="cursor:pointer" onclick="calHideCompleted=!calHideCompleted;renderCurrent()">'+(calHideCompleted?'\u2610':'\u2611')+' Show completed tasks</span>'+
    '</div></div>';
  const head='<div class="cal-head-row">'+['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map(d=>'<div class="cal-head-cell">'+d+'</div>').join('')+'</div>';
  const grid='<div class="cal-grid">'+cells.map(d=>calDayCell(d,calMonth,byDate)).join('')+'</div>';
  return toolbar+head+'<div class="cal-grid-wrap">'+grid+'</div>'+
    '<div class="faint" style="font-size:11px;margin:10px 2px 0">Click any day for its agenda, or click an item directly. Completed items are hidden by default.</div>';
}
function vCalendar(){
  return '<div class="page-head"><div><div class="eyebrow">Work</div><div class="page-title">Full Calendar</div>'+
    '<div class="page-sub">Every follow-up, meeting, marketing task and team reminder — one calendar.</div></div></div>'+
    renderFullCalendar();
}
function calNav(delta){ calMonth+=delta; if(calMonth<0){calMonth=11;calYear--;} if(calMonth>11){calMonth=0;calYear++;} renderCurrent(); }
function calToday(){ calMonth=new Date().getMonth(); calYear=new Date().getFullYear(); renderCurrent(); }
function calDayView(dateISO){
  const items=[...calendarItemsFor(new Date(dateISO).getFullYear(), new Date(dateISO).getMonth())].filter(it=>it.date===dateISO && calFilters[it.type]);
  const label=new Date(dateISO+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  openModal('<h3>'+esc(label)+'</h3>'+
    (items.length?'<div style="display:flex;flex-direction:column;gap:6px">'+items.map(calMiniItem).join('')+'</div>':'<div class="empty">Nothing scheduled for this day.</div>'));
}

   No isolated lessons.

function lessonLinks(lessonId){ return state.entity_links.filter(el=>el.source_type==='lesson'&&el.source_id===lessonId); }
function linkLabel(l){
  if(l.target_type==='organisation') return orgName(l.target_id);
  if(l.target_type==='meeting') { const m=byId(state.meetings,l.target_id); return m?m.title:'meeting'; }
  if(l.target_type==='person') { const p=byId(state.people,l.target_id); return p?p.full_name:'person'; }
  if(l.target_type==='opportunity') { const o=byId(state.opportunities,l.target_id); return o?o.title:'opportunity'; }
  if(l.target_type==='decision') { const d=byId(state.decisions,l.target_id); return d?d.title:'decision'; }
  return l.target_type;
}

  '</div>';
}

async function saveLessonForm(id){
  const title=document.getElementById('f_ltitle').value.trim();
  if(!title){toast('Title required');return;}
  const payload={title, summary:document.getElementById('f_lsummary').value.trim()||null,
    detail:document.getElementById('f_ldetail').value.trim()||null, category:document.getElementById('f_lcat').value.trim()||null};
  let lesson;
  if(id){
    lesson=await dbUpdate('lessons_v2',id,payload);
  } else {
    payload.source_type='manual'; payload.created_by=myProfile.display_name;
    lesson=await dbInsert('lessons_v2',payload);
    await logActivity({activity_type:'Lesson learned', title:'Lesson: '+title, body:payload.summary, lesson_id:lesson.id});
  }
  const orgId=document.getElementById('f_lorg').value;
  const personId=document.getElementById('f_lperson').value;
  await syncEntityLink('lesson',lesson.id,'organisation',orgId);
  await syncEntityLink('lesson',lesson.id,'person',personId);
  closeModal(); renderCurrent(); toast('Saved');
}
async function deleteLessonConfirm(id){
  if(!confirm('Delete this lesson?')) return;
  await dbUpdate('lessons_v2',id,{archived_at:new Date().toISOString()});
  closeModal(); renderCurrent(); toast('Deleted');
}
/* Keeps exactly one entity_link of a given (sourceType,targetType) pair in
   sync with a single-select dropdown — used by lesson/objection/decision
   forms so re-saving never creates duplicate links. */
async function syncEntityLink(sourceType,sourceId,targetType,targetId){
  const existing=state.entity_links.find(el=>el.source_type===sourceType&&el.source_id===sourceId&&el.target_type===targetType);
  if(targetId && (!existing || existing.target_id!==targetId)){
    if(existing) await dbDelete('entity_links',existing.id);
    await dbInsert('entity_links',{source_type:sourceType,source_id:sourceId,target_type:targetType,target_id:targetId,relationship_type:'relates_to',created_by:myProfile.display_name});
  } else if(!targetId && existing){
    await dbDelete('entity_links',existing.id);
  }
}

const KB_CATEGORIES=['Product','Positioning','Precision rule','Pricing','Pilots','Fundraising','Industries','Sales','Marketing','Investors','Company decisions','Lessons','Current company state','Future ideas'];
function vKnowledge(){
  const sections=state.knowledge_sections_v2.filter(k=>k.is_current);
  const filterQ=(route.kbSearch||'').toLowerCase();
  const activeCategory=route.kbCategory||'__all__';
  const byCategory={};
  sections.forEach(k=>{ const c=k.category||'Uncategorised'; byCategory[c]=byCategory[c]||[]; byCategory[c].push(k); });
  // Preserve a sensible chapter order; any category not in KB_CATEGORIES still shows up at the end.
  const orderedCats=[...KB_CATEGORIES.filter(c=>byCategory[c]), ...Object.keys(byCategory).filter(c=>!KB_CATEGORIES.includes(c))];
  let visible=sections;
  if(activeCategory!=='__all__') visible=visible.filter(k=>(k.category||'Uncategorised')===activeCategory);
  if(filterQ) visible=visible.filter(k=>(k.title||'').toLowerCase().includes(filterQ)||(k.content||'').toLowerCase().includes(filterQ));

  const sidebar='<div class="kb-chapter'+(activeCategory==='__all__'?' active':'')+'" onclick="route.kbCategory=\'__all__\';renderCurrent()">All chapters<span class="cnt">'+sections.length+'</span></div>'+
    orderedCats.map(c=>'<div class="kb-chapter'+(activeCategory===c?' active':'')+'" onclick="route.kbCategory=\''+c.replace(/'/g,"\\'")+'\';renderCurrent()">'+esc(c)+'<span class="cnt">'+byCategory[c].length+'</span></div>').join('');

  const body=visible.length?visible.map(k=>'<div class="card" style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;align-items:flex-start">'+
      '<div><div style="font-size:14.5px;font-weight:640">'+esc(k.title)+'</div><div class="faint" style="font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;margin-top:3px">'+esc(k.category||'Uncategorised')+' · v'+(k.version||1)+'</div></div>'+
      '<button class="btn sm" onclick="openKnowledgeForm(\''+k.id+'\')">Edit</button></div>'+
      '<div style="font-size:12.5px;white-space:pre-wrap;margin-top:12px;max-height:280px;overflow-y:auto">'+esc(k.content||'')+'</div></div>').join('')
    : '<div class="empty"><div class="empty-ico">▣</div>Nothing in this chapter yet.</div>';

  return '<div class="page-head"><div><div class="eyebrow">Institutional knowledge</div><div class="page-title">Knowledge Base</div>'+
    '<div class="page-sub">The precision rule and product definition are the source of truth for every customer conversation.</div></div>'+

function fmtBytes(n){n=+n||0;if(!n)return '—';if(n<1024)return n+' B';if(n<1048576)return (n/1024).toFixed(1)+' KB';return (n/1048576).toFixed(1)+' MB';}
function assetIconType(a){const t=(a.file_type||'').toLowerCase(),n=(a.file_name||'').toLowerCase();

  if(t.includes('word')||/\.docx?$/.test(n))return {ico:'📝',label:'Doc'};
  if(t.includes('sheet')||/\.(xlsx?|csv)$/.test(n))return {ico:'📈',label:'Sheet'};
  if(t.includes('image')||/\.(png|jpe?g|svg|gif|webp)$/.test(n))return {ico:'🖼️',label:'Image'};
  if(t.includes('video')||/\.(mp4|mov|webm)$/.test(n))return {ico:'🎬',label:'Video'};
  return {ico:'📁',label:'File'};}
function isPdfAsset(a){ return (a.file_type||'').toLowerCase().includes('pdf') || (a.file_name||'').toLowerCase().endsWith('.pdf'); }
function isImageAsset(a){ return (a.file_type||'').toLowerCase().includes('image') || /\.(png|jpe?g|gif|webp)$/i.test(a.file_name||''); }

/* ---------------------------------------------------------------------------
   STORAGE SOURCE RESOLUTION — migrated V1 assets physically live in V1's
   original bucket, confirmed as exactly 'assets' (the ASSETS_BUCKET
   constant in V1's index.html). Our SQL migration (05_v1_migration.sql,
   Phase 13) only copied metadata into assets_v2 — it never moved files —
   so file_path on a migrated row still points into that original bucket,
   not kweli-brain-assets-v2. Detection, in priority order:
     1. An explicit "now stored in <V2 bucket>" marker in notes — written
        by replaceAssetFile() below, and always authoritative (a replaced
        file is genuinely in the V2 bucket regardless of migration history).
     2. The original migration-time marker ("remains in the legacy Storage
        bucket") that 05_v1_migration.sql wrote into notes for every
        migrated row.
     3. A matching migration_log row (step 'kweli_brain_v1_to_v2_2026_07:
        assets', target_table 'assets_v2') for this asset id — the
        authoritative migration record, used if the notes marker was ever
        edited away.
   Anything matching none of these is a genuine new V2 upload.
--------------------------------------------------------------------------- */
const V1_LEGACY_BUCKET = 'assets'; // confirmed exact V1 Storage bucket name (ASSETS_BUCKET constant in V1 index.html)
function getAssetStorageSource(asset){
  if(!asset) return {bucket:ASSETS_BUCKET, filePath:null, thumbnailPath:null};
  const notes = asset.notes||'';
  const replacedIntoV2 = notes.includes('now stored in '+ASSETS_BUCKET);
  let isLegacy = false;
  if(!replacedIntoV2){
    isLegacy = notes.includes('remains in the legacy Storage bucket') ||
      state.migration_log.some(m=>m.step===MIGRATION_STEP_PREFIX+'assets' && m.target_table==='assets_v2' && m.target_id===asset.id);
  }
  return {
    bucket: isLegacy ? V1_LEGACY_BUCKET : ASSETS_BUCKET,
    filePath: asset.file_path||null,
    thumbnailPath: asset.thumbnail_path||null
  };
}

/* ---------------------------------------------------------------------------
   ASSET THUMBNAILS — ported from V1's proven pipeline: a thumbnail is
   generated ONCE, at upload time, uploaded to Storage as a real JPEG, and
   its path saved to assets_v2.thumbnail_path. Viewing a card afterwards is
   then just a signed-URL fetch (batched across every visible card, cached
   for ~45 minutes) — never a re-render of the PDF. Migrated assets that
   already carry a V1 thumb_path get the same signed-URL treatment, from
   whichever bucket getAssetStorageSource() resolves for them; if a migrated
   asset has no thumbnail at all, it shows the same fallback cover as any
   other file with no thumbnail — no forced re-upload, no forced generation.
--------------------------------------------------------------------------- */
const PDFJS_WORKER_CDN_URL='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const PDFJS_LIB_CDN_URL='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
let __pdfLibReady=null, __pdfWorkerReady=null;
function ensurePdfLibLoaded(){
  if(window.pdfjsLib) return Promise.resolve(true);
  if(__pdfLibReady) return __pdfLibReady;
  __pdfLibReady=new Promise((resolve)=>{
    const s=document.createElement('script');
    s.src=PDFJS_LIB_CDN_URL;
    s.onload=()=>resolve(true);
    s.onerror=()=>{ console.error('[Assets thumbnail] PDF.js failed to load from cdnjs.'); resolve(false); };
    document.head.appendChild(s);
  });
  return __pdfLibReady;
}
/* Same-origin blob-URL workaround as V1: browsers block new Worker() from
   loading a cross-origin script directly, so we fetch the worker source
   ourselves and hand PDF.js a blob: URL instead. */
function ensurePdfWorkerConfigured(){
  if(__pdfWorkerReady) return __pdfWorkerReady;
  __pdfWorkerReady=(async()=>{
    const libOk=await ensurePdfLibLoaded();
    if(!libOk || typeof pdfjsLib==='undefined') return false;
    try{
      const res=await fetch(PDFJS_WORKER_CDN_URL);
      if(!res.ok) throw new Error('HTTP '+res.status);
      const code=await res.text();
      const blobUrl=URL.createObjectURL(new Blob([code],{type:'application/javascript'}));
      pdfjsLib.GlobalWorkerOptions.workerSrc=blobUrl;
      return true;
    }catch(e){
      console.error('[Assets thumbnail] Could not blob-ify the PDF.js worker, falling back to direct CDN workerSrc:',e);
      pdfjsLib.GlobalWorkerOptions.workerSrc=PDFJS_WORKER_CDN_URL;
      return true;
    }
  })();
  return __pdfWorkerReady;
}
async function generatePdfThumbnailBlob(file){
  const workerReady=await ensurePdfWorkerConfigured();
  if(!workerReady){ console.error('[Assets thumbnail] PDF.js not usable — skipping thumbnail generation.'); return null; }
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    const page=await pdf.getPage(1);
    const base=page.getViewport({scale:1});
    const scale=Math.min(2,600/base.width);
    const viewport=page.getViewport({scale});
    const canvas=document.createElement('canvas');
    canvas.width=Math.max(1,Math.round(viewport.width)); canvas.height=Math.max(1,Math.round(viewport.height));
    const ctx=canvas.getContext('2d');
    if(!ctx) return null;
    await page.render({canvasContext:ctx, viewport}).promise;
    return await new Promise(res=>canvas.toBlob(res,'image/jpeg',0.82));
  }catch(e){ console.error('[Assets thumbnail] Generation failed:',e); return null; }
}
/* Batched, cached signed-URL fetch for card thumbnails — one Storage call
   per bucket for a whole page of cards, reused across re-renders. Migrated
   and new assets can resolve to different buckets, so requests are grouped
   by resolved bucket first. */
let __thumbUrlCache={};
const THUMB_CACHE_MS=45*60*1000;
async function hydratePdfThumbnails(){
  const list=state.assets_v2.filter(a=>a.thumbnail_path);
  if(!list.length) return;
  const now=Date.now();
  const byBucket={};
  list.forEach(a=>{
    const src=getAssetStorageSource(a);
    if(__thumbUrlCache[src.thumbnailPath] && now-__thumbUrlCache[src.thumbnailPath].ts<THUMB_CACHE_MS) return;
    (byBucket[src.bucket]=byBucket[src.bucket]||[]).push(src.thumbnailPath);
  });
  for(const bucket of Object.keys(byBucket)){
    const paths=byBucket[bucket];
    if(!paths.length) continue;
    try{
      const {data,error}=await sb.storage.from(bucket).createSignedUrls(paths,3600);
      if(error){ console.error('[Assets thumbnail] createSignedUrls failed for bucket',bucket,error); continue; }
      data.forEach((d,i)=>{ if(d&&d.signedUrl) __thumbUrlCache[paths[i]]={url:d.signedUrl, ts:now}; });
    }catch(e){ console.error('[Assets thumbnail] Signed URL batch request threw:',e); }
  }
  list.forEach(a=>{
    const src=getAssetStorageSource(a);
    const c=__thumbUrlCache[src.thumbnailPath];
    const el=document.getElementById('athumb-'+a.id);
    if(!el) return;
    if(c && c.url){ if(!el.querySelector('img')) el.innerHTML='<img src="'+esc(c.url)+'" loading="lazy" alt="" />'; }
  });
}
