async function confirmAssetLink(linkId){ await dbUpdate('entity_links',linkId,{is_inferred:false, confidence:1}); toast('Link confirmed'); renderCurrent(); }
async function uploadAsset(file){
  if(!file) return;
  const path=uid()+'/'+file.name.replace(/[^a-zA-Z0-9.\-_]/g,'_');
  toast('Uploading…');
  const {error}=await sb.storage.from(ASSETS_BUCKET).upload(path,file,{cacheControl:'3600',upsert:true});
  if(error){toast('Upload failed: '+error.message);return;}
  let thumbnail_path=null;
  if(isPdfAsset({file_name:file.name, file_type:file.type})){
    const thumbBlob=await generatePdfThumbnailBlob(file);
    if(thumbBlob){
      thumbnail_path=path.replace(/\/[^/]+$/,'/thumb.jpg');
      const {error:thumbErr}=await sb.storage.from(ASSETS_BUCKET).upload(thumbnail_path,thumbBlob,{cacheControl:'3600',upsert:true,contentType:'image/jpeg'});
      if(thumbErr){ console.error('[Assets thumbnail] Upload failed:',thumbErr); thumbnail_path=null; }
    }
  }
  const asset=await dbInsert('assets_v2',{title:file.name, file_name:file.name, file_path:path, file_type:file.type, file_size:file.size, thumbnail_path, text_extraction_status:'not_started', created_by:myProfile.display_name});
  await logActivity({activity_type:'Asset uploaded', title:'Uploaded: '+file.name, asset_id:asset.id});
  // suggest org links by name match — suggestion only, never auto-confirmed
  for(const o of state.organisations){
    const firstWord=o.name.split(' ')[0].toLowerCase();
    if(firstWord.length>2 && file.name.toLowerCase().includes(firstWord)){
      await dbInsert('entity_links',{source_type:'asset',source_id:asset.id,target_type:'organisation',target_id:o.id,relationship_type:'mentions',is_inferred:true,confidence:0.6,created_by:myProfile.display_name});
    }
  }
  renderCurrent(); toast('Uploaded');
}
/* Replacing a migrated asset's file uploads into the V2 bucket and marks
   the row as V2-hosted going forward — the old V1 object is never deleted
   or moved, exactly as required. */
async function replaceAssetFile(id,file){
  if(!file) return;
  const a=byId(state.assets_v2,id);
  const wasLegacy=getAssetStorageSource(a).bucket===V1_LEGACY_BUCKET;
  const path=uid()+'/'+file.name.replace(/[^a-zA-Z0-9.\-_]/g,'_');
  toast('Uploading replacement…');
  const {error}=await sb.storage.from(ASSETS_BUCKET).upload(path,file,{cacheControl:'3600',upsert:true});
  if(error){ toast('Upload failed: '+error.message); return; }
  let thumbnail_path=a.thumbnail_path||null;
  if(isPdfAsset({file_name:file.name, file_type:file.type})){
    const thumbBlob=await generatePdfThumbnailBlob(file);
    if(thumbBlob){
      thumbnail_path=path.replace(/\/[^/]+$/,'/thumb.jpg');
      await sb.storage.from(ASSETS_BUCKET).upload(thumbnail_path,thumbBlob,{cacheControl:'3600',upsert:true,contentType:'image/jpeg'});
    }
  }
  const strippedNotes=(a.notes||'').replace(/\[V1 asset[^\]]*\]/,'').trim();
  const notes=(strippedNotes?strippedNotes+'\n\n':'')+(wasLegacy?'[File replaced '+today()+' — now stored in '+ASSETS_BUCKET+'; original V1 file left untouched in "'+V1_LEGACY_BUCKET+'".]':'[File replaced '+today()+' — now stored in '+ASSETS_BUCKET+'.]');
  await dbUpdate('assets_v2',id,{file_path:path, file_name:file.name, file_type:file.type, file_size:file.size, thumbnail_path, notes, text_extraction_status:'not_started', updated_by:myProfile.display_name});
  delete __thumbUrlCache[a.thumbnail_path]; delete signedUrlCache[a.file_path];
  await logActivity({activity_type:'Asset uploaded', title:'Replaced file: '+file.name, asset_id:id});
  renderCurrent(); toast(wasLegacy?'File replaced — original V1 file left untouched':'File replaced');
}
/* Cached signed-URL getter — bucket-aware via getAssetStorageSource(), so
   migrated V1 assets and new V2 uploads both resolve correctly. Cache
   checked/populated once per path, reused by Open/Preview/Download. */
async function getAssetSignedUrl(a){
  if(!a||!a.file_path) return null;
  const src=getAssetStorageSource(a);
  const cached=signedUrlCache[src.filePath];
  if(cached && cached.expires>Date.now()) return cached.url;
  const {data,error}=await sb.storage.from(src.bucket).createSignedUrl(src.filePath,3600);
  if(error){ toast('Could not open file (bucket: '+src.bucket+'): '+error.message); return null; }
  signedUrlCache[src.filePath]={url:data.signedUrl, expires:Date.now()+3500*1000};
  return data.signedUrl;
}
async function openAssetFile(id){
  const a=byId(state.assets_v2,id);
  const url=await getAssetSignedUrl(a);
  if(url) window.open(url,'_blank');
}
async function downloadAssetFile(id){
  const a=byId(state.assets_v2,id); if(!a||!a.file_path) return;
  const src=getAssetStorageSource(a);
  const {data,error}=await sb.storage.from(src.bucket).createSignedUrl(src.filePath,3600,{download:a.file_name||true});
  if(error){ toast('Download failed: '+error.message); return; }
  window.open(data.signedUrl,'_blank');
}
async function previewAsset(id){
  const a=byId(state.assets_v2,id);

/* Broader-than-investor_profiles candidate detection — a migration-time
   inference gap (Phase 12 of 05_v1_migration.sql only matched
   category/investment_status text loosely) may have missed a real investor
   relationship that still exists correctly in organisations/opportunities.
   This surfaces every plausible candidate, not just the ones that already
   have an investor_profiles row, so nothing stays silently excluded. */
function investorCandidates(){
  const byOrgId={};
  state.investor_profiles.forEach(iv=>{ if(iv.organisation_id) byOrgId[iv.organisation_id]={profile:iv, org:byId(state.organisations,iv.organisation_id)}; });
  state.organisations.forEach(o=>{
    if(byOrgId[o.id]) return;
    const hasInvestorType = o.organisation_type==='Investor';
    const hasInvestorOpp = state.opportunities.some(op=>op.organisation_id===o.id && ((op.problem||'').toLowerCase().includes('invest')||(op.kweli_angle||'').toLowerCase().includes('invest')));
    if(hasInvestorType || hasInvestorOpp) byOrgId[o.id]={profile:null, org:o};
  });
  const personOnly=state.investor_profiles.filter(iv=>!iv.organisation_id && iv.person_id).map(iv=>({profile:iv, org:null, person:byId(state.people,iv.person_id)}));
  return [...Object.values(byOrgId), ...personOnly];
}
function investorContext(c){
  const orgId=c.org?c.org.id:null;
  const opp=orgId?state.opportunities.find(o=>o.organisation_id===orgId):null;
  const acts=orgId?state.activities.filter(a=>a.organisation_id===orgId).sort((a,b)=>new Date(b.occurred_at)-new Date(a.occurred_at)):[];
  const decisions=orgId?state.decisions.filter(d=>!d.archived_at && state.entity_links.some(el=>el.source_type==='decision'&&el.source_id===d.id&&el.target_type==='organisation'&&el.target_id===orgId)):[];
  const objections=orgId?state.objections.filter(x=>!x.archived_at && x.organisation_id===orgId):[];
  return {opp, acts, decisions, objections};
}

async function promoteToInvestorProfile(orgId){

function openLinkExistingInvestor(){
  const alreadyLinked=new Set(state.investor_profiles.map(iv=>iv.organisation_id).filter(Boolean));
  const candidates=state.organisations.filter(o=>!alreadyLinked.has(o.id)).sort((a,b)=>a.name.localeCompare(b.name));
  openModal('<h3>Link an existing organisation as an investor</h3>'+
    '<div class="muted" style="font-size:12px;margin-bottom:14px">If an investor relationship is missing from this list, it may exist as an organisation that was never tagged as an investor during migration — link it here rather than re-creating it.</div>'+
    '<div class="field"><label class="fl">Organisation</label><select class="select" id="f_linkorg"><option value="">—</option>'+candidates.map(o=>'<option value="'+o.id+'">'+esc(o.name)+'</option>').join('')+'</select></div>'+
    '<button class="btn gold" onclick="confirmLinkExistingInvestor()">Link</button>');
}
async function confirmLinkExistingInvestor(){
  const orgId=document.getElementById('f_linkorg').value;

async function saveInvestorForm(id){
  const organisation_id=document.getElementById('f_iorg').value||null;
  const person_id=document.getElementById('f_iperson').value||null;
  if(!organisation_id && !person_id){toast('Select an organisation or a person');return;}
  const payload={organisation_id, person_id, stage:document.getElementById('f_istage').value.trim()||null,
    thesis:document.getElementById('f_ithesis').value.trim()||null, notes:document.getElementById('f_inotes').value.trim()||null};
  if(id) await dbUpdate('investor_profiles',id,payload);
  else await dbInsert('investor_profiles',payload);
  closeModal(); renderCurrent(); toast('Saved');
}

  {title:'Pitch TechCabal',category:'PR',audience:'TechCabal',objective:'Product and technical build story: why the team chose Base over other chains, and the technical discipline of privacy-first verification — TechCabal’s audience is technical and appreciates real engineering detail over hype.',estMinutes:30},

  {title:'Pitch Bloomberg Africa',category:'PR',audience:'Bloomberg Africa',objective:'Macro/investor angle: category-creation economics — why “verification infrastructure” is an underbuilt category with a plausible path to a large TAM, timed to align with the raise.',estMinutes:30},
  {title:'Pitch Reuters',category:'PR',audience:'Reuters',objective:'Only pitch when there’s a genuine news hook — a regulatory mandate, a notable fraud case Kweli’s data illuminates, or a funding close. Reuters doesn’t cover positioning stories; it covers events.',estMinutes:30},
  {title:'Partnership outreach: Audit firms (Big Four and mid-tier East African firms)',category:'Partnership',audience:'Audit firms (Big Four and mid-tier East African firms)',objective:'They see the tampered-document problem across every client; a referral relationship is worth more than any single audit-firm customer contract Offer to co-author “What Auditors Wish Their Clients Understood About Document Trust” (Part 4, #6); position as a practitioner resource, not a sales pitch',estMinutes:30},
  {title:'Partnership outreach: Insurance associations (e.g., Association of Kenya Insurers)',category:'Partnership',audience:'Insurance associations (e.g., Association of Kenya Insurers)',objective:'Association-level relationships open doors to every member insurer at once and lend third-party credibility Propose a closed-door roundtable on claims documentation risk; bring data, not a pitch deck',estMinutes:30},
  {title:'Partnership outreach: Law societies / legal bodies',category:'Partnership',audience:'Law societies / legal bodies',objective:'Legal counsel influence disputes where document authenticity is contested; early relationships build a referral and credibility channel Offer a short CLE-style briefing on document provenance and chain-of-custody standards',estMinutes:30},
  {title:'Partnership outreach: Universities',category:'Partnership',audience:'Universities',objective:'Long-term credentials vertical + research-partnership credibility for reports Approach an economics or law faculty with a co-research proposal, not a sales pitch — academic partnership, not vendor relationship',estMinutes:30},
  {title:'Partnership outreach: Certification bodies (e.g., KEBS-accredited certifiers)',category:'Partnership',audience:'Certification bodies (e.g., KEBS-accredited certifiers)',objective:'Direct beachhead vertical; also credible validators when they speak publicly about verification Approach with the specific reputational-risk framing (report #5, Certification Fraud Index) as the opening conversation',estMinutes:30},
  {title:'Partnership outreach: Export councils (e.g., Kenya Export Promotion and Branding Agency)',category:'Partnership',audience:'Export councils (e.g., Kenya Export Promotion and Branding Agency)',objective:'Policy-adjacent influence on trade documentation standards; potential co-branding on trade reports Propose collaboration on the Export Documentation Friction Report (Part 4, #7)',estMinutes:30},
  {title:'Partnership outreach: Software vendors / ERP providers (lab information systems, claims management systems)',category:'Partnership',audience:'Software vendors / ERP providers (lab information systems, claims management systems)',objective:'Integration partnerships turn Kweli into a feature of systems institutions already use, reducing sales friction dramatically Approach as a technical integration partner, offering API access for a joint case study, not a reseller deal upfront',estMinutes:30},
  {title:'Partnership outreach: Government agencies (KEBS, KEPHIS, KenTrade)',category:'Partnership',audience:'Government agencies (KEBS, KEPHIS, KenTrade)',objective:'Long-term mandate-setting power; too early to sell to, not too early to build relationship and share research Share research reports as background briefings with zero commercial ask; the goal is being known and trusted before any mandate conversation is possible',estMinutes:30},
  {title:'Partnership outreach: Standards organizations',category:'Partnership',audience:'Standards organizations',objective:'Getting “verification infrastructure” terminology into a standards document is a multi-year category-ownership win (Part 2) Offer technical input sessions on document integrity standards, positioning Kweli as a knowledgeable contributor, not a vendor lobbying for adoption',estMinutes:30},

function expandTopicsToTarget(topics, target){
  const out=[]; let cycle=1, idx=0;
  while(out.length<target){
    const base=topics[idx % topics.length];
    out.push(cycle===1 ? base : base+' — Part '+cycle);
    idx++; if(idx % topics.length===0) cycle++;
  }
  return out.slice(0,target);
}

/* ---------------------------------------------------------------------------
   Every row gets a deterministic seed_key of the form
   'insurance-verification-6mo-v2-week-01-monday'. This — not the
   human-readable "[[campaign:...]]" tag still kept in `description` for
   readability — is the actual uniqueness mechanism, enforced by a real
   unique index (06_marketing_seed_key.sql). Building this list is pure,
   deterministic, offline computation; no network call happens here.
--------------------------------------------------------------------------- */
/* The very next Monday strictly AFTER today — never today itself, even if
   today happens to be a Monday. Weekend rollover (Sat/Sun -> Monday) falls
   out of the same formula. Previously this walked BACKWARD to the current
   week's Monday when today was Sunday (dow=0 gave -6, landing in the
   past) — that bug is why a plan seeded on a Sunday could start days
   before the seed even ran. */
function firstPlanMonday(from){
  const d=new Date(from); d.setHours(0,0,0,0);
  const dow=d.getDay(); // 0=Sun..6=Sat
  let daysAhead=((1-dow+7)%7);
  if(daysAhead===0) daysAhead=7; // today IS Monday — never seed onto today, use next week's Monday instead
  d.setDate(d.getDate()+daysAhead);
  return d;
}
function buildInsurancePlanRows(){
  const rows=[];
  const monArticles = expandTopicsToTarget(CORE_ARTICLE_TOPICS, 26);
  const wedTopics = expandTopicsToTarget(FOUNDER_JOURNEY_TOPICS, 26);
  let cursor = firstPlanMonday(new Date());

  for(let week=0; week<26; week++){
    const weekNum = String(week+1).padStart(2,'0');
    const monday = new Date(cursor);
    const tuesday = new Date(cursor); tuesday.setDate(tuesday.getDate()+1);
    const wednesday = new Date(cursor); wednesday.setDate(wednesday.getDate()+2);
    const thursday = new Date(cursor); thursday.setDate(thursday.getDate()+3);
    const friday = new Date(cursor); friday.setDate(friday.getDate()+4);

    const monthIdx = Math.min(5, Math.floor(week/4.345));
    const theme = MONTHLY_THEMES_6MO_V2[monthIdx];
    const articleTopic = monArticles[week];
    const founderTopic = wedTopics[week];

    const mk=(slot,title,type,date,audience,objective)=>({
      seed_key: MARKETING_CAMPAIGN_KEY+'-week-'+weekNum+'-'+slot,
      title, item_type:type, audience:audience||null, objective:objective||null,
      status:'Scheduled', priority:'Normal', owner_user_id:myProfile.id,
      scheduled_at: date.toISOString().slice(0,10),
      description:'[[campaign:'+MARKETING_CAMPAIGN_KEY+']] [[stage:Scheduled]]\nMonth theme: '+theme
    });

    rows.push(mk('monday','Article: '+articleTopic, 'Article', monday, 'CIO, COO, Claims Directors, Innovation teams', 'Write the core long-form piece for the week.'));
    rows.push(mk('tuesday','LinkedIn: '+articleTopic, 'LinkedIn Post', tuesday, null, 'Repurpose Monday\u2019s article into a LinkedIn post.'));
    rows.push(mk('wednesday',(week%2===0?'Insight: ':'Founder Story: ')+founderTopic, week%2===0?'Insight':'Founder Story', wednesday, null, 'Shorter, more personal piece.'));
    rows.push(mk('thursday','Engage & distribute this week\u2019s content', 'Engagement', thursday, null, 'Reply, share, and distribute what\u2019s been published this week.'));
    rows.push(mk('friday','Review performance & plan next topic', 'Review & Planning', friday, null, 'Check what worked this week and confirm next week\u2019s article topic.'));

    cursor.setDate(cursor.getDate()+7);
  }
  return rows;
}
function expectedSeedKeys(){
  const keys=[];
  for(let week=0; week<26; week++){
    const weekNum=String(week+1).padStart(2,'0');
    WEEK_SLOTS.forEach(slot=>keys.push(MARKETING_CAMPAIGN_KEY+'-week-'+weekNum+'-'+slot));
  }
  return keys;
}

/* Authoritative, database-verified completeness check — queries the real
   table for every seed_key belonging to this campaign, not local state
   (which could be stale or reflect a different device's in-progress
   write). This is what makes self-healing possible: a partial batch
   failure leaves some expected keys missing from this query's result,
   and the very next sign-in (any device) will see exactly which ones. */
async function fetchExistingCampaignSeedKeys(){
  const {data,error} = await sb.from('marketing_items').select('seed_key').like('seed_key', MARKETING_CAMPAIGN_KEY+'-week-%');
  if(error){ console.error('[Marketing plan] could not check existing seed keys:',error); throw error; }
  return new Set((data||[]).map(r=>r.seed_key));
}

   DUPLICATE PREVENTION, TWO LAYERS.
   Layer 1 (seed_key + unique index + upsert onConflict) already prevents
   the database from ever storing two rows with the same seed_key, even
   under a race. Layer 2, here, is a second, independent guard against a
   different failure mode: rows that exist WITHOUT a matching seed_key at
   all — e.g. left over from an earlier version of this seeding logic, or
   any other path that ever created a marketing_item with the same
   title/date/type. Before treating a computed row as "missing", check
   real content identity (title + scheduled_at + item_type) against every
   existing marketing_item, not just seed_key. If a content match is
   found but its seed_key is missing, backfill it — that both prevents a
   duplicate insert now and makes that row seed_key-recognised for every
   future run.
--------------------------------------------------------------------------- */
async function seedInsurancePlanBatched(){
  const allRows = buildInsurancePlanRows();
  const existingKeys = await fetchExistingCampaignSeedKeys();
  const contentIndex = new Map(); // "title|date|type" -> existing row
  state.marketing_items.forEach(mi=>{ contentIndex.set(mi.title+'|'+mi.scheduled_at+'|'+mi.item_type, mi); });

  const trulyMissing=[];
  const backfillKeyOnly=[];
  for(const r of allRows){
    if(existingKeys.has(r.seed_key)) continue; // already correctly seeded
    const contentMatch = contentIndex.get(r.title+'|'+r.scheduled_at+'|'+r.item_type);
    if(contentMatch && !contentMatch.seed_key){ backfillKeyOnly.push({id:contentMatch.id, seed_key:r.seed_key}); }
    else if(!contentMatch){ trulyMissing.push(r); }
    // else: a content match already carries a seed_key (from a different week/slot coincidentally
    // matching text) — leave it alone rather than risk overwriting a real, different row.
  }

  for(const b of backfillKeyOnly){ await dbUpdate('marketing_items', b.id, {seed_key:b.seed_key}); }

  if(!trulyMissing.length) return {created:0, backfilled:backfillKeyOnly.length, alreadyComplete:true, expected:allRows.length, existing:existingKeys.size};

  const CHUNK=40;
  let created=0;
  for(let i=0;i<trulyMissing.length;i+=CHUNK){
    const chunk=trulyMissing.slice(i,i+CHUNK);
    const {data,error} = await sb.from('marketing_items')
      .upsert(chunk, {onConflict:'seed_key', ignoreDuplicates:true})
      .select();
    if(error){ console.error('[Marketing plan] batch upsert failed:',error); toast('Marketing plan setup failed: '+error.message); throw error; }
    (data||[]).forEach(row=>{ if(!byId(state.marketing_items,row.id)) state.marketing_items.push(row); });
    created += (data||[]).length;
  }
  return {created, backfilled:backfillKeyOnly.length, alreadyComplete:false, expected:allRows.length, existing:existingKeys.size};
}

/* One-time cleanup pass for rows that were already duplicated before this
   guard existed. Groups every marketing_item (not just this campaign — a
   generic content-identity problem deserves a generic fix) by
   title+scheduled_at+item_type, keeps the OLDEST row in each group
   (by created_at), and deletes the rest. marketing_items has no
   archived_at column (confirmed against the schema), and it does have a
   real delete RLS policy (unlike lessons_v2/objections/decisions), so
   delete — not archive — is the correct and only available mechanism
   here. Cheap to run every sign-in: after the first real cleanup it's
   just an in-memory grouping over already-loaded state with nothing left
   to delete. */
async function dedupeMarketingItemsOnce(){
  const groups=new Map();
  state.marketing_items.forEach(mi=>{
    const key=mi.title+'|'+(mi.scheduled_at||'')+'|'+mi.item_type;
    if(!groups.has(key)) groups.set(key,[]);
    groups.get(key).push(mi);
  });
  const toDelete=[];
  groups.forEach(rows=>{
    if(rows.length<2) return;
    rows.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    toDelete.push(...rows.slice(1)); // keep the oldest, mark the rest for removal
  });
  if(!toDelete.length) return {removed:0};
  for(const row of toDelete){ await dbDelete('marketing_items', row.id); }
  return {removed:toDelete.length};
}

/* Called automatically from onSignedIn(), after loadAll(), before Today
   first renders. Runs the DB-verified check every sign-in — cheap (one
   indexed query returning ~130 text values) — so a plan that was left
   incomplete by a prior failed batch is topped up automatically, with no
   user action, on the very next login from any device. */
async function autoSeedMarketingPlanIfNeeded(){
  try{
    const dedupResult=await dedupeMarketingItemsOnce();
    if(dedupResult.removed) toast('Removed '+dedupResult.removed+' duplicate marketing item(s)');
    const existingKeys = await fetchExistingCampaignSeedKeys();
    const expected = expectedSeedKeys();
    const missingCount = expected.filter(k=>!existingKeys.has(k)).length;
    if(missingCount===0) return;
    showSeedingOverlay(existingKeys.size>0 ? 'Completing your marketing plan…' : 'Setting up your 6-month marketing plan…');
    const r=await seedInsurancePlanBatched();
    if(r.created) toast('Marketing plan ready — '+r.created+' piece(s) added ('+(r.expected-missingCount+r.created)+'/'+r.expected+' total)');
  } catch(e){
    // already toasted inside seedInsurancePlanBatched/fetchExistingCampaignSeedKeys
  } finally {
    hideSeedingOverlay();
  }
}

   campaign (matched by seed_key prefix — a real, RLS-permitted bulk
   delete, one network call) then reseeds the full expected set fresh. */
async function rebuildInsurancePlan(){
  if(!confirm('Rebuild the 6-month marketing plan? This removes every item in the current plan and recreates it fresh — any manual edits to those items will be lost.')) return;

    renderCurrent();
  }
}

const MARKETING_STATUSES=['Idea','Drafting','Scheduled','Published','Archived'];

/* ---------------------------------------------------------------------------
   WORKFLOW STAGE — the requested 7-stage model (Planned/Researching/
   Drafting/Review/Scheduled/Published/Archived) does not match
   marketing_items.status's real CHECK constraint, which only allows 5
   values (Idea/Drafting/Scheduled/Published/Archived) — and no schema
   changes are in scope this round. Rather than silently collapsing two
   pairs of stages into one (losing the Planned-vs-Researching and
   Drafting-vs-Review distinction on reload), the specific stage is stored
   as a plain, visible marker on the first line of `description` — not a
   hidden HTML comment, just a short readable prefix — and mapped to a
   valid DB status alongside it. The DB status is always kept consistent
   with the stage, so anything reading raw `status` (the calendar's "done"
   check, the org-detail tab) still works correctly without knowing about
   the marker at all.
--------------------------------------------------------------------------- */
const CONTENT_STAGES=['Planned','Researching','Drafting','Review','Scheduled','Published','Archived'];
const STAGE_TO_DB_STATUS={Planned:'Idea',Researching:'Idea',Drafting:'Drafting',Review:'Drafting',Scheduled:'Scheduled',Published:'Published',Archived:'Archived'};
function getContentStage(mi){
  const m=(mi.description||'').match(/^\[\[stage:([^\]]+)\]\]\n?/);
  if(m && CONTENT_STAGES.includes(m[1])) return m[1];
  if(mi.status==='Idea') return 'Planned';
  if(mi.status==='Drafting') return 'Drafting';
  return mi.status;
}
function stripStageMarker(desc){ return (desc||'').replace(/^\[\[stage:[^\]]+\]\]\n?/, ''); }
function setContentStageMarker(desc,stage){ return '[[stage:'+stage+']]\n'+stripStageMarker(desc||''); }
async function setContentStage(id,stage){
  const mi=byId(state.marketing_items,id);
  const patch={description:setContentStageMarker(mi.description,stage), status:STAGE_TO_DB_STATUS[stage]};
  if(stage==='Published') patch.completed_at=new Date().toISOString();
  if(stage==='Scheduled' && !mi.scheduled_at) patch.scheduled_at=today();
  await dbUpdate('marketing_items',id,patch);
  return byId(state.marketing_items,id);
}

/* Extra fields (draft link, published URL, lessons learned, industries,
   products, free notes) are not backed by dedicated columns either — same
   reasoning as the stage marker. Stored as clearly labeled lines
   immediately after the stage marker, fully visible plain text, parsed
   back into a real edit form rather than left as one undifferentiated
   blob. This is a deliberate trade-off for this round, not an oversight —
   flagged here and in the delivery notes rather than silently done. */
const CONTENT_FIELD_LABELS=['Draft link','Published URL','Lessons learned','Industries','Products'];
function parseContentFields(description){
  const body=stripStageMarker(description);
  const lines=body.split('\n');
  const fields={draftLink:'',publishedUrl:'',lessonsLearned:'',industries:'',products:'',notes:''};
  const labelMap={'Draft link':'draftLink','Published URL':'publishedUrl','Lessons learned':'lessonsLearned','Industries':'industries','Products':'products'};
  let i=0;
  for(; i<lines.length; i++){
    const m=lines[i].match(/^([A-Za-z ]+):\s*(.*)$/);
    if(m && labelMap[m[1]]){ fields[labelMap[m[1]]]=m[2]; }
    else break;
  }
  fields.notes=lines.slice(i).join('\n').replace(/^\n+/,'');
  return fields;
}
function serializeContentFields(stage,fields){
  let out='[[stage:'+stage+']]\n';
  CONTENT_FIELD_LABELS.forEach(label=>{
    const key={'Draft link':'draftLink','Published URL':'publishedUrl','Lessons learned':'lessonsLearned','Industries':'industries','Products':'products'}[label];
    out+=label+': '+(fields[key]||'')+'\n';
  });
  out+=(fields.notes||'');
  return out;
}

   CONTENT LIBRARY IMPORT — Layer 1, permanent, never auto-scheduled.
   Merge-safe by title; running twice never duplicates.
--------------------------------------------------------------------------- */
async function seedContentLibrary(){

      description:serializeContentFields('Planned',{notes:''})
    });
    created++;
  }
  renderCurrent();
  return {created,skipped};
}

/* ---------------------------------------------------------------------------
   EDITORIAL CALENDAR SCHEDULER — Layer 2. Draws unscheduled ("Planned")
   items from the library and spreads them across a realistic cadence:
   weekly (LinkedIn/Founder Story/Long-form/Founder-voice prompts, 3/week),
   biweekly (Customer Education, Opinion), monthly (Report), and a sparse
   quarterly-ish rhythm for PR/Partnership outreach. One shared calendar
   month state is used throughout the app (calMonth/calYear) — this only
   assigns scheduled_at dates into marketing_items, it never creates a
   second calendar.
--------------------------------------------------------------------------- */
const WEEKLY_CATEGORIES=['LinkedIn Post','LinkedIn Article','Founder Story','Long-form Article',
  'Founder LinkedIn — Infrastructure','Founder LinkedIn — Technology','Founder LinkedIn — Fraud','Founder LinkedIn — Trust',
  'Founder LinkedIn — Business philosophy','Founder LinkedIn — Startups','Founder LinkedIn — Enterprise software',
  'Founder LinkedIn — Case studies','Founder LinkedIn — Customer lessons','Founder LinkedIn — Product building','Founder LinkedIn — Industry observations'];
const BIWEEKLY_CATEGORIES=['Customer Education','Opinion Piece'];
const MONTHLY_CATEGORIES=['Report'];
const SPARSE_CATEGORIES=['PR','Partnership'];
const ITEMS_PER_WEEK=3;

function nextMonday(from){
  const d=new Date(from); const day=d.getDay(); const delta=(8-day)%7||7;
  d.setDate(d.getDate()+delta); return d;
}
function unscheduledInCats(cats){
  return state.marketing_items.filter(mi=>!mi.scheduled_at && cats.includes(mi.item_type) && getContentStage(mi)==='Planned');
}
async function scheduleContentItem(item,dateStr){
  await dbUpdate('marketing_items',item.id,{
    description:setContentStageMarker(item.description,'Scheduled'), status:'Scheduled', scheduled_at:dateStr
  });
}
async function generateEditorialCalendar(months){
  months=months||6;
  const weeks=Math.round(months*4.345);
  const startMonday=nextMonday(new Date());
  let scheduledCount=0;
  for(let w=0; w<weeks; w++){
    const weekStart=new Date(startMonday); weekStart.setDate(weekStart.getDate()+w*7);
    const weeklyPool=unscheduledInCats(WEEKLY_CATEGORIES);
    const dayOffsets=[0,2,4];
    for(let k=0;k<ITEMS_PER_WEEK;k++){
      const item=weeklyPool[k]; if(!item) break;
      const d=new Date(weekStart); d.setDate(d.getDate()+dayOffsets[k]);
      await scheduleContentItem(item, d.toISOString().slice(0,10));
      scheduledCount++;
    }
    if(w%2===0){
      const item=unscheduledInCats(BIWEEKLY_CATEGORIES)[0];
      if(item){ await scheduleContentItem(item, weekStart.toISOString().slice(0,10)); scheduledCount++; }
    }
    if(w%4===0){
      const item=unscheduledInCats(MONTHLY_CATEGORIES)[0];
      if(item){ await scheduleContentItem(item, weekStart.toISOString().slice(0,10)); scheduledCount++; }
    }
    if(w%3===0){
      const item=unscheduledInCats(SPARSE_CATEGORIES)[0];
      if(item){ await scheduleContentItem(item, weekStart.toISOString().slice(0,10)); scheduledCount++; }
    }
  }
  renderCurrent();
  return scheduledCount;
}

    '<button class="btn gold" onclick="runGenerateCalendar(6)">6 months</button>');

  toast('Building your '+months+'-month editorial calendar…');

/* ---------------------------------------------------------------------------
   COMPLETION WORKFLOW — completing an item never deletes it, and
   auto-schedules the next unscheduled item from the same category onto
   the day after the completed item's date (or today, if none), keeping an
   endless pipeline per category.
--------------------------------------------------------------------------- */
async function completeContentItem(id){
  const mi=byId(state.marketing_items,id);
  await setContentStage(id,'Published');
  const nextItem=unscheduledInCats([mi.item_type])[0];
  if(nextItem){
    const base=mi.scheduled_at?new Date(mi.scheduled_at):new Date();
    base.setDate(base.getDate()+7);
    await scheduleContentItem(nextItem, base.toISOString().slice(0,10));
    toast('Marked complete — scheduled the next '+mi.item_type+' for '+fmtDate(base.toISOString().slice(0,10)));
  } else {
    toast('Marked complete');
  }
  renderCurrent();
}

  const relatedLink=state.entity_links.find(el=>el.source_type==='marketing_item'&&el.source_id===id&&el.target_type==='organisation');
  const relatedOrg=relatedLink?orgName(relatedLink.target_id):null;
  let q='Help me write this '+mi.item_type+': "'+mi.title+'"'+(mi.audience?' for '+mi.audience:'')+'.';
  if(mi.objective) q+=' Objective/angle: '+mi.objective;
  if(relatedOrg) q+=' Related organisation: '+relatedOrg+'.';
  route.askPrefill=q;
  go('ask');
}

function dismissMarketingOnboarding(){ route.marketingOnboardingDismissed=true; renderCurrent(); }

function vMarketing(){
  if(!state.marketing_items.length && !route.marketingOnboardingDismissed){
    return '<div class="page-head"><div><div class="eyebrow">Growth</div><div class="page-title">Marketing Assistant</div>'+
      '<div class="page-sub">Your personal Head of Marketing — a content library plus a real editorial calendar.</div></div></div>'+
      '<div class="restore-panel"><div style="font-size:15px;font-weight:640;margin-bottom:8px">The plan should have been created automatically at sign-in</div>'+
      '<div class="muted" style="font-size:12.5px;margin-bottom:18px">If you\u2019re seeing this, automatic setup didn\u2019t complete — most likely a save was rejected (check Settings → Connection for a database error) rather than nothing having run. You can trigger it directly below.</div>'+
      '<button class="btn gold" style="margin-right:10px" onclick="autoSeedMarketingPlanIfNeeded()">Build 6-Month Plan Now</button>'+
      '<button class="btn" onclick="dismissMarketingOnboarding()">Start Empty</button></div>';
  }

  const tab=route.mkTab||'today';
  const tabs=[['today','Today'],['pillars','Content Pillars'],['library','Content Library'],['calendar','Editorial Calendar']];
  const header='<div class="page-head"><div><div class="eyebrow">Growth</div><div class="page-title">Marketing Assistant</div>'+
    '<div class="page-sub">'+state.marketing_items.length+' items in the system — '+state.marketing_items.filter(mi=>mi.scheduled_at && mi.status!=='Published').length+' scheduled, '+
    state.marketing_items.filter(mi=>!mi.scheduled_at && getContentStage(mi)==='Planned').length+' unscheduled in the library</div></div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn" onclick="rebuildInsurancePlan()">Rebuild plan</button>'+
    '<button class="btn" onclick="openGenerateCalendarPrompt()">Generate from library</button>'+
    '<button class="btn gold" onclick="openMarketingForm()">+ New item</button></div></div>'+
    '<div class="seg" style="margin-bottom:20px">'+tabs.map(([id,label])=>'<button class="'+(tab===id?'active':'')+'" onclick="route.mkTab=\''+id+'\';renderCurrent()">'+label+'</button>').join('')+'</div>';

  if(tab==='pillars') return header+vContentPillars();
  if(tab==='library') return header+vContentLibraryTab();
  if(tab==='calendar') return header+vEditorialCalendarTab();
  return header+vMarketingTodayTab();
}

function contentRow(mi,opts){
  opts=opts||{};
  const stage=getContentStage(mi);
  return '<div class="drow'+(opts.alert?' alert':'')+'" style="align-items:flex-start" onclick="openMarketingDetail(\''+mi.id+'\')">'+
    '<span class="drow-icon">'+marketingIcon(mi.item_type)+'</span>'+
    '<div class="drow-main"><div class="drow-title">'+esc(mi.title)+'</div>'+
    '<div class="drow-meta">'+esc(mi.item_type)+(mi.audience?' · '+esc(mi.audience):'')+' · '+esc(stage)+'</div></div>'+
    '<div class="drow-right">'+(mi.scheduled_at?fmtDate(mi.scheduled_at):'')+'</div></div>';
}

function vMarketingTodayTab(){
  const scheduled=state.marketing_items.filter(mi=>mi.scheduled_at && getContentStage(mi)!=='Published' && getContentStage(mi)!=='Archived')
    .sort((a,b)=>a.scheduled_at.localeCompare(b.scheduled_at));
  const overdue=scheduled.filter(mi=>mi.scheduled_at<today());
  const dueToday=scheduled.filter(mi=>mi.scheduled_at===today());
  const upcoming=scheduled.filter(mi=>mi.scheduled_at>today()).slice(0,6);
  const nextUp=overdue[0]||dueToday[0]||upcoming[0];
  const published=state.marketing_items.filter(mi=>getContentStage(mi)==='Published').sort((a,b)=>(b.completed_at||'').localeCompare(a.completed_at||'')).slice(0,5);

  let body='';
  if(nextUp){
    const stage=getContentStage(nextUp);
    body+='<div class="card" style="border-color:var(--gold);margin-bottom:20px">'+
      '<div class="eyebrow">Today\u2019s Marketing</div>'+
      '<div style="font-size:16px;font-weight:660;margin:8px 0">Write: '+esc(nextUp.title)+'</div>'+
      '<div class="grid g2" style="margin-bottom:14px">'+
        kv('Audience',nextUp.audience||'—')+kv('Category',nextUp.item_type)+
        kv('Estimated effort',estimateLabel(nextUp))+kv('Stage',stage)+
      '</div>'+
      (nextUp.objective?'<div class="muted" style="font-size:12.5px;margin-bottom:14px">'+esc(nextUp.objective)+'</div>':'')+
      '<div style="display:flex;gap:8px"><button class="btn gold" onclick="openContentForWriting(\''+nextUp.id+'\')">Open Draft</button>'+
      '<button class="btn" onclick="completeContentItem(\''+nextUp.id+'\')">Mark Complete</button></div>'+
    '</div>';
  } else {
    body+='<div class="empty" style="margin-bottom:20px"><div class="empty-ico">📌</div>Nothing scheduled right now — generate an editorial calendar from the library.</div>';
  }

  const dsec=(title,arr,emptyNote)=>{
    if(!arr.length && !emptyNote) return '';
    return '<div class="dsec"><div class="dsec-h"><h2>'+title+'</h2><span class="count">'+arr.length+'</span></div>'+
      (arr.length?'<div class="dlist">'+arr.map(mi=>contentRow(mi,{alert:mi.scheduled_at<today()})).join('')+'</div>':'<div class="dempty">'+emptyNote+'</div>')+'</div>';
  };
  body+=dsec('Overdue',overdue.slice(1))+dsec('Upcoming this week',upcoming,'Nothing else scheduled soon.')+dsec('Recently published',published);
  return body;
}
function estimateLabel(mi){
  const item=CONTENT_LIBRARY.find(i=>i.title===mi.title);
  const mins=item?item.estMinutes:30;
  return mins>=60 ? (Math.round(mins/60*10)/10)+' hr'+(mins>=120?'s':'') : mins+' mins';
}

function vContentLibraryTab(){
  const f=route.mkLibFilter=route.mkLibFilter||{q:'',category:'',stage:''};
  const categories=[...new Set(state.marketing_items.map(mi=>mi.item_type))].sort();
  let list=[...state.marketing_items];
  if(f.q){ const q=f.q.toLowerCase(); list=list.filter(mi=>(mi.title+' '+(mi.audience||'')+' '+(mi.objective||'')).toLowerCase().includes(q)); }
  if(f.category) list=list.filter(mi=>mi.item_type===f.category);
  if(f.stage) list=list.filter(mi=>getContentStage(mi)===f.stage);
  list.sort((a,b)=>a.title.localeCompare(b.title));
  const toolbar='<div class="toolbar">'+
    '<input class="input search-in" placeholder="Search the content library…" value="'+esc(f.q)+'" oninput="route.mkLibFilter.q=this.value;renderCurrent()">'+
    '<select class="select" onchange="route.mkLibFilter.category=this.value;renderCurrent()"><option value="">All categories</option>'+categories.map(c=>'<option'+(f.category===c?' selected':'')+'>'+esc(c)+'</option>').join('')+'</select>'+
    '<select class="select" onchange="route.mkLibFilter.stage=this.value;renderCurrent()"><option value="">All stages</option>'+CONTENT_STAGES.map(s=>'<option'+(f.stage===s?' selected':'')+'>'+s+'</option>').join('')+'</select>'+
  '</div>';
  if(!state.marketing_items.length) return '<div class="empty">Library is empty — import it from the onboarding panel.</div>';
  return toolbar+'<div class="page-sub" style="margin-bottom:12px">'+list.length+' of '+state.marketing_items.length+' items</div>'+
    (list.length?'<div class="dlist">'+list.map(mi=>contentRow(mi)).join('')+'</div>':'<div class="empty">No items match this filter.</div>');
}

function vEditorialCalendarTab(){
  const upcoming=state.marketing_items.filter(mi=>mi.scheduled_at && getContentStage(mi)!=='Published')
    .sort((a,b)=>a.scheduled_at.localeCompare(b.scheduled_at));
  const byWeek={};
  upcoming.forEach(mi=>{
    const d=new Date(mi.scheduled_at);
    const monday=new Date(d); monday.setDate(d.getDate()-((d.getDay()+6)%7));
    const key=monday.toISOString().slice(0,10);
    (byWeek[key]=byWeek[key]||[]).push(mi);
  });
  const weekList=Object.entries(byWeek).sort((a,b)=>a[0].localeCompare(b[0])).slice(0,12);
  return renderFullCalendar()+
    '<div class="sec-h" style="margin-top:24px"><h2>Upcoming, by week</h2></div>'+
    (weekList.length?weekList.map(([monday,items])=>'<div class="dsec"><div class="dsec-h"><h2>Week of '+fmtDate(monday)+'</h2><span class="count">'+items.length+'</span></div>'+
      '<div class="dlist">'+items.map(mi=>contentRow(mi)).join('')+'</div></div>').join(''):'<div class="empty" style="margin-top:16px">Nothing scheduled yet.</div>');
}

async function saveMarketingDetail(id){
  const stage=document.getElementById('f_mdstage').value;
  const fields={
    draftLink:document.getElementById('f_mddraft').value.trim(),
    publishedUrl:document.getElementById('f_mdpub').value.trim(),
    industries:document.getElementById('f_mdind').value.trim(),
    products:document.getElementById('f_mdprod').value.trim(),
    lessonsLearned:document.getElementById('f_mdlessons').value.trim(),
    notes:document.getElementById('f_mdnotes').value.trim()
  };
  const scheduled_at=document.getElementById('f_mddate').value||null;
  const patch={
    audience:document.getElementById('f_mdaudience').value.trim()||null,
    objective:document.getElementById('f_mdobjective').value.trim()||null,
    priority:document.getElementById('f_mdpriority').value,
    status:STAGE_TO_DB_STATUS[stage],
    description:serializeContentFields(stage,fields),
    scheduled_at
  };
  if(stage==='Published') patch.completed_at=new Date().toISOString();
  await dbUpdate('marketing_items',id,patch);

  const orgId=document.getElementById('f_mdorg').value;
  const existingLink=state.entity_links.find(el=>el.source_type==='marketing_item'&&el.source_id===id&&el.target_type==='organisation');
  if(orgId && (!existingLink || existingLink.target_id!==orgId)){
    if(existingLink) await dbDelete('entity_links',existingLink.id);
    await dbInsert('entity_links',{source_type:'marketing_item',source_id:id,target_type:'organisation',target_id:orgId,relationship_type:'relates_to',created_by:myProfile.display_name});
  } else if(!orgId && existingLink){
    await dbDelete('entity_links',existingLink.id);
  }
  closeModal(); renderCurrent(); toast('Saved');
}

const onSearchInput = debounce(function(q){
  const panel=document.getElementById('searchPanel');
  if(!q || q.trim().length<2){ panel.style.display='none'; return; }
  panel.style.display='block';
  panel.innerHTML=renderSearchResults(q.trim().toLowerCase());
}, 180);
document.addEventListener('click',e=>{ if(!e.target.closest('.searchwrap')) document.getElementById('searchPanel').style.display='none'; });

function searchIndex(q){
  const hit=s=>s && String(s).toLowerCase().includes(q);
  const groups=[];
  groups.push(['Organisations', state.organisations.filter(o=>{ const meta=getOrgMeta(o); return hit(o.name)||hit(o.sector)||hit(o.current_summary)||hit(meta.champion)||hit(meta.decisionMaker)||meta.tags.some(t=>hit(t)); }).map(o=>({label:o.name,sub:o.organisation_type,go:"go('organisationDetail','"+o.id+"')"}))]);
  groups.push(['People', state.people.filter(p=>hit(p.full_name)||hit(p.role)||hit(p.notes)).map(p=>({label:p.full_name,sub:p.role||'',go:"go('personDetail','"+p.id+"')"}))]);
  groups.push(['Opportunities', state.opportunities.filter(o=>hit(o.title)||hit(o.problem)||hit(o.kweli_angle)).map(o=>({label:o.title,sub:o.stage,go:"go('opportunityDetail','"+o.id+"')"}))]);
  groups.push(['Activities', state.activities.filter(a=>hit(a.title)||hit(a.body)).slice(0,8).map(a=>({label:a.title,sub:fmtDate(a.occurred_at),go:a.organisation_id?"go('organisationDetail','"+a.organisation_id+"')":"void(0)"}))]);
  groups.push(['Meetings', state.meetings.filter(m=>hit(m.title)||hit(m.notes)).map(m=>({label:m.title,sub:fmtDate(m.scheduled_at),go:"go('meetingDetail','"+m.id+"')"}))]);
  groups.push(['Tasks', state.tasks.filter(t=>hit(t.title)||hit(t.description)).map(t=>({label:t.title,sub:t.status,go:"openTaskModal('"+t.id+"')"}))]);
  groups.push(['Assets', state.assets_v2.filter(a=>hit(a.title)||hit(a.file_name)).map(a=>({label:a.title,sub:a.asset_type||'',go:"go('assets')"}))]);
  groups.push(['Lessons', state.lessons_v2.filter(l=>!l.archived_at && (hit(l.title)||hit(l.summary)||hit(l.detail))).map(l=>({label:deriveLessonTitle(l),sub:l.category||'',go:"go('lessons')"}))]);
  groups.push(['Knowledge', state.knowledge_sections_v2.filter(k=>hit(k.title)||hit(k.content)).map(k=>({label:k.title,sub:k.category||'',go:"go('knowledge')"}))]);
  groups.push(['Decisions', state.decisions.filter(d=>!d.archived_at && (hit(d.title)||hit(d.decision))).map(d=>({label:d.title,sub:fmtDate(d.decided_at),go:"go('decisions')"}))]);
  groups.push(['Objections', state.objections.filter(x=>!x.archived_at && hit(x.objection)).map(x=>({label:(x.objection||'').slice(0,80),sub:x.status,go:x.organisation_id?"go('organisationDetail','"+x.organisation_id+"')":"go('objections')"}))]);
  groups.push(['Marketing', state.marketing_items.filter(m=>hit(m.title)||hit(m.description)).map(m=>({label:m.title,sub:m.status,go:"go('marketing')"}))]);
  groups.push(['Team notes', state.team_messages_v2.filter(m=>hit(m.title)||hit(m.message)).map(m=>({label:m.title,sub:m.status,go:"openTeamNoteDetail('"+m.id+"')"}))]);
  return groups.filter(([,arr])=>arr.length);
}
function renderSearchResults(q){
  const groups=searchIndex(q);
  if(!groups.length) return '<div class="empty" style="padding:20px">No matches.</div>';
  return groups.map(([title,arr])=>'<div class="search-group-h">'+title+' ('+arr.length+')</div>'+
    arr.slice(0,6).map(r=>'<div class="search-res" onclick="'+r.go+';document.getElementById(\'searchPanel\').style.display=\'none\';document.getElementById(\'globalSearch\').value=\'\'"><div class="r-title">'+esc(r.label)+'</div><span class="r-snip">'+esc(r.sub)+'</span></div>').join('')
  ).join('');
}

/* ---------------------------------------------------------------------------
   TEAM BOARD — digital cork-board. Yellow = normal open, Red = important/
   urgent open, Green = done (always overrides priority). Per-user unread
   state, replies, history, realtime.
--------------------------------------------------------------------------- */
function tbColor(m){
  if(m.status==='Done') return 'note-green';
  if(m.priority==='Important'||m.priority==='Urgent') return 'note-red';
  return 'note-yellow';
}
/* Deterministic small rotation per note (hash of id) — real sticky notes
   are never perfectly aligned, but must stay stable across re-renders. */
function stickyTilt(id){
  let h=0; for(let i=0;i<id.length;i++) h=(h*31+id.charCodeAt(i))|0;
  return ((h%7)-3)*0.9; // -2.7deg .. +2.7deg
}
function myUnreadCount(){
  const pinned=state.team_messages_v2.filter(m=>m.is_pinned);
  return pinned.filter(m=>!state.team_message_reads.some(r=>r.team_message_id===m.id && r.user_id===myProfile.id)).length;
}
function refreshUnreadBadge(){
  const n=myUnreadCount();
  const el=document.getElementById('tbUnreadBadge');
  if(el) el.innerHTML = n? '<span class="nav-badge">'+n+'</span>' : '';
}

/* ---------------------------------------------------------------------------
   AI WORKSPACE — retrieval-first. Resolves entities, traverses entity_links,
   pulls related records, ranks by recency, builds focused context. No
   fabricated reasoning: callLLM() returns null until a model is connected.
--------------------------------------------------------------------------- */
let _lastSuggestedPrompts=[];
function suggestedPrompts(){
  const prompts=[];
  const topOrg=[...state.organisations].sort((a,b)=>(b.priority||0)-(a.priority||0))[0];
  if(topOrg){
    prompts.push('What is the current status of '+topOrg.name+'?');
    prompts.push('Summarise our relationship history with '+topOrg.name);
  }
  const waitingTask=state.tasks.find(t=>t.status==='Waiting for Response');
  if(waitingTask) prompts.push('What are we waiting to hear back on?');
  const recentPerson=state.people[state.people.length-1];
  if(recentPerson) prompts.push('What do we know about '+recentPerson.full_name+'?');
  prompts.push('What lessons have we learned recently?');
  prompts.push('What objections keep coming up?');
  _lastSuggestedPrompts=prompts.slice(0,5);
  return _lastSuggestedPrompts;
}
function useSuggestedPrompt(i){
  document.getElementById('askInput').value=_lastSuggestedPrompts[i]||'';
  runAsk();
}
function vAsk(){
  const prompts=suggestedPrompts();
  return '<div class="page-head"><div><div class="eyebrow">AI</div><div class="page-title">AI Workspace</div>'+
    '<div class="page-sub">Ask about any organisation, person or opportunity — answers are built only from linked records.</div></div></div>'+
    '<div class="card"><div class="field"><label class="fl">Question</label><input class="input" id="askInput" value="'+esc(route.askPrefill||'')+'" placeholder="e.g. What did Kyle say about the Farmer App?"></div>'+
    '<div style="margin-bottom:14px">'+prompts.map((p,i)=>'<span class="prompt-chip" onclick="useSuggestedPrompt('+i+')">'+esc(p)+'</span>').join('')+'</div>'+
    '<button class="btn gold" onclick="runAsk()">Ask</button></div>'+
    '<div id="askResult" style="margin-top:20px"></div>';
}
function resolveEntities(query){
  const q=query.toLowerCase();
  const people=state.people.filter(p=>q.includes(p.full_name.toLowerCase()));
  const orgsDirect=state.organisations.filter(o=>q.includes(o.name.toLowerCase()));
  const orgsFromPeople=people.map(p=>p.primary_organisation_id).filter(Boolean).map(id=>byId(state.organisations,id));
  const orgs=[...new Map([...orgsDirect,...orgsFromPeople].filter(Boolean).map(o=>[o.id,o])).values()];
  return {people, orgs};
}
function runAsk(){
  const q=document.getElementById('askInput').value.trim();
  if(!q) return;
  const {people,orgs}=resolveEntities(q);
  const orgIds=orgs.map(o=>o.id);
  const relatedTasks=state.tasks.filter(t=>orgIds.includes(t.organisation_id));
  const relatedMeetings=state.meetings.filter(m=>orgIds.includes(m.organisation_id));
  const relatedActs=state.activities.filter(a=>orgIds.includes(a.organisation_id)||people.some(p=>p.id===a.person_id))
    .sort((a,b)=>new Date(b.occurred_at)-new Date(a.occurred_at)).slice(0,15);
  const relatedAssets=state.assets_v2.filter(a=>state.entity_links.some(el=>el.source_type==='asset'&&el.source_id===a.id&&el.target_type==='organisation'&&orgIds.includes(el.target_id)));
  const relatedLessons=state.lessons_v2.filter(l=>!l.archived_at && state.entity_links.some(el=>el.source_type==='lesson'&&el.source_id===l.id&&el.target_type==='organisation'&&orgIds.includes(el.target_id)));

  const contextLines=[];
  contextLines.push('QUESTION: '+q);
  if(orgs.length) contextLines.push('\nRESOLVED ORGANISATION(S): '+orgs.map(o=>o.name).join(', '));
  if(people.length) contextLines.push('RESOLVED PERSON/PEOPLE: '+people.map(p=>p.full_name+(p.role?' ('+p.role+')':'')).join(', '));
  if(relatedActs.length){ contextLines.push('\nRELEVANT ACTIVITY (most recent first):'); relatedActs.forEach(a=>contextLines.push('- ['+fmtDate(a.occurred_at)+'] '+a.title+(a.body?': '+a.body.slice(0,400):''))); }
  if(relatedTasks.length){ contextLines.push('\nOPEN/RECENT TASKS:'); relatedTasks.forEach(t=>contextLines.push('- '+t.title+' ('+t.status+(t.due_at?', due '+t.due_at:'')+')')); }
  if(relatedMeetings.length){ contextLines.push('\nMEETINGS:'); relatedMeetings.forEach(m=>contextLines.push('- '+m.title+' ('+fmtDate(m.scheduled_at)+')')); }
  if(relatedLessons.length){ contextLines.push('\nLESSONS:'); relatedLessons.forEach(l=>contextLines.push('- '+deriveLessonTitle(l)+(l.summary?': '+l.summary:''))); }
  if(relatedAssets.length){ contextLines.push('\nASSETS:'); relatedAssets.forEach(a=>contextLines.push('- '+a.title)); }
  if(!orgs.length && !people.length) contextLines.push('\nNo specific organisation or person was recognised in the question — showing nothing rather than guessing. Try including a company or person name.');

  const prompt=contextLines.join('\n');
  document.getElementById('askResult').innerHTML =
    '<div class="grid g2"><div class="card"><div class="fl">Retrieved context</div><div class="out">'+esc(prompt)+'</div>'+
      '<button class="btn gold sm" style="margin-top:10px" onclick="copyToClipboard()">Copy to Claude</button></div>'+
      '<div class="card"><div class="fl">Sources used</div>'+
        (orgs.length?orgs.map(o=>'<div class="kv" style="cursor:pointer" onclick="go(\'organisationDetail\',\''+o.id+'\')"><span class="v">'+esc(o.name)+'</span><span class="k">organisation</span></div>').join(''):'')+
        (people.length?people.map(p=>'<div class="kv" style="cursor:pointer" onclick="go(\'personDetail\',\''+p.id+'\')"><span class="v">'+esc(p.full_name)+'</span><span class="k">person</span></div>').join(''):'')+
        ((!orgs.length&&!people.length)?'<div class="empty">No matching records.</div>':'')+
      '</div></div>';
  window._lastAskPrompt = prompt;
}

function normaliseNameLoose(s){ return (s||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim(); }
const SNAPSHOT_NAME_ALIASES={'kentatse':'Kentaste','greenkey':'Green Key','green key':'Green Key','cropnuts':'CropNuts'};
function snapshotCanonicalName(raw){
  const key=normaliseNameLoose(raw);
  return SNAPSHOT_NAME_ALIASES[key]||raw;
}
function findOrgLoose(name){
  const canon=normaliseNameLoose(snapshotCanonicalName(name));
  return state.organisations.find(o=>normaliseNameLoose(o.name)===canon);
}
async function restoreFromSnapshot(){
  const report={orgsCreated:0,orgsEnriched:0,oppsCreated:0,oppsEnriched:0,investorsCreated:0,investorsEnriched:0,decisionsCreated:0,decisionsSkipped:0,meetingsCreated:0,meetingsSkipped:0};

  // --- Organisations + opportunities ---
  for(const s of SNAPSHOT_ORGS){
    let org=findOrgLoose(s.name);
    if(!org){
      org=await dbInsert('organisations',{
        name:snapshotCanonicalName(s.name), canonical_name:normaliseNameLoose(s.name),
        organisation_type:'Prospect', pipeline_stage:s.stage, priority:s.priority||0,
        next_action_summary:s.nextAction||null, description:s.description||null,
        created_by:myProfile.display_name, updated_by:myProfile.display_name
      });
      report.orgsCreated++;
    } else {
      const patch={};
      if(!org.pipeline_stage && s.stage) patch.pipeline_stage=s.stage;
      if(!org.next_action_summary && s.nextAction) patch.next_action_summary=s.nextAction;
      if(!org.description && s.description) patch.description=s.description;
      if(!org.priority && s.priority) patch.priority=s.priority;
      if(Object.keys(patch).length){ await dbUpdate('organisations',org.id,patch); org=byId(state.organisations,org.id); report.orgsEnriched++; }
    }
    let opp=state.opportunities.find(o=>o.organisation_id===org.id);
    if(!opp){
      opp=await dbInsert('opportunities',{
        organisation_id:org.id, title:snapshotCanonicalName(s.name)+' — opportunity',
        stage:['Identified','Contacted','Meeting done','Pilot discussion','Pilot active','Proposal sent','Won','Lost','On hold'].includes(s.stage)?s.stage:'Identified',
        status:'Active', priority:s.priority||0, next_action_summary:s.nextAction||null,
        proposed_pilot:s.pilot||null, pilot_scope:s.pilot||null,
        created_by:myProfile.display_name, updated_by:myProfile.display_name
      });
      report.oppsCreated++;
    } else {
      const patch={};
      if(!opp.next_action_summary && s.nextAction) patch.next_action_summary=s.nextAction;
      if(!opp.proposed_pilot && s.pilot) patch.proposed_pilot=s.pilot;
      if(!opp.pilot_scope && s.pilot) patch.pilot_scope=s.pilot;
      if(Object.keys(patch).length){ await dbUpdate('opportunities',opp.id,patch); report.oppsEnriched++; }
    }
  }

  // --- Investors ---
  for(const s of SNAPSHOT_INVESTORS){
    let org=findOrgLoose(s.name);
    if(!org){
      org=await dbInsert('organisations',{
        name:s.name, canonical_name:normaliseNameLoose(s.name), organisation_type:'Investor',
        pipeline_stage:s.stage, next_action_summary:s.nextAction||null,
        created_by:myProfile.display_name, updated_by:myProfile.display_name
      });
      report.orgsCreated++;
    } else if(org.organisation_type!=='Investor'){
      await dbUpdate('organisations',org.id,{organisation_type:'Investor'});
      org=byId(state.organisations,org.id);
    }
    let iv=state.investor_profiles.find(x=>x.organisation_id===org.id);
    if(!iv){
      await dbInsert('investor_profiles',{
        organisation_id:org.id, stage:s.stage||null, notes:s.notes||null, next_action_summary:s.nextAction||null
      });
      report.investorsCreated++;
    } else {
      const patch={};
      if(!iv.stage && s.stage) patch.stage=s.stage;
      if(!iv.notes && s.notes) patch.notes=s.notes;
      if(!iv.next_action_summary && s.nextAction) patch.next_action_summary=s.nextAction;
      if(Object.keys(patch).length){ await dbUpdate('investor_profiles',iv.id,patch); report.investorsEnriched++; }
    }
  }

  // --- Decisions (matched by first 60 chars of decision text, to stay idempotent) ---
  for(const s of SNAPSHOT_DECISIONS){
    const key=s.text.slice(0,60);
    const exists=state.decisions.some(d=>!d.archived_at && (d.decision||'').slice(0,60)===key);
    if(exists){ report.decisionsSkipped++; continue; }
    const title=s.text.replace(/^[•\s]+/,'').split(/\s+/).slice(0,10).join(' ').replace(/[.,;:]+$/,'');
    await dbInsert('decisions',{title:title.slice(0,200), decision:s.text, decided_at:s.date, created_by:myProfile.display_name, updated_by:myProfile.display_name});
    report.decisionsCreated++;
  }

  // --- Meetings (matched by org + date) ---
  for(const s of SNAPSHOT_MEETINGS){
    const org=findOrgLoose(s.org);
    if(!org) continue;
    const exists=state.meetings.some(m=>m.organisation_id===org.id && (m.scheduled_at||'').slice(0,10)===s.date);
    if(exists){ report.meetingsSkipped++; continue; }
    const isPast=s.date<today();
    const created=await dbInsert('meetings',{
      title:org.name+' — meeting', organisation_id:org.id, scheduled_at:s.date+'T09:00:00',
      meeting_status:isPast?'Completed':'Scheduled', objective:s.objective||null,
      notes:s.notes||null, next_steps:s.nextSteps||null,
      created_by:myProfile.display_name, updated_by:myProfile.display_name
    });
    if(s.notes) await logActivity({activity_type:'Meeting', title:'Meeting notes (restored from Snapshot): '+org.name, body:s.notes, organisation_id:org.id, meeting_id:created.id});
    report.meetingsCreated++;
  }

  renderCurrent();
  return report;
}

  const r=await restoreFromSnapshot();
  openModal('<h3>Snapshot restoration complete</h3>'+
    kv('Organisations created',r.orgsCreated)+kv('Organisations enriched',r.orgsEnriched)+
    kv('Opportunities created',r.oppsCreated)+kv('Opportunities enriched',r.oppsEnriched)+
    kv('Investor profiles created',r.investorsCreated)+kv('Investor profiles enriched',r.investorsEnriched)+
    kv('Decisions created',r.decisionsCreated)+kv('Decisions already present (skipped)',r.decisionsSkipped)+
    kv('Meetings created',r.meetingsCreated)+kv('Meetings already present (skipped)',r.meetingsSkipped)+
    '<div class="muted" style="font-size:11.5px;margin-top:14px">Nothing existing was overwritten — only missing records and empty fields were filled in.</div>');
}


function vSettings(){

  const outstanding=state.migration_log.filter(m=>['needs_review','error'].includes(m.status)).length;
  const tabs=[['status','Connection'],['counts','Row counts'],['review','Migration review'+(outstanding?' ('+outstanding+')':'')],['recovery','Data recovery']];
  let body='';
  if(tab==='status'){
    body='<div class="card">'+
      kv('Supabase database', statusDot(dbStatus)+dbStatus)+
      kv('Realtime', statusDot(realtimeStatus)+realtimeStatus)+
      kv('Storage bucket (V2 uploads)', esc(ASSETS_BUCKET))+
      kv('Storage bucket (migrated V1 assets)', esc(V1_LEGACY_BUCKET))+
      kv('Signed URL cache', Object.keys(signedUrlCache).length+' cached URL(s)')+
      kv('Signed in as', esc(myProfile.display_name)+' ('+esc(currentUser.email)+')')+
    '</div><button class="btn danger" style="margin-top:16px" onclick="doSignOut()">Sign out</button>';
  } else if(tab==='recovery'){
    body='<div class="card"><div style="font-size:14.5px;font-weight:640;margin-bottom:8px">Restore from the 10 July 2026 Snapshot</div>'+
      '<div class="muted" style="font-size:12.5px;margin-bottom:16px">Re-applies the organisations, opportunities, investor profiles ('+SNAPSHOT_INVESTORS.length+' investors, including full relationship notes), decisions ('+SNAPSHOT_DECISIONS.length+') and meetings ('+SNAPSHOT_MEETINGS.length+') recorded in the Snapshot. Safe to run any number of times — every record is matched first; only missing records and empty fields are filled in, nothing existing is ever overwritten.</div>'+
      '<button class="btn gold" onclick="runSnapshotRestore()">Restore from Snapshot</button></div>'+
      '<div class="card" style="margin-top:16px;border-color:var(--gold)"><div style="font-size:14.5px;font-weight:640;margin-bottom:8px">6-Month Marketing Plan (automatic)</div>'+
      '<div class="muted" style="font-size:12.5px;margin-bottom:16px">Kweli\u2019s current strategy — insurance claims fraud/leakage, invoice &amp; certificate fraud, verification infrastructure, and the founder journey — is created automatically at sign-in if it doesn\u2019t already exist. Rebuild it here only if you need to reset it (this deletes and recreates every item tagged to this plan; manual edits to those items are lost).</div>'+
      '<div class="faint" style="font-size:11px;margin-bottom:12px">Status: '+campaignRowCountLocally()+' / 130 scheduled pieces present</div>'+
      '<button class="btn" onclick="rebuildInsurancePlan()">Rebuild plan</button></div>'+
      '<div class="card" style="margin-top:16px"><div style="font-size:14.5px;font-weight:640;margin-bottom:8px">Alternative: general 36-month content backlog</div>'+
      '<div class="muted" style="font-size:12.5px;margin-bottom:16px">Imports the broader '+CONTENT_LIBRARY.length+'-item content library (not insurance-focused) AND generates a 6-month publishing calendar from it in one action.</div>'+
      '<button class="btn" onclick="runFullMarketingSetup()">Set Up General Marketing</button></div>'+
      '<div class="card" style="margin-top:16px"><div style="font-size:14.5px;font-weight:640;margin-bottom:8px">Restore V1 Marketing Plan (legacy)</div>'+
      '<div class="muted" style="font-size:12.5px;margin-bottom:16px">Restores the weekly content cadence plus the full '+V1_CONTENT_BACKLOG.length+'-item V1 content backlog from the original carbon-era plan.</div>'+
      '<button class="btn" onclick="seedDefaultMarketingPlan()">Restore V1 Marketing Plan</button></div>';
  } else if(tab==='counts'){
    body='<div class="card">'+TABLES.map(t=>kv(t, state[t].length)).join('')+'</div>';
  } else if(tab==='review'){
    const open=state.migration_log.filter(m=>['needs_review','error'].includes(m.status));
    const resolved=state.migration_log.filter(m=>m.status==='ok' && (m.detail||'').includes('[Migration review:'));
    const duplicates=state.migration_log.filter(m=>m.status==='duplicate');
    body='<div class="grid g2" style="margin-bottom:18px">'+
      stat(open.length,'Outstanding')+stat(resolved.length,'Resolved this session')+
      stat(duplicates.length,'Duplicate (matched existing — informational)')+
      stat(state.migration_log.filter(m=>m.status==='ok').length,'OK')+
    '</div>'+
    (open.length?'<div class="dsec"><div class="dsec-h"><h2>Outstanding — needs a decision</h2><span class="count">'+open.length+'</span></div>'+
      '<div class="dlist">'+open.map(m=>migrationReviewRow(m)).join('')+'</div></div>'
      :'<div class="empty"><div class="empty-ico">✓</div>Nothing outstanding — every migration item has been reviewed.</div>')+
    (duplicates.length?'<div class="dsec"><div class="dsec-h"><h2>Duplicates (already matched to an existing record — no action needed)</h2><span class="count">'+duplicates.length+'</span></div>'+
      '<div class="dlist">'+duplicates.slice(0,20).map(m=>migrationReviewRow(m,true)).join('')+'</div>'+
      (duplicates.length>20?'<div class="faint" style="font-size:11px;margin-top:6px">+'+(duplicates.length-20)+' more</div>':'')+
      '</div>':'');
  }
  return '<div class="page-head"><div><div class="eyebrow">System</div><div class="page-title">Settings</div></div></div>'+
    '<div class="tabs">'+tabs.map(([id,label])=>'<div class="tab'+(tab===id?' active':'')+'" onclick="route.tab=\''+id+'\';renderCurrent()">'+label+'</div>').join('')+'</div>'+
    body;
}
function migrationReviewRow(m,readonly){
  return '<div class="drow" style="align-items:flex-start;padding:12px" onclick="'+(readonly?'void(0)':"reviewMigrationItem('"+m.id+"')")+'">'+
    '<div class="drow-main"><div class="drow-title">'+esc(m.step||'')+' · '+esc(m.source_table||'')+'</div>'+
    '<div class="drow-meta" style="white-space:normal">'+esc(m.detail||'No detail recorded.')+'</div></div>'+
    '<div class="drow-right">'+fmtDate(m.created_at)+'</div></div>';
}
function reviewMigrationItem(id){
  const m=byId(state.migration_log,id); if(!m) return;
  const hasTarget=m.target_table && m.target_id;
  openModal('<h3>Migration item</h3>'+
    kv('Step',esc(m.step))+kv('Source',esc(m.source_table)+' · '+esc(m.source_id||''))+
    (hasTarget?kv('Target',esc(m.target_table)+' · linked record'):'')+kv('Status',esc(m.status))+
    '<div class="field" style="margin-top:10px"><label class="fl">Detail</label><div style="font-size:12.5px;white-space:pre-wrap">'+esc(m.detail||'—')+'</div></div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px">'+
      (hasTarget?'<button class="btn sm gold" onclick="fixMigrationItem(\''+id+'\')">Fix — open record</button>':'')+
      '<button class="btn sm" onclick="resolveMigrationItem(\''+id+'\',\'accept\')">Accept</button>'+
      '<button class="btn sm" onclick="resolveMigrationItem(\''+id+'\',\'resolve\')">Mark resolved</button>'+
      '<button class="btn sm" onclick="resolveMigrationItem(\''+id+'\',\'ignore\')">Ignore</button>'+
    '</div>');
}
async function resolveMigrationItem(id,action){
  const m=byId(state.migration_log,id); if(!m) return;
  const newStatus = action==='ignore' ? 'skipped' : 'ok';
  const label = action==='accept'?'Accepted':action==='resolve'?'Resolved':'Ignored';
  const detail=(m.detail||'')+' [Migration review: '+label+' by '+myProfile.display_name+' on '+today()+']';
  await dbUpdate('migration_log', id, {status:newStatus, detail});
  closeModal(); renderCurrent(); refreshUnreadBadge(); toast(label);
}
function fixMigrationItem(id){
  const m=byId(state.migration_log,id); if(!m) return;
  closeModal();
  const routeMap={organisations:'organisationDetail', people:'personDetail', opportunities:'opportunityDetail',
    meetings:'meetingDetail', lessons_v2:'lessons', assets_v2:'assetDetail', investor_profiles:'investors', team_messages_v2:'lessons'};
  const page=routeMap[m.target_table];
  if(page && (page.endsWith('Detail'))) go(page, m.target_id);
  else if(page) go(page);
  else toast('No direct record to open for this item — resolve it manually, then mark Accepted/Resolved.');
}

/* ---------------------------------------------------------------------------
   SNAPSHOT EXPORT — "Export for Claude". Generated live from V2 tables.
--------------------------------------------------------------------------- */
function buildSnapshotMarkdown(){
  const now=new Date();
  const openTasksList=openTasks().sort((a,b)=>(a.due_at||'9999').localeCompare(b.due_at||'9999'));
  const overdue=openTasksList.filter(t=>t.due_at&&t.due_at<today());
  const waiting=openTasksList.filter(t=>t.status==='Waiting for Response');
  const activeOpps=state.opportunities.filter(o=>o.status==='Active').sort((a,b)=>(b.priority||0)-(a.priority||0));
  const upcomingMeetings=state.meetings.filter(m=>m.meeting_status==='Scheduled'&&new Date(m.scheduled_at)>=now).sort((a,b)=>new Date(a.scheduled_at)-new Date(b.scheduled_at));
  const recentMeetings=state.meetings.filter(m=>m.meeting_status==='Completed').sort((a,b)=>new Date(b.scheduled_at)-new Date(a.scheduled_at)).slice(0,10);
  const recentDecisions=[...state.decisions].filter(d=>!d.archived_at).sort((a,b)=>new Date(b.decided_at)-new Date(a.decided_at)).slice(0,15);
  const openObjections=state.objections.filter(x=>!x.archived_at && x.status==='Open');
  const investors=state.investor_profiles;
  const next30=openTasksList.filter(t=>t.due_at && daysUntil(t.due_at)<=30 && daysUntil(t.due_at)>=0);

  let md = '# Kweli Brain Snapshot\n\nGenerated: '+now.toLocaleString('en-GB')+'\n\n---\n\n';
  md += '## Current Priorities\n\n';
  const urgent=openTasksList.filter(t=>t.priority==='Urgent');
  md += urgent.length ? urgent.map(t=>'- **'+orgName(t.organisation_id)+'** — '+t.title+' (due '+fmtDate(t.due_at)+')\n').join('') : '_None currently._\n';

  md += '\n---\n\n## Active Opportunities\n\n';
  activeOpps.forEach(o=>{ md += '### '+orgName(o.organisation_id)+' — '+o.title+'\n\nStage: '+o.stage+'  \nNext Action: '+(o.next_action_summary||'—')+'  \nLast Updated: '+fmtDate(o.updated_at)+'\n\n'; });
  if(!activeOpps.length) md += '_None currently._\n';

  md += '\n---\n\n## Overdue Follow-ups\n\n';
  md += overdue.length ? overdue.map(t=>'- **'+orgName(t.organisation_id)+'** — '+t.title+' (was due '+fmtDate(t.due_at)+')\n').join('') : '_None._\n';

  md += '\n---\n\n## Waiting For Response\n\n';
  md += waiting.length ? waiting.map(t=>'- **'+orgName(t.organisation_id)+'** — '+t.title+' (next check '+fmtDate(t.due_at)+')\n').join('') : '_None._\n';

  md += '\n---\n\n## Upcoming Meetings\n\n';
  md += upcomingMeetings.length ? upcomingMeetings.map(m=>'- '+fmtDate(m.scheduled_at)+' — '+orgName(m.organisation_id)+' — '+m.title+'\n').join('') : '_None currently._\n';

  md += '\n---\n\n## Recent Meetings\n\n';
  md += recentMeetings.length ? recentMeetings.map(m=>'- '+fmtDate(m.scheduled_at)+' — **'+orgName(m.organisation_id)+'** — '+(m.outcomes||m.title)+'\n').join('') : '_None recently._\n';

  md += '\n---\n\n## Recent Decisions\n\n';
  md += recentDecisions.length ? recentDecisions.map(d=>'- '+fmtDate(d.decided_at)+' — **'+d.title+'**: '+d.decision+'\n').join('') : '_None recorded._\n';

  md += '\n---\n\n## Current Risks\n\n';
  md += openObjections.length ? ('- Unresolved objections logged for: '+[...new Set(openObjections.map(x=>orgName(x.organisation_id)))].join(', ')+'\n') : '_None flagged._\n';

  md += '\n---\n\n## Investors\n\n';
  investors.forEach(iv=>{ const label = iv.organisation_id?orgName(iv.organisation_id):(iv.person_id?(byId(state.people,iv.person_id)||{}).full_name:'Investor'); md += '- **'+label+'** — '+(iv.stage||'—')+' — next: '+(iv.next_action_summary||'—')+'\n'; });
  if(!investors.length) md += '_None recorded._\n';

  md += '\n---\n\n## Metrics\n\n| Metric | Value |\n| --- | --- |\n';
  md += '| Open Opportunities | '+activeOpps.length+' |\n| Overdue Follow-ups | '+overdue.length+' |\n| Waiting For Response | '+waiting.length+' |\n| Meetings Scheduled | '+upcomingMeetings.length+' |\n| Investors | '+investors.length+' |\n';

  md += '\n---\n\n## Next 30 Days\n\n';
  md += next30.length ? next30.map(t=>'- **'+orgName(t.organisation_id)+'** — '+t.title+' (due '+fmtDate(t.due_at)+')\n').join('') : '_Nothing scheduled._\n';

  return md;
}
function vSnapshot(){
  const md=buildSnapshotMarkdown();
  const activeOpps=state.opportunities.filter(o=>o.status==='Active').length;
  const overdueTasks=openTasks().filter(t=>t.due_at&&t.due_at<today()).length;
  const wordCount=md.split(/\s+/).length;
  return '<div class="page-head"><div><div class="eyebrow">AI</div><div class="page-title">Export for Claude</div>'+
    '<div class="page-sub">A complete, current-state briefing generated live from the V2 database — nothing cached, nothing stale.</div></div></div>'+

    '<div class="export-hero">'+
      '<div class="export-icon">🧠</div>'+
      '<div style="flex:1"><div style="font-size:16px;font-weight:660">Kweli Brain Snapshot</div>'+
      '<div class="muted" style="font-size:12.5px;margin-top:3px">Ready to paste into a new Claude conversation — priorities, pipeline, meetings, decisions, and risks in one document.</div></div>'+
      '<button class="btn gold" style="padding:13px 22px;font-size:13.5px" onclick="copySnapshot()">⬇ Copy snapshot</button>'+
    '</div>'+

    '<div class="export-metrics">'+
      '<div class="export-metric"><div class="em-val">'+activeOpps+'</div><div class="em-lbl">Active opportunities</div></div>'+
      '<div class="export-metric"><div class="em-val">'+overdueTasks+'</div><div class="em-lbl">Overdue follow-ups</div></div>'+
      '<div class="export-metric"><div class="em-val">'+state.decisions.filter(d=>!d.archived_at).length+'</div><div class="em-lbl">Decisions logged</div></div>'+
      '<div class="export-metric"><div class="em-val">'+state.investor_profiles.length+'</div><div class="em-lbl">Investor relationships</div></div>'+
      '<div class="export-metric"><div class="em-val">~'+wordCount+'</div><div class="em-lbl">Words in export</div></div>'+
    '</div>'+

    '<div class="sec-h"><h2>Preview</h2></div>'+
    '<div class="out" style="max-height:560px">'+esc(md)+'</div>';
}
function copySnapshot(){ navigator.clipboard.writeText(buildSnapshotMarkdown()); toast('Snapshot copied — paste it into a new Claude conversation'); }
