<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kweli Brain — The Institutional Intelligence Platform</title>
<style>
  :root{
    --bg:#070E14; --panel:#0E1E2A; --panel2:#122636; --raise:#16303F;
    --line:rgba(255,255,255,.07); --line-s:rgba(255,255,255,.12);
    --txt:#EAF1F4; --muted:#90A6B2; --faint:#5E7785;
    --gold:#C9A24B; --gold-d:#A6822F; --gold-soft:rgba(201,162,75,.13);
    --green:#46B98A; --amber:#E0A340; --red:#E0654B;
    --r:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-size:14px;line-height:1.55;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:var(--gold);text-decoration:none}
  ::selection{background:rgba(201,162,75,.28)}
  .serif{font-family:Georgia,"Times New Roman",serif}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .muted{color:var(--muted)} .faint{color:var(--faint)}

  /* layout */
  .app{display:flex;min-height:100vh}
  .sidebar{width:236px;flex:none;background:#060B10;border-right:1px solid var(--line);
    position:fixed;inset:0 auto 0 0;padding:24px 16px;overflow-y:auto;z-index:40;transition:transform .22s ease}
  .main{flex:1;margin-left:236px;min-width:0;display:flex;flex-direction:column}
  .brand{display:flex;align-items:center;gap:12px;padding:2px 8px 22px}
  .brand-mark{width:36px;height:36px;border-radius:9px;flex:none;display:grid;place-items:center;
    background:linear-gradient(145deg,var(--gold),#6f571f);color:#070E14;font-weight:800;font-size:19px;font-family:ui-monospace,monospace}
  .brand-name{font-weight:660;font-size:15.5px;letter-spacing:-.01em;line-height:1.1}
  .brand-sub{font-size:9.5px;color:var(--faint);letter-spacing:.13em;text-transform:uppercase;font-family:ui-monospace,monospace;margin-top:3px}
  .nav{display:flex;flex-direction:column;gap:1px;margin-top:4px}
  .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:9px;color:var(--muted);
    cursor:pointer;font-size:13.5px;font-weight:500}
  .nav-item:hover{color:var(--txt);background:var(--panel)}
  .nav-item.active{color:var(--txt);background:var(--panel2)}
  .nav-item.active .ico{color:var(--gold)}
  .nav-item .ico{width:17px;height:17px;flex:none;color:var(--faint)}
  .nav-badge{margin-left:auto;font-size:10px;font-family:ui-monospace,monospace;background:var(--red);color:#fff;border-radius:9px;padding:1px 7px;font-weight:700}
  .nav-sect{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-family:ui-monospace,monospace;padding:18px 12px 7px}

  /* top bar */
  .topbar{display:flex;align-items:center;gap:14px;padding:14px 34px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:rgba(7,14,20,.86);backdrop-filter:blur(10px);z-index:30}
  .hamb{display:none;background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--txt);width:38px;height:38px;cursor:pointer;font-size:18px}
  .searchwrap{position:relative;flex:1;max-width:560px}
  .searchwrap .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--faint)}
  #globalSearch{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:11px;color:var(--txt);
    padding:11px 14px 11px 38px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
  #globalSearch:focus{border-color:var(--gold)}
  .search-panel{position:absolute;top:52px;left:0;right:0;background:var(--panel);border:1px solid var(--line-s);border-radius:13px;
    box-shadow:0 24px 60px -22px rgba(0,0,0,.8);max-height:60vh;overflow-y:auto;z-index:50;padding:8px}
  .search-group-h{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-family:ui-monospace,monospace;padding:10px 12px 5px}
  .search-res{padding:9px 12px;border-radius:9px;cursor:pointer;display:flex;gap:10px;align-items:baseline}
  .search-res:hover{background:var(--panel2)}
  .search-res .r-title{font-size:13.5px;color:var(--txt)}
  .search-res .r-sub{font-size:11.5px;color:var(--faint);margin-left:auto;white-space:nowrap}
  .search-res .r-snip{font-size:12px;color:var(--muted);margin-top:2px;display:block}
  .search-empty{padding:18px 14px;color:var(--faint);font-size:13px;text-align:center}

  .content{padding:38px 34px 90px;max-width:1120px;margin:0 auto;width:100%}
  .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:35}
  .scrim.show{display:block}

  /* headings */
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:30px;flex-wrap:wrap}
  .eyebrow{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
  .page-title{font-size:26px;font-weight:660;letter-spacing:-.02em;margin-top:6px}
  .page-sub{font-size:13.5px;color:var(--muted);margin-top:5px}
  .greeting{font-size:13px;color:var(--muted);font-family:ui-monospace,monospace;letter-spacing:.04em}

  /* cards */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:22px}
  .sec{margin-bottom:30px}
  .sec-h{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .sec-h h2{font-size:13px;font-weight:600;letter-spacing:.02em;margin:0}
  .sec-h .count{font-family:ui-monospace,monospace;font-size:11px;color:var(--faint);margin-left:auto}
  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:1fr 1fr}
  .g-auto{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}

  /* action row item (dashboard / followups) */
  .row-item{display:flex;align-items:center;gap:14px;padding:15px 18px;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;cursor:pointer;margin-bottom:9px;transition:border-color .15s}
  .row-item:hover{border-color:var(--line-s)}
  .row-item.alert{border-color:rgba(224,101,75,.4)}
  .udot{width:9px;height:9px;border-radius:50%;flex:none}
  .row-main{flex:1;min-width:0}
  .row-title{font-size:14.5px;font-weight:560}
  .row-meta{font-size:12px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row-right{font-size:11.5px;font-family:ui-monospace,monospace;white-space:nowrap}
  .score{flex:none;width:40px;height:40px;border-radius:10px;display:grid;place-items:center;font-weight:740;font-size:14px;font-family:ui-monospace,monospace;border:1px solid var(--line)}

  /* chips */
  .chip{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;padding:4px 11px;border-radius:30px;border:1px solid var(--line);background:var(--panel2);color:var(--muted)}
  .chip .dot{width:7px;height:7px;border-radius:50%}
  .warm{color:var(--green)} .cold{color:var(--faint)}

  /* company / people cards */
  .ent-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;cursor:pointer;
    display:flex;flex-direction:column;gap:11px;transition:border-color .15s}
  .ent-card:hover{border-color:var(--gold)}
  .ent-card.alert{border-color:rgba(224,101,75,.45)}
  .ent-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .ent-name{font-size:16px;font-weight:600;letter-spacing:-.01em}
  .ent-sub{font-size:11.5px;color:var(--faint);font-family:ui-monospace,monospace;margin-top:3px}
  .ent-line{display:flex;align-items:center;gap:9px;flex-wrap:wrap;font-size:12.5px;color:var(--muted)}
  .ent-next{font-size:13px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 11px;line-height:1.45}
  .ent-next .lbl{display:block;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);font-family:ui-monospace,monospace;margin-bottom:3px}

  /* buttons / inputs */
  .btn{background:var(--panel2);border:1px solid var(--line-s);color:var(--txt);border-radius:10px;padding:10px 16px;
    font-size:13px;font-weight:540;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:8px;white-space:nowrap;transition:all .15s}
  .btn:hover{border-color:var(--gold)}
  .btn.gold{background:var(--gold);color:#070E14;border-color:var(--gold);font-weight:660}
  .btn.gold:hover{filter:brightness(1.08)}
  .btn.sm{padding:7px 12px;font-size:12px;border-radius:9px}
  .btn.ghost{background:transparent}
  .btn.danger:hover{border-color:var(--red);color:var(--red)}
  .btn .ico{width:15px;height:15px}
  .input,.select,textarea.input{width:100%;background:var(--bg);border:1px solid var(--line-s);border-radius:10px;color:var(--txt);
    padding:11px 13px;font-size:13.5px;font-family:inherit;outline:none;transition:border-color .15s}
  .input:focus,.select:focus,textarea.input:focus{border-color:var(--gold)}
  textarea.input{resize:vertical;line-height:1.55}
  .select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' stroke='%2390A6B2' stroke-width='1.4' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 13px center;padding-right:32px}
  label.fl{display:block;font-size:10px;color:var(--muted);font-family:ui-monospace,monospace;letter-spacing:.11em;text-transform:uppercase;margin:0 0 7px}
  .field{margin-bottom:15px}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .toolbar{display:flex;gap:11px;align-items:center;flex-wrap:wrap;margin-bottom:22px}
  .toolbar .input,.toolbar .select{width:auto}
  .toolbar .search-in{flex:1;min-width:180px}
  .seg{display:inline-flex;border:1px solid var(--line-s);border-radius:10px;overflow:hidden}
  .seg button{background:transparent;border:none;color:var(--muted);padding:8px 14px;font-size:12.5px;cursor:pointer;font-family:inherit}
  .seg button.active{background:var(--panel2);color:var(--gold)}
  .right{margin-left:auto}

  /* detail */
  .detail-grid{display:grid;grid-template-columns:1.55fr 1fr;gap:18px;align-items:start}
  .kv{display:flex;flex-direction:column;gap:3px;padding:11px 0;border-bottom:1px solid var(--line)}
  .kv:last-child{border-bottom:none}
  .kv .k{font-size:9.5px;font-family:ui-monospace,monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
  .kv .v{font-size:14px;word-break:break-word}
  .block{margin-top:20px}
  .block h4{font-size:10px;font-family:ui-monospace,monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin:0 0 10px}
  .prose{white-space:pre-wrap;font-family:Georgia,"Times New Roman",serif;font-size:14.5px;line-height:1.65;color:#DCE7EC}

  /* timeline */
  .timeline{list-style:none;margin:0;padding:0}
  .timeline li{position:relative;padding:0 0 18px 22px;border-left:1px solid var(--line);margin-left:5px}
  .timeline li:last-child{border-left-color:transparent;padding-bottom:0}
  .timeline li::before{content:"";position:absolute;left:-5px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--gold);border:2px solid var(--bg)}
  .t-meta{font-size:9.5px;font-family:ui-monospace,monospace;letter-spacing:.06em;color:var(--faint);text-transform:uppercase}
  .t-text{font-size:13.5px;margin-top:3px}
  .t-type{color:var(--gold)}

  /* prompt / workspace output */
  .out{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:18px;white-space:pre-wrap;
    font-family:ui-monospace,monospace;font-size:12.5px;line-height:1.62;color:#C6D6DD;max-height:520px;overflow:auto}
  .ws-actions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .ws-actions .btn.active{background:var(--gold-soft);border-color:var(--gold);color:var(--gold)}

  /* empty */
  .empty{text-align:center;padding:60px 24px;border:1px dashed var(--line-s);border-radius:var(--r);background:var(--panel)}
  .empty .em{width:50px;height:50px;border-radius:13px;margin:0 auto 16px;display:grid;place-items:center;background:var(--panel2);color:var(--gold)}
  .empty h3{margin:0 0 7px;font-size:17px;font-weight:600}
  .empty p{margin:0 0 20px;color:var(--muted);font-size:13.5px}
  .empty .row{display:flex;gap:11px;justify-content:center;flex-wrap:wrap}

  /* modal */
  .modal-scrim{position:fixed;inset:0;background:rgba(3,8,12,.7);z-index:60;display:flex;align-items:flex-start;justify-content:center;padding:44px 16px;overflow-y:auto}
  .modal{background:var(--panel);border:1px solid var(--line-s);border-radius:16px;width:100%;max-width:620px;padding:26px;box-shadow:0 30px 70px -24px rgba(0,0,0,.8)}
  .modal.lg{max-width:680px}
  .modal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .modal-h h2{margin:0;font-size:19px;font-weight:620}
  .x{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1;padding:2px 6px}
  .x:hover{color:var(--txt)}
  .modal-foot{display:flex;justify-content:flex-end;gap:11px;margin-top:8px}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--raise);border:1px solid var(--gold);
    color:var(--txt);padding:12px 20px;border-radius:11px;font-size:13px;z-index:80;opacity:0;pointer-events:none;transition:opacity .2s;box-shadow:0 14px 34px -14px rgba(0,0,0,.7)}
  .toast.show{opacity:1}

  @media(max-width:880px){
    .sidebar{transform:translateX(-100%)} .sidebar.open{transform:translateX(0)}
    .main{margin-left:0} .hamb{display:grid;place-items:center}
    .topbar{padding:12px 16px} .content{padding:24px 16px 70px}
    .g2,.detail-grid,.field-row{grid-template-columns:1fr}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">K</div>
      <div><div class="brand-name">Kweli Brain</div><div class="brand-sub">Institutional Intelligence</div></div>
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <div class="scrim" id="scrim" onclick="toggleSidebar(false)"></div>
  <div class="main">
    <div class="topbar">
      <button class="hamb" onclick="toggleSidebar(true)">&#9776;</button>
      <div class="searchwrap">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="globalSearch" placeholder="Search companies, people, notes, objections, lessons, ideas…" autocomplete="off"
          oninput="runSearch(this.value)" onfocus="runSearch(this.value)">
        <div id="searchPanel"></div>
      </div>
      <span id="statusPill" class="right" style="display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-family:ui-monospace,monospace"></span>
      <button class="btn gold" onclick="quickAdd()" style="margin-left:14px">+ Quick add</button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="modal-root"></div>
<div id="authOverlay" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:100;align-items:center;justify-content:center;padding:20px"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   KWELI BRAIN — Institutional Intelligence Platform (single file)
   Vanilla JS · localStorage · no backend · no build step
   ============================================================ */

const CATEGORIES=["Labs","Insurance","Exporters","Banks/Lenders","Governance/Legal","Agriculture/FMCG","Professional Services","Investors","Other"];
const STAGES=["Identified","Researched","Contacted","Replied","Meeting booked","Meeting done","Proposal sent","Pilot discussion","Pilot agreed","Closed","Paused"];
const STATUSES=["Active","Won","Lost","On hold"];
const INVEST_STATUS=["Researching","Contacted","Pitched","In discussion","Term sheet","Committed","Passed"];
const WARMTH=["Warm","Neutral","Cold"];
const WAITING_STAGES=["Contacted","Proposal sent"];
const CLOSED=["Closed","Paused"];
const STAGE_COLOR={"Identified":"#6E8794","Researched":"#7CA0B0","Contacted":"#C9A24B","Replied":"#D9B968","Meeting booked":"#4FA3D1","Meeting done":"#5FB0C9","Proposal sent":"#C9A24B","Pilot discussion":"#6FBE9E","Pilot agreed":"#46B98A","Closed":"#46B98A","Paused":"#5E7785"};
const ACT_TYPES=["Note","Research","Email","Meeting","Proposal","Follow-up","Pilot","Stage"];

const WS_ACTIONS=[
  {id:'research',label:'Research'},{id:'brief',label:'Meeting brief'},{id:'followup',label:'Follow-up'},
  {id:'reply',label:'Reply'},{id:'pilot',label:'Pilot'},{id:'objections',label:'Objections'},
  {id:'summary',label:'Summary'},{id:'brainupd',label:'Brain update'},{id:'investor',label:'Investor notes'}
];
const TASKS={
  research:"TASK: Using only the pasted material and the Brain, map where high-value regulated documents move into and out of this organisation, who issues each, who relies on it, and the financial/legal/compliance risk if one were forged, altered, or never issued. Separate confirmed facts from [inferred]. End with the 1-2 documents most worth Kweli-verifying.",
  brief:"TASK: Prepare a meeting brief. 5-6 discovery questions that surface where documents move and what a bad document costs them; 3 likely objections each with a one-line response (hold the precision rule); the recommended pilot in one line; 2-3 ROI metrics the pilot could move.",
  followup:"TASK: Write a follow-up email from Juna using a DIFFERENT angle from previous touches. Under 150 words, one fresh hook (audit readiness, a peer signal, a specific document risk), one soft ask. No guilt, no 'just checking in'.",
  reply:"TASK: The prospect's reply is in the pasted material. Read what they are really saying, then draft Juna's response under 150 words that moves toward a call or pilot without pushing, holding the precision rule. Note any objection worth logging.",
  pilot:"TASK: Propose a tightly-scoped Kweli pilot. One document category, one business unit, the single measurable proof point, a success metric, a rough timeline, and the tier (design partner $10-15K or commercial pilot $20-35K). Hold the precision rule.",
  objections:"TASK: List the 4-6 objections this organisation is most likely to raise, each with a crisp one-line response grounded in the Brain. Hold the precision rule. Flag any objection you cannot yet answer.",
  summary:"TASK: From the pasted notes produce: a 3-line summary; action items (owner + date where stated); new insights; objections raised; recommended next steps; a draft follow-up under 150 words; and any suggested Brain or Lessons-Learned updates. Invent nothing not in the notes.",
  brainupd:"TASK: From the pasted material, propose specific updates to the Kweli Brain. Quote the section name and give exact replacement/addition text. Only propose changes grounded in the material. Flag anything the founder must confirm.",
  investor:"TASK: From the pasted material produce concise investor notes for Juna: what this investor cares about, likely questions, the strongest Kweli framing for them (e.g. digital public infrastructure for environmental trust; the lab/export beachhead; pricing and ACV), risks they will probe, and 3 sharp talking points. Do not invent the investor's portfolio, theses, or facts."
};
const PLAYBOOK_MAP={"Labs":"labs","Insurance":"insurance","Exporters":"export","Agriculture/FMCG":"export","Banks/Lenders":"banking","Investors":"investors"};

const BRAIN_SECTIONS=[
  ["product","Product"],["industries","Industries"],["insurance","Insurance"],["labs","Labs"],
  ["export","Export"],["banking","Banking"],["investors","Investors"],["pricing","Pricing"],
  ["pilotFramework","Pilot Framework"],["objections","Objections"],["futureIdeas","Future Ideas"]
];

function defaultBrain(){return {
  product:"Kweli is verification infrastructure. An organisation registers a cryptographic fingerprint (hash) of a document on the Base blockchain; the document itself is never uploaded or stored - only the fingerprint and verification metadata are anchored. Anyone can later upload the document; Kweli hashes it and compares. Three results: VERIFIED (authentic, unaltered issued document), VERIFICATION FAILED (altered or not the issued version), DOCUMENT NOT FOUND (no record of issuance). The original never leaves the customer; Kweli stores no document contents.\n\nWHAT KWELI IS NOT: not a document-management system, not fraud-detection software, not workflow software, not 'a blockchain product' - the chain is plumbing, never the pitch.\n\nPRECISION RULE (non-negotiable): Kweli proves authenticity of issuance - that a document is the genuine, unaltered one a named issuer registered. It does NOT prove the contents are clinically, factually, or financially correct. A genuinely-issued report with false numbers still verifies. Never claim Kweli detects content fraud, inflated-but-real invoices, or staged events with genuine paperwork. Holding this line keeps the pitch credible.",
  industries:"Target sectors share one trait: high-value regulated documents that a third party must trust but did not issue. Leading beachhead = agricultural export labs and certification bodies (owner-operated gatekeepers with mandate power). Adjacent: exporters, banks/lenders, insurers (verifier-side), governance/legal, and environmental/impact bodies. Sequence: land issuer-side gatekeepers first, prove the mandate mechanic via unprompted downstream verification, then approach verifier-side buyers.",
  insurance:"Insurers are VERIFIERS, not issuers - value only appears once issuers (hospitals, garages, assessors) register documents. Hold the precision rule hard: Kweli does NOT catch inflated-but-real invoices or staged claims; it removes the forged/altered/fabricated category. Best play = Model A anchor-mandate: the insurer mandates its provider panel register documents so claims arrive pre-verified. Slow multi-stakeholder enterprise sale - pursue only with a warm anchor. Reimbursement claim documents are a strong entry wedge. Pilot: one document type across a small provider panel.",
  labs:"Labs issue test reports / certificates of analysis relied on by exporters, buyers, and regulators. Risk: forged or altered COAs cause rejected shipments, food-safety liability, lost market access. Angle: the lab registers each report at issuance; downstream parties verify instantly; the lab becomes a gatekeeper that can mandate verification across its client network (Model A). Pilot: one report type, one season, measure unprompted downstream verifications. Champions: MD/CEO, Quality/Lab Manager, Commercial lead. Leading beachhead wedge.",
  export:"Exporters move phytosanitary certificates, COAs, certificates of origin, fumigation certs across borders; importers, customs, and buyers rely on them. Risk: forged certs cause shipment rejection, fraud, reputational damage. Angle: the certifier or exporter registers each certificate at issuance; importers and customs verify on receipt. Anchor-mandate: a certification body or large buyer mandates verification across its supplier network. Pilot: one certificate type on one export corridor.",

/* dates */
function iso(d){return d.toISOString().slice(0,10)}
function today(){return iso(new Date())}
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return iso(d)}
function fmtDate(s){if(!s)return"";return new Date(s+"T00:00:00").toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"})}
function daysUntil(s){if(!s)return null;return Math.round((new Date(s+"T00:00:00")-new Date(today()+"T00:00:00"))/864e5)}
function uid(p){try{if(crypto&&crypto.randomUUID)return crypto.randomUUID();}catch(e){}return (p||'o')+Math.random().toString(36).slice(2,9)+Math.random().toString(36).slice(2,9);}

/* ---- offline pending queue ---- */
function loadPending(){try{return JSON.parse(localStorage.getItem(PENDING)||'[]');}catch(e){return[];}}
function savePending(q){try{localStorage.setItem(PENDING,JSON.stringify(q));}catch(e){}}
async function sync(table,op,payload){
  if(!CLOUD)return;
  try{
    let res;
    if(op==='upsert')res=await sb.from(table).upsert(payload, table==='brain_sections'?{onConflict:'section_key'}:undefined);
    else if(op==='delete')res=await sb.from(table).delete().eq('id',payload);
    if(res&&res.error)throw res.error;
    if(!online){online=true;updateStatus();}
  }catch(e){online=false;const q=loadPending();q.push({table,op,payload});savePending(q);updateStatus();}
}
async function trySyncPending(){
  if(!CLOUD)return;const q=loadPending();if(!q.length)return;
  const remain=[];
  for(const it of q){try{let r;if(it.op==='upsert')r=await sb.from(it.table).upsert(it.payload,it.table==='brain_sections'?{onConflict:'section_key'}:undefined);else r=await sb.from(it.table).delete().eq('id',it.payload);if(r&&r.error)throw r.error;}catch(e){remain.push(it);}}
  savePending(remain);online=remain.length===0;updateStatus();
  if(online){await fetchAll();render();toast('Synced pending changes');}
}

/* ---- cloud fetch / sync ---- */
async function fetchAll(){
  try{
    const [o,p,l,b,t]=await Promise.all([
      sb.from('opportunities').select('*'),sb.from('people').select('*'),sb.from('lessons').select('*'),
      sb.from('brain_sections').select('*'),sb.from('timeline_events').select('*')]);
    for(const r of [o,p,l,b,t])if(r.error)throw r.error;
    state.opps=(o.data||[]).map(rowToOpp);
    state.people=(p.data||[]).map(rowToPerson);
    state.lessons=(l.data||[]).map(rowToLesson);
    const nb=defaultBrain();
    if((b.data||[]).length){b.data.forEach(r=>{nb[r.section_key]=r.content;});}
    state.brain=nb;
    if(!(b.data||[]).length){for(const [k,label] of BRAIN_SECTIONS){await sb.from('brain_sections').upsert({section_key:k,title:label,content:nb[k]},{onConflict:'section_key'});}}
    const byOpp={};(t.data||[]).forEach(r=>{(byOpp[r.opportunity_id]=byOpp[r.opportunity_id]||[]).push({date:r.date,type:r.type,text:r.text});});
    state.opps.forEach(op=>{op.timeline=(byOpp[op.id]||[]).sort((a,b)=>(a.date||'').localeCompare(b.date||''));});
    online=true;cacheSave();updateStatus();return true;
  }catch(e){
    online=false;updateStatus();
    try{const c=JSON.parse(localStorage.getItem(CACHE));if(c){state=c;state.brain=migrateBrain(state.brain);state.opps.forEach(op=>op.timeline=op.timeline||[]);}}catch(_){}
    return false;
  }
}

    if(data&&data.session){await onSignedIn(data.session);}else{showLogin();}
    sb.auth.onAuthStateChange((_e,s)=>{if(s&&!currentUser){onSignedIn(s);}else if(!s){currentUser=null;CLOUD=false;updateStatus();showLogin();}});

/* ============ CONNECTED DATA MODEL ============
   Enter once, reference everywhere, never duplicate.
   People + Lessons are backed by real synced tables, so links use existing
   columns (companyId / related / source) — no schema changes, cloud-safe.
   Objections + Follow-ups are derived from data already stored on the company. */
function normalizeName(s){return String(s||'').toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();}
function normalizeText(s){return String(s||'').toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();}
function samePerson(n1,n2){const a=normalizeName(n1),b=normalizeName(n2);if(!a||!b)return false;if(a===b)return true;
  const ta=a.split(' '),tb=b.split(' ');const sh=ta.length<=tb.length?ta:tb,lo=ta.length<=tb.length?tb:ta;
  return sh.every((t,i)=>t===lo[i]);}
function mergeNonEmpty(target,fields,skip){skip=skip||[];Object.keys(fields||{}).forEach(k=>{if(skip.indexOf(k)>=0)return;const val=fields[k];if(val!==undefined&&val!==null&&String(val).trim()!=='')target[k]=val;});return target;}
function addSource(list,name){if(!name)return list||'';const cur=String(list||'').split(',').map(s=>s.trim()).filter(Boolean);
  if(!cur.some(s=>normalizeName(s)===normalizeName(name)))cur.push(name);return cur.join(', ');}

function findOrCreatePerson(name,fields){
  const matches=state.people.filter(p=>samePerson(p.name,name));
  let ex=null;
  if(matches.length===1)ex=matches[0];
  else if(matches.length>1)ex=matches.find(p=>normalizeName(p.name)===normalizeName(name))||null;
  if(ex){
    if(normalizeName(name).split(' ').length>normalizeName(ex.name).split(' ').length)ex.name=name;
    mergeNonEmpty(ex,fields);ex.dateUpdated=today();persistPerson(ex);return ex;
  }
  const np=Object.assign({id:uid('p'),createdBy:userName(),dateCreated:today(),dateUpdated:today()},fields,{name});
  state.people.push(np);persistPerson(np);return np;
}
function findOrCreateLesson(fields,companyName){
  const tkey=normalizeText(fields.title),dkey=normalizeText(fields.description);
  let ex=null;
  if(tkey)ex=state.lessons.find(l=>normalizeText(l.title)===tkey);
  if(!ex&&!tkey&&dkey)ex=state.lessons.find(l=>normalizeText(l.description)===dkey);
  if(ex){
    mergeNonEmpty(ex,fields,['related','source']);
    if(companyName){ex.related=addSource(ex.related,companyName);if(!ex.source)ex.source=companyName;}
    ex.dateUpdated=today();persistLesson(ex);return ex;
  }
  const nl=Object.assign({id:uid('l'),createdBy:userName(),dateCreated:today(),dateUpdated:today()},fields);
  if(companyName){nl.related=addSource(fields.related,companyName);if(!nl.source)nl.source=companyName;}
  state.lessons.push(nl);persistLesson(nl);return nl;
}
function linkEntityToCompany(entity,companyName,field){field=field||'related';entity[field]=addSource(entity[field],companyName);return entity;}
function getCompanyPeople(o){if(!o)return [];const n=normalizeName(o.company);
  return state.people.filter(p=>p.companyId===o.id||(n&&normalizeName(p.company)===n));}
function getCompanyLessons(o){if(!o)return [];const n=normalizeName(o.company);if(!n)return [];
  return state.lessons.filter(l=>normalizeName(l.related).indexOf(n)>=0||normalizeName(l.source).indexOf(n)>=0);}
function getCompanyFollowUps(o){if(!o||!o.followUp)return [];return [{company:o.company,companyId:o.id,due:o.followUp,task:o.nextAction||'',priority:o.priority,status:o.status}];}
function getCompanyObjections(o){return (o&&o.objections&&o.objections.trim())?o.objections.trim():'';}
function allObjections(){return state.opps.filter(o=>getCompanyObjections(o));}

/* ============ GLOBAL SEARCH ============ */
function runSearch(q){const panel=document.getElementById('searchPanel');q=(q||'').trim();
  if(!q){panel.innerHTML='';return;}
  const ql=q.toLowerCase();const hit=t=>(t||'').toLowerCase().includes(ql);
  const groups=[];
  const comp=state.opps.filter(o=>hit(o.company)||hit(o.category)||hit(o.angle)||hit(o.pilot)||hit(o.objections)||hit(o.notes)||hit(o.meetingNotes)||hit(o.contactRole));
  if(comp.length)groups.push(['Companies & Investors',comp.map(o=>({title:o.company,sub:o.category,snip:o.nextAction||o.angle,go:"go('detail','"+o.id+"')"}))]);
  const ppl=state.people.filter(p=>hit(p.name)||hit(p.role)||hit(p.company)||hit(p.notes)||hit(p.relationship));
  if(ppl.length)groups.push(['People',ppl.map(p=>({title:p.name,sub:p.role||'',snip:p.company,go:"openPerson('"+p.id+"')"}))]);
  const les=state.lessons.filter(l=>hit(l.title)||hit(l.description)||hit(l.impact)||hit(l.category)||hit(l.source)||hit(l.related));
  if(les.length)groups.push(['Lessons',les.map(l=>({title:l.title,sub:l.category||'',snip:l.impact,go:"openLesson('"+l.id+"')"}))]);
  const kb=BRAIN_SECTIONS.filter(([k,label])=>hit(label)||hit(state.brain[k]));
  if(kb.length)groups.push(['Knowledge Base',kb.map(([k,label])=>({title:label,sub:'section',snip:(state.brain[k]||'').slice(0,90),go:"go('knowledge')"}))]);
  if(!groups.length){panel.innerHTML='<div class="search-empty">No matches for “'+esc(q)+'”.</div>';return;}
  panel.innerHTML='<div class="search-panel">'+groups.map(([title,items])=>'<div class="search-group-h">'+title+'</div>'+
    items.slice(0,6).map(it=>'<div class="search-res" onclick="'+it.go+'"><div style="flex:1;min-width:0"><span class="r-title">'+esc(it.title)+'</span>'+(it.snip?'<span class="r-snip">'+esc(String(it.snip).slice(0,100))+'</span>':'')+'</div><span class="r-sub">'+esc(it.sub)+'</span></div>').join('')).join('')+'</div>';
}

/* ============ PROMPT BUILDER ============ */
function brainText(){return BRAIN_SECTIONS.map(([k,label])=>'## '+label+'\n'+(state.brain[k]||'')).join('\n\n');}
function companyBlock(o){if(!o)return '(no company selected — general request)';
  const ppl=peopleOf(o.id).map(p=>p.name+' ('+(p.role||'role unknown')+', '+(p.warmth||'')+')').join('; ');
  return ['Company: '+o.company,'Category: '+o.category,'Website: '+(o.website||'unknown'),
    'Contact role: '+(o.contactRole||'unknown'),'Email: '+(o.email||'unknown — do not guess'),
    'Stage: '+o.stage,'Priority: '+(o.priority||0),isInv(o)?'Investment status: '+(o.investmentStatus||'—'):'',
    'Linked people: '+(ppl||'none'),'Kweli angle (founder hypothesis): '+(o.angle||'none yet'),
    'Proposed pilot: '+(o.pilot||'none yet'),'Known objections: '+(o.objections||'none logged')].filter(Boolean).join('\n');}
function notesBlock(o){if(!o)return '';const p=[];if(o.notes)p.push('Notes: '+o.notes);if(o.meetingNotes)p.push('Meeting notes: '+o.meetingNotes);
  const tl=(o.timeline||[]).slice(-5);if(tl.length)p.push('Recent timeline: '+tl.map(t=>t.date+' ['+(t.type||'Note')+'] '+t.text).join(' | '));return p.length?p.join('\n'):'(none recorded)';}
function buildPrompt(task,o,extra){
  const pk=o?PLAYBOOK_MAP[o.category]:null;const pb=pk?state.brain[pk]:'';
  const rules='You are the Kweli BD Analyst — the sharpest business-development analyst in Africa, trained only on Kweli. Reason ONLY from the Kweli Brain, the company record, and the pasted material below.\n\nRULES (non-negotiable):\n- Do not invent names, emails, titles, or facts. If unknown, write "unknown — verify" and say how to find it.\n- Hold the precision rule: Kweli proves a document is the authentic, unaltered issued one; it does NOT prove the contents are correct.\n- Keep any outreach under 150 words, founder-led, human, no hype.\n- If Kweli is not a genuine fit here, say so plainly.';
  const parts=[rules,'=== COMPANY RECORD ===\n'+companyBlock(o)];
  if(o)parts.push('=== STORED NOTES ===\n'+notesBlock(o));
  if(pb)parts.push('=== SECTOR PLAYBOOK ('+o.category+') ===\n'+pb);
  if(extra&&extra.trim())parts.push('=== PASTED MATERIAL ===\n'+extra.trim());
  parts.push('=== KWELI BRAIN ===\n'+brainText());
  parts.push(TASKS[task]||TASKS.research);
  return parts.join('\n\n');
}

  const TA=(l,k,r,ph)=>'<div class="field"><label class="fl">'+l+'</label><textarea class="input" id="f_'+k+'" rows="'+(r||3)+'" placeholder="'+(ph||'')+'">'+esc(o[k]||'')+'</textarea></div>';
  const SEL=(l,k,arr)=>'<div class="field"><label class="fl">'+l+'</label><select class="select" id="f_'+k+'">'+arr.map(v=>'<option '+(o[k]===v?'selected':'')+'>'+v+'</option>').join('')+'</select></div>';
  document.getElementById('modal-root').innerHTML='<div class="modal-scrim" onclick="if(event.target===this)closeModal()"><div class="modal lg"><div class="modal-h"><h2>'+(id?'Edit':'New')+' record</h2><button class="x" onclick="closeModal()">×</button></div>'+
    F('Company name','company')+
    '<div class="field-row">'+SEL('Category','category',CATEGORIES)+SEL('Stage','stage',STAGES)+'</div>'+
    '<div class="field-row">'+F('Website','website','text','https://')+F('Priority (0–100)','priority','number')+'</div>'+
    '<div class="field-row">'+F('Contact name','contactName')+F('Contact role','contactRole')+'</div>'+
    '<div class="field-row">'+F('Email','email','text','verified public email only')+F('LinkedIn','linkedin','text','https://linkedin.com/in/')+'</div>'+
    TA('Kweli angle','angle',3,'Where Kweli genuinely helps this org')+TA('Proposed pilot','pilot',2,'Tight, measurable, one document type')+
    '<div class="field-row">'+F('Last interaction','lastInteraction','date')+F('Follow-up date','followUp','date')+'</div>'+
    F('Next action','nextAction')+TA('Notes','notes',3)+TA('Meeting notes','meetingNotes',3)+TA('Objections','objections',2)+
    '<div class="field-row">'+SEL('Status','status',STATUSES)+SEL('Investment status (investors)','investmentStatus',['—'].concat(INVEST_STATUS))+'</div>'+
    '<div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn gold" onclick="saveForm(\''+(id||'')+'\')">'+(id?'Save changes':'Add')+'</button></div></div></div>';
}
function val(k){const el=document.getElementById('f_'+k);return el?el.value.trim():''}
function saveForm(id){const company=val('company');if(!company){toast('Company name required');return;}
  const inv=val('investmentStatus');
  const d={company,category:val('category'),website:val('website'),contactName:val('contactName'),contactRole:val('contactRole'),linkedin:val('linkedin'),email:val('email'),
    stage:val('stage'),priority:Math.max(0,Math.min(100,+val('priority')||0)),angle:val('angle'),pilot:val('pilot'),
    lastInteraction:val('lastInteraction'),followUp:val('followUp'),nextAction:val('nextAction'),notes:val('notes'),
    meetingNotes:val('meetingNotes'),objections:val('objections'),status:val('status'),investmentStatus:inv==='—'?'':inv};
  function linkContact(cid){if(!d.contactName)return;findOrCreatePerson(d.contactName,{companyId:cid,company:d.company,role:d.contactRole,email:d.email,linkedin:d.linkedin,relationship:'Company contact',warmth:'Warm'});}
  if(id){const o=byId(id);const old=o.stage;Object.assign(o,d);persistOpp(o);if(old!==d.stage){addActivity(id,'Stage',userName()+' changed stage from '+old+' to '+d.stage);}linkContact(id);closeModal();render();toast('Updated');}
  else{d.id=uid();d.createdBy=userName();d.timeline=[];state.opps.push(d);addActivity(d.id,'Created',userName()+' created '+d.company);linkContact(d.id);closeModal();go('detail',d.id);toast('Added');}
}
function delOpp(id){const o=byId(id);if(!o)return;if(!confirm('Delete '+o.company+'? This cannot be undone.'))return;
  state.opps=state.opps.filter(x=>x.id!==id);state.people.forEach(p=>{if(p.companyId===id)p.companyId='';});persistOppDelete(id);go('companies');toast('Deleted');}
function logAct(id){const t=document.getElementById('logText').value.trim();if(!t)return;const o=byId(id);
  const ev={date:today(),type:document.getElementById('logType').value,text:t};o.timeline=o.timeline||[];o.timeline.push(ev);o.lastInteraction=today();persistTimeline(Object.assign({oppId:id},ev));persistOpp(o);render();}

/* People form */
function personForm(id,companyId){const p=id?state.people.find(x=>x.id===id):{companyId:companyId||''};
  const F=(l,k,t,ph)=>'<div class="field"><label class="fl">'+l+'</label><input class="input" id="pf_'+k+'" type="'+(t||'text')+'" value="'+esc(p[k]||'')+'" placeholder="'+(ph||'')+'"></div>';
  const TA=(l,k)=>'<div class="field"><label class="fl">'+l+'</label><textarea class="input" id="pf_'+k+'" rows="3">'+esc(p[k]||'')+'</textarea></div>';
  const compOpts='<option value="">— none —</option>'+state.opps.map(o=>'<option value="'+o.id+'"'+(p.companyId===o.id?' selected':'')+'>'+esc(o.company)+'</option>').join('');
  const warmth='<div class="field"><label class="fl">Warmth</label><select class="select" id="pf_warmth">'+WARMTH.map(w=>'<option '+(p.warmth===w?'selected':'')+'>'+w+'</option>').join('')+'</select></div>';
  document.getElementById('modal-root').innerHTML='<div class="modal-scrim" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-h"><h2>'+(id?'Edit':'New')+' person</h2><button class="x" onclick="closeModal()">×</button></div>'+
    F('Name','name')+
    '<div class="field"><label class="fl">Company</label><select class="select" id="pf_companyId" onchange="document.getElementById(\'pf_company\').value=this.selectedOptions[0].text.replace(\'— none —\',\'\')">'+compOpts+'</select></div>'+
    '<input type="hidden" id="pf_company" value="'+esc(p.company||'')+'">'+
    '<div class="field-row">'+F('Role','role')+warmth+'</div>'+
    '<div class="field-row">'+F('Email','email','text','verified only')+F('LinkedIn','linkedin')+'</div>'+
    '<div class="field-row">'+F('Relationship','relationship','text','e.g. warm intro, target champion')+F('Last interaction','lastInteraction','date')+'</div>'+
    F('Next action','nextAction')+TA('Notes','notes')+
    '<div class="modal-foot">'+(id?'<button class="btn danger" style="margin-right:auto" onclick="delPerson(\''+id+'\')">Delete</button>':'')+'<button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn gold" onclick="savePerson(\''+(id||'')+'\')">'+(id?'Save':'Add')+'</button></div></div></div>';
}
function pval(k){const el=document.getElementById('pf_'+k);return el?el.value.trim():''}
function savePerson(id){const name=pval('name');if(!name){toast('Name required');return;}
  const cid=pval('companyId');const comp=cid?(byId(cid)||{}).company||'':pval('company');
  const d={name,companyId:cid,company:comp,role:pval('role'),warmth:pval('warmth'),email:pval('email'),linkedin:pval('linkedin'),
    relationship:pval('relationship'),lastInteraction:pval('lastInteraction'),nextAction:pval('nextAction'),notes:pval('notes')};
  if(id){const ex=state.people.find(x=>x.id===id);Object.assign(ex,d);ex.dateUpdated=today();persistPerson(ex);}
  else{findOrCreatePerson(name,d);}
  closeModal();render();toast(id?'Updated':'Person added');}
function delPerson(id){if(!confirm('Delete this person?'))return;state.people=state.people.filter(p=>p.id!==id);persistPersonDelete(id);closeModal();render();toast('Deleted');}

/* Lessons form */
function lessonForm(id,companyId){const l=id?state.lessons.find(x=>x.id===id):{date:today()};
  if(!id&&companyId){const c=byId(companyId);if(c){l.related=c.company;l.source=c.company;}}
  const F=(lab,k,t)=>'<div class="field"><label class="fl">'+lab+'</label><input class="input" id="lf_'+k+'" type="'+(t||'text')+'" value="'+esc(l[k]||'')+'"></div>';
  const TA=(lab,k)=>'<div class="field"><label class="fl">'+lab+'</label><textarea class="input" id="lf_'+k+'" rows="3">'+esc(l[k]||'')+'</textarea></div>';
  document.getElementById('modal-root').innerHTML='<div class="modal-scrim" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-h"><h2>'+(id?'Edit':'New')+' lesson</h2><button class="x" onclick="closeModal()">×</button></div>'+
    F('Title','title')+
    '<div class="field-row">'+F('Date','date','date')+'<div class="field"><label class="fl">Category</label><select class="select" id="lf_category">'+['',...CATEGORIES].map(c=>'<option '+(l.category===c?'selected':'')+'>'+c+'</option>').join('')+'</select></div></div>'+
    F('Source','source')+TA('Description','description')+TA('Impact','impact')+F('Related companies','related')+
    '<div class="modal-foot">'+(id?'<button class="btn danger" style="margin-right:auto" onclick="delLesson(\''+id+'\')">Delete</button>':'')+'<button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn gold" onclick="saveLesson(\''+(id||'')+'\',\''+(companyId||'')+'\')">'+(id?'Save':'Add')+'</button></div></div></div>';
}
function lval(k){const el=document.getElementById('lf_'+k);return el?el.value.trim():''}
function saveLesson(id,companyId){const title=lval('title');if(!title){toast('Title required');return;}
  const d={title,date:lval('date')||today(),category:lval('category'),source:lval('source'),description:lval('description'),impact:lval('impact'),related:lval('related')};
  const companyName=companyId?((byId(companyId)||{}).company||''):'';
  if(id){const ex=state.lessons.find(x=>x.id===id);Object.assign(ex,d);if(companyName)ex.related=addSource(ex.related,companyName);ex.dateUpdated=today();persistLesson(ex);}
  else{findOrCreateLesson(d,companyName);}
  closeModal();render();toast(id?'Updated':'Lesson saved');}
function delLesson(id){if(!confirm('Delete this lesson?'))return;state.lessons=state.lessons.filter(l=>l.id!==id);persistLessonDelete(id);closeModal();render();toast('Deleted');}

function closeModal(){document.getElementById('modal-root').innerHTML=''}

/* data actions */
function resetBrain(){if(confirm('Reset the Knowledge Base to defaults? Your edits will be lost.')){state.brain=defaultBrain();cacheSave();if(CLOUD){BRAIN_SECTIONS.forEach(([k,label])=>sync('brain_sections','upsert',{section_key:k,title:label,content:state.brain[k]}));}render();toast('Knowledge Base reset');}}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='kweli-brain-'+today()+'.json';a.click();URL.revokeObjectURL(a.href);toast('Backup downloaded');}
function importData(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.opps&&!d.brain)throw new Error('not a valid backup');if(!confirm(CLOUD?'Upload this backup into the shared cloud? Existing records are kept; this adds the backup\'s records.':'Replace all current data with this backup?'))return;
  if(CLOUD){toast('Importing…');uploadDataset(d).then(()=>fetchAll()).then(()=>{render();toast('Backup imported');}).catch(e=>toast('Import failed: '+(e.message||e)));}
  else{state={opps:d.opps||[],people:d.people||[],lessons:d.lessons||[],brain:migrateBrain(d.brain),version:2};state.opps.forEach(o=>o.timeline=o.timeline||[]);cacheSave();go('dashboard');toast('Backup restored');}
  }catch(e){toast('Import failed: '+e.message);}};r.readAsText(f);input.value='';}
function resetDemo(){if(!confirm(CLOUD?'Replace ALL shared cloud data with demo data?':'Reload demo data? This replaces everything currently stored.'))return;
  if(CLOUD){(async()=>{toast('Resetting…');try{await clearCloud();await uploadDataset(seed());await fetchAll();render();toast('Demo data loaded');}catch(e){toast('Failed: '+(e.message||e));}})();}
  else{state=seed();cacheSave();go('dashboard');toast('Demo data loaded');}}
function clearAll(){if(!confirm(CLOUD?'Delete ALL shared companies, people and lessons? Cannot be undone.':'Delete ALL companies, people and lessons? The Knowledge Base is kept. Cannot be undone.'))return;
  if(CLOUD){(async()=>{try{await clearCloud();await fetchAll();render();toast('Cleared');}catch(e){toast('Failed: '+(e.message||e));}})();}
  else{state.opps=[];state.people=[];state.lessons=[];cacheSave();go('dashboard');toast('Cleared');}}

/* clipboard + toast */
function copy(t){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>toast('Copied to clipboard'),()=>fb(t));}else fb(t);}
function fb(t){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('Copied to clipboard');}catch(e){toast('Copy failed');}document.body.removeChild(ta);}
let tt;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),1900);}

function afterRender(){}
init();
</script>
</body>
